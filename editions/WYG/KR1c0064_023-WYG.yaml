body:
  text: 詩序補義卷二十三石泉縣知縣姜炳璋撰周頌頌者祭祀之樂歌美盛德之形容以其成功告於神明也籀文頌作額漢書魯徐生善為頌頌與容古通用葢樂有音有容頌主乎容舞人之綴兆疾徐屈伸俯仰歌詩以為之節非如二雅専以鐘鼓管磬之音也後又借為稱頌之頌讀為誦周頌者鄭譜云周室成功致太平德洽之詩在周公攝政成王即位之初也朱子曰周公相武王成王天下既平作為樂章薦之郊廟所謂周頌也吾葢讀周頌而知周公之後無為周頌者矣清廟維清大武用于文武二廟者也何以羣廟用之賔禮用之養老及小學亦用之禘之雝又用於徹又用於賔饗武之酌用於燕禮又用於内則此類不可更僕夫名臣鉅儒所時有也何難祭為一詩賔為一詩養老小學為一詩而墨守故什使王者宗廟之大樂為尋常之歌舞哉盖不愆不忘率由舊章後王遵周公之制作寜上下通用而不敢别有設施也吾讀周頌而知成王康王無頌成康賢君也豈不可以為頌者然以因心篤慶之王季未有形容肇基王迹之太王不列世室盖頌者祖有功而宗有徳以大公無我之心合諸天下後世臣民之議雖太王王季亦在先王先公歌天作之詩之列而不得多為之頌也成康之無頌亦如是矣如必廟為一頌則宣王中興吉甫善頌何雅詩連篇而頌獨闕然乎或曰殷中宗髙宗既有頌太宗疑亦有頌先儒以為詩散亡耳然則三宗皆有頌也成康何遽不如三宗曰殷人祖契宗湯下及三宗俱為百世不遷之廟故𤣥王武湯及三宗俱有頌周人祖文王而宗武王未聞又宗成康也成康之廟親盡則祧故成康無頌盖所謂宗者于初崩祔廟即率臣民而定為宗迨親盡之時始别立廟非必至七世而後宗之也商人兼重守成之君太甲所以不祧也周家獨重開創之主所以世室止于文武不及成康也吾讀周頌而可訂漢儒議禮之謬昊天有成命郊祀天地也郊者南郊北郊也不言合祀則周禮兩郊分祀可遵而劉歆合祀之説悖矣既有南郊之祀又有祈穀又有大雩可知郊為特重祈穀大雩不得擬于南郊而後人以郊為祈穀者誤矣既有北郊之祀又有祈報社稷則知大社祭地在北郊即方丘泰折之祭與郊對舉者也王社祈報在國中是祭土穀之神不與郊對舉者也彼混北郊之社于祈報之社者誤矣且讀周頌而可補禮經之闕少牢禮卿大夫賔尸無異牲而絲衣言自羊徂牛則天子之繹無異牲可知也武王伐商武城但言告于所過名山大川有般之詩知滅商而還亦祀于名山大川也諸儒言禘未嘗云並祀祖妣而雝已言之月令耕籍之後未嘗云祈社稷而載芟言之金縢載成王悔悟之詞未盡而小毖等篇言之然則周頌者文武周公之道大經大法所垂不比周官載記有大純而不能無小疵者也清廟之什清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉此詩即洛誥所云王在新邑丞祭其升歌之樂也尚書大傳云周公升歌清廟苟在廟中嘗見文王者愀然如復見文王焉又云諸侯進受命于周公退見文武之尸者千七百七十三諸侯而明堂位乃云周公踐天子之位以治天下六年朝諸侯於明堂孔疏謂此詩所作即此時也按漢人作明堂位者承大傳之説妄謂周公居攝踐祚安可據以釋經故集傳據洛誥以成洛邑朝諸侯為七年事也續序所云可補古序未備然祀文王者成王也周公亦顯相之列安得專之不言主祭之成王而但言周公亦襲明堂位之謬也清廟賈逵左傳註肅然清静謂之清廟敬之從容不迫處曰雝對箋云配也越於也原解對接也言顯相肅雝和敬多士秉文王之徳者可以接於文王在天之神也凡頌只重祖考不重子孫故篇中不言成王主祭之誠敬而顯相之肅雝多士之秉徳纔見文徳深入人心而成王之誠敬自在其中清廟一章八句維天之命太平告文王也太平告文王者以今日大平之業本於文王之徳之純故於祭時以告文王也盖天道不已故能博厚髙明悠乆無言而萬物生文王之純亦不已故能配天配地無為而萬民化成王之時禮明樂備宇宙太和刑措不用極太平之盛而歸本於文徳之純猶中庸極言至誠之功業而歸本於純亦不已也運行而不息者天也純一而不雜者文王也文王之徳上下與天地同流所以致今日太平之業也太平之業不於其身於其子孫而實其身基之其所以恤我者大矣我成王自我也凡文徳武功典章禮樂垂裕後昆者皆所以恤我也我則受之不敢失墜其所以大順文王之道而不愆不忘者豈惟今日哉繼此曽孫又當篤厚之而弗替以長享太平之業也箋疏求序中太平之義而不得其解謂周公將制禮作樂而作此詩非也維天之命一章八句文王世子祭統孔子燕居俱云升歌清廟下管象可知清廟維清歌於一時而維天之命獨無明文詩所云清廟方祭之詩維天之命祭而受福之詩維清祭畢而送神之詩盖體㑹三篇文義以立説也維清奏象舞也樂有歌有舞歌以為聲舞以為容聲容備謂之奏象文王之舞也武武王之舞也堂下將舞象則堂上歌維清故序曰奏象舞也堂下將舞武則堂上歌大武故武之序曰奏大武也盖有其舞必有其歌如舜九徳之歌則有九韶之舞也自鄭箋謂象舞象文王用兵刺伐之舞孔疏云文王之樂象箾與南籥各是一舞南籥既是文舞象箾當是武舞按其説可疑者三象舞維清之詩也象者想象形容之意象文王之功徳而舞人即以此為節故謂象舞非維清之外别有所謂象舞也猶大武即於皇武王之詩以為舞節非是詩之外别有所謂大武也詩但言文王之典未及伐密伐崇事而云象文王武功一也頌體謹嚴主於形容功徳體極簡括猶文王諡文武王諡武一字而該生平耳不得以大雅下武有聲之詩為例也祭文王之廟安得侈陳刺伐之事二也鄭箋既以象舞為文王樂而其註禮記又以象為武王之舞即彼亦未有定説三也盖維清而曰象猶於皇武王之名為武於鑠王師之名為勺雝之名為徹耳或曰左傳吴季札觀樂見舞象箾南籥者曺氏以象箾為干舞南籥為籥舞干舞非武舞歟曰象箾南籥服䖍云文王樂也箾舞曲名杜預曰箾舞者所執孔疏謂不知何器未嘗云干舞也至唐顧野王孫强之玉篇乃本鄭箋而謬云以干擊人曰箾遂使音義皆别而象舞為武舞矣不知箾與蕭通説文云虞舜樂曰箾韶尚書作蕭韶記曰管象註云以管吹象舞之曲或以蕭管為舞器如左手執籥之類或以簫亦管也象箾象管一也總之為文舞無疑也不然左氏傳又言見舞韶箾者豈盡美盡善之韶亦以干擊人歟曲禮十三年舞勺則於鑠王師也成童舞象則維清也盖清廟用歌象用管大武用干戚故樂記曰始奏以文謂清廟維清也復亂以武則大武也歴考經傳可知鄭箋之非矣然清廟維清大武不止用於文武二廟其見於明堂位祭統則羣廟皆用之見於仲尼燕居則賔禮用之見於文王世子則養老用之見於曲禮則小學用之盖文王之徳武王之功周人崇之也至故其用之也廣原解以維清為句緝熈文王之典為句言周道所以清明者以能緝熈文王之典常也文王新命肇開一代之禋祀迄於後人用天子之禮以祀文王克有成禮然則文王之典章謨訓非我周之禎祥也哉後人當守而弗失也維清一章五句烈文成王即政諸侯助祭也即政者喪畢而親政也諸侯來朝王率之以祀祖考此其獻助祭諸侯之詩也後儒本明堂位遂謂成王七年周公留洛王始親攬大政此詩為七年以後作夫成王以十有三歲而立再七年則年二十乃始見諸侯乎洛誥云周公誕保文武惟七年亦謂成王七年周公留洛耳非謂七年以前成王未嘗親政也烈文辟公呼助祭之諸侯而告之也言汝之助祭前王既錫祉福君臣共獲其休矣汝能順受此無疆之福則汝之子孫亦能保兹於勿替也我我先王也子孫指諸侯之子孫即所謂繼序也方與下節相屬保之維何爾於國中無封殖無侈靡維王室是尊則永為屏翰矣念爾有輔我前王平定天下之大功繼爾為諸侯者亦無墜此大功則勲業永著矣此皆保之之道也戎大也皇亦大也櫛風沐雨削平天下前日之大功也榦不度方以佐戎辟後嗣之大功也非必於前人之功更加擴大方為繼序之皇而道徳者其根本也人徒知力馭勢驅為强不知莫强於人道能使四方之訓人徒知位膺康侯為顯不知莫顯於君徳能使百辟之刑我前王緝熈執競完此心即完道徳爾辟公法前王之道徳而不忘則前王錫之祉福者世世保之矣補正云諸侯有功徳加地進律皆可為牧伯故以百辟其刑勉之六月之萬邦為憲抑之四方其訓皆諸侯之事也烈文一章十三句天作祀先王先公也頌有専祭太祖者則稱太祖之功徳如思文是也有専祀文王者則稱文王之功徳如清廟三篇是也此詩祫祭太祖三昭三穆之樂歌禮天子七廟三昭三穆并太祖之廟而七先王者太王以下也先公者后稷髙圉亞圉祖紺也盖時祭以昭穆為重若徧舉羣廟功烈髙圉以下無可稱述且人各稱頌亦非簡嚴頌體故於先王中舉一肇基王迹之太王非遺祖紺以上也言太王而后稷以來之緒可見矣又舉一有二新命之文王非遺王季也季以太王為父文王為子承先啟後之美可見矣故持祭則歌是詩於各廟祫則合奏是詩於太廟也要知頌與雅不同雅者臣子之告君祖功宗徳可以詳述頌者子孫之告於祖主於謹嚴故錯舉大端包涵無盡如此篇太王造岐之功只一荒字盡之文王治岐之政只一康字盡之即岐山之太和宇宙只有夷之行該之子孫撫有天下又只一保字該之盖上承祖考凛凛如在稱頌之詞極簡慎之至也彼作矣言既荒之後亦文自作之也荒之承天作之意裕子孫之謀其功最大彼指文王補正云大雅言掠彼武王或疑太王不冝稱彼誤矣作者創造於前也便有王季丕承一層在内康之包孟子一叚治岐之政險岨之岐山遂成太和翔洽之都㑹今日八蠻通道萬方攸同皆托基於此居岐者文王之初年文固作邑於程作邑於豐武且遷於鎬京矣而子孫之保歸重岐山豈非以興王根本之地當萬世守之而文王治岐之政當萬世行之也哉周公之意微矣其後周室東遷岐以西屬之於秦而周迄於亡固知祖宗為子孫計早数計而燭照也天作一章七句昊天有成命郊祀天地也周禮冬至祀天於南郊夏至祀地於北郊序云郊祀天地盖二郊並歌此詩也北郊亦歌此詩不言地地統於天也頌之體有祭其神即歌其功烈者亦有祭其神而所歌在彼其理可通於此者如天作一詩文王而上王季以至髙圉武王而下成王以至羣廟無不歌之今其詩但舉太王文王而不及其餘然則祀地而以天統之奚不可乎故曰郊社之禮所以祀上帝也成王不敢康成王非王誦之諡猶之詩曰成王之孚平王之孫文武維后書曰成王畏相云爾凡頌中言成康者皆非成王康王也成命成王兩成字同義命於天為成命成就於君為成王其義一也至於成康無頌則已詳見周頌篇端補傳曰國語言時邁思文二詩為周公作以孔子之言參之郊祀后稷以配天宗祀文王於明堂以配上帝皆出於周公則昊天有成命我將思文皆一時之事則二詩作於周公復何疑也作於周公則非祀成王者矣此詩言天命者止一語盖天地功徳無可形容但言二后所以受之不負所付託而已可知是詩本未嘗頌天及其祭地更何煩易一語以頌地矣昊天有成就王業之命文武受之以成王業而不敢康夙夜之間基天命於宏深静密之徳繼續光明單盡其心以與天心契故能安靖天下而克受成命也昊天有成命一章七句我將祀文王於明堂也范氏處義曰明堂者王者之堂也其制始於黄帝之合宫有虞氏謂之總章夏謂之世室商謂之重屋周謂之明堂以為聽政之所耳祀文王於此則周公為之也周公制作禮樂以為周之王業始於后稷成於文王既於郊祀以后稷配天矣於是祀文王於明堂以配上帝焉此周公以義起也孝經所謂宗祀文王於明堂以配上帝此其樂歌也右尊臨也集傳在羊牛之右説恐未安文王之典正奉若天道以靖四方者也儀式刑於平日則將享未行而精神已契於文王庶幾藉是以格天法文王敬天之心夙夜亹亹無敢戱豫方是畏天而天心常眷盖臨時之將享不可恃而平日之夙夜不敢寛哀公問云仁人之事親也如事天事天如事親盖以事天者事親而親之饗可必也以事親者事天而天之饗或可知也饗帝享親初無二道西銘云于時保之子之翼也畏天之威乃孝子所以嚴父也歟我將一章十句時邁巡守告祭柴望也書曰嵗二月東巡守至於岱宗柴望秩於山川五月南巡守如岱禮八月西巡守如初十有一月北巡守如西禮柴謂燔柴祭天以告至也望謂境内山川望而祭之五嶽視三公四瀆視諸侯其餘視伯子男也序言巡守告祭又云柴望言巡守告祭者乃行柴望之禮也或謂武王末受命無巡守之事因據書周官為成王之詩按左傳稱武王克商作頌曰載戢干戈國語又稱此為周文公之頌則周公作於武王時也武王十三年克商十九年崩在位七年豈無巡守之事詩云時邁其邦其邦諸侯之邦也盖以時巡行諸侯之國也然則武王巡守自在七年之内詩之所有足以補史傳之闕者此類是也告天之詞無不卑順而此獨信其子我者以實尊周之位序於天下之上為天下主也一序字幾許斟酌足為天之肖子而後為民之元后故巡行而神人受職時邁即所以震之也孔疏云諸侯為王者守土専制一國王者端拱深居耳目不達於逺方神明不照於幽僻將强以凌弱衆以侵寡壅遏王命寃不上聞而使逺道細民受枉聖世先王知其如是時自巡之所以震之也震疊一作震慴謂恐懼屏息慮獲戾也言甫至方岳諸侯已有震疊之心於是行懐柔之典百神河嶽俱在告祭之内神人受職如此信矣為天下君語氣有責成意明昭有周式序在位即孟子入其疆一叚王制命太師以下二大叚事於是兵可以無用懿徳箋云我武王求懿徳之士而任用之補正云古者天子使上官監于方伯之國而諸侯之卿皆命於王朝所以紀綱四方有條而不紊我求懿徳肆于時夏允王保之盖謂此也言維后言保之俱以允字發端皆欲其信能如此也范家相引武成以證此詩謂薄言震之非大邦畏力小邦懐徳乎懐柔百神非神克相予以濟兆民乎明昭式序非列爵分土乎戢弓櫜矢非偃武脩文乎懿徳肆夏非惇信明義垂拱而治乎按此詩謂與武城相表裏則可而云即是所過名山大川之祭則有般之篇在非此詩也時邁一章十五句外傳金奏肆夏樊遏渠天子以饗元侯也韋昭以樊遏渠為九夏之三呂玉叔又以時邁為肆夏執競為樊遏思文為渠説雖不同然其為周公所作則無異也執競祀武王也朱子曰武王持自强不息之心故其功烈之盛天下莫得而競此其所以成大功而安之也箋云不强乎其克商之功業言其强也不顯乎其成安祖考之道言其顯也按無競與不顯一例箋説甚明而其云成安祖考解成康字猶未融洽康安也安天下者天之心武王能成就之則上帝是皇矣自彼成康彼指武王也自武王成就其安天下之心而奄有四方聰明首出斤斤乎照臨天下幽隱畢達明之至也樂以宣執競之心播無競不顯之烈者也功成樂作則武王儼然如在祭則受福正受此成康之緒耳作樂時非無威儀此以見禮終不倦故福亦反覆之而不厭也執競一章十四句思文后稷配天也此郊祀后稷以配天之樂歌也與大雅生民篇意同雅主追叙其事故詳明頌主形容功徳故簡括但生民言養民而盡文徳陳常則此詩獨見也立當從傳如字言立我烝民之命莫非爾徳之極也傳云極中也中者無過不及堯舜禹相傳之至徳也莫非内便含陳常意此二句只作引起之詞下文乃申明之貽我來牟之二麥猶云誕降嘉種耳偽泰譬云烏五至以穀俱來韓詩乃作貽我嘉􅓿劉向封事引飴我釐麰麥也始自天降皆非也帝命徧育烝民而稷實貽之無有疆界之殊食足而禮義興堯舜之常道可以陳於中國然則立民之命者即立民之性也民同此性性同此中人人全其受中之性而文明以啟此為爾徳之極足以贊化育也郊祀配天宜矣思文一章八句清廟之什十篇十章九十五句周頌臣工之什臣工諸侯助祭遣於廟也疏云諸侯來朝行朝享之禮已終天子饗食燕賜之事又畢惟待祭訖而歸故於祭之末在廟中遣之作此歌焉頌者宗廟之樂歌而政之行於廟者亦附之皆所以闡揚祖功宗徳也若但為戒農官則不得為頌矣周有天下頒於諸侯者毎事俱有成法諸侯各君其國恐其自作聰明變亂舊章故於來朝祭畢之後辟公具在呼其臣工命之以嗟嗟發之者見守國守官非可以輕心處之也君之敬在率由舊章臣之敬在謹守成法倘其中或有所未喻欲斟酌行之者則來咨來茹王朝自有一定章程盡善至美行之無不宜者徃來咨度皆臣工之事故以告臣工此節所該甚廣農事亦在其中下節特抽出其至重者告之臣工亦不專指農官周先公以力農開國其於稼穡之事法制獨詳皆祖訓也介甲也保介衣甲而保䕶其君者月令天子親載耒耜措之於參保介之御間保介為車右乃參乗者之副非農官之副也諸侯助祭必有侍御呼保介者車馬臨行獨近於君欲其隨地以農事相朂也維莫之春建辰之月宗廟之祭以仲春諸侯助祭畢歸正及莫春之時也亦又何求正從上節抽出言此時惟農事為亟更無他事足先乎此也臣工一章十五句噫嘻春夏祈穀于上帝也月令孟春祈穀於上帝仲夏大雩帝以祈穀實此其樂歌也朱子曰言我之成其王業既昭假于爾上帝我今率是農夫播其百穀曰爾其大發私田終三十里盖駿發爾私以下皆述其命農夫之辭也駿發即耕也三十里萬夫之田即十千維耦也末二句似複出細按之服者下事上之稱爾耕者爾所耕之公田也不言公田上既云私田則此為公田可知遂人鄉遂之制即匠人都鄙之制原統天下言之非僅王畿也小雅云雨我公田遂及我私自下言之先公而後私此云駿發爾私亦服爾耕自上言之先私而後公噫嘻一章八句振鷺二王之後來助祭也二王之後來助祭遣于廟之樂歌也王安石云西雝盖辟廱也辟廱有水鷺所集也朱子亦云然射義將祭擇士先射於澤宫辟雝天子之學二王之後來助祭於此觀禮焉故曰于彼西雝其言亦有斯容謂閒雅修潔似之也末節集傳俱作欣幸之詞見王者尊賢崇徳之意三王之興惟天命所歸非有一毫私意欲得之也廢必若桀紂興必若湯武然後誕膺大位而人信之即其子孫守先王典物作賔王家尊之者不以為過受之者不以為恥設使為二王後者不度徳不量力小腆而動墜宗滅祀乃不孝之大者夫子於微箕二賢並許其仁則知不以武庚為仁矣删詩存振鷺有客豈非亡國之後萬世之典則哉振鷺一章八句豐年秋冬報也噫嘻序云春夏祈榖于上帝此云秋冬報也有祈必有報不言上帝者䝉前篇噫嘻之序見春夏祈者祈上帝則秋冬報者亦報上帝也或以豐年為天地之功故並報天地然載芟為春祈社稷良耜為秋報社稷則地示已别有祭此則為秋冬大饗帝之樂歌也月令季秋大饗帝季冬乃畢天之神祗是也烝畀祖妣宗廟之祀無不舉也以洽百禮百神之祀無不舉也所降之福徧及天下皆上帝雨𤾉時若之賜溯其功於上帝所以當報也豐年一章七句有瞽始作樂而合乎祖也周公相成王大樂始作合奏祖廟因述其事而為此歌也黄氏佐曰樂成謂之合廟器成謂之考宮室成謂之落周公制禮作樂樂成合而奏之祖廟非為祭祀或以為祫祭者非也凡大合樂必遂養老此則為始作樂而已亦非為釋奠養老也故篇中但言樂官之盛樂器之備樂聲之和而不及其他祖廟疏云文王之廟不知治定制禮功成作樂形容功徳不得専告之文王經云先祖是聽則昭穆之主無不聚於太祖之廟矣其後垂為定制月令季春之末擇吉日大合樂孟夏命樂師習合禮樂季冬大合吹莫不以是詩為樂歌焉既備乃奏簫管備舉言諸器既備而後奏樂簫管亦備舉焉兩備字凡樂器皆在其中肅雝和鳴雝即和也然一於和而無以節之非和也惟肅雍相濟皦如純如乃和之至也有瞽一章十三句潛季冬薦魚春獻鮪也季冬薦魚春獻鮪並歌是詩也祭則於廟薦則於寢月令季冬乃命漁師始漁先薦寢廟周禮天官庖人冬行鱻羽膳膏羶季冬薦魚之事也月令季春薦鮪於寢廟周禮天官􅻵人春獻王鮪此春獻鮪之事也潛一章六句或言漆沮之水先澤所鍾故不忘本或言致治太平萬物盛多可告於神明或言思其所嗜皆後儒推測而得也詩因薦魚而作則但言魚之多而已頌者祭祀之樂章有大祀有小祀宗廟之祀大矣或専叙祖宗之功徳或錯舉祖宗之功徳毎以有盡之辭寓無窮之意至於兩郊則大蔑以加并不敢質言天地之功徳而但言王者事天之誠畏天之嚴盖不以稱頌為工而以至誠感格為主也若小祀各因一事而言未嘗旁溢一語故意每有餘於辭以視魯頌不相去霄壤耶雝禘太祖也禘王者之大祭王者推其始祖自出之帝而始祖率毁廟羣廟之主以與享焉所謂大禘也大祖始祖謂后稷也不言帝嚳嚳之位設於大祖之廟故不言嚳也不言毁廟羣廟統於所尊也此周公相成王制禮作樂時所定其云皇考烈考皆武王也檀弓云生曰父死曰考李氏集解云皇考尊之之詞烈考美之之詞閔子小子所云於乎皇考洛誥所云烈考武王宏朕恭是也大禘於始祖自出之帝而詩頌武王功徳盖不王不禘惟天子得行之一戎衣有天下皆烈考之功也故祀羣廟歌天作之詩止叙太王文王之功而於禘祭必歸大一統之烈考義各有當也然則詩不及嚳與稷何也其云燕及皇天克昌厥後盖列祖之靈於昭于天武王以宣哲文武之徳奄有天下凡在天之靈已燕及之克昌厥後使之有天下為今日之大祭則自嚳以下無不包舉豈必指嚳之名而後為祭嚳乎商頌大禘詩曰長發其祥亦猶是也雝雝肅肅寫辟公之威儀正托起天子穆穆耳穆穆深逺非肅雝所得盡主祭薦牲羣公相祀此天子之禮也大哉皇考安我孝子得有此大祭焉祭有虧闕處則孝子之心便有所未安禘則自始祖推所自出并已祧未祧之主咸在詳盡精密孝子之心無一毫虧欠處所謂妥我孝子也三節美武王之徳也四節眉壽繁祉正昌後之實皆武王之功故今日既右烈考亦右文母文母諸儒多謂太姒文王為成王之祖不可以言考太姒為成王之王母不可以言母母與考對則文母者文懿之母謂邑姜也然則禘祭固合祖妣並祀之春秋僖八年秋七月禘於太廟用致夫人左傳曰禘而致哀姜是因禘而致夫人也此又禘祭祖妣並祀之一證也雝一章十六句自孔子不言禘而禘晦乆矣雖然孔子何嘗不言禘中庸云明乎郊社之禮禘嘗之義治國如視諸掌仲尼燕居云郊社之義所以仁鬼神禘嘗之禮所以仁昭穆禘大祭也嘗時祭也大祭舉禘而祫在其中時祭舉嘗而祠禴烝在其中初未嘗例禘於嘗而以夏禴為禘以夏禘為大禘也則萬氏質疑之説非也時祭之顯然者莫如天保之詩曰禴祠烝嘗于公先王春曰祠夏曰禴秋曰嘗冬曰烝稱先王則有天下之後可知先儒謂開國之初尚仍諸侯之禮者非也東漢光武問禘祫張純奏五年一禘三年一祫鄭氏引以註禮唐趙匡更詳言之説者以為本於禮緯然未可盡非也禮不王不禘天子有禘有祫諸侯有祫無禘魯以禘易祫其言大事有事皆昔而祫也今而禘也然則魯以三年一祫之實而僭王者大禘之名原未嘗五年而一禘也漢儒以為禘止于此故諸禮經皆不載五年一禘之説而禘益晦矣其云諸侯礿則不禘禘則不嘗則以魯僭禘而誤也云禘一犆一祫又以春秋禘於莊公左傳禘於武宮僖宮襄宮而誤也郊特牲祭義並云春禘秋嘗又以孔子禘嘗對舉而誤解之也故諸儒言禮之悮皆由於春秋所幸天保一詩猶存時祭之名而知改禴為禘之謬盖禘一而已無所謂時禘更無所謂喪畢之禘故春秋之言禘皆亂制也夫豈聖人之所取者哉若夫祫祭則有時祫大祫之分焉四時惟春祠為犆祭其餘升三昭穆於太祖之廟所謂禴祫嘗祫烝祫而毁廟之主不與此時祫也三年則聚己未毁之主而合祀於太廟禮通乎諸侯所謂大祫也自此而五年一禘夫何疑焉然謂禘其始祖自出之帝而以祖配之其説是也祖列祖也乃云羣主不與則萬氏以為是官師之祭也趙氏以為殊失大傳之義長發一篇商禘也祭始祖自出以羣廟之主及功臣配享之周制雖或小變應亦不大相逺雝詩可證也故孔氏安國程子胡氏皆謂以所出之帝為東嚮之尊其餘合食於其前是謂禘也夫孔子言禘嘗之禮所以仁昭穆如一父一子尚有昭穆可言哉豈祫於太祖毁廟未毁廟之主咸在而太祖之心安豈自出之帝與太祖有異而轉以不在為安也哉周禮樂師及徹帥學士而歌徹是雝亦名徹而祭畢歌之也仲尼燕居云大饗之禮客出以雍是又歌於賔饗盖詩為禘作而上下亦通用之歟載見諸侯始見乎武王廟也此與烈文同時所奏盖成王喪畢諸侯初見新天子因助祭於武王廟也載見烈文二詩一時所奏特此詩用於武廟烈文兼用羣廟耳載見從來朝叙起因及其助祭受福烈文從助祭受福叙起而終勉之以前王不忘兩詩一氣相貫辟王成王也章法度也法度為昭考所定頒之侯國而緩急變通湏一番禀命講求方能恪守無失龍旂以下言其儀衛之盛諸侯之烈光赫奕即新天子之聲靈赫濯也以介眉壽永言保之詩所云言諸侯願為天子求眉壽而使其永言保之也皇美也言思此至美之多祜原無窮期乃籠起下三句之詞烈文辟公綏以多福是倒裝法言昭考綏辟公以多福耳俾昭考俾之也又俾我繼續光明于純嘏則君臣並受多祜也載見一章十四句有客微子來見祖廟也祖廟周之祖廟來見者來朝而助祭也一節率土皆臣而於周為客兩有字有驚喜意有客有客客不一人也已兼其旅矣傳云亦亦周也箋云亦亦武庚也按亦亦殷也言殷尚白今微子亦白其馬便見先王典物猶存萋且箋云威儀萋萋且且盡心力於其事傳云敬慎貌敦琢疏云選擇從者如敦琢玉然從者皆賢故為周人所愛二節白駒留賢維其駒有客留賔縶其馬皆愛敬無己之心也而此於先朝遺􅏷尤見其難三節滛大夷易釋詁文威則釋言文盖客所以不安於心者黼哻灌將未免有情耳告之曰既有滛威言作賔王家守承先祀依然天子制度客心亦可以少慰非侈陳其禮遇之隆也五服俱有等威賜以天子禮樂乃出於等威之外所謂大威也自客受之則曰威自我降之則曰福亂之為言治也繆之為言穆也滛之為言大也古人用字竒創有客一章十二句晉魏以來禪代革命之際視故主遺育如芒刺在身必去後已至有生生世世願無生帝王家者亦可哀矣武王代商千里邦畿以封祿父未幾叛周三年克之復封㣲子於宋修其先王禮物而不臣觀振鷺有客之詩愛敬交至不啻若自其口出非大公無我之心至誠惻怛之意何能至此哉延祚八百雖以秦政之暴猶有南君之封福善禍滛之天道不誣也武奏大武也聲容備謂之奏凡言奏者歌是詩與舞人為節禮曰朱干玉戚冕而舞大武盖象武王之功為大武之樂與舞相應初用於武王廟其後羣祭皆用之也何氏楷曰此大武一成之歌也武王無競之功實文王開之伐崇伐密剪除惡黨意在止殺也武王承而受之以武功嗣文徳一戎衣而勝殷盖勝殷之武即遏劉之武其成功也乃所以嗣文徳也無競之烈千古莫尚矣武一章七句臣工之什十篇十章一百六句周頌閔予小子之什閔予小子嗣王朝於廟也序何以不言成王頌作於成王周公則此嗣王指成王也遭家不造嬛嬛在疚謂王業草創而皇考棄予嬛嬛失怙在疚病之中也不言己之思皇考而但言皇考之克孝永世終身也皇考不以有天下為孝而以思念皇祖陟降庭止者為克孝則成王夙夜與武王不忘文王一叚孝思相貫盖心法相傳止此一敬敬心真切止此一思皇考思繼皇祖之序我亦思繼皇考之序思不忘者念之深敬之至也此時王業既成而猶怵􅅥維厲如此成王之所以為成也閔予小子一章十一句訪落嗣王謀於廟也謀於廟者與羣臣謀於廟中觀未堪家多難句則已遘武庚管叔之變周公東征之日也落始也予謀之在始也欲循昭考之道於乎逺哉聖凡懸隔朕未能盡也將扶助也繼字與落字對言羣臣助我以就之繼而猶泮渙未合所以遭此多難也因念我皇考之紹我皇祖上下于庭陟降于家時時見之無一事不相契合以保其身於無過明其身於無蔽而予于皇考猶然泮渙羣臣何以教我紹庭以下箋指皇考説則休矣皇考句乃倒裝法成王有流言之疑致風雷之變乃深悔從前視逺未明聴徳未聰故與羣臣謀於廟而不勝其怵􅅥危厲之意焉大誥曰惟予小子若涉淵水予惟往求朕攸濟又曰予造天役遺大投艱于朕身又曰矧今天降戾于周邦皆此意也必謀於廟者以管叔為叔父武庚為武王所封變生肘掖之間以其罪告之祖考也不言東征方畧者盖已委之周公矣訪落一章十二句敬之羣臣進戒嗣王也詩作於周公羣臣進戒之忠成王受戒之美兩兩傳出以訓嗣王後世遂以登歌昭功徳焉故序以進戒為主不言廟者盖以訪之於廟則戒亦於廟也閔予小子曰夙夜敬止此曰不聰敬止言不聰未能敬也加一聰字亦從流言之變來光明是本體上無一毫䝉翳學焉而日有所造月有所往時時繼續此明以至於明之純便是光明境界何患聴徳不聰所謂下學而上達也在成王只豫想其功候以自䇿勵然恐其不能至是也尚賴弼我仔肩者示我以顯徳行乎曰仔肩已將光明之徳負荷於身不容息肩顯徳行顯然以徳見於行事之實示以進為之方得以循序漸進受戒求益之心至深切矣敬之一章十二句小毖嗣王求助也箋云毖慎也天下之事當慎其小小時而不慎後為禍大史遷樂書云成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善守善終哉荓蜂傳云掣曳也本爾雅釋訓文孫炎曰謂相掣曳入於惡也彼作夆古今字耳然荓字即有掣曳之義故集傳謂使也詩所以蜂鳥比小人謂成王之初管蔡流言必有左右者表裏其間既已感悟察見情偽而深懲之言自今以始豈復堪家之多難而又重其苦乎所謂毖後患也天下前事之足懲者以前此之不能無過也若周公之封武庚管叔天理人情之至何過之足懲如懲前事而豫防後患將王者之後必不可備三恪同母之弟必不可長名藩乎監殷之過孟子所以直斥陳賈之誣也過成王之過也成王之過在惑於流言而疑周公耳設流言不行周公不避則二叔之謀沮武庚之計窮亂無由生成王所由痛恨於聴徳之不聰也所謂周公將不利於孺子乃史臣約舉之詞而二叔流言自有一番近於情理使之傳播國中成王所悔恨者盖以蜂與桃蟲之細比流言之微一聴信之身受其毒為國家大禍語云涓涓不壅將成江河綿綿不絶將尋斧柯微之不可不慎也求助云者盖欲求助於見幾知微之君子以輔成己徳也小毖一章八句詩所云疑後世於成王廟亦歌之載芟春籍田而祈社稷也甫田云以社以方我田既臧雲漢云祈年孔夙方社不莫是社稷有祈年之典也補傳云月令天子躬耕帝籍在孟春擇元日命民社在仲春序言籍田而祈社稷盖籍田祈社稷皆在春皆歌是詩如春夏祈穀皆歌噫嘻之類其説是也然社有二祭法曰王為羣姓立社曰大社郊特牲云天子大社必受霜露風雨以達天地之氣社所以神地之道地成萬物故教民美報夏至日方丘之祭即於此行焉中庸所謂郊社之禮所以祀上帝此北郊之社與郊對舉者也又曰王自立社曰王社盖祭土穀之神而以勾龍后稷配此庫門右内之社不與郊並稱者也均名為社而大小不同序云祈社稷乃祈穀於王社也此祈穀社稷之樂歌而耕籍亦用之耕籍之後即祈年于社稷也序増一而字自見天子既祈社稷又於仲春擇元日命民社即里社也大社在北郊王社在庫門内萬氏辨之甚詳鄭氏以大社在庫門内是誤以王社為大社也賈公彦謂王社在籍田内則又誤讀此序也耘箋謂除其根株是畢芟祚之事非去苗間草也主伯等即承千耦來千耦統言之主伯亞旅疆以分言之也嗿衆飲食聲也有嗿其饁田家之景如繪婦媚士依太和之氣宛然祈者祈神降以豐年之瑞也自載芟以下人力之齊播穀以下苗生之盛皆形容農夫之瘁治田之精以祈神之佑也載穫以下收入之多為酒為醴以下奉祭燕賔養老之事言農夫之慶即邦家之光其所係甚大也末節總結上文言周自后稷以來世重農業迄用康年其佑於神也乆矣則䝉休於昔日者獨不受眷於今日乎載芟一章三十一句良耜秋報社稷也王者有載芟之祈則有良耜之報或云此安知非民間之報賽故載芟良耜先儒以為豳頌竊謂郊特牲云郊特牲而社稷太牢然則非天子不用太牢此曰殺時犉牡則非民間之報賽也地官牧人凡隂祀用黝牲毛之註云隂祀祭地北郊及社稷也詩孔䟽亦引地官而云社稷用黝牛角以黒用黄者正禮用黝至於報功社是土神故用黄色仍用黑唇也則詩為報社稷明甚王制祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺傳曰社稷之牛角尺謂與賔客等有捄其角所謂角尺也其非民間之報賽明矣尚得謂八蜡之豳頌乎載芟曰振古如兹以昔日之休冀今日之慶故以為祈良耜言續古之人則以不替其先者為長享其瑞故不言福而福已在其中所以為報也或來瞻女田畯來視耕也則載笠兩句就饁者言而其饟其笠其鏄都從瞻者眼中㸔出荼蓼滋而黍稷瘁然滋則瘠黍稷以自肥朽則轉以肥黍稷故彼曰朽止此即曰茂止殺時犉牡言豐年之慶皆神貽之休故報之良耜一章二十三句絲衣繹賔尸也髙子曰靈星之尸也王者於祭之明日賔尸於廟門外又祭之謂之繹公羊傳繹者祭之明日也周謂之繹商謂之彤書髙宗彤日即此祭也賔尸者以賔事所祭之尸也卿大夫曰賔尸與祭同日天子則明日繹又謂之祊楚茨所謂祝祭于祊是也祊在廟門之外郊特牲曰繹之于庫門内祊之於東方失之矣庫門内失則廟門外是也于東失則于西夾室是也鄭箋本特牲以自堂徂基為視壺濯籩豆告濯具自羊徂牛為視牲告充鼐鼎及鼒為告絜皆宗人為之郝氏敬駁之曰繹禮殺于正祭牲牢器皿皆因祭之餘有司徹云埽堂燅音尋尸爼非别殺牲先夕省視也果爾王親省則大小宗伯從豈越卿大夫而用士鄭云繹禮輕故用士然則王又何必親省也其説審矣然據髙子靈星之説以祭為先蠶之祭尸為蠶神之尸則非也詩言堂基在宗廟明矣不是祭農祥又安得以農祥為蠶神耶又陳氏禮書引此自羊徂牛以為繹用異牲之證按繹但用正祭之牲也祭禮繁重質明行事宴朝而退若明日之祭腥肆爓腍鼎爼籩豆之屬無一不異天子必親省視有司各以職告雖有强力之容所失將不止跛倚今有司徹云燅尸爼卒燅乃升羊豕魚三鼎無腊與膚乃設扃鼎陳鼎於門外如初則天子諸侯亦當視此盖正祭重主乎禮神故祭在室而禮儀備繹祭輕主于禮尸故祭在堂而禮儀簡惟備足以盡子孫之敬惟簡足以極賔尸之歡祭統曰尸亦餕鬼神之餘也鳬鷖曰㫖酒欣欣燔炙芬芬公尸燕飲而謂繹有異牲也哉然則僅以士服將事何也周禮膳夫凡王祭祀徹王之胙爼按膳夫之職皆以士為之小雅所謂諸宰君婦廢徹不遲是也然則徹而陳之廟門外者非士之事乎又箋云基門塾之基謂廟門外西夾之堂基也此指繹祭而言若正祭則所謂堂者乃廟堂非門外西夾之堂故宗人升階而後告濯具也正祭之基在門内繹祭之基在門外詩言絲衣爵弁之士自堂而之塾基之器自羊而之牛之牲鼐鼎以烹牲體及鼒以盛和羮皆徹之以陳於廟門外兕觥㫖酒以樂賔尸來燕來寜可謂盡其歡矣而承祭者能謹其威儀徳盛禮恭宜得胡考之休也絲衣一章九句經義考云子夏授詩於髙行子此絲衣序有髙子之言趙岐注孟子以髙子為齊人則齊之説詩者殆不始於轅固酌告成大武也言能酌先祖之道以養天下也告成大武者言武功既成以大武之樂告於武王之廟也何氏楷曰酌大武再成之樂歌也兩時字便有酌字之意於鑠者言光明磊落無一毫暗昧也時所當晦則遵循當晦之道以退養其晦時既純熈則一著戎衣以乗時無覬覦天下之心亦無坐視塗炭之理經權在於心變化因乎時所謂酌也我後人寵受此蹻蹻之造用以嗣武王之統惟公與允是師耳公則無私無私而人自服允則不欺不欺而人自孚武王之開創今王之守成豈有二道哉酌一章八句儀禮燕禮若舞則勺䟽云謂為之舞則歌勺詩以為曲内則十三舞勺疏云熊氏曰勺籥也言十三之時學此舞籥之文舞也桓講武類禡也桓武志也釋文云桓武志也本或以此句為注凡天子將出征祭上帝曰類至所征之地祭始造軍法者曰禡武王伐商講武類于上帝禡于先戎詩於武王稱諡而曰屢豐年則為成王之詩明矣詩為六成之終講武類禡為行軍之始盖由終以追頌其始也後序云武志謂其志在安四方之民非利天下也據春秋傳此為大武之六其後遂用之於講武類禡也歟何氏楷曰桓大武六成之樂歌也成王謂我今日綏萬邦屢豐年天命於有周可謂匪解矣大兵之後必有凶年而我周克享天心者由桓桓武王致之也盖同心同徳之士天心簡在使之定厥家以安四方之民者也武王保有厥士用于四方以定國而安民其志豈利天下哉故其徳昭格于天君天下以伐商而世世有無疆之休也保字正與播棄相反謂愛惜之以用也謂任用之民之未安由國家未定故定國即所以安民桓一章九句賚大封於廟也賚予也言所以錫予善人也祭統曰古者爵有徳禄有功必賜於太廟汪云命於廟不敢專也樂記云武王克殷反商未及下車而封黄帝之後于薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋此克殷之後即封之既封而後告於文王廟也若大封功臣春秋傳封兄弟之國十五人姬姓之國四十人皆舉親也武成列爵惟五分土惟三樂記將帥之士使為諸侯則告於文王之廟而後封也序云大封於廟則合前後所封而悉舉矣後序賚予也又本論語周有大賚以釋賚字之義春秋傳此為大武之三其後為封國於廟之樂歌也文王之勤勞斯民至矣我子孫應受而有之今日之大封功臣即繹思文王安民之心以敷布之所謂善繼人之志也故大賚之典惟往求天下之安定而已孔疏云行之於天下以求安定天下以行訓徂圓甚時周之命言此我周大公無我之命而非復商之私昵惡徳也於繹思者言所封之功臣亦當世世繹思文王安民之心而不忘使無一民不被文王之澤也賚一章六句般巡守而祀四嶽河海也般箋訓樂蘓傳訓遊俱未安不如説文訓旋曹氏云取盤旋之義般與武酌賚桓一例則知為大武之樂章伐紂時事也若以後之巡守已有時邁之詩矣彼云時邁其邦明是春岱夏衡云式序在位明是慶賞黜陟此詩俱未之及但言裒時之對正與大雅皇矣之篇以對于天下同則為伐紂後巡行既畢聚諸侯而朝於方岳之下也序不言伐商與賚桓連篇其為伐商可知也不言朝諸侯曰巡守其為朝諸侯可知也伐商而南未嘗周歴四嶽而云祀四嶽河海言武王之望祀乃天子巡守祀四嶽河海之禮也武王伐紂底商之罪告于皇天后土所過名山大川孔氏曰名山謂華山大川謂河自豐鎬至朝歌必道華山沙河也則此喬嶽其華山乎朝諸侯于方嶽亦當在華山之下郝氏謂此當為四成南國是疆之位按詩中雖無疆理南國意然伐商之後前有告者後必有祀則疆理既定歸而祀之也當為大武之四允猶翕河箋謂信按山川之圖而次序祭之或又謂信其謀合衆河祭之迂澁難通集傳猶與由同翕河河善泛溢今得其性故翕而不為暴其説艮是然又謂道于河以周四岳無論克商之後無暇周巡其于允字亦恐無著落盖陟其髙山燔柴于天升中之禮也燔柴之後凡山之狹而長嶽之大而髙河之信由其翕順之性而不泛溢皆望秩以報其功也敷徧也諸侯不期而㑹者八百國徧天下諸侯聚而朝于方岳之下以答其仰望之心秩祀舉人心恱此周之新命而非商之舊典矣般一章七句周公於成王之世為大武之樂頌武王之功春秋傳謂其卒章曰耆定爾功孔疏云卒章者終章之句也其三曰鋪時繹思即賚也其六曰綏萬邦屢豐年即桓也酌與般楚子未之及故無傳焉然則大武六成固有六詩矣樂記言武之六成始而兆出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子鄭氏曰成猶奏也曲一終為一成盖舞人每越一位則歌一詩以為舞節也分之則武酌賚般桓皆樂名合言之六成皆大武也今按序云武奏大武也舞為北出詩為勝殷遏劉言北伐之志即止暴之心盖統揭六成大㫖故為大武之首章而名章以武或以左氏所云卒章為末章豈六成之後又有所謂卒章耶其説非也酌告成大武也於舞為再成滅商詩為純熈大介必殷滅而武功始成當為武之二章賚大封於廟也於武為三成而南於詩為敷時繹思樂記云武王克殷反商未下車而封薊祝陳下車而封杞宋反商者自商而反也則興滅繼絶大賚之時也而後亦以為封國於廟之樂歌桓講武類禡也於舞為六成復綴以崇天子於詩為屢豐年又曰皇以間之此從成王時追述武王之功而凡講武類禡亦歌此詩惟般義無所屬先儒謂南國是疆之後祀名山大川盖歌以為四成之節後遂以為祀四嶽河海之樂歌也五成之章獨無聞其詩亡也五詩俱大武之章賚般桓序不言大武者以武言奏大武又於酌言告成大武成者備也六成既備而告於廟則此後連章者可知其為大武之詩也其先後失序則秦火之後毛公承之不敢易也夫奏六成於武王之廟則備舉六詩若奏於羣廟則獨奏首章以為亂所謂復亂以武也閔予小子之什十一篇一百三十六句詩序補義卷二十三
