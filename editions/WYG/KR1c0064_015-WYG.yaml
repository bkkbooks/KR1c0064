body:
  text: 詩序補義卷十五石泉縣知縣姜炳璋撰南陔之什蘇氏轍曰毛公推改什首予以為非古於是復為南陔之什則小雅之什皆復孔子之舊南陔孝子相戒以養也白華孝子之潔白也華黍時和嵗豐宜黍稷也有其義而亡其辭傳云南陔六詩秦火之後義存辭亡董氏􅓉鄭氏樵以為有聲無辭朱子亦主樵說然集傳云此笙詩也詩即辭也無辭何以云詩考史記漢書俱云詩三百五篇除去此六詩舉現在之數也可知此六詩至漢已亡毛公所謂無其辭是也朱子注論語詩三百曰詩三百十一篇兼此六詩也如謂笙必無詩則當云笙譜如魯鼓薛鼓之類也如謂亡於刪詩之前宜名亦不存矣如謂毛公據儀禮姑留其目則禮有貍首又有九夏何獨舍之如謂此但詩題耳不知後世有題而後有詩惟三百篇先有詩而後有題取詩首句或一字二字以名篇即所謂題也若詩無南陔白華華黍等字則六詩名篇者將何所出且合樂三終工歌關睢葛覃卷耳笙吹鵲巢采蘩采蘋笙之所吹不獨六詩矣不得謂笙有譜而不必詩也南有嘉魚樂與賢也太平之君子至誠樂與賢者共之也此只就燕飲一節以見君子樂與賢人之心也與相與也猶交也燕飲何足以與賢然非此則與賢之心無以將之則君子至誠已在式燕之先上以誠相感下以誠相應但覺賢人未至求之甚勞賢人既至親之益至既幸其相安又樂其不去以類相引來思者不止一人以久而深綏之者非徒今日信是宇宙泰交君臣一氣此周家之所以致太平也鄭譜曰成王論其世也集傳曰主人畧其分也至通於燕饗乃言其用非詩之所由作也一章以嘉魚興嘉賔上二句重罩罩字下二句重以字罩罩者上下四旁多方求之必致而後已烝衆也久也此只就久言猶云耐心求之不憚煩也不以衆言者疏云重言罩罩衆自明不假復言衆也以樂至誠相感委曲周至必至樂而後安也二章汕汕補傳恐其伏以衎者使之盡情極意其樂無㡬微之伏於中也兩章自有淺深三四章言賢者之感其意而來也綏者賢者安適之甚彼此融洽正如甘瓠之固結而不可解也翩翩説文疾飛貌烝從箋訓乆意言來而能乆不是暫至而即去也君子有酒燕而又燕不是既燕而即已也主人戀賓賓戀主人渾然無間謂之泰交南有嘉魚四章章四句南山有臺樂得賢也得賢則能為邦家立太平之基矣此據儀禮則燕饗通用之樂歌也然其作詩之由則樂得賢也朱子鹿鳴傳云本為燕羣臣嘉賔而作後乃推而用之是也樂得賢者人君既得賢而樂之深故形為歌咏以寫其愛敬無己之心也曰基曰光語其始也曰父母曰德音語其用也曰眉夀曰黃耉曰保艾要其終也盖從今日所得之賢想到賢者耄期之日并想到賢者之必有賢子孫無非利我國家綿我國祚皆於今日始之則此時之傾倒有不期然而然者矣故曰樂得賢也一章詩緝云周地之南山則有臺北山則有萊喻周家得賢之盛隨取隨有是正意己包在興處樂是人君樂之邦家之基實心實政以立國家之本也下桑楊杞李栲杻枸楰多其名者喻賢之多而皆有用也萬夀無期承邦家之基來盖根基固則厯數長所謂博厚而悠久也若遽説賢者之夀則複後二章意二章有桑有楊興賢者在位能者在職也無疆承邦家之光來君身光顯聲靈赫濯則國祚綿長亦自然之理三章李氏樗曰民之父母其所施者不忍之政則民得所親矣不已言其令聞合於衆聽無己也四章胡不眉夀言夀則其固然也齒髙或倦於勤令聞未必如初故曰是茂不已日繼一日也是茂終如其始也五章保艾爾後謂養其後世之子孫以保我子孫黎民也此篇只重德上首二章言其德之有益邦家有關歴數三章言澤及生民名譽乆逺無非德也末二章言其一身夀考固足為國家之世臣遐不二字作逓過勢德音是茂畢命所謂惟公克成厥終建無窮之基亦有無窮之聞是也保艾爾後如伊尹之有陟周公之有伯禽世為國輔畢命所謂子孫訓其成式惟乂是也皆言其德之徹始徹終至歴世不匱樂之所以至也南山有臺五章章六句由庚萬物得由其道也崇丘萬物得極其髙大也由儀萬物之生各得其宜也有其義而亡其辭按潘氏云三百篇未嘗以命篇取義六笙詩序詩者何以知其然盖謂毛公因題敷衍以補之也竊謂南陔南隴也白華見於變雅為刺幽王何以並知為孝子詩庚有更償續三義何以見萬物得由其道朱子疑白華之序尤無理學者正於無理處想見序者已誦全文不然即鑿空杜撰詎能至是序最簡樸間與詩中字面偶同如漢廣云德廣所及德廣之廣非即漢廣之廣旄丘云刺衛伯衛伯之伯非即叔兮伯兮之伯安見孝子潔白即為白華之白也三百篇有即其篇名已見詩㫖者如螽斯多子以美子孫衆多葛屨凉薄以刺儉北風疾厲以刺虐碩䑕刺貪時邁言廵守有客言微子此類不可更僕如以序與篇名相合遂疑其不見全文將謂作螽斯序者祇見螽斯二字乎且序與篇名相戾既以為無理序與篇名相合又以為順文為詩序者難矣束晳之前補此六詩有夏侯湛昭明不入文選遂致無傳晳之補笙詩猶皮日休之補九夏范氏處義棄瑕取瑜晳之幸也蓼蕭澤及四海也此來朝而燕諸侯之樂歌也或云此篇朝諸侯下篇燕飲非也諸侯朝見天子極其恭肅安得云笑語豈弟序云澤及四海者原解云天子親萬國懐諸侯天下一家故曰澤及四海按諸侯順命兵革不作是王者聲靈被及四海即此是王者之澤不然背叛在諸侯困瘁在小民矣序者見其大不語其小非為零露二字作註解也一章蕭蓼然而上榮露湑然而下墜君臣泰交之象也故以為興集傳譽善聲也處安樂也譽者即君臣一德之美名處者即君臣相恱之至樂也二章傳曰龍寵也按左傳昭十二年叔孫昭子以寵光之不宣譏華定李氏謂指第二章也為龍者所謂邦之榮懐是也為光者所謂邦家之光是也其德不爽謂與龍光相副而不爽夀考不忘在天朝則勒於旂常在爾國則沒世歌咏方盡不忘之實三章天子於諸侯由一本而同姓由同姓而異姓極其親睦諸侯之宜親睦者尤莫如兄弟而被天子之化無不宜其兄弟焉皆天子宜之也四章集傳鞗革和鸞指諸侯之車竊謂載見之龍旂和鈴以未見之前言之故云休有烈光此鞗革和鸞以赴宴而來既宴而歸統始終言之故云萬福攸同冲冲而垂雝雝而和便見動容周旋中禮以之恪守侯度共樂昇平福之所以聚也蓼蕭四章章六句湛露天子燕諸侯也集傳以前篇為始燕此為終燕按前篇言零露瀼瀼濃濃此曰匪陽不晞前篇曰既見君子燕笑語兮而此曰厭厭夜飲不醉無歸次第秩然詩人早自下註脚也前篇初燕語意濶大故序曰澤及四海此篇終燕情意篤摯故序曰燕諸侯然寗武子曰天子當陽諸侯用命則亦澤及四海之意也前二章留賓以盡其情後二章樂賓而美其德露者天之澤燕飲者人君之澤天之澤以曙為節未曙則未已也君之澤以醉為節不醉則未已也此興意也歐陽氏以豐草興諸侯是也露被於豐草其澤深而無不沾足宗室以飲諸侯其情浹而無不盡醉乃申明不醉無歸之意宗傳曰宗室也燕禮膳夫具饌於寢東鄭註寢路寢也召南采蘋亦曰宗室則指宗子之廟彼以大夫言之此天子即宗子是正寢也後二章亦承醉字又見令德令儀如此也蘓傳露之在草也如將弗勝其在木也則能任之矣將言其無不醉故以豐草言之將言其醉而不亂故以杞棘言之顯允君子莫不令德言醉而不亂也陳氏云杞棘中實故興令德桐椅外文故興令儀湛露四章章四句南陔之什十篇六篇無辭凡十七章八十六句彤弓之什彤弓天子錫有功諸侯也天子報有功諸侯之典重在錫彤弓不重在饗以彤弓為非常之賜故設鐘鼓行廟饗以非常之禮樂將之也集傳燕有功諸侯燕宜作饗乃與本文合此篇辭意自明而解者多誤如受言藏之王自命有司藏之天府耳而箋謂諸侯受而藏之王肅謂藏之家以示子孫則下四句難接中心貺之言中心誠欲與之也重中心二字䟽所謂中心誠實非餙貎矯情也説者特重貺字則一朝兩字無力饗者行饗禮也盖行饗禮於廟而以弓賜之疏謂先賜弓而後饗王氏謂即獻弓於諸侯無所為燕饗皆臆說也讀集傳吕氏説而諸説皆破右之䟽云勸勞其功集傳兼有尊意詩緝謂與侑同俱指弓言不指饗言葢饗禮上章已言之下二章鐘鼓既設已該饗意右之醻之專以賜弓言之醻報也謂報功也首章中心貺之則欲與之矣故下但言饗之而與之之意已見下章但言喜好則該不得與字意故明云以此弓右之醻之也彤弓三章章六句菁菁者莪樂育才也君子能長育人材則天下喜樂之矣此太學之士樂君子之育材而作此詩昌黎以為頌上之詞是也中阿中陵喻培植之廣厚中沚喻浸灌之滋深儀者學士之威儀也盖一畨進見一畨整頓威儀便見多士濯磨容止可式而對面人君之樂得賢才以禮接見可知矣樂者樂君之育才喜者喜己之成材百朋指為利禄則雅歌中有俗腸矣盖泥益之六二或錫之十朋之龜也不知聖王視學其鼓舞作興有加無己德頼以成業頼以廣則其貽我者不啻百朋之錫也末章總括始終結之盖始也才之或成或否其心如舟之無定也既見君子而長育之大以成大小以成小無有棄材於我心休休然安定矣菁菁者莪四章章四句六月宣王北伐也鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福禄缺矣采薇廢則征伐缺矣出車廢則功力缺矣枤杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則亷恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基墜矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國微矣箋云從此至無羊為宣王之變小雅周之先世常患戎翟文王木㧞道通奉命出師采薇三篇所由作也至昆夷駾矣翟患遂息武王伐商蠻夷君長皆㑹成王通道九夷八蠻所謂天子有道守在四夷也成康既沒周室寖衰自昭穆共懿孝王以至夷厲之世獫狁復熾諸戎並興蕩所云内􅀢於中國覃及鬼方是也宣王於是有六月之師然則六月以前正小雅也六月以後變小雅也毛公於正變相承特著此序見内治缺而後四夷侵其云廢者至夷厲蕩然而不自夷厲始也四夷者治亂之鑒也治則後服亂則先動驪山之禍殆兆於厲宣之時乎六月之序何以知為毛公所作皇皇者華傳曰周忠信也序云皇皇者華廢則忠信缺矣此其證也六月之詩是寫吉甫行師之善序曰宣王北伐歸美於上也一章出師之匆遽而二章之整暇三章之嚴翼一時互見並行不悖此方出師之吉甫也於是有四章之選銳前驅五章之大隊追逐此應敵之吉甫也而歸宿於文武吉甫萬邦為憲盖大功既成策勛飲至所謂君臣之間穆穆棣棣也或云詩中未嘗侈陳戰功是禦戎之法不窮追否斯則固然然王者有征無伐奉命以討不庭軍至而服無容誇戰後世露布盛稱殺敵不特啟好殺之心并亦失立言之體此詩只言車馬之盛籌畫之善而戰而獲勝只以薄伐玁狁至于太原括之方是堂堂正正王者之師一章見倉卒興師人情擾攘即戎車三句亦是急於興師處下四句則推其急之故也然亦見天子臨軒大將受鉞軍政修器械備不待接戰己知王師之威武匡者正中外之防正中外者所以安天下也故三章曰以定王國二章上章寫車馬處一氣赶來只完得一急字故此章見急中有暇閑習自在平日至臨時而比之復試之果合於馳驅之法軍服製於平時至臨時又更新補缺無一之不完備以戎車載此常服可以疾行而必以三十里為止息從容應敵而不至於過驟也三章車馬服物上二章已盡故此只以四牡二句逓過以歸重將帥之德嚴紀律嚴也翼陣法善也恭敬以從武事臨事而懼也皆言將帥之德逺人不服則天子不尊安内攘外正以輔佐天子也此三章言不畏敵亦不輕敵不以躁進取功不以縱恣取敗用武之善術也四章是出師赴戰下章是戰而獲勝不可以此章為前鋒而下章為全軍言敵之大隊在焦穫偏師已至涇陽而我之全軍即於涇陽與之遇焉織文鳥章二句已通寫全軍斾繼旐如燕尾者也鳥章者前朱雀也白斾以繼旐龜蛇為旐後元武也已是全軍旗幟元戎十乗不過軍之前鋒率以先驅或以攻瑕或以誘敵而全軍即進若止以十乗摧堅非萬全之䇿也五章上章旗幟鮮明既有以奪其魄而此駟馬安閑壯健復有以制其勝前軍既鋭大隊亦勁於是敵棄涇陽棄鎬與方并舍焦穫而逺遁我軍薄伐玁狁自平凉逐之出塞至固原而還不窮追也固原古大原也戎車四牡兼元戎與全軍言之安者車不妄馳也佶且閑者馬與人謀也此止寫挫敵處文以安内武以攘外盖統承四章贊美之詩曰文武吉甫萬邦為憲則大將吉甫無疑下篇云顯允方叔征伐玁狁則此時方叔亦在行間耳六章何氏楷云首二句王燕下是吉甫自與諸友私燕也按吉甫敵愾有功彤弓旅矢之錫正在此時劉向所謂吉甫之歸周厚賜之正指燕喜受祉也然只作逓過之勢亟入自燕追出張仲來以見將相和衷忠孝一德吉甫之所以能成功也來歸自鎬自鎬京歸於尹邑也我行永乆告家人之詞也諸友中孝友之張仲常在左右故能篤其忠孝和其性情嚴急而應以從容觀變而不失常度大功之成豈偶然哉六月六章章八句按宣王北伐南征及淮夷徐夷四役詩人皆作詩美之獨西戎無聞焉豈四夷並起戎獨帖然乎盖千畝之敗王師無功大原之料事後莫補也然則不足以服犬戎也乆矣東遷之禍殆萌蘖於此顧炎武曰周世有戎禍始於穆王之征犬戎宣王之世其患如漢之安帝也幽王之世其患如晉之懐帝也戎之所由來非一日之故而三川之震檿弧之謠皆適㑹其時然則宣王之功計亦不過唐之宣宗而周人之美宣亦猶魯人之頌僖也事劣而文侈矣書不盡言是以論其世也如毛公者非獨見其情於意言之表者哉采芑宣王南征也此詩是寫方叔行師之善而歸結在方叔元老克壯其猷二語前二章只寫上公車服之盛便見元老率師六軍聽命車馬駢闐旌旂熌爍已有如霆如雷之勢早為壯猷寫出一叚氣燄第三章未戰而肄習將戰而告誡既戰而作止有節所謂元老壯猷正在於此而末章明言之以收全局蠻荆來威告成功也纔見車服可尊謀畫盡善然惟克盡壯猷之實斯不愧元老之名一章詩人言采芑必於良田猶之治兵必得良將良田無敗蔬良將無弱卒也師干之試古重車戰車即所以捍禦者試車與人肄習也上六句言軍之衆且練而歸重方叔之涖師下三句言車馬之盛而歸重方叔之率師早為方叔出色注到克壯其猷上其車三千法當用三十萬衆用寡易用衆難方叔將之布陣不亂進止有法如臂使指真所謂壯猷矣魚服矢服即采薇所謂象弭魚服也沈氏守正謂此章言車馬不言器械不當獨言矢服左氏歸夫人魚軒服虔云魚獸名則魚皮亦可飾車也戎車不應有鈎今曰鈎膺則知路車金車也疏云不乗革路者以革路臨戰所乗此時受命率軍未至戰時故不言戎車也二章從戎車之盛旌旂之美寫出大將命車命服照耀耳目不是説車服是寫車服中人耳不然王昭素規橅卧龍綸巾羽扇猶是而其人已非三章兵以鼓進以金退鉦人伐鉦鼔人伐鼓各有所司三令五申之於是進戰之時鼓聲不暴進不躁動鉦鳴而退氣且有餘所謂步伐止齊之不愆方叔壯猷全體皆見末二句按左傳鞍之戰張侯曰兵之耳目在吾旗鼓艾陵之戰陳書曰聞鼓而已不聞金矣故鼓聲不絶則戰不止必聞鉦而後退振旅謂收兵也與左傳出曰治兵入曰振旅微不同盖彼則講武既畢整衆而歸此則對伐鼔言謂戰畢而鳴鉦收兵也戰勝收兵則其行聲闐闐然餘勇可賈也詩但言伐鼓不言鳴鉦者亦猶上文鉦人伐鼓偏舉互見也爾雅振旅闐闐郭註闐闐羣行聲此承振旅來不得以孟子填然鼓之為證此章已寫到戰功然不及克敵之事但言其進止有法乃見王師無敵不失詩人立言之體又以見其師一進敵即敗北而我不窮追也四章傳曰元大也五官之長出於諸侯曰天子之老方叔元老克壯其猷為一篇結穴氣歉者多靡氣盈者多逞皆不得為壯方叔率止直貫至如霆如雷言方叔率之以執訊獲醜者此嘽嘽焞焞如霆如雷之戎車也以此氣燄何難搗其巢穴而疇昔征伐玁狁之方叔於蠻荆來威即已還師依然薄伐至于大原之舊法也斯之謂壯猷斯之謂元老蠻荆之敢抗中國恃其衆也故方叔必總大衆以臨之其車三千至此始言其故威者畏服也舊以威屬天子則來字無着來威猶云來同來朝耳提出征玁狁見南征北伐寛嚴一轍如南仲之伐西戎也采芑四章章十二句車攻宣王復古也宣王能内修政事外攘夷狄復文武之境土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉此詩之㫖朱子全録後序只増周公相成王以下二十三字以見昔為常制今為曠典正首序所謂復古也或云宣王重在㑹同詩人重在田獵非也田獵亦即㑹同中事詩人寫田獵正寫㑹同之盛也一章只四語前便包内修外攘後便包㑹同田獵中間便包修車馬備噐械而曠典創聞人心鼓舞期㑹布告百職待命無不在内駕言徂東猶云乗輿已駕傳令將往東都也二章上泛言車馬而此特提出田車上泛言徂東而此特提出行狩盖徂東是第一通號令重在㑹同行狩是第二通號令飭戒有司者專主田獵詩人初聞之則言徂東繼審之則言行狩故兩言字即宣王之命不可作語助也然言徂東猶未徂也言行狩猶未行也甫草地名可獵之所三章詩記云言選車徒備器械謂當搏取禽獸於敖地未實行也按建旐設旄搏獸于敖皆選徒者飭戒之詞此其所以囂囂也凡徒衆有聲則選者之聲反無以别今則徒衆翕静無聲惟聞選者之聲囂囂然或以囂囂礙下有聞無聲不知末章正寫此句未盡之意也此詩狩苗錯出徐氏六帖四時之田通稱蒐狩亦猶四時之祭通言嘗烝也四章傳曰言諸侯來㑹也周官行人時見曰㑹殷見曰同時見不時而見也殷見者王十二年不廵狩六服盡朝王為壇而旅諸侯命以政焉夷厲以來諸侯不行朝覲之禮乆矣宣王初立北伐南征威震中外以㑹同之禮合諸侯而因示以大蒐之典焉五等各以其爵尊卑有等貴賤有序旅見於天子但見行列之繹如也五章及下章正寫田獵也射夫指諸侯及諸侯之臣同者齊其心力也助我舉柴助我舉此積禽之事猶云助我田獵耳六章正諸侯助我舉柴之事上言射夫助我而所以助處尚未説出此則見其善射則助我也至矣詭遇而獲非善射也見諸侯宅心正大無詭譎之行而天子左右之善射亦在其中補正游環脅驅所以禁驂馬外内出入盖驂馬偏倚則服馬為所牽制而車行不調故兩驂不倚乃為御之善也七章傳曰言不讙譁也䟽云軍旅齊肅惟蕭蕭然馬鳴之聲見悠悠然斾旌之狀無有讙譁者按上二句正寫出徒御不驚之實末句又抽出頒禽一事言之言徒御既不驚矣而大庖又不盈也集傳終事嚴指上三句頒禽均指末一句八章有聞如車行馬鳴有所聞也無聲謂無人聲也此篇雖冩車馬之盛朝㑹之衆而嚴肅意尤多盖周室積衰人心渙散宣王力為整頓號令嚴明軍政修舉凡在從行之徒御來㑹之諸侯莫不震叠悚息極其恪恭首二章兩言字令出而奉行維謹也三章惟聞選徒之聲徒衆無聲也四章列國奔命恐後也五六章助獵之諸侯無不守其常度也七章徒御不驚擾也一叚嚴肅之氣聳人心魄故八章以有聞無聲結盡通篇之㫖而末乃贊美之也車攻八章章四句吉日美宣王田也能慎微接下無不自盡以奉其上焉此宣王自獵於畿内也天下雖安忘戰則危故周召二公於成康之初皆以克詰兵戎張皇六師為言正恐守成之主溺於宴安耳况周家以仁厚立國其勢易弱穆王㡬致徐方之亂昭王南征不復至於厲王遂死於彘雖諸王君人之道有所未盡而兵威未振無以懾服人心亦可見矣宣王於積衰之後既㑹於東都又獵於畿内意在整頓人心張皇威武以成中興之業豈不偉哉詩中悉率左右以燕天子便見大禮舉行人心鼓舞為一篇主腦後序慎微以下非詩㫖也一章未田之前擇戊日祭馬祖既祭而車堅馬健觀三既字一孔字見天子舉行蒐狩雖在畿内之地亦正一事不苟夫然後可以升大阜而從羣醜也二章爾雅十藪周有焦穫在涇陽三原二縣之間當涇水之東北漆沮之西南去鎬京百餘里漆沮舉其所近者非必實至其地也三章左右從王獵者之左右也盖從獵者有司也即車攻所云之子也其左右即車攻所云徒御也天子畿内之臣俱得以有司稱之所以别於外諸侯也田於畿内非以㑹諸侯故有司各率其左右之人善射善御以樂天子也四章以御賔客且以酌醴為田獵作餘波謂全篇之意專重在此者非也賔客兼諸侯及羣臣言觀且以字言可以行燕禮且以之饗醴無不可也饗重於燕酌醴惟饗禮用之如左傳王用饗醴命之宥之類吉日四章章六句鴻雁美宣王也萬民離散不安其居而能勞來還定安集之至於矜寡無不得其所焉此詩人述流民之言以美宣王也一章之子指有司劬勞指流民詩言有司奉命廵視見流民病困於荒野之中即可矜憐如鰥寡者亦不得寧居正如鴻雁于飛未知棲泊之所也傳以病苦訓劬勞其指流民顯然之子于征劬勞于野與之子于征有聞無聲語氣相似鴻雁水鳥以中澤為安宅非中澤雖暫息旋又颺去流民以田廬為安宅非田廬雖暫停泊旋又轉徙于野正對安宅言草棲露宿故見其病苦二章于垣有相度有區處有董率便是還定安集處百堵皆作亦指民説其究對從前言之盖不訴前日之病苦不見今日之安適也三章傳云未得安集故嗷嗷然雖釋興義而大㫖已了流民言我之初至于野固向之子訴之猶鴻雁之哀鳴嗷嗷也維此哲人知我病苦之甚下情得以上逹而與以安宅若是愚人方以我為宣驕耳孰從而恤之此君德之不可忘也宣驕如恃衆脅制無故擾攘之類鴻雁三章章六句庭燎美宣王也因以箴之王氏道曰此詩美宣王之早朝勤政也後序因王鮮克有終又見烈女傳載姜后待罪永巷故附因以箴之句遂致説者辭費通篇不露勤政字不安於寢字但設為王之自言而一叚宵衣之意自見於言外雅而近於風者也郊特牲庭燎之百自齊桓公始也孔氏䟽云大戴禮天子百燎皇氏云作百炬列於庭或云百炬共一束恐非庭燎之光王氏曰燎盛或曰燎始然對下晰晰則燎正盛也集傳晰晰小明也嚴氏曰晰晰然其光漸小夜將盡則晨光漸逼燭光漸小車聲漸近世學云周以斗建子為正夜半為朔朝㑹必以子時末章曰夜鄉晨明以晏朝為箴按玉藻云朝辨色始入君日出而視之鄉晨而起不失為早豐説非也不特未央未艾鄉晨為想像之辭即下三句亦想像之辭也方見倘恍之景惕厲之神庭燎三章章五句沔水規宣王也朱子謂憂亂盖憂䜛言致亂作此以規宣王也䜛言者亂之根原亂者䜛言之究極䜛言至末方㸃出而以敬為去䜛之方宣王天資儘髙其不終厥德由於怠勝敬耳篇末拈出敬字正立德去䜛之本周至厲王亂極矣其故始於信任榮夷公宣王撥亂反治䜛言復興意是時必有詆毁老臣動搖社稷故詩人欲其將目前之亂一念之而知其不堪再裂也一章詩人意主疾䜛而先從致亂說入言流水有入海之日飛隼有載止之時喻禍亂之必有止息也人欲止亂安可不念亂乎縱不憂吾身亦當憂吾親如之何其不念也念者念其致亂之由也隱隱注到䜛言二章水流以喻流毒之泛濫隼飛以喻召禍之恣肆所謂亂也蹟行之之跡不蹟所謂鑿空行去不循其道也念彼不蹟之人知其載起載行如水流隼飛而不已安得不致亂也吾心之憂至於不可弭忘者恐禍亂至而無以救之耳三章憂亂者非徒憂而已也當深念其致亂之由盖不蹟即訛言之事訛言即不蹟之言顛倒是非亂所由生也彼隼之髙飛猶循彼中陵而欲止豈民之訛言竟莫之懲乎訛言者䜛言也我深念之惟敬而已敬以存心則清明而不惑敬以處事則正直而不摇䜛言或至立辨其姦其何自而興乎我友念亂亦敬焉可矣前言兄弟邦人諸友統言之也此言我友親之也規王而曰我友猶云敬告僕夫云耳流水三章二章八句一章六句史記宣王殺杜伯而非其罪左儒死之宣王之信䜛有明驗矣或以史記云懿王之世周道始衰遂以此當之非也鶴鳴誨宣王也傳云興也箋云興者喻賢人雖隐居人咸知之郝氏敬述之曰鶴良禽鳴深澤之中聲聞于野賢人修德岩穴令聞逺播無異此王欲得之非易也如魚潛于淵時或游泳于渚江湖自得未肯出潛輕受人餌必也清明之朝貴德尊士如人稱彼園之可樂有嘉樹之檀其下惟落葉之籜有德在上無德在下賢者始樂就耳得賢則可以切磋君德砥礪治功如他山之石為磨錯之用其受益豈可量乎集傳云比也朱氏善述之曰誠中形外非可矯餙為也千變萬化非可執一求也君子或有未仁不可溺於愛也小人或有一長不可偏於惡也按二説並是然傳則偏於一事集傳無所不包宣王質地儘髙詩人以易之取象為詩之微㫖三百篇中别具一體鶴鳴二章章九句王符云攻玉以石洗金以鹽濯錦以魚浣衣以灰物固有以賤理貴醜化好者矣彤弓之什十篇四十章二百五十九句詩序補義卷十五
