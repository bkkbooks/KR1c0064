body:
  text: 詩序補義卷三石泉縣知縣姜炳璋撰邶邶鄘二國立扵三監既誅之後未㡬為衛併詩為衛詩猶繫扵二國誠有不可曉者疏謂詩人之作自歌土風騐其水土之名知其國之所在然其説難通如浚郊新䑓桑間楚丘皆濮陽地而或咏扵邶或咏扵鄘則何説也朱子以為其聲之異然鄘風桑中靡靡之音而楚丘忽作變調記曰鄭衛之音比扵慢矣是二國之音相類乃一國之音反分而為三恐無是理顧氏炎武直謂此詩簡編獨多故漢儒分三國名以各冠之夫季札觀樂歌邶鄘衛曰是其衛風乎則衛詩之分久矣不得謂成扵漢儒也然則衛詩何以分盖詩有作扵衛人而鄘人傳之者亦有事在鄘地而邶人咏之者况詩多擬作非必自為劉氏瑾云太師各従所得之地而繫之其説是也地理志河南本殷之舊都周既滅殷分其畿内為三國詩邶鄘衛國是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監書序曰武王崩三監畔周公誅之盡以其地封弟康叔遷邶鄘之民扵洛邑故邶鄘衛三國之詩相與同風按三監者監扵紂子武庚之國不得并武庚為三監而周公誅三監亦封邶鄘衛三國不以邶鄘盡與衛也衛之併邶鄘鄭譜謂康叔子孫稍併邶鄘是也想在夷厲以後耳陳氏傅良乃云自荆以南蔡叔監之管叔河南蔡叔蔡國管則管城霍所謂霍太山也顧亭林以為其地綿廣不得為邶鄘衛三國良是然則三國邶自封武庚管叔封鄘朝歌以南皆屬之蔡叔封衛則自朝歌東郡之地霍叔則在河北而邶封則今大名北至真定之間皆是書所謂殷小腆也柏舟言仁而不遇也衛頃公之時仁人不遇小人在側此篇朱子以為詞氣卑順良然士君子忠而獲譴易扵憤激仁人之言藹如悲惋中不失和平卑順之意聖人扵變風之首特揭此篇以為萬世臣子處變者之法所謂可以怨也一章首二句興起全篇以柏舟汎汎水中而不以濟渡興己之放棄而不見用也精神直貫到不能奮飛上下云覯閔受侮己是去位之臣箋云與小人同列非也二章傳云茹度也不如歐陽氏曰茹納也傳曰火日外景金水内景鑒之扵物納景在内凡物不擇妍媸皆納其景我心匪鑒不能善惡皆納是以見嫉扵小人也意謂鑒能照物亦能容物我心則照察之便不能容之矣欲去小人不能不藉衆君子之力兄弟是同姓者怒者離騷所謂申申詈予是也始欲據之見怒而後外之不言怒我而曰逄彼之怒若彼先有所怒而我適逄之者然親親之誼仁人之言也三章兄弟之怒盖欲我俯仰従俗也惟我不然即威儀之間遇小人未甞少假詞色棣棣傳云富而閑習富盛無従降抑閑習不待勉强如孟子之泰山巖巖是其富也只行所無事若刓方為圓反為造作與夏畦同病矣是閑習也選集傳訓簡擇小人處世那一等人便把那一等儀容應副他聲音笑貌隨機俯仰有似簡擇只一選字摹擬小人極工四章我欲决去小人者正我憂心悄悄慮國是之日非也而竟為羣小所愠扵是既覯閔而放斥矣又受侮之不少人之云亡邦國殄瘁安得不拊膺欲絶乎楊文公億云已擠溝壑猶下石而不休方困蒺藜尚彎弓而未已蘇舜欽云友讎一波共起議謗被廢之後喧然不已皆覯閔既多受侮不少之謂也五章日居月諸當従日月篇傳云日乎月乎言日月照臨我胡更迭而㣲乎㣲虧也小雅彼月而㣲此日而㣲是也㣲則其眀蔽我之寃抑無従昭雪如不澣之衣誰為湔洗其垢也箋云憒辱無照察不澣則憒辱迭㣲則無照察呼日月者不敢斥言君也小人誣衊君子何所不至如衣被垢然故傳云如衣不澣矣似不必又加衣字不能奮飛者羣小見誣身已斥外欲一至君前告以吾言之可採羣小之不足聽奈不能奮飛徒為汎汎不繫之舟而已柏舟五章章六句緑衣衛荘姜傷己也妾上僣夫人失位而作是詩也序言荘姜傷己者三篇此篇盖傷己不得輔助君子以成内治也其傷之始致亂之本歟並后匹嫡凟倫已甚上二章但言心之憂矣其可憂處使之自㑹下二章兩言我思古人風刺深而辭益婉易坤卦六二象傳曰臣道也妻道也道莫難扵處變夫子首録柏舟以為臣道之凖次録緑衣以為妻道之準皆處變不失其常一章二章傳云緑間色黄正色箋乃改緑為褖此據禮説詩之誤三章緑兮已含衣字言此緑兮本􅁝也而汝染治之為衣以喻嬖妾本賤也而汝寵嬖之使尊治治􅁝也兼絢染組織意俾無訧者黄氏一正云言欲求古道以處之俾其夫扵無過也按此俾字較有著落古人有一言悟主如姜后永巷待罪而宣王早朝勤政是也事闗宗社全無諷諌似亦愈疏且云女所治眀指荘公故欲求一悟主之道以救其過不徒泛然引過歸已而已輕輕下一訧字将上二章意収拾又借古人立言盖狂暴之人諌不能入故㣲諷之四章絺綌當暑今以待寒喻失所也自比扵寒風之絺綌隠然見樸素情懐冷淡光景原無争寵之心絶少趨時之意以是捐棄宜也上章思古人欲俾君子立身扵無過之地也此章思古人欲以古人自處而絶無怨尤之心也方見上兩憂字不是一己私意憂者慮宗社之危自得者安所遇之素憂時樂天兩不相悖先儒謂荘姜足以嗣音太姒良然緑衣四章章四句荘公名揚武公之子也武公淇澳見扵風抑威賔筵垂扵雅其兢兢扵天理人欲者深矣而荘公首違其教溺扵衽席釀為禍胎若荘公者可謂上愧乃父下負乃妻矣燕燕衛荘姜送歸妾也説者謂陳方與州吁伐鄭忽中變執之此詩動之也此詩作扵既送之後乃追述之詞然當時煢煢兩婺婦郊門訣别未嘗不足以動舊臣故老之心穆姜啼而晉靈不廢出姜過而魯人皆哭况桓公在位十六年未聞失德國人目擊其身弑母歸則未能和其民或此送助之而無闗詩之作與不作也又禮婦人迎送不出門于野疏謂越禮逺送則姜似不如許穆夫人箋云舒已憤盡已情國當大變荘姜自有深心固難以尋常迎送律之一章史漢桓曰差池箋謂張舒其羽翼只此五字真能得物之性情而不齊之意已寓三章陳在衛南荘姜在衛心與俱南此中無限委託兾其成又恐其無成祗可黙㑹轉不如呢喃燕子得以自適也四章以厲媯之娣故曰仲氏任就大槩親信上説塞淵以立心言温恭淑慎以持身言雜㳫寫來俱是説他好處盖别後相思覺這一件好那一件好不覺縷縷所謂文生扵情也平日勸勉之詞多端正不知従何處説起特拈他臨别丁寜之言先君指荘荘無可思指桓則母不得以子為先君盖統指衛先君也思者思先君之遺緒不得付之賊子而以討賊勉荘姜也言外便見彼之至陳肯一日忘討賊哉而語却渾然不露燕燕四章章六句韓詩以為定姜歸其婦以篇中之子于歸句也鄭氏註坊記亦用其説陸德眀又以為魯詩鄭志答炅模云後得毛公傳記註已行不復改之按州吁與鄭共叔叚絶肖然叚有夫人之啟而州吁荘姜與為敵叚有京城之富太叔之尊而州吁無尺地之封且為衛國亡命乃叔叚一跌不振而州吁手提數十亡虜入千乗之國刺其君而奪之國何也衛桓之仁柔不如鄭荘之剛武荘有偹桓無偹也此荘姜所以拊心扼腕而痛恨扵防之不早也日月衛荘姜傷已也遭州吁之難傷已不見答扵先君以至困窮之詩也按此篇依後序立説以乃如之人指先君夫先君可怨燕燕早怨之且桓公未歸淺土曾無一言哀此鞠子而反怨及先君則亦悖矣因又以指州吁夫州吁何如人而責以古處德音望其顧我報我抑又愚矣不知古序言傷己者傷己之坐視國難而無以見正也一章照臨下土是直説言無㣲不照也豈得容亂賊公行扵青天白日之下乃如之人指本國之臣民古處猶云古道逝往也頺惰過日而不以古道自勉也定定其亂顧顧我而救之也二章下土是冒是横説天下封國俱在照臨之中乃如之人指隣國之諸侯桓公最睦扵魯而陳蔡宋鄭皆玉帛往來之國本相好也今則宋殤為上公従州吁伐鄭陳蔡與焉魯復使公子翬助之皆黨賊而與先君為讎矣故衛以州吁弑君赴諸侯而總無一報者報答也三章東方荘姜之父母家也乃如之人指齊僖斯時僖公小霸欲長諸侯使能討賊立君豈非名之甚美德音美名也而反以為不善而不肯為胡能定亂而使我忘枕戈之志也齊國强大整旅而來州吁授首則復讎之願脱然以釋此忘字之義也四章荘姜齊所自出也姜之父荘公也荘公在其必有以定我之亂矣乃父母既亡其畜我也不能終我之身胡能有定乎但見報我者不過唁問之常無足輕重之事盖眀刺齊僖也日月四章章六句終風荘姜傷已也遭州吁之暴遭侮慢而不能正也按州吁嬖人之子素有簒奪之心而桓得以不廢者外有石碏内有二母保護之功居多乃一旦以平日従憂危中百計扶植之𦙍子絶脰扵仇人之手况帷堂猶在秘不發喪棄之如孤雛腐鼠賢如荘姜何以為情諸儒説此篇則曰州吁雖無禮荘姜猶思之也又曰我思扵此彼或無故自嚏嗟乎是荘姜忘不共戴天之讎而認賊作子保若嬰兒作詩招之使來其不為戴媯冷齒㡬何矣東海吕母當新莾之簒猶能㪚家財為子復讎曾荘姜而無此志也哉朱子所以深惡而削之也然則序言傷己以己之不能討賊而傷之也一章終極也終風謂大風暴猝然而來以比州吁之亂之驟也顧我則笑笑其従前之惡我者無謂也其平居則謔浪笑傲志得意滿也荘姜惟有中心是悼而已悼傷之至也盖悼桓公也二章大風而且霾則天地昏暗綱常倒置也有時若順我而肯來往來指州吁來至姜所也往歸其室也我惟欲其莫往來耳悠悠之思即載馳所謂誰因誰極之思也三章終風而且隂曀日光漸出而又曀喻州吁未能和其民民思叛之而終無如之何也不遂吾願終夜之間咄咄自語而成鬱結之疾也四章曀曀其隂重隂屢結復加虺虺之雷虺虺電光也熌爍如虺故謂電為金蛇喻州吁之威熖自恣也願言則懐雖至鬱結成疾而悠悠之思總未有已也終風四章章四句按州吁簒位五閲月而荘姜呼號之詩有三聖人存而弗削者所以立萬世母道之準也擊鼓怨州吁也州吁用兵暴亂使公孫文仲将而平陳與宋國人怨其勇而無禮也此詩人叙軍士臨行與其家人訣别之詞盖怨州吁也前二章與家人訣别而叙其由也第三章訣别而預欲収其骨也末二章一反一正訣别沈痛之辭也一章開手擊鼓其鏜覺踊躍喜鬬之状如見盖通篇皆悽楚之音而發端甚是豪舉纔見武人為大君不顧生靈而下面乃節節是此二句致之也末章二吁嗟鼓聲高亮人聲酸楚矣鄭在衛南南行指伐鄭此時陳宋未平而先言伐鄭軍士有以灼見其心二章平陳宋無可憂可憂者将伐鄭也三章王肅云未知于何居于何處于何喪其馬若求我與馬當扵林下求之盖為必敗之計朱子曰猶蹇叔送其子之意也似較集傳為安不言死亡不忍言也四章説到血膏淺草已是黯然銷魂忽􅉐起一意従前相約偕老為期于嗟乎今日乃至扵此覺平原白骨猶是春閨夢裏而止以供州吁一踊躍也五章不我活不我信兩不字是用兵之州吁不之也言濶又言洵言活又言信辭意纒綿真是一時訣别不下令人悽絶可為窮兵者之戒擊鼔五章章四句讀日月終風擊鼓三篇嫡母呼號扵上軍士怨咨扵下土功城築一時並興方且謔浪自如踊躍不顧雖與之天下其能居乎凱風美孝子也衛之滛風流行雖有七子之母猶不能安其室故美其子能盡其孝道以慰其母心而成其志爾疏云不安其室則仍在室但心不安耳孝子自責母遂不嫁故美孝子能慰其母心也按經只孝子自責之辭而孔氏云然以序言美孝子也使此詩既作母猶不安則是七子積誠未至聖人何以取之如母既去而後作此詩則不能匡救扵前其罪已大且母出與廟絶安得强名之以聖善至誠可以感神號泣可以底豫觀七子之自責如此知母已悔悟國史熟知其事録其詩曰美孝子以其得㡬諌之道卒能安其母也聖人删詩以此為三百篇孝子之詩之首非以其處變不失其常也哉二章只易一薪字而自少長以至成人母氏之劬勞不勝言故進而曰聖善凱風興聖善棘薪興無令人補正云子扵父母其滛昏大惡亦未有不心知其非者七子所謂聖善通眀慈惠之稱耳女子固有通眀慈惠而獨不能以志節自堅者文姬甄后之類是也又曰一則曰母氏劬勞再則曰母氏勞苦非徒念母亦使其母念育子之艱而不忍去室也一則曰有子七人再則曰有子七人非徒自責亦使其母覺年嵗已暮而顧惜名義也三章羅侍御典云凡私淑前輩每云無由質之寒泉寒泉猶黄泉也盖其父墓所在七子環而哭之耳其説是也浚邑之下父墓在焉有子七人而使母氏如是之勞苦吾父而在何至扵此朱子所謂㣲指其事以感動其心也四章詩所云盖必七子嘗有不従之色㡬諌之言致母怒不悦而加譴焉故曰黄鳥猶能睍睆其色好音以悦人我乃不能婉容柔聲以慰親心乎傳云睍睆好貌詩緝光鮮貌檀弓華而睆睆眀貌大東詩睆彼牽牛亦同集傳云清和圓轉是好音之訓凱風四章章四句雄雉刺衛宣公也滛亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作是詩刺宣公之軍旅數起大夫久役也與滛亂無渉考春秋隠四年宣即位眀年衛人入郕又與宋入鄭伐戴瓦屋之盟及鄭平矣又與陳蔡従王伐鄭既為鄭敗又與齊鄭謀魯魯桓求好待于桃丘弗遇卒來戰于郎前後以兵為戱故詩人託為大夫久役室家思念之詞因以刺宣公也觀既曰展矣君子又曰百爾君子可知非婦人自作矣一章考埤雅等書謂雉飛若矢一往而墮崇不過丈脩不過三丈非如燕雀之属可以任意翺翔也又雉耿介輕死尤善鬬不生得故以興従軍者傳云飛而鼓其翼泄泄然原解云泄泄鼔翅舒㪚貌義較精詩牖自詒二字最可思此大夫多是負氣矜智攘臂功名之人盖上有貪功之主則下必有喜事之臣故末以不忮求望之按此既合思婦之詞又得詩人之意而自詒二字亦有着落二章雉飛下上其音興君子雖有勤苦無所告語三章兵凶器也戰危事也悠悠之思與日月俱長便可見宣公兵興之久四章忮者疾人之有而有負氣喜事之心求者恥已所無而有攘臂邀功之事所以自詒伊阻也不特告于君子并告于凡百君子詩人之託諷逺矣凡百君子不敢斥言君也雄雉四章章四句匏有苦葉刺衛宣公也公與夫入並為滛亂箋云夫人謂夷姜凡美意顯刺意隠刺滛之意尤隠宣公烝父妾詩人惡忍以聚麀者聞扵鄰國故詩中㣲特無君與夫人字并無犯禮等字曰深厲淺揭曰濟盈雉鳴若不為公發者然下雝雝鳴雁従雉鳴上生來招招舟子従濟盈上掉轉刺宣處只求牡歸妻四字隠隠照顧而求牡則取喻扵物歸妻則託言夫士絶不露一痕迹而刺宣之意已宛然可思或曰安知此夫人非宣姜曰夷姜之事稍曖昧若宣姜則作新䑓以要之矣故刺宣姜之詩嚴而直刺夷姜之詩㣲而婉一章泛論其理以起刺之之端尚未着滛者身上匏方葉濟方深不可渡也所謂當止而止也可見凡事深則宜厲淺則宜揭處處度量纔無失著而况婚姻之大乎此二句雖承上深渉却已推開一歩以興起婚姻不可苟意盖深淺之宜處便是義理所在深厲淺掲為度量事物作一影子故荷蕢引以諷聖人二章曰瀰曰盈秋水時至百川灌河有滅頂之懼乃不以舟而以車已是失智猶悍然不顧以為不濡軌全無人心者矣以雌求雄已是滛奔而乃求獸之牡反常紊類更非意計所及矣俱進一層説分眀一指宣公䧟扵天下大戮而不恤一指夷姜凟亂大倫而不恥與泛常刺滛者不同也陸農師曰以雌求雄者滛也又求其牡焉者亂也三章引証扵古也雝雝鳴鴈行禮扵始旦言納采也禮之慎扵始者如此士如歸妻言親迎也則迨氷未泮禮之慎扵終者如此約舉始終已包六禮補正云霜降而婦功成嫁娶行氷泮而農桑起昏禮殺故曰迨氷未泮朱註誤四章諸説俱不可解用匏則危用車則濡舟子招我何反云卬否以衣而渉曰厲褰衣渉水曰掲豈舟在而人猶徒渉抑上渉字為徒行而此渉字為乗舟乎按此承上婚姻之有禮猶濟渡之有舟也濡軌固謬用匏亦危招招我招之也王逸云以手曰招以口曰召招舟子待舟也舟喻禮惟其待舟所以人徒渉而我否也複一句言必湏舟也下句不但湏舟更須我友以共濟喻公不獨宜守婚姻之禮更當求賢淑之人以承宗廟社稷所謂嘉耦也将上三章意収拾在内通篇歸結以兾君之一悟也匏有苦葉四章章四句谷風刺夫婦失道也衛人化其上滛扵新昏而棄其􅃇室夫婦離絶國俗傷敗焉一章統冒全篇夫婦失道猶言失夫婦之道也詩人盖述棄婦之辭以刺之隂陽和而雨澤降夫婦和而家道成此夫婦之道也葑菲取其莖婦人取其德亦夫婦之道也今乃不然所謂失道也不宜有怒提出怒字正為上下兩截作轉捩盖怒者以其色之衰耳故以采葑菲告之徳音美名也如所謂賢淑之名聞扵黨族是也違者異扵前日也色雖異而德音如故可以偕老矣二章此行道就棄婦方出門時説畿門限也畿以外即道也行道而遲遲不忍身方踰閾将就道以為過此便是路人寸步千里方期送者之見留而彼已返矣不逺伊邇送也薄送我畿返也而我荼苦之時正新昏燕樂之日曼倩怨思曰故人䟽而日忘兮新人近而逾好三章不我屑以以箋云用也用以治其室家也方與下無逝無發一串蘇傳逝人之梁而發人之笱因人之成功也新昏因舊室之成業不知其成之難則将輕用之故告而止之按此解甚精無限辛勤百端交集豈我躬不閲而無暇恤我後日之事乎我雖被棄固憂之深而不能已也言外便有不忍遽絶之意如此説方合詩人忠厚之㫖故記引此以為終身之仁四章上六句是勤勞治家之事然婦人一味作家苦扵周恤之義全然不曉此徐吾有閉燈之隣髙祖有戛􅅅之嫂故又曰凡民有喪匍匐救之婦德乃全五章不我能慉疏云不以善道養我謂恩禮也加善道兩字扵下文反字更掲得起末四句求生之時恐無以同生既生之後反無以共死哀哉六章以我御窮悽絶覺鳥盡弓蔵千古同慨洸憒是形容武怒之状田舎翁多収十斛麥其對妻子便有此種意氣漢光武所謂富易妻是也其被棄時必有一種藉口之詞令人難堪而以既詒我肄四字盡之若但加以勞苦之事者然忠厚之至也随以昔者來塈陡然収住喫緊在一念字盖追顧初念最能動人其望之深矣谷風六章章八句逸齊范氏曰此婦人雖怨而不忍絶豈以有子故歟盖箋以恤我後為恤其子也又元史俞述祖傳述祖為徐夀輝所執縳其五嵗兒曰不降殺是矣述祖罵曰我躬不閲遑恤我後何不速殺是可知元人未嘗不讀註疏式微黎侯寓于衛其臣勸以歸也按書云西伯戡黎黎近紂都故祖伊奔告紂都為衛箋云黎在衛西唇齒之國也六韜决大疑云武王封湯後扵黎殷後扵宋吕氏春秋云武王封堯後扵黎其立國非後扵衛也爵為侯地在今大名府之域此朝歌始封之衛非渡河以東之衛也或據左傳晉荀林父畧狄土立黎侯而還謂此詩作扵衛穆公之世夫衛至穆公徙居楚丘已三世則黎與晉為鄰晉為盟主何殷殷望救扵衛哉則此詩作扵宣公之世無疑斯時狄勢已强翦黎者窺衛之漸也黎舉而衛繼之矣或曰黎既滅安得衛穆時復有黎為赤狄所滅曰味此詩云式微悼其衰之甚猶未盡滅也云胡不歸歸黎也猶有故土可棲也傳云衛處之二邑其臣不欲則其故土必有逺過扵此二邑者然則狄非盡黎有之抑或入其國得其子女玉帛而去惜史官踈闕不能偹述其事耳夫衛文復國頼有齊桓即其後黎侯再造亦由林父惟此日援絶勢窮其君臣乃能崎嶇立國至衛穆之世尚存延祀百有餘年中興之功誠有不可没者夫子存此二詩以補史氏之闕亦使萬世之懦夫有以自立也夫傳云中露泥中衛邑也水經及一統志以為實有其地凡詩中人名地名毛公必有傳受何以衰㣲之至便當歸去諸説俱未浹洽盖黎臣寓衛習見宣公所為非結好扵宋即求盟扵齊滿腔都是勢利我衰微如此安望其能助我也故字躬字須坐實否則便是怨君故者事也其事為乞師紓難之事其躬為報讎雪恥之躬今既無望不如歸去重作區處耳胡不二字有翻然振作意以見失援扵人正湏發憤扵已晉人所謂戮力王室克復中原豈作楚囚相對泣耶首二句不言彼無恤鄰之義只言勢力單弱自不足以動其相恤也下二句亦不言其不救但言吾為此事而來而深歎始願之違以見今日之當去也序言勸以歸将前後神理一語道盡式微二章章四句劉向列女傳以此詩為二人所作宋方匀因以為聨句之祖旄丘責衛伯也狄人廹逐黎侯黎侯寓扵衛衛不能修方伯連率之職黎之臣子以責扵衛也王制二百一十國以為州州有伯八州八伯八伯各以其屬屬扵天子之老二人分天下以為左右曰二伯是州伯之上有二伯武公扵平王時為上公則為二伯武公而後仍為州伯宣公為武公之孫世代未逺衛固州伯也黎衛接壤桓文未興安得不以方伯連率之職望之衛哉序以責字包括全詩覺四章聲情皆見一章曰何多日二章曰何其處三章曰匪車不東似處其國而待救者或以為作扵廹逐之日尚自保其餘邑而未至扵衛之前則旄丘當在式微之前矣今次扵式微者必黎君歸而衛猶有連合與國來捄之約故黎人仍待其救耳既約與國何以有别故或以之伐人國或以之救他國皆未可知者能左右之曰以猶云以與國别處去也三章靡所與同又疑與國無同心恤患者至扵終不見恤乃知衛之君臣褎如充耳焉耳補正云曲折以體其情而終乃質言以責之忠厚之至也自夏葛而冬裘言其時之久耳非一章作扵夏三章作扵冬也釋鳥云鳥少美長醜為􅀈鷅陸璣云流離梟也其子適長大還食其母傳云瑣尾少好之貌流離鳥也少好長醜集傳以漂散訓流離但玩瑣尾字似扵鳥為切盖就其利害切身上警切言之蘇傳云衛人以狄之微而不忌譬如流離之養其子不知其将為己患也金人謂宋曰蒙古滅國四十以及西夏夏亡必及我我亡必及宋唇亡齒寒自然之理若與我連和所以為我亦以為彼即此章之意末句褎如充耳如作瑱之塞耳則褎字宜従傳盛服解如褎字作多笑貌則充耳當作聾耳説諸家褎字遵朱而充耳用毛説不可行旄丘四章章四句簡兮刺不用賢也衛之賢者仕扵伶官皆可以承事王者也賢者仕扵伶官詩人作此詩以刺時君之不用非賢者自作也詩言碩人多矣無自譽而曰碩人者赫如渥赭的是詩人形容之詞若自已顔靣無従見之連説簡兮望其破格以擇賢也方行萬舞之時日之方中至眀而易見也在前上處至近而易察也而碩人者俁俁然公庭萬舞其竒偉望而可知也其平日力則過人藝則可用也即執籥秉翟之時赫如渥赭逈然獨異自當一見色動簡擇不遑而公曰伶耳伶耳但錫以一爵與韠胞閽寺無殊所以動西方美人之思歟簡兮頓住従方将萬舞起一路追到赫如渥赭説得十分刺眼種種異人而以公言錫爵一語収煞頓使英雄氣短従前属望付之灰冷又轉出一意望古嘅今恨不得置此人扵其世綿邈低佪至深至逺一章萬舞傳謂用之祭祀不知在廟對越何暇瞻頋伶人容貎朱子專言燕禮以錫爵為主人獻工其説不刋公庭指所舞之處不必宗廟也二章大德之人豈可以藝力盡之此只就當時所重者而言盖裕将材能射御皆庸主心目所亟須故粗舉以形之非謂碩人才盡扵此三章傳云籥鄭氏扵周禮少儀眀堂位皆註三孔名物疏曰爾雅大籥謂之産中謂之仲小謂之箹傳云六孔其産歟詩記自註云文舞舞羽吹籥恐無右手舞而左手復吹之理盖籥為翟之助陸德眀謂籥以竹為之長三尺執之以舞是也四章朱子以美人目君是也山榛隰苓喻賢者之生宜在西方美人之世末二句即従上二句宕漾出之盖舎之不忍薦之不能邈然遐思以為美人而過此碩人不知若何愛䕶當其淪落又不知若何惋惜也兩兮字忽作變調神韻與首句相應若曰簡擇賢人非斯人誰與歸孟子論友忽想到舜尚見帝同一結搆簡兮四章三章章四句一章六句泉水衛女思歸也嫁扵諸侯父母終思歸寜而不得故作是詩以自見也此終不得歸之後以自叙其悲惋之意非欲歸之時作也一章毖彼泉水亦流于淇言水可以注淇我不可以至衛二句已蓄全篇之意諸姬従嫁之諸娣也二章與諸姬謀曰吾将出宿于姊飲餞于瀰而言歸乎則皆告我曰女子有行逺父母兄弟恐未可以歸也然其言不足據也又必問我諸姑伯姊之老成有識者焉箋云泲瀰所嫁國適衛所經之道恭録折中云夫之母婦謂之姑諸姑伯母叔母也夫之女兄婦謂之姊伯姊年長者也盖以諸姬為少不更事欲詢扵尊長以定謀也謹按方謀於諸姬忽揷女子有行二語與下問姑姊似無倫次意即諸姬之言也此二語國風三見盖人所熟知者只泛言不可遽歸至父母終禮無歸寜一層尚未見及故又問之諸姑伯姊也三章吾向諸姑伯姊而問曰吾将出宿于干飲餞于言膏塗車軸不日而至扵衛将父母已没一登其丘隴兄弟久踈一接其音容未為不可也則交口而應曰不瑕有害乎言害扵禮也禮父母没不得歸寜也或疑出宿飲餞何以兩番互異夫所謂宿餞原是意中懸度猶云従此路可至衛從彼路亦可至衛也而以不瑕有害㗳焉終止聖人所以取其止扵禮也瑕同何不瑕有害雖若疑辭正言其有害也與二子乗舟篇同㸃出有害二字以見私情為輕名義為重一失其道害不可言安得不凛然自止四章扵是終不得歸惟有思之而已永歎而已陳止齋曰泉水竹竿作扵無事之時故其辭緩以婉載馳作扵故國已亡之日故其辭切以怨泉水四章章六句北門刺士不得志也言衛之忠臣不得其志爾常人不安扵命故不能已已焉哉三字銷却多少悲愴省却多少營求乃賢人無入不自得實際盖惟賢人偏招得如許艱難亦惟賢人受得起如許艱難也君闇世亂君子道消飄然颺去九州相君何地不可而蹇蹇匪躬安于苦節非賢者能如是乎而斯時乗堅策肥方且頋身家不知國是所以可刺也一章傳云興也北門背眀鄉隂已将亂世闇君意攝入三章都是亂世闇君所致以興起全篇也室人二字是士君子居官第一闗鍵我不管身家彼却不顧名節適我摧我令人難堪苟非真豪傑必至名行墮地即不然戚戚之景况亦自難以消受詩人一委扵天庶㡬樂天知命矣君子所憂者國事不為貧憂其憂貧正憂國事也古者忠信重禄所以勸士故行役者勞而不困奉命者事無不集若終窶且貧而君相莫知其艱難則動見窘廹何事可為此又載離寒暑従事獨賢者所未及之苦况也一終字有長此終身意一且字有日甚一日意天實為之不尤人也謂之何哉不怨天也二章王事適我政事一埤益我従莫知我艱來室人交徧讁我従終窶且貧來朱氏善曰交無一人之不讁徧無一事之不讁也三章箋云敦投擲也釋文云敦廹也敦甚扵適遺甚扵益摧則挫辱而不止扵怨訕矣史氏榮云敦毛如字鄭都回反集傳既用鄭義則都回反是也乃反以為叶不應相戾如此故疑音切非朱子手定北門三章章七句詩人無虚假之辭十五國風無輕言王事者如衛風為王前驅則桓王伐鄭之事也唐風王事靡盬則以故晉之立皆王命也秦風王于興師則㐮公上承天子之命也此詩言王事與國之政事分説則眀眀天子之事不比春秋傳凡交扵大國者㑹盟征伐皆曰無曠王事也意者此詩作扵西周之世夷厲之時衛未并邶之日乎此真邶風矣北風刺虐也衛國並為威虐百姓不親莫不相擕持而去焉北風雨雪何等氣象狐蹤烏喙何等景物興處已包得如許嚴刑毒歛不成世界矣此只寫出君子危邦不居見㡬而作熒澤之禍已數計燭照之後序謂百姓皆去者非也一章惠而好我即平日志同道合者盖他人或處堂而不知禍及或戀棧而不能决去惟順而相好者一言感悟相率同行且古來豪傑多為虛徐二字所誤徘徊眷戀受其牢籠卒至玉石俱焚雖欲逺舉而不可得兩其字故作㳺移如云其虚乎其徐乎禍亂亦既亟矣言外便有不俟終日之意禍未至而云既者想見見㡬眀决二章同歸歸扵他國也去父母之邦非人之本情而轉以他國為歸則以故國不可一日居也梅尉入山终身不出管寜客遼東至五十年皆得此歸字之義三章烏有三種師曠以白頸者為不祥恭録折中云虐政之興始扵小人小人一用則必言利言利則必重歛重歛而不得必繼以嚴刑而虐政行矣狐邪媚之獸烏不祥之鳥喻小人也故狐烏者北風雨雪所由至也虐政既行則小人各引小人而舉朝皆是虐政大行則庸人皆變小人而舉國若狂故莫赤匪狐莫黑匪烏此北風雨雪之極致也謹案觸目盡是此類則賢人君子自無處頓放以見朝野皆播惡害民之徒不必窮竒饕餮等名而其義已備北風三章章六句静女刺時也衛君無道夫人無德序言刺時者十二篇有刺時事者有刺時俗者夫子刪詩列此詩扵新䑓之前而鄭氏又譜入宣公之世盖新䑓将築聘使欲行其情甚閟其事甚隠詩人托為刺時事者以諷止之極言静女之可欽可愛而齊女事事相反使之知其無益有損而自止也主文譎諫其㫖微矣一章静女貞静之女有德者也俟我幽閒之地待我娶之也吾愛之愛其德也而或不見宜其躑蠋不寜也若有色無德夫何所愛而憂其不見乎本宣俟姜而言俟我者遷就其辭也斯時宣意中欲其得見又恐其不得末句寫盡徬徨之意預知其有新䑓之要矣二章傳云煒赤貎彤管以赤心正人者也左傳静女之三章取彤管焉杜注雖悦女美義在彤管女史紀事規誨之所執也盖以其為静女知其所貽者必彤管也豈徒悦懌女美乎若所貽者非彤管而為鳥獸之行也何為娶之三章牧逺郊姜來自齊故以逺郊為言荑宗廟取以縮酒言非女色之為美亦視美人之貽我者何如耳若貽我以芳荑則祭祀有托也苟貽我穢聲則十年尚有臭君何為搔首踟蹰乎末句作不了語以見其理易眀静女三章章四句新䑓刺衛宣公也納伋之妻作新䑓扵河上而要之國人惡之而作是詩也宣公納子之妻無復人理所貴乎刺者欲其君之感悟也此何足以感悟而刺之盖此詩之作新䑓既成齊女未至猶意為伋妻者守従一之義不至扵従公之欲也序云要之者以前此未嘗言自娶于是作新䑓使齊女登之道達其意然則齊女之來何常知為宣婦哉故言燕婉之求而忽得此醜惡之人畧有人心自當唾棄豈従而暱就乎惜之者望之也泚水中之䑓影可望而不可即子婦之喻也鴻雁之大者鴻不再偶守信之烏婦人従夫之義也皆所以為諷也一章長樂劉氏曰泚水中䑓影鮮眀之貎盖臨河作䑓影入水中倍覺鮮眀補正云昭五年葬鮮者扵西門註不以夀終為鮮與次章不殄意同按不鮮不殄猶言須臾無死尸居餘氣耳二章洒訓髙峻方扵泚有别然亦扵水中見之方於籧篨不能俯相對三章魚網設而反得鴻事之必無者也求燕婉而反得此戚施情之必不順者也吾恐人所厭棄仰靣為難矣王世培曰使伋妻能如列女傳所載之宣夫人欲同庖而不聽不且聞此詩而逺去哉新䑓三章章四句二子乗舟思伋夀也衛宣公之子争相為死國人傷而思之作是詩也按伋夀之死傳云賊待於隘殺之左氏云盗待扵莘殺之史記盗遮界上則二子死扵陸地詩何以言乗舟或曰公使盗待其乗舟而沈之中流耳竊以為非也盖二子之死甚閟未嘗眀示國人而作詩者亦未嘗與伋偕行親見其殞命之所可知當時之傳説不一矣詩人以伋奉命之齊弟夀先行自衛適齊者必渡河此衛人所共知者因以乗舟渡河為辭二子乗舟猶云二子適齊耳又新䑓作扵河上即宣公要齊女之地禍根種扵此則禍機亦蔓衍扵此故歐公謂譬彼乗舟不如集傳實作乗舟適齊之確也言二子汎汎其景其逝而所以使之去者自見扵言外而二子之死只作游移不定之詞所謂風也後懿公之世百姓大臣猶以殺伋之故懐擕貳狄人乗之遂滅其國然則二子之所繫重矣哉二子乗舟二章章四句容齋隨筆云衛宣立十有九年卒其烝於庶母夷姜也姑以即位之始便成滛亂而伋即以次年生勢須十五年然後娶而奪之又生夀朔已能同母譖兄又能代為使者越境非十嵗以下兒所能辦此决無之事也按史記宣為桓弟乃荘公之庶子夷姜荘公之妾也烝夷姜生伋子當在桓公初年桓在位十六年桓弑及宣即位而有新䑓之事十九年間復舉二子伋使齊之日知夀朔之已長也夫何疑焉又頋氏曰桓公之世宣為介弟安然奄其父之妾生子而育之是則可疑也按春秋書衛人立晉左氏曰衛人逆公子晉于邢疏云晉去衛居邢晉何以去衛出奔也晉之出奔必以烝夷姜之故為桓公所黜也桓公能黜驕奢之州吁獨不能絀亂倫之晉乎或又疑伋夀為同母或責夀不辨之於公按宣公殺伋之謀閟而夀知之以與朔同母故也夀不黨母弟而必欲全其兄夫安知始之不諫其父其父不以諫故而併怒夀又安知朔不忌伋而併及夀乎春秋與伋後先嫓美者有晉恭世子而與夀合轍二百四十二年㡬無一人夫安得輕議之邶十九篇七十二章三百六十三句詩序補義卷三
