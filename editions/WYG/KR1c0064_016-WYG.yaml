body:
  text: 詩序補義卷十六石泉縣知縣姜炳璋撰祈父之什祈父刺宣王也傳云祈父司馬也箋云此勇力之士責司馬之辭也六軍之士取於六鄉法不取於王之爪牙之士宣王料民太原人不足用乃令祈父出禁衛以從軍通詩皆役非其職而怨之之辭盖司右虎賁如後世羽林佽飛之類行則專隨車駕居則扞衛王宫而征役則非其職也予字略頓爪牙一日不可去諸身者也轉移也恤憂也指征役若云逺戍則宣王無戍申戍甫之事一章爪牙取以為喻二章直指爪牙之士立言之序也靡所底止謂征役正未有艾也三章王之爪牙爪士無從征役之例既不聞之矣而獨子無從征之例人盡聞之而亦不聞也信乎其不聰也祈父三章章四句通鑑外紀云三十三年王伐太原戎不克三十八年王伐條戎奔戎王師敗績三十九年戰于千畆王師敗績於姜氏之戎四十一年王征申戎破之轉予于恤盖謂此四役也或據穆天子傳以此為穆王之詩則非也自駒大夫刺宣王也此借留賢之辭以刺宣王也賢人既去之後述其將去留行之作使王聞之而悔悟耳首二章永朝永夕即以為幸乃前此日在王側而王不以為異也三章爾公爾侯以挽其行而天位天禄王不與之共也末章白駒空谷猶望德音而王未聞其思之也語語諷刺一二章上四句但於白駒致其留戀之情而下始指出乘駒之人食我場苖謂縶維其駒而飼之以苖使之不去也逍遥不敢強其仕但欲其遨逰數日猶勝於决然以去也嘉客留之暫客於斯不能使之安於此也三章謝氏枋得曰賁華采也賢人所至山川草木皆有華采蓬户皆有輝也范家相曰方其賁然來思我正期爾以為公以為侯而孰意今兹之逸豫無期乎按逸豫隐居自樂也無期無公侯之望也於是告之曰君臣義無可逃公侯豈異人任安可過於優㳺决於遯思哉尚其賁然返駕也蔣氏悌生曰所留之賢必當時之俊乂而留之者亦家父吉甫之徒與國同休戚者也四章然而不可留也彼在空谷之中秣其馬者生芻一束耳無俟我之苖藿也徒想見其人如玉而已然國家有大事猶當見訪幸毋金玉爾音而有遐心置國是生民於不問也白駒四章章六句或以此為送行之詩與驪駒同則爾公爾侯無謂矣或又以為共伯歸國之作尤謬黄鳥刺宣王也宣王初政哀鴻得所及其終也畿内之士大夫有失職而逺適異國至困而思反者詩人為王述其言以見政衰於上人民困於下王其克終厥德以無墮中興之業也此及下篇俱有族有家知為大夫失位者之作也一章葢以黄鳥自比呼而告之曰爾無集於此邦之穀而啄我之粟當翻飛去也二章不可與明是馭强之法亦止謗逺怨之方唐人得之便有唾面自乾之策三章立言有序彼既不以善相接不與我相知我自不樂與相處矣安得不賦歸來黄鳥三章章七句王氏蘇氏並謂賢者去國詩故謂諸侯之兄弟來依王室窮困而反古義又謂共伯歸國之作皆非我行其野刺宣王也此詩亦大夫失位其子弟就昏于異國大夫之家有負約不納者故詩人述其辭為王誦之也其曰昏姻之故有父母之命也箋云婦之父婿之父相謂昏姻其曰言就爾居言就爾宿不敢負約也兩言爾不我畜畜者止也不止而留之志在求新匹也所以求新匹者以舊者之貧不如新者之富也於是正告之曰凡為人者誠不以富亦祗有信有義足異於人乃可貴耳今舍信義而求新特豈足多乎喚醒之使之自反也上無教化下無風俗誰實主之序所云刺王也三章當從集傳作賦也惡木自蔽惡草為食是旅人艱苦景况正蹴起一富字不言彼之負信無禮只以不我能畜該之不言彼之厭貧謟富而但言富不足異皆忠厚之至末二句當從論語集註不必别作一解我行其野三章章六句此詩蘇傳疑為諸侯求卿士而不得然依樗采葍語甚不倫王氏泛作依其姻親詩故又分兩篇為同異姓皆臆說也斯干宣王考室也此述宣王考室以著中興之盛也前二章一篇之綱式好弟也似續孝也孝弟立而家齊而國治王者治天下之本也三章治垣定考室大勢四章言堂五章言室從攸芋攸躋以至攸寧早為後四章伏脉六章言夢七章言占八章男子之祥九章女子之祥考室時頌禱之辭也或云關鍵在似續妣祖鄭氏補德行國富人民殷衆正考室之本為似續之基公劉造豳古公作岐皆妣祖之己事其不陋不侈正善於似續處兄弟為妣祖之分體現在者以式好為難故為王幸之子孫紹妣祖之箕裘未來者覆墜是懼故逺為王期之無非似續也一章上四句是言室下三句是居此室之人鍾靈毓秀卜世卜年而和氣致祥必自最親者始今幸式好無猶則太和元氣已氤氲於此猶訓謀兄弟之間坦然共見肫然相與便是式好若彼此各有所謀而彼此各不相知便是邪謀二章似續所包甚大築室其一耳君子將營宫室宗廟為先然只在百堵中不必以首句貼祖廟此上三句承前章上四句來言所以致此者原非苟且已含三四五章意居處二句承首章下三句來言和好者不獨兄弟已含末四章意三四五章承築室百堵來治垣而言風雨除鳥䑕去則下文堂室規模已粗定於此四五章寫堂室的是王者氣象又的是盛王氣象後世甘泉景福徒形侈妄下莞上簟四章近脉承君子攸寜逺脉承爰居爰處二句來子孫萬億頌稱常談而假之於夢寫來别是一畨出色或謂視周初淳樸之風少减良然然亦雅而近於風者也太人占之是末二章過脉但言朱芾斯皇室家君王則其德之宜君宜王可見有謂今日之男即他日之兄弟者謂太子為天下之根本者謂男當繼螽斯麟趾女當繼樛木卷耳者謂無非無儀是鑒于牝雞之失以為戒者雖其理未嘗不該而均非詩旨所重也斯干九章四章章七句五章章五句按左傳昭二十五年宋公享昭子賦新宫或以新宫即此詩燕禮下管新宫大射禮乃管新宫三終儀禮作於周公知新宫非此詩矣無羊宣王考牧也詩之美宣王者大都形容其中興氣象假如人民困苦饑饉洊臻則百物凋耗安有此蕃庻之牧事惟時和年豐室家稱慶然後萬物得所是以上三章言牧事之成而末章即以富庻之徴繼之觸則敗羣燥則有疾濈濈濕濕正其盛處言外便含牧政之得宜二章上三句是物之自順其性而爾牧三句是盡物性之一端可補周禮未備三章上三句言牧之閒暇下三句言羊之壯盛末二句忽一總是人與物天機鼓動相習而且相忘矣宣王之牧正梁鴦曰吾心無順逆鳥獸之視吾猶其儕也甚合詩㫖豐年溱溱是現前實境而必假之夢者從一節推廣到全體苦於辭意不倫故假牧人之夢方與上三章浹洽若言牧人真有是夢太卜真獻夢於王則癡矣衆維魚言始而夢衆既而夢魚於占法為少變多之象變者占夢之官謂其變耳謂始則夢少繼而夢多耳非謂夢人變為魚也無羊四章章八句節南山家父刺幽王也箋云從此至何草不黄為幽王之變小雅箋云家父字周大夫也疏云知是大夫者以春秋之例天子大夫則稱字桓七年天王使家父來求車上距幽王之卒七十五嵗若幽王之初八十五嵗矣古人以父為字或累世同之宋大夫孔父其父正考父其子木金父此家父或父子同字父未必是一人也雲漢序云仍叔箋引桓五年仍叔之子來聘春秋時趙氏世稱孟智氏世稱伯仍氏世稱叔也此詩前三章歴言尹氏有辜人望而據位不去也説到不敢戲談已至防民之口道路以目光景於是想到厲王監謗至於失國可不監視於此而蹈其故轍乎若幽王尚存而云國既卒斬似無此理或又疑厲王未嘗亡國按史記厲王虐國人流王於彘則國之卒斬亦既然矣二章正幽王之世天怒於上人怨於下鄭桓公所謂王室多故何所可以逃死者三章末二句頗難安頓盖前六句一氣注到俾民不迷上詩人呼尹氏而告之曰太師之職維持四方輔佐天子使民生養安全而不至迷亂今日者民不見愍於天矣所謂俾民不迷者安在汝復貪戀此位必至空我師而後已也迷者昏亂之謂茫然不知其生全之所在也不弔指上薦瘥喪亂說師即民空甚於迷今日迷將來空矣四章箋云仕察也言王之政不躬而親之不問而察之承上章天怒人怨如此由於王之不能進君子而退小人也盖凡事不躬親則民不信矣惟不躬親故弗問弗察而小人得以誣君子王豈可聽其如此哉惟以夷說者接君子而以决斷者去小人毋以小人而危君子也小人去則小人之黨皆去𤨏𤨏姻婭何至膴仕乎夷平也箋於第八章云說也盖不得其平則不說故夷者和說之意五章承上章言今日者昊天不傭降此尹氏之鞠訩昊天不惠降此尹氏之大戾王誠一旦去之而用君子君子如至民心之憂患一時而息君子如和說民心之惡怒一時而去猶曰庻民弗信未之有也兩此字即指尹氏六章王不哀此民而曰昊天不敢斥言王也賢人不用即不哀此民矣國成即國鈞也民之不寧皆秉國成之尹氏致之王不自為政而一以見委以致百姓之困窮而勞敝也七章承上章言小人柄用君子斥逐則亂靡有定而百姓困敝天下皆然八章此承上章天下昏亂由於用小人逺君子彼君子者豈無意於王哉於爾惡怒方盛之時如視爾之矛㦸欲刺然固避之恐後矣及王有悔心既說既懌君子又歡然相與酬酢焉九章言昊天不平而薦瘥䘮亂使我王之不寧如秉國成之尹氏能懲創其心引用正人則君子亦未嘗不樂為酬酢匡其不逮焉乃不惟不自懲反怨惡正人必中傷而後已斯真妨賢病國不容一日立於其朝者也此言不必王能夷懌即尹氏能懲創自新君子亦不終拒之十章訩鞠訩謂禍患也推究禍患之所起由於尹氏窮究禍患之所止有不忍言者訛其心者變其信任尹氏之心也訛則明明則所任皆當訛則公公則所為皆平而天下嘉頼之前章冀尹氏之自懲尹氏既不能自懲故以訛其心望之王也節南山十章六章章八句四章章四句按幽王昏主也尹氏大奸也而詩人刺尹氏者語語刺骨刺其樹威真炙手可熱刺其播惡真道路以目或冷語問之則曰不平謂何誰秉國成使之汗顔或甚言責之曰空我師曰鞠訩曰大戾幾令骨戰刺其怙惡不悛則曰􅆭莫懲嗟又曰不懲其心刺其中傷善類則曰罔君子怨其正尊其名曰太師指其實曰小人而平日之倚氷山趨炎熱者只以𤨏𤨏兩字盡之不足責也可謂盡情刻酷矣而刺王則語有含蓄弗躬弗親兩章正言親賢逺奸之道下章王不能然則曰昊天不弔未嘗斥言王也刺其斥逐君子但言相爾矛矣刺其任用小人但言不自為政刺其違天虐民但云卒勞百姓而又以既夷既懌引進之又以畜萬邦歆動之即王酗二字以禍患言不以君德言而歸結於式訛爾心之一言君臣之義也正月大夫刺幽王也此大夫欲幽王用賢以救亡也前三章言天道變於上訛言興於下刑罰日酷無辜被刑而國其岌岌皆小人致之也然亦非小人之福故四章言天道難欺而總由於王心之蔽故五章言賢否莫辨于是君子局天蹐地惟訛言之及而人主於君子亦仇仇然不之用推其故女寵蠱於内䜛夫得交搆於外宗周將隕焉然非不可救也故又以車為喻言棄輔則輸載無棄則踰險若之何恣情剝削善類一空國家之危甚於累卵而植黨播惡之小人方華膴自腴斯時政安得不敗亂民安得不困窮天安得不示變國安得不滅亡也哉此後四章之意也一章訛言不可泛說盖顛倒賢不肖而中傷善類之言也訛言不一或明用攻擊或暗用抵排或使黨人為鷹犬或通宫掖為内援皆訛言之作用也曰民者對天言則皆為民念我獨兮自念之也哀我人斯自哀之也故下章呼父母訴之二章郝敬云訛言之人巧肆中傷言人美好惟自口出言人莠醜亦自口出好言莠言猶云譽言毁言也詩人有一叚憂國之心即有一種正直氣象救正語言小人以為苖之有莠去之後已是以有侮也三章箋云辜罪也言王既刑殺無罪并及其家之賤者不止於所罪而已書曰越兹麗刑并制天之繁霜由於政之酷烈釋詁云無禄死也詩人言憂心惸惸念我值無可逃生之世嚴刑酷法及於無辜之人并其臣隷刑之哀我人斯手足莫措更從何處求生乎箋云當於何得免是難我觀斯民正如烏然將來不知止于誰之屋也四章承上民之無辜并其臣僕言訛言交搆善人被戮幾疑天之夢夢矣抑知福善禍滛理自不爽小人之禍人者適以自禍也維皇上帝其靈赫赫不小人是憎而伊誰云憎乎殆者人人自危有定謂潦盡潭清從前氣熖一時氷釋也五章謂山葢卑雖岡陵亦以為卑猶以賢為不肖也訛言如此而王莫之懲彼故舊之臣可以决是非占夢之官可以辨吉凶召而訊之宜其有所救正矣今皆以聖人稱王則王以為賢竟賢矣王以為不肖竟不肖矣誰知此中之是非得失乎子指王詩人代王予之也六章甚言訛言之流毒可畏也嚴緝云人謂天為髙而我不敢不曲身傴僂而行懼壓也人謂地為厚而我不敢不累足小步而行懼陷也喻處亂世禍生意外不可謂必無之事而不懼也人孰不疑其言之過然實則有倫有理何也盖當時羣小肆毒以害人無所不至不可不慮也末句朱子加使之至此四字言今之人胡為肆毒使我局髙蹐厚至此乎七章言已之不能救正于王以王之不見用也瞻彼阪田之中尚有菀然特生之苖是阪田若有助於人也曽大臣而無以助君德乎乃王之危苦我者日甚一日如不我克焉則效忠無路矣吾思先王求我為法之時如不我得故我得盡其力今也動見掣肘既拘執我而又仇仇視我則亦何以盡我力耶扤不安也言危苦也作詩者必用自宣王而留於幽王者八章窮禍亂之本由于女子為小人内援故君子救正無從也今兹之政胡為厲矣作一詰問神已注着褒姒按漢書趙飛燕入宫披香博士淖方成在帝後唾曰此禍水也滅火必矣是時漢猶未滅也國語史蘇云晉以男戎勝戎而戎以女戎勝晉是時晉亦未敗也而云然者其幾已形知其斷然耳且褒姒滅周不特詩人早見及鄭語史伯曰若伐申而繒與西戎伐周周不守矣亦料之於未然也九章上章說到褒姒滅之已吞聲嗚咽而此及下章一反一正開出生路來勸其亟用賢人以救禍亂也顧氏兆麟曰依蘇傳永思其終則終其永懐倒句法也又字照既載亦倒句法負重行逺而又隂雨濘滑總見無可棄輔之理也十章終踰絶險言留輔顧僕終能踰越絶險之地而無患也已盡喻意于是又醒之曰王曾是不以為意而棄絶賢人乎故下章遂言君子罹患之事十一章承曽是不意而痛切言之王非但不能用賢而斥逐刑戮惟恐不至君子遜言避禍或奉身退休兾逃仇人之鋒而復不能免憂者詩人憂之也憂不在君子而在國家也不敢斥言王故曰國亦以見為為虐者之衆也十二章承上章言如是則宗周之滅必矣而小人者方且樹朋黨植私交安危利災絶不知其禍之將及也前四句説得極熱閙忽接念我獨兮二句所謂一人向隅而哭也補正云小人乗權其姻黨鳴豫必甚相稱引故曰昏姻孔云春秋傳曰晉不鄰矣其誰云之十三章補正云小人之虐以濟其貪也此有屋有穀者即為虺為蜴者也小人之封殖如此則民之無禄可知是天降禍亂而椓䘮是也火炎崑岡玉石俱焚彼厚自封殖以病民者罹此禍可也而惸獨亦將與焉誠可哀也富人即謂小人之昏姻孔云有屋有穀者若以富民之夭椓為不足惜非義所安哀此惸獨哀其無辜而罹禍孟子所引乃斷章取義無禄無生養之具不得生也前十二章俱是憂國獨此章是憂民國是已非民困已極周室之亡可立待耳正月十三章八章章八句五章章六句詩故云申后太子之辭詩億云詩作於幽王已弑平王未立之時皆臆説也幽王嬖褒姒事備見於國語史記劉向列女傳諸書然載其裂繒舉火足矣而龍漦神降檿弧箕服抑何為者豈非逞妖誕不經之説寛暴君亡國之罪歟其後巨君遂藉符命以簒漢十月之交大夫刺幽王也此大夫刺幽王用皇父以召天變而不敢自逸者惟此大夫前三章言天變而歸之人事四國何以不用其良乎已呼起王朝盖京師者四方之則朝無良士故四國尤而效之也不臧者天變也言為何人而有是變乎已呼起皇父哀今之人胡憯莫懲已隱刺幽王及皇父以下小人乃懲之者獨一作詩之大夫恐黽勉無益耳七子比周艶妻煽處其罪總歸皇父皇父積惡多端其顯然者在營向一事殘民以營私不仁甚矣而反自言曰禮則然則禮者乃徹人墻屋壤人田宅之具也工于自謀矣而反稱之曰聖則聖者乃擇多藏實車馬樹朋黨之術也極哀苦中作此趣語一章十月之交謂九月之晦十月之朔日月交㑹之時也朔日辛卯十月之朔為辛卯也四月純陽陽氣正盛隂不避陽而食則隂盛極矣十月純隂陽氣甚微而猶為隂所食則陽衰極矣故此兩月日有食之尤為災異二章䟽云左傳晉士文伯曰國無政不用善則自取謫於日月之災三章集傳以震電為十月事如後世十月雷未可知也若夫日食在幽王六年三川震岐山崩在幽王三年集傳乃併指為十月事則失考矣此由日食而及震電由天變而及地異立言之序如此四章羣小結内援以肆虐嬖妾借外權以固寵未有不亡者也五章述民言以責其不仁三代之時凡有興作必庶人協謀洪範所謂汝則有大疑謀及乃心謀及卿士謀及庻人所謂即我謀也皇父不然徹我墻屋徙民居于向也猶漢徙良家以實五陵魏徙冀州士卒家以實河南是也田卒汙萊不待農功之畢而徙之也而猶曰此不戕民下供上役禮則然矣雖民怨於下而不恤也六章責其不忠言其作都于向也亦孔聖矣西京將危故遷而之東又恐朝謝事權夕生煤孽故委其政於七子國所重者卿立三卿自比大國得以置三軍凡大國三卿二卿命於天子一卿命於其君而三卿皆我擇之則恩自已出巨室富强足為己衛又恐老成在於王所則因端悟主皇父危七子亦危故屏去之非勒令歸籍則斥置荒野于是七子暗通消息皇父遥執朝權又徙民之有車馬者實其新邑甲兵田賦取之有餘非聖於自謀何以得此自謀聖安得復顧我王也七章此詩人為王朝之大夫非皇父之大夫也若皇父之大夫則三卿賂進無此忠告且王朝大夫自不在所徙之内其云徹我墻屋述民言也從事不必作從皇父之事泛指王事言復以䜛口加我是老成既逐羣臣亦危誰為盡職之人皇父之惡斯為極也然則日食震電川沸山崩豈天也哉由於噂㳫背憎專主争競之小人耳欲禳天變皇父其首八章言我里不敢斥言王國也多藏者有車馬者皆徙以徂向所留者貧户耳故甚病也四方皆有餘而我獨憂民皆暇逸而我獨勞以皇父病之也徹去也今日災異迭見天之警戒我也天命豈真盡去而不可為哉當盡人事以補救之耳我則不敢傚我友之自逸也皇父以下皆友也無論營向比周者為自逸即遁跡而去亦自逸也幽王君臣歛怨積惡上干天謫原其初皆一逸字致之通章結穴於此其所以清君心而勵臣節也至矣十月之交八章章八句雨無正大夫刺幽王也雨自上下者也衆多如雨而非所以為政也篇名當闕其疑此詩􅉏御之臣所作而序云大夫按周禮内宰僕一人馭道僕等皆下大夫為之故曰大夫也所謂周宗既滅者指流彘之禍也夫民叛而逐王并欲殺其太子天下無王者十四年安得不謂之滅宣王既没幽復踵其亂政詩人追溯前事以為永鑒焉正大夫六官之長而番維司徒家伯維宰則賢者安得不棄官三事三公以尹氏皇父為之大夫任國政者師氏以楀為之則賢者安能夙夜在公舉烽火以博婦人一笑則諸侯安肯朝夕無一非幽王之世也周邇西戎搆難已乆王室大騷自然蠢動不出史伯所料則云戎成不退又明明刺幽矣若云追刺恐不能起死魄而庻曰式臧也王都西都也毛氏寫官記謂指王城如指西都當言還不當言遷不知遷於王都對下昔爾出居言去王都為出則還為遷矣出居者正謂從西都而避居於郊如鄭伯寄帑皇父營向詩人欲其仍遷王室耳若東遷之後瑕禽所謂七姓從王豐鎬之民莫不東徙何待詩人招之耶一章有罪者指尹氏皇父七子之徒舍舎置之而不論也伏隱也捨此有罪之人不誅殛其辜既隱伏而不昭著矣若此無罪之民則饑饉徧及而受其害此天之弗慮弗圖故至此也二章周宗既滅已然之辭也蘇氏范氏並謂周宗周之族姓夫斯時周之同姓徧天下而云既滅乎當指流彘之禍周宗謂周之宗子指厲王既滅猶所謂滅我立王也雖有宣王中興然至今無所止定正頼羣臣協力而孰知不然三章昊天指王也補正云法度之言乃義理所歸宿如行者之有程也辟言不信則㝠行而無所至矣陳善閉邪謂之敬辟言不信則人將欺誕以求容故戒以敬其身而畏于天也此承上章覆出為惡之意以見王雖為惡而羣臣不可不敬慎以事其上也故下兩章言不敬之事四章補正云戎既成而亂勢不退饑既成而民生不遂已獨憂病而羣臣無以是告王者王何由悛哉聽王之言則漫應之唯唯諾諾而已此章言保身者之不能敬身以事上也盖保身者常恐禍之及已敬身者盡吾身之當為聽言則答譖言則退保身之道非敬身之道也宣王三十九年敗績于姜戎氏料民太原勢已不振幽王繼之故曰㓂戎已成五章上章言羣臣之觀望不能有事君之敬此章言小人之巧言方且為逢君之惡乃巧言則休反是則瘁則人孰不巧言以媚主匪舌是出是從心上嘔出不徒著之舌也六章承上章言人曰于仕乎孔棘且危殆矣彼不能言者王之所云不可用者也得罪天子直道難容矣而巧言者王之所謂可用者也而怨及朋友清議復難容焉見幾者惟有避位而已此章原避位者之情見其不得已而然七章然而敬身畏天者不如是也我冀汝遷于王都與我共事爾反云未有室家夫我固癙思泣血無言不痛疾以告汝矣而爾言乃如此然則昔爾出居誰從作爾室乎而為此託辭恐非敬身畏天之道矣嗟乎覆出為惡去者無以招其來留者又欲盡其類朝廷之上惟巧言如流者而已國不亡可得乎雨無正七章二章章十句二章章八句三章章六句此篇盖為刺幽而作朱子曰不去者作此責去者羣臣之去王敺之也集傳每節俱歸責於王未嘗不用序意嚴坦叔謂七章俱用各開說不必以末章為主立論最精祈父之什十篇六十四章四百二十六句詩序補義卷十六
