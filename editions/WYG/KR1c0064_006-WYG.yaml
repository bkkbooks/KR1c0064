body:
  text: 詩序補義卷六石泉縣知縣姜炳璋撰王王者之迹熄而詩亡詩亡然後春秋作程子曰詩亡謂雅亡盖以風則黍離十篇猶作於東遷之後朱子本此以註孟子是也然雅亡之故實有不可曉者若謂東遷無陳善納諫之辭則富辰萇𢎞王孫滿之徒莫不忠而有文何難規橅二雅若謂平王之後無事則戰於繻葛出居于鄭豈無忠義之士為變雅之音如云史官散佚則老􅅨職司柱下聖人從而問禮且晉董狐衛史嚚史輶魯史克皆其選也何至專錄民間風謡偏軼朝廷大制作若云平桓亦有雅泛求之三百萹以實之則又何詩不可附㑹然則東遷何以無雅竊以意逆之西周風氣敦龎其文厚重朝㑹燕饗之樂章公卿大夫之辰告釐為雅音播之管絃雅之所以盛也東都立國孱焉不振地復鄰於鄭衛既無巡狩述職之事一時士大夫靡然趨於東音東西之聲既異風雅之調遂别夫子所謂有司之失其傳者多矣即如漢武時河間獻王進雅聲詩樂而一時所尚皆新立之樂府晉永嘉之亂江左初立宗廟太常賀循奏曰舊京荒廢音韻曲折無識者於今難以意言然則東周有風無雅猶操南音者之不能强而西而北也亦猶樂府之不明於唐而歌詩之不能復於宋也不然王風十篇不盡出於民俗如君子于役大夫刺王即雅之北山矣葛藟王族刺王即雅之角弓矣故自西周以來未有大臣獻納而稱風者有之自王風始故曰平王之世無雅也黍離閔宗周也周大夫行役至于宗周過故宗廟宫室盡為禾黍閔宗周之顛覆徬徨不忍去而作是詩也全詩未嘗及宗廟宫室并未及宗周序者明白指出用一閔字其一副如醉如噎之情千古如見劉元城謂往來行役固非一見以當時之景物為行文之次第兩彼字傳云彼宗廟宫室謂我何求者人固不知彼為何處直視為禾黍之區矣不言悲而言憂正以朝廷絶少中興氣象胸中有一叚光復舊物之志而不得舒非徒下新亭之淚也或責大夫不為王言夫安知大夫之不告于王而不用乎范家相云㐮公立國之初恐未必將西周宗廟悉犂為田按此犬戎焚毁者耳梁書侯景傳泰清三年十二月百濟使至見城邑丘墟于端門外號泣域外使臣且然矣鎬京焚毁大駕東遷久而為田固其所也按許氏以黍色黄稷色黑按本草黍亦有赤白黄黑數種許氏誤矣黍稷之苗雖頗似粟而結子不同粟穗叢聚攅簇黍稷之粒疎散成枝孫炎以粟為稷誤矣又盧穄蜀黍也其莖苗高大如蘆今之祭祀者不知稷即黍之不黏者往往以蘆穄為稷亦誤也然則粟者總名黏者為黍不黏者為稷耳黍稷三章章十句劉向新序衛宣公之子夀閔其兄伋之見害作黍離太平御覽伯封作也伯封伯竒之弟曹植令禽惡鳥論昔尹吉甫信後妻之䜛而殺孝子伯竒聞伯勞而悔悮故作是詩自毛詩出古序行而諸説皆廢君子于役刺平王也君子行役無期度大夫思其危難以風焉平王之時西戎作難故戍申戍甫征役繁興又立於諸侯國家新造故錫命聘使不絶詩人目撃其事乃述大夫行役室家思念之辭欲王體恤之也箋云苟無飢渇憂其飢渇也見身存猶可緩為歸計此中含蓄正不忍言君子于役二章章八句君子陽陽閔周也君子遭亂相招為祿仕全身逺害而已賢人隱處則其君可刺此不言刺平而曰閔周者盖平王當屯之初九蠱之六二非有亨屯幹蠱之材不足以圖恢復吾讀干旄而知衛之中興讀君子陽陽而知周之不復西也流離播越與衛相同其君不聞帛冠布衣其臣不聞素絲良馬君子沉抑賤官覺黍離麥秀一副血淚轉付諸執簧執翿陽陽自得上而且招其同志相與偕來然則詩之所謂樂者正其澘焉欲涕者也平何必刺哉而以公劉太王之豳岐文武成康之豐鎬棄如斷梗夷然不概於心是可閔也輔氏曰古之樂官實掌教事故賢者多隱于此郝氏曰士不得用并求為抱關撃柝不可得故爾溷職優人按此兩説並通然即一伶官而其時之韗胞閽翟之可用者正多也其時之高爵厚秩不足有為者又可知也一章君子二字一頓見中興事業全憑賢者奈何陽陽然不見其憂戚也傳云陽陽無所用其心也是將宗社絶大愁煩一齊放下但見其執簧而招我曰此間樂吾與爾共之末句盖招之之辭此與黍離篇參看彼在心憂二字形容閔宗周此却重樂字反拓出閔之之意不知者乃云謀全身逺害是憫君子非閔周也豈知一身榮辱何與重輕而賢人顯晦實闗興廢詩人豈為君子作感士不遇賦哉君子陽陽二章章四句揚之水刺平王也不恤其民而逺屯戍于母家周人怨思焉揚水箋云激揚之水以手激水曰揚如云掘泥而揚波水性本順而激之揚之雖一束薪不能流矣王命本行而顛之倒之雖一侯國不用命矣想見當時諸侯不服調遣不得已以畿内之民戍申盖西周更歴十三主雖幽厲之世從無此事故其事為創見祗覺侯國之民安堵如故而王都之民奔走不遑勞逸既分安危亦異彼其之子歐陽氏指列國當戍之人懐思歸也甫許姜族也戍之由申推及之也平王之為姜氏謀者愈周到則戍者愈厭苦揚之水三章章六句王氏道謂申侯雖有弑君之罪實有存周之功平王固當復父之仇尤不可忘母之難竊以為不然周雖播遷王室聲靈未嘗遽替申侯非犬戎之力無能勝周幽雖無道非申侯召戎何至社稷為墟誅申侯以復父仇立其子以慰母志天理昭人心奮不待後日秦文之逐而周轍西矣嗚呼秦趙高手握兵柄推刃二世而子嬰一乳臭不動聲色有以制高之命况奄有六百里之京師者乎乃平既委靡而當時諸侯秦襄利取鎬京鄭武利取十邑晉文衛武雖有勤王之功未遂復仇之志此周之所以東也中谷有蓷閔周也夫婦日以衰薄凶年饑饉室家相棄焉周公營洛王氣所鍾苟得令主不難光復而反仇為恩大本已失於是天怒于上人怨于下饑饉薦臻室家相棄至于如此讀中谷有蓷但見蕭瑟之氣哀慘之音以視西周别是一般天地詩人冩出耳目不思聞見之景而胸中絶大志願灰冷矣序曰閔周有以知其心也夫一章程子曰蓷谷中所生之物待隂潤而後能生故暵則乾矣興夫婦樂嵗則能相保凶年則至相棄也二章嚴氏粲曰脩長也長茂者亦為所暵興饑饉甚則粗給亦乏絶矣條條然而長歗其悲恨甚于歎矣不善猶言不幸三章茹敦和曰暵其濕矣言今日之暵或異日而濕以興今日之苦或他日之樂未可知也而女則何嗟及矣言不及待也猶云索我於枯魚之肆耳詩人所見只一女而歎而歗而泣以漸而深曰有女曰嘅嘆知非此婦自作中谷有蓷三章章六句兔爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉舊謂此詩以兔喻鄭雉喻王罹于羅喻傷敗然詳味詩意沉痛刻酷云我生之初猶及西周之世我生之後逢此百凶正東遷之初也安得指桓王伐鄭事桓王失信以下後儒增入無疑一章雉善闘守信不踰集傳以兔喻小人雉喻忠直之君子是也小人得志而君子罹罪刑政之舛也夫我生之初天下無事尚無待于有為我生之後時方多難遭此百羅安可以無為哉尚且安寤而不動以致百事廢弛更無望其亨屯傾否周之所以可閔也尚猶也兩尚字一例羅網也言患難也二章造作為也創造一畨使乾坤改觀氣象煥發天下無事則無待於此無覺如偃卧而不驚覺也形容平王極切三章庸功也天下無事無竒功可建今則社稷丘墟君父為戮百凶孔棘矣佯聾不聞安望其有功乎葛藟王族刺平王也周室道衰棄其九族焉春秋文六年傳宋昭公將去羣公子樂豫曰葛藟猶能庇其本根故君子以為比盖引此詩也通篇三提終逺兄弟盖與王叙兄弟行而以王為昆也主意全在末章王以他人視之是以他人為昆矣夫以他人為昆而不我恤亦其宜也而吾與王豈他人者前二章却從後一章推出與王為兄弟行則王之父母即吾諸父諸母諸父諸母亦父母也他人可為昆豈他人可為父母乎皆從兄弟推上一層故三章皆㸃終逺兄弟句先言父母者故為逆耳之言且動之以先王先后之思也一章綿綿不絶之葛藟庇其本根見王亦同在葛藟本根中而無不託庇者今不在豐鎬之山而在大河之滸矣王族之從王于東都猶是也二章莫我有王心目中無此人也三章莫我聞補正云休戚不相聞也葛藟三章章六句詩譜是平王詩宗序也皇甫士安及崔靈恩集註皆以為桓王時説者因附㑹為刺周鄭之質子皆非也采葛懼讒也此非懼讒於讒言未入之先乃讒言既入疎斥既加詩人為君子危懼之深也一章葛性蔓延又善攀附故為小人之喻而上之人任用之雖君子一日不見則鼓舌蔓延君心頓移有如三月之乆矣况不止一日乎吾懼君子之不免也二章蕭荻蒿也蕭稂所以害嘉糓小人所以害君子三章離騷服艾以盈要兮謂幽蘭其不可佩又云何昔日之芳草兮今直為此蕭艾也皆以蕭艾喻小人艾能薰灼其勢可畏小人能煆鍊其毒可憂采葛三章章三句原解韓氏愈謂日隔之疎加以忌者之口哲人憂讒每在去後君子日在君側羣邪有所畏而不敢小人譛君子必伺其間隔孟子致王憂十寒於去後趙高使二世人不得見而後鹿馬之計行霍光出沐而後上官之譛入自古小人排君子未有不始於離間而終於䧟害者大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉後序陳古刺今其説固非然以詩中一奔字遂定為淫奔天下豈有生未得為夫婦而死欲與之同穴者哉盖征役之人刺其大夫之辭檻檻啍啍如菼如璊皆言大夫之威炙手可熱豈不爾思爾指室家畏子不敢子指大夫不敢者不敢歸也猶云豈不懐歸畏此譴怒耳釋宫云門外謂之趨大路謂之奔奔者逃役而歸也既而無可如何則曰生則隔逺所居異室死則相隨與爾同穴復援皦日以誓之以明其不相背負也王氏道曰觀漸漸之石則王不恤其將觀大車檻檻則將不恤其士戰陳上下均服此毳衣者盖防守之卒以大夫彈壓之也大車三章章四句漢書哀帝詔曰朕聞夫婦一體詩云榖則異室死則同穴祔𦵏之禮自周興焉則此詩之非淫可知矣列女傳楚伐息破之虜其君使守門納息夫人於宫楚王出逰夫人出見息君乃作詩曰榖則異室死則同穴遂自殺息君亦自殺按左傳楚子納息媯生堵敖及成王是息夫人未嘗自殺也劉向主魯詩亦以此非淫詩矣丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也序曰思賢盖賢人放逐而國人思之也傳云留氏也子國子嗟之父此詩傳神在叠句結穴在第三章末句此曰留氏子嗟彼曰留氏子嗟則思之者非一人麻熟而屢思子嗟之來麥熟而屢思子國之食李熟而兼思二人亦所思首非一時非一處想見民間家人婦子一飲食一居處一燕㑹無不反覆歎息纒綿不已非斯二人深入民心何以至此彼者在彼而不在此也佩玖傳云美寶也民安物阜國之寶也家給人足民之寶也所以思彼二人如此之切者以其貽我以至寶也賢人為國之寶有其寶而棄之周之所以不復西也故為王風之終先言子嗟而後及子國或王惡子嗟并子國去之或王惡子國先去子嗟使之不安其位説者乃云無父子並斥之理又曰不宜先子後父皆非也丘中有麻三章章四句范逸齋謂子嗟子國兄弟也説既無稽何氏楷云鄭桓公淫于鄫夫人季妘此詩季妘所作復廣引典故以證其説李迃仲曰詩中所言即是事蹟此言甚當如泥詩言而必求當時之事實之則一部左國何事不可以牽合耶王國十篇二十八章百二十六句詩序補義卷六
