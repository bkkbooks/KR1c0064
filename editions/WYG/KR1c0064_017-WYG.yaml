body:
  text: 詩序補義卷十七石泉縣知縣姜炳璋撰小旻之什小旻大夫刺幽王也輔氏廣曰荀卿子樂王鮒皆以此章為畏小人而發而集傳不取者以詩專為刺王惑於邪謀初不為小人而賦也一章直刺幽王而其病全在謀臧不從不臧覆用不臧即回遹也下三章是形容不臧之狀旻天指王也謀猷王之謀猷也臧與不臧臣下之謀猷也回遹由於小人王用之即王之回遹矣補正云謀臧不從不臧覆用以為偶然耳猶望其或止故曰何日斯沮繼則凡臧者皆是遣不臧者皆是依則無望其沮矣故歎其伊於胡底也二章集傳潝潝相和也訿訿相詆也兩相字便含具字之意其存心可惡其無識可哀三章發言盈庭誰敢執其咎箋云言小人争知而譲過盖議論滿堂皆無稽之言勿詢之謀知身任之必有其咎故乍隂乍陽無有倚着補正云問道當於已經與未嘗行邁者謀所以不得於道也四章凡事本諸先民按諸典法遺大投艱可以一言而斷如文武周召皆先民也顯謨承烈皆大猷也今所聽所争只粗陋媕鄙絶不知國計民生為何等事則臨幾决務築室道謀矣金將尼堪謂宋使曰待爾謀畫既定我兵已在城下即此謂也五章靡止謂國勢震動也膴大也靡膴䟽云無大有人言人材剥落也俱引起之辭禍亂之來賢愚同盡泉流喻禍亂言無使同淪胥於敗亡也此章以用賢望之六章極言禍亂將至欲王惕然知懼人知其一不知其他正喚醒王處戰戰三句言我戒懼如此而王夷然不概於心何也補正云人但知不敢暴虎而不知謀之回遹招殃致凶猶暴虎也人但知不敢馮河而不知謀之回遹䧟滯莫濟猶馮河也此知之者所以如在氷淵也小旻六章三章章八句三章章七句詩故云所謂謀者亦黜申后登褒姒廢宜臼立伯服事歟名篇之義當闕其疑小宛大夫刺幽王也此篇大夫兄弟相戒篇中人之齊聖天命不又哀我填寡皆非泛設末章又與小旻同盖以家庭孝友之箴規為堂亷切近之藥石雅而近於風者也一章嚴氏粲曰宣王承厲王之後而能中興幽王承中興之緒反致衰亂故一曰先人又曰所生以其親見者勉之言非久逺難知之事也此大夫者周之世臣先人其列祖也自文武創業宣王中興彼先人皆有功於國者念者念其功業也懐者懐其恩勤也若曰先人之勲業父母之箕裘至我而斬然中絶乎言外便是諷幽王宣王勵精圖治姜后待罪永巷其父母皆鋭意中興故諷之使懐二章此以敬儀教其家而其意則刺王之荒於酒也幽王甘酒事史無所見惟列女傳云幽王惑於褒姒出入同輦飲酒沈湎故集傳謂王以酒敗徳非誣也天命不又言敬則天命眷我而留不敬則天命棄我而去大夫之守家天子之守國其理一也故趙孟賦此以答公子圍大眀之首章齊聖眀指先王不知眀指幽王却以人字彼字代之天命不又明謂勢將亡國却只作自相為戒對症良方而不令其苦口可謂善諌三章此以教子朂其家意在諷王裕後以承其先也言中原有菽庶民采之固以物之善而取之矣桑間有蟲與蜾蠃不相似也然負之則化其不善以歸於善矣况爾有子可不教誨之以使之善哉式語助辭言爾子之善與爾相似也宜臼之廢當時必有謂其不克負荷者小弁所謂君子信䜛是也故詩人及之四章此以勤敏勉其家人意在諷王勤政以紹乃父也脊令固是喻兄弟然此只重飛鳴上以興兄弟皆當努力也列女傳載幽王優倡在前俾晝作夜無忝所生正欲以庭燎問夜為法也五章此及下章言刑罰之濫常懐恐懼欲王恤刑以回天命以繼前人也以桑扈之不能自活興填寡之不能自生以無辜而反受獄極駭異事而俱謂宜然更無門可叩於是繫獄之家人握粟出外卜之曰何從得生乎箋云自從榖生也持粟卜之從何能得生與於何從禄相似顧炎武云古時用錢未廣詩書無泉貨之文而問卜者亦用粟漢初猶然史記日者傳卜而有不審不見奪糈六章此只我足上章言刑罰之酷如此是以君子無不危懼而吾與爾尤當戒慎也幽王使士大夫至此刑政不可問矣小宛六章章六句國語秦伯燕公子重耳賦鳩飛注云鳩飛即小宛按當時公子賦河水河水逸詩也小宛言鳴鳩非鳩飛韋昭之説不足據小弁刺幽王也太子之傅作焉平王事後不知追痛當事豈能哀怨作詩故朱子作孟子集註定為太子之傅述太子之情也述太子之言如身處太子之地故孟子以為知親親之仁毛公以為得念父之孝也按史記幽王逐太子宜臼宜臼出奔申國語亦云王欲殺太子以成伯服必求之申則太子在申眀矣此太子在申其傅代作此詩感動幽王語語是居申情景篇中俱以極𤨏極賤之物相擬曰鸒曰蜩曰葦曰雉曰伐木曰析薪曰投兎曰死人而我皆不如刺心刻骨真無可形容説者離却居申宗㫖泛作離憂致疑為尹伯竒之作不知與伯竒所䖏之境天地懸隔一章詩緝傳曰鸒鴉鳥也鴉鳥不能反哺猶已之不能致養然鸒出食在野飽則提提然羣飛而歸是其父子相隨為可樂也按着眼在歸字以鸒之歸飛興已之不得歸也其云何辜非自謂無辜也親者子之天也我何處得罪於天乎我之罪在何所乎云如之何是忖度之辭商量不出感格親心之路使親頓悟而召我也二章怨已之不得歸父母之所也説者俱云周室將亡有神州陸沈之懼但細按前後俱是憫已之見逐國破君亡等意未嘗稍露幾諌之道與犯顔不同首二句言周道本平坦今若為茂草廢塞使我欲歸無從是時太子居申不奉幽王之召安得向都門一歩人見踧踧我見茂草耳三章言凡人皆得遂瞻依之願而已獨不能也上四句泛言之言人子未有不得親其父母者也我獨非屬毛離裏之人子而不得親其父母求其故而不得委之生辰之不祥而已或曰星命之學自古有之觀此詩可見諸侯夫人出則大歸天子以天下為家后雖廢居宫中如後世長門是也故父母俱不得見四章上章以凡人起興此以微物起興言物莫不有所依而歎已之見逐也上四句反興下二句詩兩言汎彼柏舟一仁人被逐一共姜失所天此云舟流不知所届即泛字之義而語尤沉痛五章言物各有羣歎已之孤立而無由白其寃也或謂以鹿比兄弟雉比太子之妻則太子放逐何暇念及伯服并妻子耶按首二句只泛言獸尚有羣鳥尚有匹若各有伴侶呼朋引類以自助而我乃如病壊之木孑然無枝曾鹿與雉之不如也漢書張良以四皓侍太子上謂戚夫人曰羽翼既成難摇動矣正如木之有枝也今正人既逐羽翼翦除隻身逺竄猶失羣之鹿矢固易及無匹之鳥網不難加彼尹氏皇父七子虢石父之徒方䜛搆不已無一人知太子之無罪為之開悟其主故太子詰之曰爾諸臣何莫之知乎六章言已雖甚親而賤惡之物之不如也君子秉心兩句言王於吾為父子之親豈投兎死人比耶而王之執心維忍我至此而不之恤我不觧其故惟隕涕而已七章言已放逐之由也伐木必以物依其巔者懼壓也巔謂木之上稍先倚以物伐其根則根斷而木不從人以壓薪必有理循其理而斧析之者易觧也理即薪之裂䖏言雖細事皆當審愼而况國本所在不舒究之舎彼有罪之人而逐我他適乎時太子在申故云他適有罪指褒姒八章此總叙其始終也上四句推䜛言所自起莫髙於山莫浚於泉以興莫險於人情故君子之言甫出屬垣者迎合風㫖而䜛搆其間矣因言爾䜛人母擅居我勢位母變亂我法度豈我躬不閲遑恤我後日之事乎我雖放逐固憂之深也以見䜛人交訌必致敗事㣲寓幾諌而已之俟命召歸不忍割絶之意惻然見於言外所謂親親之仁也小弁八章章八句趙岐注孟子小弁伯竒之詩也親親而悲怨之辭也論衡琴操並同韓詩以黍離為伯封作曹植惡鳥論亦謂黍離為伯封作孫奭以伯竒即宜臼王道以伯竒即宜臼之傅皆附㑹之説也昌黎擬履霜操父兮兒寒母兮兒饑兒罪當笞逐兒何為又曰母生衆兒有母憐之獨無母憐兒寧不悲哀愴可與小弁並讀巧言刺幽王也大夫傷於䜛故作是詩也此詩人身被䜛人之祸而急欲王之去䜛也首言已之無辜被䜛而小人之䜛始曰僭繼曰䜛王之聽䜛始曰涵繼曰信盖以漸而深也如於䜛言初試之時立辨其奸則利刃斷物霎時可了而屢盟而信盗且甘盗且餤亂王於是乎病宗社摇典章紊此非癬疥之疾乃軀命之憂也而抑知䜛人之計易窮其言易辨其人易去斯時君子如怒如祉則除亂如反掌顧令其口含酖毒手弄威權君父受病而不知無辜被僇而莫愬惟搔首告諸貪亂之天也悲夫一章呼天以告王也無罪無辜泛言之四句方不􅃨二章僭僭差也僭差之言無實故曰不信僭者䜛之萌芽涵者亂之根柢初生又生謂接續發動也集傳訓祉為喜能怒小人即能喜君子四語一篇之綱節節俱注意在此三章按司盟職邦國有疑㑹同則掌其盟約之載及其禮儀北面詔神明是王令諸侯盟耳幽王亂政䜛言數行人不自安故從而屢盟也屢盟中已腐而外強示以堅而不知蛆宅其中君子指王盟是與賢臣盟所以屢盟者有人閒之也是在既涵之後欲信之前故僭始則祸根已種屢盟則祸幾漸長矣君子於小人徃徃取其少有才能而小人亦以勤事結主知如温公謂蔡京曰使能任事如公則何事不可為而抑知非然也祗為王病耳供事益久病根益深癰疽既潰而大命隨之集傳用然字一轉極有分曉四章承維王之卭來言維君子能建天下大功惟聖人能定天下大謀䜛人何人敢為國計民生之言吾有以揣知其心矣恭録折中云外以甘言欺王實欲於中取利如彼田犬意在獲兎而已非果有社稷生民之至計也王奈何坐受其病也五章言䜛人之所以為王病者以其言也彼良材君子猶樹之以備用况賢才而可棄之乎行人之言猶心數其是非况妨賢之言而不之察乎盖正意已在興内更不𥙷出詩中自有此例彼䜛人之言不難察也度其言盖有二焉時而為大言以籠絡人極其矜張安然出之於口而中實無所有也時而為巧言以中傷人極其便利則如簧之可聽而恬不知愧也其言雖多總不外此二者辨之不難而王何以坐受其病也六章言其人則又甚易去也其未仕時居河之麋品甚汙下也無權無勇地甚寒微也此勇字以勢力言之王假之勢位因尃為亂階耳然今日即有勢位既瘍又腫力不足以敵一人也此勇字以氣力言之雖大肆其謀衆多其謀而徒衆幾何黨羽可立盡也王何為而坐受其病乎居徒是小人伎俩盖此居何職彼居何地用心盡力以樹其黨及元兇就殛一網皆空絶不費手厯考史册無不皆然巧言六章章八句何人斯蘇公刺暴公也暴公為卿士而譖蘓公焉故蘓公作是詩以絶之此以末章為主上七章不過極力形容其鬼蜮之心耳然暴公之譖人極其詭秘而暴公之忸怩微露破綻其露破綻也在不入唁我詩人扼定此意故每章俱以此為詰責其實不唁固譖唁亦譖也特不唁而其譖顯然耳故曰壹者之來非望其來正責其不來也俾我祗也非欲巳之安正眀我心之不安也皆所以絶之也夫以情同伯仲而畧一掉舌便奪其位而逐之去鄙夫可與事君也與哉豈一見而底裏盡剖一誓而山盟可固乎故凡言來則前愆盡棄者皆非也苐君子絶交不出惡聲故賦體中處處以比興行之意殊含蓄至末方㸃清而猶未眀指其人聖人取之以為性情之正也一章不斥言刺暴公而但指其從者則篇中言其從者即言暴公也伊誰云從設為問者之言此人從何處來則云自暴國來者猶云自魯國齊國非必指其君也故下又以彼何人斯發端都作㳺移不定之辭篇中多用胡字云字自作猜疑胡者怪之之辭云者他人所言若不敢以䜛人坐實者然二章二人即指已與暴公也言我二人相從以行素無嫌隙則此祸誰為為之或在他人未可知也然既非祸我何以不唁我也從行者其始不唁者其今意者始之親不如今之踈而有所不足於我乎是可疑也三章天下豈有聞聲而不見其身者補正云逝陳則入門矣聞聲則通問矣而不見其身盖通問而不請見也或托言亟行及還而後請見故五六章及之末二句一若彼不愧於人而獨有愧於我也彼不畏於天而獨有畏於我也苟非譖我胡為如此四章飄風傳以為暴起之風言疾也補傳以為摧折之風言厲也竊謂飄風者蹤跡不可測度之喻隠隐指䜛言言彼何人斯今則為飄風矣自南自北任其所之可也胡為逝我之梁我獨遇之祗以憂亂我心也盖謂䜛言所播自南自北任爾加害不及於我猶幸免耳胡為䜛及於我耶風刺極隱五章六章本一意作兩層以責之祗安也不疑之謂也七章乃追叙其前日也諒照察也又知也索也言我昔與爾情如兄弟和如壎箎勢相比次如物之在貫也諒汝有不知我之時我即以此三物詛爾此事於神無不消釋而不意今日譛我至此故下章直刺之詛爾斯言以此三物詛爾不知我之事詛非一次亦非兼用三物盖君子小人同居政府議論不合好惡異趨徃徃有之君子坦懐接物一經詛盟銷化無有而小人則積乆成隙匿怨而友故隂為中傷使之去位不特大權獨歸掌握并平日之氷炭我者皆一時報復八章䟽云研窮而不得其情於是怒而責之視人承面目來郝氏敬云為鬼為蜮受害者不見其形汝乃人耳靦然面目相㸔而為此罔極不測之事故作此好歌以窮究爾傾險之心也罔極猶園有桃青蠅之罔極皆不測意反側即罔極意讀至末章方知逝梁不入聞聲不見飄風南北曰亟行曰難知皆鬼蜮也人靣而鬼蜮所謂孔艱也節節寫出鬼蜮而渾然無迹故自以為好歌也何人斯八章章六句巷伯刺幽王也寺人傷於䜛故作是詩也此遭䜛而被宫刑故其言腐心刻骨重第六章三百篇中無有痛憤至是者此夫子謂好賢如緇衣惡惡如巷伯也前二章正欲投畀之實也三四章雖若告小人者亦見王心悔悟賊奸不難辨其喫緊處全在五章一視字無心為見有心為視盖王於小人從未注目視其所為若能視則生疑疑則生悟必且謂其不信而禍遷於彼故譛人者不必為豺虎食為有北受只湏留以待王加之顯戮則眠者帖席矣一章傳云萋斐文章相錯也貝錦錦文也錦文言錦如貝之文也重錦不重貝萋斐指貝錦盖用比喻字面成者䜛人成之也言萋兮斐兮文采昭著者貝錦也而䜛人之言竟成萋斐之貝錦顛倒是非説出來真文理斑爛眩惑主聰使其不聽不休譛人如此不太甚乎二章陳氏云南箕箕星本非箕噐張口如箕也貝錦是䜛言絢爛之象南箕是䜛口囂張之象言哆兮侈兮口張舌廣者南箕也而䜛人之口成是哆侈之南箕張大肆妄不難啓口傷人亦且同聲共詆以傾善類使之不盡不休誰為設此謀而􅆭毒至此乎三章承上貝錦來盖貝錦是借喻其一叚成之之實尚未説出故此補足之下章倣此言其成是貝錦也緝緝然如絲縷之組織相繼不絶也翩翩然徃來窺伺以為織之之具也其意不過謀欲譛人文致其罪耳下二句設為告小人之辭言爾當慎其言王之眀非汝所能終蔽也爾之不信王將立見亦即喚醒王處四章承上南箕來言其成是南箕也捷捷而口之儇利也幡幡而舌之反覆也其所謀者欲譛人之言鼓動主聽耳當譛王之時王豈不受之行誅罰哉既而悔悟即以所受者遷以予汝如教王斥逐後即以斥逐予之教王誅戮後即以誅戮予之遷對受言猶還也與謂爾遷於王都遷字對下出字者同小人不可以名義動而可以利害怵寛一分排撃便為君子寛一分罪辜而國家存一線元氣然詩人之意在蹴起下視字耳五章蒼天蒼天非呼天也呼王也視彼驕人庻幾謂其不信而因以遷之也矜此勞人庻無貝錦之傷南箕之構也六章有昊指王也不食不受待王眀正其罪七章郝氏敬曰楊園下濕之地有路上倚於畝丘䜛加於卑賤漸及於尊貴矣孟子遭䜛而被宫刑為寺人非既為寺人而後遭䜛也所謂微賤指未刑之前孟子本㣲賤者及其既刑而後為寺人也若在大臣豈有為寺人之理詩人惡惡而歸結於敬字是君子待小人之法巷伯七章四章章四句一章五句一章八句一章六句谷風刺幽王也天下俗薄朋友道絶焉此述朋友相怨以刺幽王也幽王刺詩當從諸詩合觀之小弁作而父子之恩絶節南山正月作而君臣之義舛角弓作而兄弟之倫廢白華作而夫婦之道苦何人斯谷風作而朋友之誼乖有一於此即足致亡而况於兼之欲其不亡不可得也一章傳云興也風雨相感朋友相湏谷風或作大谷之風然東風謂之谷風見爾雅嵇中散詩習習谷風吹我素琴注谷風春風習習風和貌可知古人讀是詩悉依毛訓二章寘於懐便是棄如遺之根谷風三章章四句蓼莪刺幽王也民人勞苦孝子不得終養焉孔叢子曰於蓼莪見孝子之思養也箋云不得終養者二親病亡之時時在役所不得見也按此詩創鉅痛深非身罹大故不能為此然只孝子自作寫其終天抱恨而或以暴君虐政等辭入孝子語中者非也詩為孝子所作太史得之入告於王使之深維所由致此者而發其悔悟也一章言愛我如莪長大則為蒿父母劬勞一旦泯沒句中有無限不得遂志盡職意其哀惨在字句不到處生我劬勞生前之父母也哀哀父母死後之父母也於死後計及生前痛絶二章勞而至於顦顇則更病矣已猶是蒿而親益病已徳不增而親恩日重也三章傳云缾小而罍大箋云孝子之心怙恃父母依依然以為不可斯湏無也出門則思之而憂旋入門又不見如入無所至父母衰老故以缾為喻子壯盛故以罍為喻老者資壯者之養猶缾資罍之助也缾罄罍耻父母不能終養乃子之責也鮮民单獨之民猶所云孤子不如死之久使吾親早可以絶望也四章此承上文劬勞勞瘁之意詳言之而深恨其無以報也子於親不可謂徳欲報之徳我欲報父母之徳也而如天無極何以報之五章六章追叙其聞訃之時也烈烈律律猶言栗烈謂山之氣寒發發弗弗猶言觱發謂其風之疾也盖孝子在役聞父母之訃此時天氣愁惨飄風猛厲勞苦之時又罹大故覺行役者人所同而罹辜者我所獨於作詩時追憶以述其痛酷有如斯也傳云烈烈然至難也得詩㫖矣人當父母新喪雖遇賤夫走卒凡父母尚存其一言一笑皆視為至樂我終身必不可得之異數詩人兩言民莫不榖以此也於自已一想我於父母更從何處著手百緒填膺總於父母身上無益所謂不卒也蓼莪六章四章章四句二章章八句姚氏謂親遭䜛言而殁已不能代而作則以幽王之世多䜛言附㑹之也大戴禮用兵篇夫子稱詩曰鮮民之生不如死之久矣以為其父母遭兵而死則又以王裒事而為之辭也大東刺亂也東國困於役而傷於財譚大夫作是詩以告病焉説者謂幽王厚取於東薄取於西不知幽王之虐畿内之民應先受毒豈能以近在輦轂加以寛恤之政哉詩人所刺西人之子亦指在位之小人耳不得言京師之人也一章賦也恭録折中云饛滿貌飱熟食也鄭康成曰飱者客始至主人所致之禮也捄長貌棘匕以棘為匕所以升鼎實也砥言平也矢言直也君子有位者小人下民也言周之盛時諸侯大夫朝貢徃來所至之處饔餼豐盛道路脩整故君子履之以為安小人視之以為樂今乃睠言顧之而澘焉出涕者以周道猶是而周政日敝非復前時矣二章東方之國無小無大杼柚皆空者以盡輸之於周也補正云行彼周行無車而徒也言其貧薄之甚按集傳云佻輕薄不耐勞苦之貌徒行故見其佻佻三章正言以告之五章范逸齋曰竊意譚大夫因輸送所賦之物於京師而作是詩故此章眀言東人之子以輸送為職可謂勞矣殊無勞來之禮而西人之子無功享賦衣服鮮明不自知其不稱而無愧恧也於是歴言西人王氏道曰熊羆貴者之裘與百僚互義舟人私人當有所指言厮役之賤皆濫冠裳享禄食六七八章補正天漢有光望其能鑑我之情也織女七㐮望其能助我以力也孰意織女報章不成而牽牛亦不可以服箱畢亦不可以罩簎乎雲漢不可監而啓眀長庚亦虗有其光乎其意盖謂織文菽粟百貨皆人力所成非天降地出神輸鬼運也豈能恣取而不竭哉此皆極怨之辭六章非直望其助也言東國財力已盡而西人誅求無己或者自天降之方可供汝之求七章言欲天降之而天不能也八章言天非維不能降而且若為吞噬挹取之形使人可畏則無從告之於人并亦無從告之於天此其所以澘焉出涕也大東八章章八句曰服箱曰南箕曰北斗則知徴及粟米矣曰或以其酒不以其漿則知徴及酒醴矣曰鞙鞙佩璲則知徴及寳玉矣曰有捄天畢則知徴及鳥獸矣雖葛屨履霜公子徒行不顧也盖在位者㣲賤小人市井無頼谿壑無有窮極彼節南山之姻婭膴仕正月之嘉殽洽比十月之交之擇有車馬試思此物將安至哉而周遂以亡故曰刺亂也四月大夫刺幽王也在位貪殘下國搆祸怨亂並興焉詩殆作於幽王之末年乎節南山以下皆無此沉酷訴及先祖甚於呼父母我日搆禍我獨何害甚於䜛口囂囂匪鶉匪鳶無所逃於天地甚於臨深集木盖國亂已極天命人心岌乎不可留而身為世臣義無可去惟有鞠躬盡瘁明知無益而圖之庻幾見我先王列祖以告無罪此詩人之志也一章䟽云四月已漸暑至六月乃暑極以興王初即位惡政未甚酷至於今乃極酷也補正云四月陽盛已極至六月而盛德長養之氣盡矣以治運已過而亂方生也不幸適生此時何先祖之忍予乎猶正月次章父母生我胡俾我瘉不自我先不自我後也按左傳稱趙盾為夏日之日註云夏日可畏故維夏徂暑為酷虐之喻先祖匪人原觧云先祖於我一氣相關非他人比寧忍棄我不救乎二章亂而憂憂而病矣字有人人皆然意正與具字應於何所適歸乎言無可歸之所也已含七章意三章䟽云以寒風喻􅆭毒之政則言祸害者正謂毒政之害也箋以此章類蓼莪故有不得養父母之説其實非也所謂害者大夫遭亂世䜛口及之訶譴及之而艱鉅又及之而又悲命憫窮傷心􅆭目總此一身受此痛酷耳於夏曰忍予於秋曰何歸至冬已極故曰我獨何害榖善也言民皆泄泄如燕子之處堂也四章山有嘉卉侯栗侯梅喻朝廷之上多善人也宣王中興吉甫方叔之徒遍列朝廷今一變為貪殘賊害之人而莫知其誰之過也暗指幽王廢王廢之也廢變置也左傳廢六關是廢即置也楚辭昔日之芳草今直為此蕭艾劉禹錫云惟有紫葵燕麥動揺春風耳即此詩意五章傳云構成也箋云猶集合也補正云視彼流泉源清則流清源濁則流濁豈有日搆禍本而能善終者乎其曰我者不敢斥言其上泉之源本清有時而濁者泥沙汨其流也世之運常治而率至於亂者殘賊搆其禍也此搆禍如搆怨之構暗指求太子於申事驪山之禍殆灼見之六章按一統志江漢並在漢中境周南士女徃徃言之安得為逺言江漢發源於西統南方之國包絡之源逺者流自長也我自先祖來莫不盡瘁以仕王朝源逺流長有如此江漢矣王曽莫我顧念而一言不納乎集傳有識有也猶云顧念七章首言先祖則世臣也與國存亡義無可去故為無處逃死之辭八章詩所云生亂世者既不能如鳥之奮飛魚之深藏庶幾山隰之間采掇草木以終老乎然未能忘哀思故歌以告之至於春時薇蕨並生杞荑同茂儘可遯荒終老然世臣義無可去惟作歌以告哀庶幾王之一悟而已四月八章章四句孔叢子以為孝子思祭韓詩以為行役之詩詩故以為南國困於征輸皆非也小旻之什十篇六十五章四百十四句詩序補義卷十七
