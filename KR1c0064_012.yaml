body:
  text: 詩序補義卷十二石泉縣知縣薑炳璋撰陳據前編自武王已卯至厲王元年癸未八世十主得年二百五十有四而陳世家自胡公至幽公五世六君已及厲王之世矣説者謂是六君安得在位皆四十餘年按史遷據詩序決幽公與厲王同時古人年嵗最長如周昭王享國五十一年穆王享國五十五年又安知陳六君必不如是耶無書可考非如陳他以下可據左傳以糾史記也太姬武王元女周多賢婦人而太姬獨以好巫覡開宛丘之濫觴乎閫內無關雎之德國中有澤陂之應其視召南之始鵲巢齊風之始雞鳴風斯下矣而嚴氏乃云太姬從媯滿會王孫于豐以伐紂今鄠縣七里有胡公泉為太姬治師之地後封于陳因以太姬當十亂之數按太姬從師于鄠漢志不載惟一統志鄠有胡公泉但云旁有虞思胡公廟亦無治師之文乃欲以太姬充十亂也豈其然哉宛丘刺幽公也淫荒昏亂遊蕩無度焉傳曰子大夫也按刺幽公而託言大夫猶云敢告僕夫耳蓋使其君聞之若不為已刺者然繹思其旨又字字砭入肌骨所謂言者無罪聞者足思也幽惡諡也其所以得此諡者正以遊蕩無度故臣民諡之即諡以觀知詩序之不誣也一章湯不是遊蕩乃飄搖動宕之致對下情字凡端凝厚重之人民望而畏未有情致可觀此則眉宇之間處處生情而絶不為嚴重之威望也無望乃有情之實而刺意已寓著宛丘之上句見髙坐宛丘羣巫效命鷺羽鷺翿皆在顧盼中也二三章周禮地官舞師教羽舞帥而祀四方之祭祀鄭注羽析白羽為之則知鷺羽可用以為舞魯頌云振振鷺鷺于飛是也此云鷺羽鷺翿正四方祭祀所用者續詩鳥名謂鷺翅背上皆有長翰毛可為飾用不止頂上戴羽絲也以鷺羽為翿執之以指麾于舞者之列風俗通缶用以節歌故古者言缶必及歌此言擊鼓擊缶歌以事神楚辭所云揚枹兮拊鼓疏後節以安歌是也值羽值翿舞以樂神楚辭所云傳芭兮代舞姱女倡兮容與是也人君臨民以莊祭祀以時乘輿所指望而敬畏今乃無冬無夏既媟褻而不尊時鼓時舞亦繁囂而可厭夫子録陳風首此以見一國之風皆上有以倡之也詩人無追咎太姬意而揆厥所元其能為貽謀者恕哉宛丘三章章四句東門之枌疾亂也幽公荒淫風化之所行男女棄其舊業亟會于道路歌舞于市井爾疾者深惡痛絶之謂詩人目擊巫風聚會歌舞以至男女淫亂欲救正而事權不屬故深疾而作為是詩非男女自作也蓋此篇亦巫覡娛神之事上篇是刺幽公此是刺風俗子仲之子婆娑其下男覡也不績其麻市也婆娑女巫也提出子仲原氏貴族猶然亂先自上也榖旦祀鬼神之日也鬷邁男女駢集也視爾如荍貽我握椒男女亂也此其所以可疾也宛丘在東門之外至宛丘必出東門故陳風多言東門以宛丘為一國勝地也枌也栩也即道間之木婆娑且行且舞以娛神子仲傳云陳大夫氏箋云之子男子也子仲之子猶云臧氏之子耳疏云今此所刺宜刺在位之人若庶人不足顯其名氏矣傳云原大夫氏箋云南方原氏女古人言姓氏往往舉其所居之地如澤中之晳邑中之黔是也總以宛丘為主言其至宛丘以娛神也先擇其榖旦是時不獨子仲男子婆娑而至即居于南方原氏女者亦且不績其麻婆娑過市而來焉凡娛神必由通衢方為衆目所覩原氏居南方則必由南方過都邑之市而出東門然後至宛丘若直達宛丘則徑塗冷落非人所聚觀矣男女雜沓舉國皆行不特東門南方也逝與邁皆至宛丘也于是男子謂女子曰我視爾如荍爾貽我以握椒以娛神始者以淫佚終陳之風俗可疾也東門之枌三章章四句衡門誘僖公也願而無立志故作是詩以誘掖其君也此篇與小雅鶴鳴篇同一例純用比體皆絶不露正意而正意宛然言下然鶴鳴如易之取象辭氣莊重故序曰誨也此則隨手拈來極淺近極風致而至理躍然使人入耳情怡而感發興起序之所以為誘也僖公目擊乃父幽公遊蕩荒佚百度俱廢思欲蓋愆而憂其國小故詩人迎機而誘掖之三章俱有可以豈必字詩人劃開以成章法耳僖公憂國小而不足有為也詩人言隨在可以棲遲豈必髙軒廣厦隨在可以樂而忘飢豈必名園沼池隨在可以食魚豈必河魴河鯉隨在可以取妻豈必齊薑宋子而誘之之意躍如嚴氏云上章喻國小亦足有為二章云不必大國而後可有為也衡門三章章四句東門之池刺時也疾其君之淫昏而思賢女以配君子也漚麻漚紵決非淫女之事而攻序者又云諸侯禮不再娶何勞詩人為蹇修且陳媯姓曰淑姬則已來嫁于陳矣安得思之以配君子其説甚辨按此云刺時者刺當時在位之人惑于嬖幸而賢行之配反不見答也彼者外之之詞以其所疏逺故彼之淑在彼而不淑在此也疏者可與則親者不可與也一章言東門之池人不知其清潔也然其用可以漚麻而載績之事起焉彼美孟姬人不知其貞善也然其德可與晤歌而諷切之功著焉淑姬在而疏之何異池水近而人逺之乎晤歌言與之晤對而聽其諷咏詩篇也二章晤語謂與之晤對而聽其論難道理也歌之意微語之意顯言謂直言相告也語之詞婉言之詞直東門之池二章章四句李氏樗曰自古人君修身謹行而無流連荒亡之禍者非特有忠臣義士亦由賢妃正女夙夜警戒以成其德周宣王之薑后齊桓公之衛姬楚莊王之樊姬是也不獨人君為然吳許升少為博徒妻吕榮數勸升修學升每為不義輒流涕進規乃尋師逺學遂以成名賢女之助如此東門之楊刺時也昏姻失時男女多違親迎女猶有不至者也刺時者刺時俗也傳曰牂牂盛貌言男女失時不及秋冬箋云楊葉牂牂三月中也蓋霜露降逆女氷泮殺止時已暮春失婚姻之候久矣而女不至者非既行奠鴈而猶不至也結吉納徵之後女家復有異志不許其迎而壻待之也此亦未即是淫女或女家以勢利寒盟以他故爽約則父母之命難憑媒妁之言莫據棄信不顧風俗之敗壞視唐之綢繆風愈下矣故詩人述其言以刺時也明星傳云大明星夜深時也集傳啓明星將曉時也觀鄭風明星有爛宜從集傳蓋昏以為期至于啓明星見而猶不得行親迎之禮則終不得遂其願矣東門之楊二章章四句騷經云黃昏以為期兮羌中道而改路九章云昔君與我成言兮曰黃昏以為期羌中道而回畔兮反既有此它志此詩之謂也則為孤臣被棄借事言情合之刺時亦不相戾但傳或有所受不敢妄為之説墓門刺陳他也陳他無良師傅以至于不義惡加于萬民焉吕成公謂左傳載他勸陳侯許鄭平親仁善鄰之言中于事理他蓋非昏愚者才數年而變壞如此詩人之所傷也竊以為不盡然他以凶悍之性濟以狡詐之謀故能伺桓公病殺太子而奪其位他何人而望其悔悟哉此詩之作作于桓公未疾之先他謀已成而未動于惡蓋直發其姦于桓公使公鋤而去之也其云斧以斯之猶祭仲所云無使滋蔓也國人知之猶泄伯知他之必不免鄭良佐知陳之將亂也是時他寵方盛他謀甚閟公與太子懵然不知國人雖知之而不敢言詩人顯然作歌揭其逆謀以冀君之一悟國史曰刺他者所以深著他之罪表詩人之忠也豈必刺他之詩即陳于他也哉州吁之殺曰衛人無知之殺曰齊人明其國尚有討賊之人也若他殺于蔡人陳幾無一忠臣義士矣得此以見忠孝之良不泯于人心為萬世示討賊之義一章此以幽暗之棘斯之猶易以興共知之惡斯之轉難棘惡木也不已者謂無以斯其惡而聽其方興未艾也誰昔然矣言寵祿之過自昔已然矣果誰為為之乎誰暗指桓公蓋惡之未形既無裁抑之方則惡之既成急須剪除之力其所望于桓公者深矣二章凶僻之地本足以集梟而有梅之嘉木以招之則梟萃矣以興幽暗之中本足以集惡而有榮顯之秩以寵之則惡盛矣今日者夫也不良我作詩以告庶幾治惡如逐梟乎豫告之而不顧至于顛倒而後思豫吾恐梟鳥拚飛既取爾子又毁爾室矣此諫桓公之詩非追咎也墓門二章章六句列女傳昔晉大夫解居甫使于宋道過陳遇采桑之女止而戲之曰女為我歌我將舍女采桑女乃為之歌曰墓門有棘云云其二女歌曰墓門有梅云云大夫服而釋之楚詞天問何繁鳥萃棘負子肆情王逸注解居父聘吳過陳之墓門事同而吳宋微異要皆賦此詩也魯詩説謂泄冶所作又以澤陂為傷泄冶則以株林附會也防有鵲巢憂讒賊也宣公多信讒君子憂懼焉宣公信讒雖本續序然觀其欲立嬖姬之子欵而殺太子禦冦又逐敬仲出奔其信讒非誣也故此詩與王風采葛同屬憂讒之作一章防堤也卭丘也旨美也苕草名好生下濕侜誑也此當與采苓參看鵲巢于大樹防以止水安得有鵲巢苕生于下濕卭乃髙丘安得有旨苕今皆謂之有者侜我也蓋欲侜豫所美之賢人而去之也程子曰侜謂譸張迂回誣罔人者豫美心所賢者憂讒誣賢善也二章中堂廟中路名甓瓴甋也俗謂之磚鷊草名按鷊本綬鳥咽下有囊如小綬具五色此草雜色如綬因其似鷊而名也本義云讒言惑人非一日一言之致如中唐之甓非一甓也以積纍而成旨鷊綬草雜衆色以成文猶多言交織以成惑義與貝錦同君子小人之進退興亡大機也忠臣被讒將以去國則憸邪連茹矣詩人所以忉忉而憂也然君子小人正相反豫之所甚美正彼之所必侜不特斥逐之斬艾之并汚以不韙之名小人用心何所不至此詩人之所以惕惕而懼也防有鵲巢二章章四句月出刺好色也在位不好德而悅美色焉謹按月出憂靈公好色將及于難而欲其知懼也恭録折中云皎明也佼美也佼人謂夏姬也僚好貌舒夏徵舒也古人二名間有截用一字者如晉重耳傳謂之重樂王鮒傳謂之鮒是也陳靈公與孔寧儀行父淫于夏氏夏姬之子徵舒恥之故弒靈公此詩言月出之時靈公悅夏姬之佼好而其子徵舒幽窈糾結勢必為亂故中心憂勞又悄然而不敢言也二章皓月光白也懰美而清也優受憂思而忍受也慅煩亂也悄然不言而中心煩亂也三章照月光照人面也燎人面亦有光也夭矯變紹糾緊慘哀痛也言其憂而忍受者今矯變而糾緊則禍甚速故煩亂至于哀痛知靈公之必不免也月出三章章四句株林刺陳靈公也淫于夏姬馳驅而往朝夕不休息焉此述民間相語之詞以刺之一章兩株林兩夏南轉換七個間字將當時車馬簇擁鄉民聚觀囁嚅附耳道旁指摘無不一一勾出然言從夏南不言為夏姬而往詩人之忠厚也二章將單襄公過陳道茀不可行以下一假櫽栝在裡時君臣只知夏氏舉國事民瘼賔客交際一齊置之詩人只説一面而面面俱到株林二章章四句澤陂刺時也言靈公君臣淫于其國男女相悅憂思感傷焉刺時者刺靈公之時君臣宣淫必及于難也後序君臣淫于其國是也男女相悅以下皆附益之詞蒲荷微物猶能擇地而生各得其所以興靈公為一國之主不能擇地以蹈以自危其身有美一人指靈公也離騷以美人比君意亦如此傷如之何傳云傷無禮也寤寐無為泄冶既死二豎為姦惟有寤寐傷之而無可挽也涕泗滂沱禍不旋踵悲其將亡也然則楚子縣陳之事詩人早見及之矣碩大且卷者靈公非不魁梧美好奈何投之不測之險碩大且儼者言靈公非不威儀尊貴何至為此淫媟之事都從外貌言之喚醒以使之自愛也澤陂三章章四句有美一人誠似女子然葛生曰豫美以指君子簡兮曰美人以指盛王且觀其詩沈痛刻酷展轉莫救且悲且涕非身膺君父之危急不足以語此詩繫于株林之後而自此陳無詩則刺靈公之作也詩無以容貌碩大稱女子者碩大且卷碩大且儼正如還之詩曰其人美且鬈耳陳風十篇序曰刺淫至月出株林澤陂而極矣然陳風之淫由于好巫覡樂歌舞故宛丘東門之枌所以誨淫也季札觀樂為之歌陳曰國無主其能久乎蓋君臣燕遊于上士女贈遺于下賢人去焉讒賊起焉內變作外患興有心者涕泗而無能為也陳國十篇二十六章一百一十四句檜集傳于鄭世系言鄭武公又得檜虢之地及敘檜又云檜為鄭桓公所滅按鄭之滅檜史記韓非説苑公羊皆載其事然皆不可信惟鄭語云桓公為司徒甚得周衆問于史伯曰王室多故余懼及焉其何所可以逃死史伯對曰虢叔恃勢檜仲恃險而加之以貪冒君若寄孥與賄必將背君君若以成周之衆奉辭伐罪無不克矣公説乃東寄孥與賄虢檜受之十邑皆有寄地蓋鄭欲取虢檜而無名故先有所寄俟其負約以為兵端而滅之此史伯之謀也故鄭之滅檜韋昭陸德明孔頴達皆言武公朱子譜鄭則是而譜檜則非也武公之得虢檜經無明文公羊傳先鄭伯有善于檜公者通乎夫人以取其國而遷鄭焉按周語富辰諫王以狄女為后有檜由叔妘𣆀由鄭姬之言然謂其同姓相娶而已韋昭注乃引公羊以實之果爾則更甚于熊資之滅息安得謂賢君又何氏楷據竹書云幽王死虢公立王子余臣平王四年鄭滅虢檜為其黨因并滅之今據國史之文斷之而知其不然東遷時秦襄公晉文侯鄭桓公父子皆力戰勤王而虢檜之君無聞虢檜微弱豈能立君與諸侯抗其為鄭武滅也背鄭負約故武公興王師滅之而王即以其地賜鄭故鄭語首篇史伯所料秦晉齊楚皆有歸結獨于鄭反不敘明蓋以不出史伯之所料無容再贅也文家以闕處見全者此類是也若集傳引蘇氏謂檜風皆為鄭作如邶鄘之于衛則子由初無此説矣羔裘大夫以道去其君也國小而迫君不用道好潔其衣服逍遙遊燕而不能自強于政治故作是詩也檜國𥚹小迫于強大王室衰微漸相并吞觀鄭桓公之欲逃死則知當日之時勢矣乃逍遙遊燕飾其衣服孟子所謂及是時般樂怠傲者大夫以國無善政不用其言而去之去之而又思之且告以去之之故以冀君之一悟可謂得去國之道矣檜君以朝服遊燕而以朝天子之服視朝只首二語檜君不善已可槩見與憂勤惕厲正相反也其燕樂之日正君子憂戚之時勞心忉忉時事國勢無不可憂心憂之口不忍言之而不得不出于一去以自潔其身也後序刪去以道去其君豈不爾思無著落二章在堂路寢也檜君但日出視朝退適路寢而已無所事也三章如膏有曜只就羔裘上一摹寫而可悼處已見覺對此羔裘悽然欲絶羔裘三章章四句素冠刺不能三年也周道親親及其衰也至不能行三年之喪檜詩作于東遷之前去文武未逺而世變至此昔時所為庸行無竒今直視為祥麟威鳳欲見之而不可得又何怪春秋之以喪婚以喪聘者乎夫子特存此詩以扶世道云賢者遭喪獨行古禮而人轉以為怪也故欲得一素冠之棘人為同心之助焉一假目擊澆風望古悲涕都于一庶字中傳出傳云庶幸也箋增一覬字蓋未得見之而想其或一見之也想見其冠想見其骨立之狀惟其不得見而想其一見所以勞心慱慱也不必用轉語即一庶字而勞心之故已在其中二章曰我心傷悲兮非不得見而傷悲也言庶得見此素衣之人使我之心相與傷悲也傷悲即欒欒所感在彼為欒欒在我為傷悲夫子見齊衰者雖少必作過之必趨即傷悲之意滕文公顔色之戚哭泣之哀弔者大悅亦所謂傷悲也平日猶然而况己亦遭喪者乎王氏詩億藴結猶鬱結也見人之素韠而我之哀痛鬱結而不可解也如一言其心之一也詩人在終慕之後見人之素而我心輾轉傷悲而鬱結以人之哀感己之哀自有所不能已也二章素衣當從箋作素裳裳素則韠亦素故三章曰素韠素冠三章章三句隰有萇楚疾恣也國人疾其君之淫恣而思無情欲者也按説文恣縱也序曰疾恣何以見疾其君之淫恣後序妄增淫字耳蓋先王之制用民之力嵗不過三日講武各有其時惟驕恣則土木遊畋無所不至政之所以繁也周制什一而賦惟縱恣則橫征酷斂無有醉飽賦之所以重也詩不言君之恣而但示以己之苦亦不明言己之苦而但言草木之樂并不言我以有知而苦但言草木以無知而樂而己之苦難堪誰使之然哉疾恣之義躍如無知二字包含不盡有賦役不及意無家無室言無家室之纍也凡啼飢號寒種種愁苦都在言下隰有萇楚三章章四句匪風思周道也國小政亂憂及禍難而思周道焉詩人之意思文武之道也箋云周道文武之政令也一章安溪李氏云言匪風也而有震動之聲匪車也而有顛偈之勢斥政之亂而人不之安也文武之道布在方策而平王東遷新政潰亂絶無仰法文武之心故詩人顧瞻文武之善政而心怛也周道猶是而已非文武之君周召之臣矣顯謨承烈如在目前特任其廢墜無振興者耳故下文有西歸之懷也三章詩作于東遷之初斯時諸侯未嘗忘周總以周失其政文武之治不可復見耳西歸者西歸于周而欲興其道也箋云能輔周道治民者是也懷歸也好音美名也猶云以周召稱之以忠義許之耳匪風三章章四句檜之入鄭在平王東遷時鄭武既滅其國此檜風四篇留周之柱下其後太史于故府得之仲尼刪述存此以列於經虢檜同滅于鄭而檜風獨存幸也檜國四篇十二章四十五句曹檜曹皆小國曹立國五百八十九年至曹伯陽滅于宋景其于春秋數數見而編詩後于檜者蓋檜亡于平王之初檜滅而強凌弱大并小五伯之所以興也曹亡于魯哀公十一年曹亡而諸國殆盡七雄之所以起也陳氏傅良曰檜亡東周之始曹亡春秋之終夫子刪詩繫檜曹于國風之後于檜之卒篇曰思周道也傷天下之無王也于曹之卒篇曰思治也傷天下之無伯也夫所謂傷天下之無伯者下泉之詩人其傷者天下無郇伯以其時晉伯之不義而小國困也聖人所傷者天下并無桓文以孔子之世晉伯衰而小國就盡也蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉鄭譜既以為昭公詩又云蜉蝣至下泉共公時作自相矛盾朱子疑之按昭公當齊桓初伯無役不從非如鄭之逃蔡之潰也今以朝生暮死之蜉蝣况之毋乃不類即指共公亦未有以見必然也蓋曹小國四詩雖存而世次無序國史編詩雖知其作詩之旨而無以定為何公之朝闕疑而慎言其餘乃見首序之可信蜉蝣朝生暮死之蟲蜉蝣之羽其整潔如衣裳楚楚人之修飾衣裳猶之蜉蝣也豫憂方深矣只一憂字已括尚華飾而非久逺意蓋作法于儉猶恐漸奢作法于奢何以示後強大猶不堪此况曹之國小而逼乎無逺慮者有近憂一時絢爛不過如蜉蝣之遊息耳君于我謀歸處之道國奢示之以儉國儉示之以禮庶幾可常居止也衣裳只舉其一端凡意之所娛者無不如是朱子所謂玩細娛也細對逺大而言極意娛樂未有不忽于逺大者歸息謂謀所以歸息于此而不遷也蓋不奢不儉無過不及乃可以止息之道蜉蝣黃黑色安得云如雪按閲與穴通管子曰掘閲得玉是也蜉蝣初出之色無考意者初出穴時色白後變為楚楚采采耳説往也言人君之道以誠確為基以朴素為質如物之初生無所漸染潔白自完則可大可久無所往而不宜也來即我謀其歸説之道不出乎此蜉蝣三章章四句候人刺近小人也共公逺君子而近小人焉後序以為刺共公詩學辨之曰晉語楚令尹子玉請止狐偃王曰不可曹詩曰彼其之子不遂其媾郵之也楚成與曹共同時豈有曹之新詩而楚成已成誦在口者其説是也按晉文公入曹數其不用僖負羈而乘軒者三百人蓋晉文用曹詩以譏共公非即以此詩為刺共公之詩不然曹小國安得乘軒如此之多也序云刺近小人則當以近小人為主前三章俱就近小人上一氣趕到薈蔚朝隮未用季女斯飢結出君子之逺故首章不必夾入逺君子候人何戈與祋乃示以小人當居之位能盡之職此正所謂稱其服遂其媾也彼其之子不以一長自效而竟三百赤芾乎赤芾大夫以上服之三百言芾之多二三章俱承赤芾來言鵜貪而出入泥塗濡翼求食乃其分也今則因人以飽不濡其翼身則逸矣然非分矣以興小人貪而下位因材效力乃為稱也今則赤芾其服服則美矣然不稱矣以賢人從仕則曰公侯好仇以不肖竊位則曰不遂其媾遂稱也不遂者猶云大家婢為夫人舉止羞澀也末章總承上二章言不稱不遂而公然居之者由人君寵護之深也寵護在小人則擯棄在君子自然之勢也薈蔚集傳云草木衆多謂小人連類而升穢雜之甚也南山象崇髙之位復有雲氣護之君假以氣焰也婉孌言其美季女言其貞正與薈蔚相反勢非崇髙君復擯棄則長斯飢而已候人四章章四句葉氏謂漢世文章未有引詩序惟黃初四年有共公逺君子近小人之説蓋衛宏詩序至魏始行此説本之鄭氏樵然亦非是按張衡西京賦云獨儉嗇以齷齪忘蟋蟀之謂何蓋用蟋蟀序意也坊記云以此坊民婦猶有不至者又明用東門之楊詩序至于左傳孟子孔叢子往往與序合集矢于宏宏不任受也鳲鳩刺不一也在位之君子用心之不一也素厭後序陳古刺今之説惟此篇則信其不誣何也曹為小國安得如是君子如不在曹何以列于曹風如謂孟子生于鄒不以地限則國史必稽其名史傳當詳其事且所謂正四國正國人胡不萬年則必在上之人而共公以前所謂淑人君子者實無足以當此則序以為陳古之君子以諷刺今之不能為君子者宜非鑿空之説且詩無有既稱淑人復稱君子惟此詩與小雅鼓鐘篇皆望古遙集極思慕之致也一章儀一者有常度也所處之地所接之人不一而在我之威儀皆有其常度即其儀之一見其心之固誠中而形非色莊也于首章説明下章説威儀處都是説心不必再提出心矣儀之一者敬之形于外者也心之一者敬之積于中者也兼內外方完得敬蓋以全體言之也二章七子有在梅者梅善木也喻醇良之民而君子不敢恃也君子全體只一心如結見之而心形容不出故于儀一上見之而儀又形容不盡又于其帶其辨上見之連用三其字低回反覆純是一敬不以民易治而生怠肆之心也三章七子有在棘者棘惡木也喻頑梗之民而君子不敢傷也喜怒當于理容止可師作事可法其威儀總無一差忒故人之不正者歸于正也四國猶然况吾國乎統括之曰儀一一逐件細細檢過儘有不一處而未嘗忒也乃見其一也四章其子有在榛者榛雜木也喻平常之民而君子不敢忽也惟正已以正國人能如是雖萬年以此守國可矣何待他求乎正字上有正已一層故不言威儀鳲鳩四章章六句曹叔振鐸親受文王后妃之教意者作為此詩以訓子孫而曹人至今傳之凡威儀之不飭者則誦此詩以警之也今味其辭誠緝熙敬止之遺故大學引其第三章以發明治國齊家之旨歟又淮南子云賈多端則貪工多技則窮心不一也其儀一兮心如結兮君子也夫此猶不失詩意而詩故以君子美公子臧蠡測以為美周公而詩億以為美僖負羈皆非然也下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也孔叢子曰于下泉見亂世之思明君也安溪李氏曰下泉泉之下流者易曰井冽寒泉食言澤之及于民也今也下泉冽矣而所浸者稂莠耳蕭艾耳蓍蒿耳惠在小人則善人困苦由王澤之竭故列國無政以至於斯是以愾然而念宗周之盛時也又曰黍苗者稂莠蕭蓍之反也隂雨者下泉之類也以其諸侯之澤則曰下泉近而長逺者也以其王者之澤則曰隂雨膏而溥遍者也四國有王即周京之盛時也方伯賦其政諸侯行其化豈有今日偏枯之事哉所以慨嘆而思念之者如此國亂民困賢人傷之與檜卒章同意傳從古序但云思其先王之明者自後序云共公侵刻下民鄭氏因之遂謂此詩為共公作則非也安溪之説精矣蓋稂莠害苗者也稂莠盛則黍苗益困芃芃黍苗則稂莠蕭蓍均不得而賊之矣天子主政于上方伯敷政于下諸侯之國土地闢田野治敬老尊賢俊傑在位此成周之盛時也四國有王王盛王也舉郇伯見凡為牧伯者無不然詩人説至此如唐天寶亂後説到貞觀盛時一似天上人令人神馳而不覺言之津津也提出郇伯隱刺當時為霸者虐用小國之民而不知恤也下泉四章章四句曹國四篇十五章六十八句詩序補義卷十二
