body:
  text: 詩序補義卷二十一石泉縣知縣姜炳璋撰生民之什生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉箋云從此至卷阿為成王之正大雅尊祖尊始祖也配天則尊之至矣言尊祖而配天在其中故不言配天頌思文篇序曰后稷配天也尊莫尊於天但言配天而尊祖亦在其中故不言尊祖一章補正云郊之祭尊無與匹故主日而配以月配日非配天也五帝郊祀必先帝有聖德者故舜舍瞽瞍而郊堯鯀之得郊有以死勤事之功而議禮者猶有憾焉媒氏配天瀆亂不經甚矣周以前何嘗有禖祀生民之詩所云以弗無子者亦何嘗為祈於先禖哉世本及譙周古本因云伏羲制嫁娶之禮既用之配天其尊貴先媒則燧人氏火食宜為之先炊何乃為老婦極卑之祭乎甫田及此詩攸介攸止俱當訓介為助姜嫄從髙辛之行蓋為助祭曾孫親履田間亦為助田畯勞農也聖王表揚先德當傳其可信必不傳其可疑如云乃祖無人道而生雖在常人怒形於色史遷謂劉媪與異人遇感龍而生髙祖武帝好神仙故不之禁也聖如周公肯以怪誕不經之說誣先祖哉禇先生曰后稷人迹者欲見其有天命精誠之意耳鬼神不能自成須人而生奈何云無父而生乎自山海經謂后稷生於巨跡爾雅釋詁又訓武為拇列子史遷皆踵其訛鄭箋因改毛傳矣乃張氏謂人固有化生者嚴氏詩緝曰此可以語洪荒之始不可以言稷大聖莫如帝舜文王孔子其生有異於人哉蓋髙辛姜嫄因郊天而祈子故此曰克禋克祀履隨也武步也姜嫄為祈子之故從髙辛步武而行兾神之速歆而俾有子也助祭居於后位介助也止居也行禮既畢而歸未幾有震肅居側室乃生后稷焉此曰帝下章以上帝别之知帝為髙辛也下章曰上帝居歆與此敏歆無異也曰載生載育血氣之類父施母生人道之常非如陸終娶於鬼方剖其脅而獲之也詩辭本醇人自擾之耳然則姜嫄何以棄之按傳最近情傳云天生后稷異之於人欲以顯其靈也孔疏云異之於人猶有奇表異相若孔子之河目海口文王之四乳龍顔之類但書傳不言后稷異狀無得而知耳按後世以俗忌棄者如田文胡廣檀道濟是也以貌之怪惡棄者如王鎮惡張法雲是也后稷之棄以其怪惡毛公傳經夫有所受後人自生枝節耳二章降生之異足以驚人故心疑之曰上帝之靈甚赫也豈心有不寧乎不康我禋祀乎何居然而生子之異也居然驚異之意己含奇表異相在內四章以就口食不過自知食耳而粒食天下之智己胚胎於此藝之以下固是種植有道然却無心而化工呈五章后稷農官名提出后稷已為后稷之官矣五穀之生天與以時地與以利后稷則盡人力以助穀之生而天地交賴之道則其方也草不除則禾不立故茀草為第一義數實字便有道在凡浸灌耘耔防護諸法無一不具封邰重報功上非欲其主母家之祭也疏云邰為后稷之母家所以得封后稷者或時君滅絶或遷之他國也六章重肇祀說祭祀自古有之而秬秠以釀酒穈芑以為粢后稷倡之也七章我祀言得天下之後我之祀后稷也或舂四句承秬秠穈芑來是為饎事蓋即后稷所降者祀稷也下分吉蠲求神獻尸三項宗廟祭后稷因及七祀之行宗廟及行皆有尸故又言獻尸之物燔烈所以為尸羞也內外之祀並舉以起來年之祭嗣續於不絶也八章言郊祀后稷以配天也卬與我字應卬盛于豆于豆于登指尊祖配天之祭香謂粢盛及備物之香氣所謂臭也上帝居歆則后稷之歆可知蓋自后稷以農事肇祀以來世世力農承祭無有罪悔以至於今有天下故郊天而配以稷無罪悔言獲福也生民八章四章章十句四章章八句行葦忠厚也周家忠厚仁及草木故能內睦九族外尊黃耇養老乞言以成其福祿焉補正云此王以族燕之詩非祭畢之燕也序云忠厚忠者出於實心厚者親愛無己全詩之旨躍如矣仁及草木以下講師之附益也一章凡興例不一有以一句興全篇者綿是也有以四句興下二句者此章是也行道也蘆葦水生古人井間有溝溝上有塗故道旁有葦也補傳云人之兄弟相聚而處如葦之同根相依而生如葦之枝葉所以不可逺踐履之則傷物之生意逺之則傷兄弟之生意生意者相親相愛如物之天機盎然也爾訓近近之者親之也傳曰戚戚內相親也吕成公以為深體詩旨蓋下面以燕以射俱是外面相親本之自內須有一段至性從天倫流出誠意惟恐不周恩誼惟恐不至略不參一毫勉强孔疏所謂親親起於心內也古義筵竹席也几踞几也存旨云兩或字是開燕初預擬何人當肆筵何人當授几尚是未然事二章王與族人燕或稚者肆之筵矣老者授之几矣而且設重席且有緝御有加無已也或獻或酢二句禮之詳也醓醢以薦三句物之備也或歌或咢樂之和也三章序賓以賢不中者飲射之常也序賓以不侮即中者亦飲設為此格以協其歡詩所云雖同姓亦曰賓故曽孫曰主四章酌以大斗以祈黃耇非酌老人也既無不飲矣又酌以大斗以祈其夀考也蓋酒以助眉夀能勝大斗者致髙年之祝欲其盡歡也至於黃耇台背者豈可湮沒其善故乞其善言以前導之以贊翼之使我夀考維祺以助我之景福也儀文節節加詳禮意節節加密行葦忠厚之至如此行葦四章章八句既醉大音泰平也醉酒飽德人有士君子之行焉正大雅何一非太平之作何於此詩言太平疏云此篇福事數備於五君子萬年夀也天被爾祿富也室家之壼康寧也昭明有融攸好德也髙朗令終景命有僕考終命也李氏樗曰方且至於子孫綿綿延延似續而不絶豈特五福哉此可以知太平之說矣人君一身為天下臣民斂福之原五福有一不備則太平之福必有所虧即五者具備天下無事而當時雖盛禍亂己伏豈能久享太平至永錫祚𦙍而後太平之業萬年弗替此真所謂太平也此詩蓋以太平祝成王而所以致太平者由於德之昭明針規之義也一章介爾景福統冒全篇公尸嘉告以下皆景福也二章介爾昭明人君自明其明德而神若助之如云天牖其衷耳三章有融昭明之極也不特融其疵纇并融其思勉髙者峻極不可踰朗者瑩徹不可掩令終即中庸所謂不息則久也有俶者於今日之善始知他日之善終也下五章無疆之福使以有盡之德承之豈能相副此章將昭明之德推勘到無以復加則下面福祿之來方不是幸致雖云神助實由於己四章其告維何一句提起籩豆靜嘉以下及下一章是公尸嘏辭其類維何則又詩人之辭蓋公尸口中無自作問答也仇少宰兆鰲曰此與下章皆當重君子上蓋朋友之敬亦君子之敬是為君臣一德孝子之孝亦君子之孝是為父子一心五章威儀孔時當指孝子說言舉奠之時威儀之甚宜者則君子之有孝子也但言朋友及嗣子之威儀而君子之威儀更不待言傳云類善也箋作族類之類宜兼說言父子同心感格故神永錫爾以衆善之類使奕世皆有是善也下三章即此意申之六章其類維何凡在室家嚴密之地者無一人不均受其慶也壼宫中之巷言深逺而嚴肅也蓋深宫嚴密之地自謂外廷無知者縱逸敗度無所不至不知天命之凝承祖宗之繼述子孫之孕育皆在於是善則和氣致祥不善則沴氣致戾國祚修短之機也此文王所以雍雍在宫無射亦保歟補正云觀晉魏以後亂亡之國子孫后嬪死亡奔迫汚辱之慘始知室家之壼即如天之福也秦漢以後亡國子孫無不被其災者周人雖遇暴秦之厄不過其君稽首獻地仍號南君以守先祀皆文武周公盛德所積而詩人所謂永錫祚𦙍者早信其理之必然矣七章八章申言永錫祚𦙍之意祚福祿𦙍子孫原離不得故七章其𦙍維何而云天被爾祿景命有僕便見子孫之賢而福祿附之也八章其僕維何而云釐爾女士從以孫子便見福祿之來而賢子孫承之也此國家所以卜世三十而長享太平於無窮也既醉八章章四句鳬鷖守成也太平之君子能持盈守成神祇祖考安樂之也成王大雅皆守成之作序獨於是詩發之成者先王之成法守者不妄有所作為也吾蓋於興義得之鳬鷖水鳥陸璣所謂鳥之謹願者也故以為守成之主之喻蓋一部周禮宏綱巨目燦然具備更無滲漏待後王補正但當尊守力行之偶一紛更則禍不可言今成王守之弗失猶鳬鷖之鳥常在於涇其在沙亦涇之沙在渚亦涇之渚在潨亦涇之潨在亹亦涇之亹雖逺近左右微有不同總不離乎其處以興王者成法雖先後疾徐微有區别總不易乎其方所謂守成也興處已含正意更不明白說出三百篇此例最多公尸以下但言其感格神明而受福也集傳祭之明日繹而賓尸之樂歌本之鄭箋以此詩用處言之序則推本作詩之由也一章言水鳥常在於涇守之弗去守成之主率由罔懈何以異此故公尸之來燕也心安之甚即公尸之寧知祖考之寧矣祭之明日繹而賓尸亦成法所在恪守罔失亦是守成處興處所該甚廣而燕公尸亦其一也四章既燕于宗宗廟也有常處也五章傳云亹山絶水也吕成公引後漢書馬援傳浩亹注浩水名亹者水流峽山間兩岸深若門也更分曉無有後艱孔疏云致其無復有後日之艱難補正云必無有後艱福祿乃有終燕樂之時而預及此使君臣上下長幼親疏莫不惕然自循省也鳬鷖五章章六句假樂嘉成王也補正云左氏嘗受經於孔子中庸乃出孔子之孫皆以為嘉樂蓋見聖人所刪之詩其序有嘉成王之語故以為嘉也然則詩之有序在左氏子思之前此可證也既醉篇序言太平所以致太平者由於德之昭明而昭明之實際詩未明言也鳬鷖篇序言守成其守成之獲福詩言之而其所以守成亦未嘗明言之也此篇補正云首言受祿于天而先之以顯顯令德次言干祿百福而繼之以率由舊章三章言受福無疆而先之以率由羣匹末章言燕及朋友而先之以之綱之紀言民之攸塈而先之以不懈于位蓋人君所以受祿于天者在宜民宜人所以宜民宜人者在修德於身所以修德於身而宜民宜人者又在法祖任賢而修德法祖任賢皆不可以始勤而終怠也然後紀綱常明而臣民胥協焉按此則成王之守成而致太平其實功實事皆於此篇發之故篇首云嘉樂君子言其可嘉可樂也序云嘉成王見成王之賢備見於是也而東萊謂既嘉之又規之亦無不寓其中矣一章宜民宜人正德之顯處二章舊章文謨武烈著於典冊者也周公告成王曰篤敘乃正父又曰考朕昭子刑乃單文祖德又曰以覲文王之耿光以揚武王之大烈又戒之曰此厥不聽人乃訓之乃變亂先王之正刑可知成王孳孳矻矻惟率由二字而詩乃為子孫言之數百年後韓宣子猶曰周禮盡在魯魯災季桓子命藏象魏曰舊章不可忘則子孫之世守何有窮期歟三章末二句集傳云又能無私怨惡以任衆賢蓋英主嗣位往往自作聰明秉用新進其於先王所遺羣彥或以不順己而怨或以犯顔而惡舍置舊人即是舊章變亂之根惟推心置腹以任用立政所謂自一話一言我則末惟成德之彥以乂我受民是也匹者配也明良一德與己相配尚有怨惡之隙耶四方之綱言羣臣釐其事而人君總其成綱舉而目自張也四章之綱之紀燕及朋友蓋政平刑清禮明樂備總在君身張之為綱理之為紀而羣臣亦賴以安安非怠逸之謂綱紀明則國有成法事有定規百辟卿士但安意率由之若恣情變亂其不安孰甚則綱紀不明故也人君致治其大端在息民而民之攸塈全在不懈于位上一語足包無逸一篇大旨乃不以為責難而以為媚吕氏所謂上下交而為泰之時也假樂四章章六句公劉召康公戒成王也成王將涖政戒以民事美公劉之厚於民而獻是詩也是詩苦於層次難明尚未至豳而云既庶既繁下文又云于時處處陟巘又陟南岡又云既景乃岡胥原又云瞻彼溥原依京又云于豳斯館廬旅又云止旅一望茫然然細按本文脉落前後自見一章言公劉在邰重農積穀國勢富强可以遷也二章上文言爰方啓行矣而所以必遷之故尚未說出故此章補敘之以其在邰之原故曰此原既庶既繁民居稠密無可居止於是順民之情宣布遷國之令而上下相同無有永歎者永歎者如盤庚遷民而不適有居是也然其初不敢遽宣其令也登髙望逺復降在原以玉瑶鞞琫之飾親升降勞勩之事知此原上下四旁無可以容此大衆夫而後宣布遷國之令焉陟降下著何以舟之三語公劉往來不止一次斯民常常習見以形容其審度之慎也蓋安土重遷者人之情公劉非如太王之迫逐苟非萬不得己則不為亦見人浮於土勢不能容不得不議遷耳于胥斯原四句當在爰方啓行之前見其君民和同陟則在巘五句又當在既順乃宣之前見其再三慎重也綿之篇於來朝走馬下補出謀始契龜義亦同三章言建都於京也曰逝彼瞻彼則非此原明矣蓋别為一溥原即豳也添一溥字則有什伯倍於此原者矣平曠之地百泉繞之山川精氣所聚往而觀之乃陟南岡之髙乃覯于京之大京大也師衆也後世因以名天子之都李巡曰丘之髙者曰京南岡是溥原之山京是溥原之大丘登髙以望形勢覯京以定建都俱承瞻溥原來非至陟南岡而後覯于京也於是自邰啓行即此京師之野建國焉處其所當處暫止其地也從王之人皆旅人也築廬舍以棲之直言論難凡寢廟宫室民居無一不經營籌度而百堵興矣逝彼百泉四句在啓行之前京師之野以下在啓行之後非既啓行而後覯京也四章言既安居而燕羣臣也依安居也則寢廟成宫室立於是登筵依几執豕用匏雖草昧初開而蹌蹌濟濟之盛想見從臣羽儀具有開國氣象異姓則為之君同姓則為之宗又情洽而分嚴也五章營度於野外耕桑之地也欲疆井畝必先正其方向何氏楷云視其隂陽向背寒暖使種植各適其土之宜如黍宜髙燥稌宜下濕之類觀其水泉灌溉之利如水東畝南水南畝東之類也古者田賦出車什一而稅故軍制稅法即於井畝時定之清溪李氏曰度其夕陽西方負山少見夕陽則居人苦寒故又度其有夕陽者以定民居也此則國中所不能容者又度山間向陽之地居之而豳人之居於是益大三單傳云相襲也箋云大國三軍以無羡卒釋單義范家相曰非無羡卒也不用羡而止用正耳故曰單若王肅云婦女在內老弱次之强壯在外則始遷在道之時耳如平時軍制役及婦女老弱豈公劉之師哉出則賤者在前貴者在後則下軍而上軍而中軍入則貴者在前賤者在後則中軍而上軍而下軍所謂三重相襲也六章詳味止旅乃密芮鞠之即二語蓋以處新氓也新氓者既遷作室之後又有來歸之衆也營宫廟作賓館定井賦上文已詳言之不必又重叙一畨按補傳云廬旅前日流寓之客户今己為舊民矣止旅則今日始至之客户也詩言舊民已授田畝既遷而新至者則先授之館周禮五十里有市市有館館有積是也既授館矣乃涉渭之流取石以為礪取鐵以為鍛為新氓備器用既定其居止又疆理其田野其來者益衆乃使夾皇澗遡過澗而居所止之旅日益稠密乃即汭水之外居焉户口繁而民生遂公劉所以開王業歟爾雅崖外為鞠公劉六章章十句許氏謙以此篇為豳雅辨見豳風泂酌召康公戒成王也言皇天親有德饗有道也行潦挹注一念之誠也猶足格天况有君民之大德者乎皇天親之饗之固其所也便有至治馨香感于神明天聰明自我民聰明意所以為戒也左傳潢汙行潦之水可薦於鬼神可羞於王公雅有行葦泂酌昭忠信也據此說詩興義自明餴饎濯溉祭祀之事罍祭器也傳云豈以强教之弟以悅安之民皆有父之尊有母之親本表記以釋豈弟之義黃實夫云父母之愛子誠心也心誠求之則赤子無難知之情萬里之逺若一堂之上萬口之異若一辭之戴此召康公所以論享天之理以明治民之理也可以濯溉方可以濯罍可以濯罍方可以餴饎有以安息其赤子方為赤子之所歸方為赤子之父母其理一也泂酌三章章四句卷阿召康公戒成王也言求賢用吉士也朱子以此及上篇皆召康公作此君子指王按諷詠首章集傳自不可易但既以君子指成王三俾字作何著落蓋俾者使也孰使之下文馮翼孝德之人使之也詩言爾既泮奐優游矣土宇厚矣受命長而茀祿康矣豈弟君子必有人焉使爾終其德性日以充滿則似先公酋矣且主百神而終純嘏矣三章俱連用矣字作游移欣羡之詞為下章四有字蓄勢於是緊承上文俾爾彌爾性者有馮有翼有孝有德頓出一班賢人來連用四有字兩以字勢如山立康公一片歆動之意如見引即牖其牲中之良知翼即補其性中之良能以使爾彌也俾爾彌爾性則容貌之尊嚴德行之純潔聞譽之美威儀之隆皆爾性中自然流露之光輝故及顒卬一節鳳凰于飛兩章以鳳凰興賢士箋云時因鳳凰至因以喻焉疏引君奭云耇造德不降我則鳴鳥不聞又古今樂録載成王神鳳操云鳳凰翔于紫庭豫何德以感靈賴先人恩德臻于胥樂民以寧則成王時實有鳳至若竹書紀年云成王十八年鳳凰見又云王遊卷阿則依託此詩為之不足信也馮翼孝德在朝曰士在野曰人爰止則近故興士傅天則逺故興人媚于天子非容悅也以責難陳善者媚之媚于庶人以遂生復牲者媚之鳳凰鳴矣兩章比賢者必聚於有道之朝而王當致敬盡禮以迎之也蓋上四章言賢才足以輔君治民而此二章則責備到成王身上遂歌與首章來歌相應卷阿十章六章章五句四章章六句民勞召穆公刺厲王也箋云從此至桑柔為厲王之變大雅穆公兩朝元老顧命大臣知無不言即奔彘之時猶自言曰吾驟諫王王不從以及此難豈有所疑畏而託詞以諫哉此詩是刺一少壯用事之人觀戎雖小子二語自見蓋與穆公同秉國而信任於暴主者故為戒小人之詞使王知其人而去之也墨子荀子皆云厲王染於虢公長父榮夷公終今所戒者非榮夷即虢公歟一章民亦勞止汔可小康猶言民不堪命也民不堪命致亂之由大記云荆楚寇於南玁狁寇於北淮夷寇於東命虢公征之不克徵斂數起四方之不安孰甚要在惠中國以綏之而所以惠中國者除其寇虐吾民者而己寇虐之人即詭隨之人也從來相臣誤國必有為相臣任用之人以為爪牙此輩豈無是非良心而貪取富貴明知不義而詭隨之則天良喪矣故曰無良略假事權便播惡於衆凡虜掠人之資財戕害人之身命離散人之妻子毁敗人之名行有一於此即寇也詭隨之肆虐何以異此故五章皆曰式遏寇虐而不變其文僭不畏明公行橫暴天道之明威萬民之指視皆無所畏人以為極慘彼以為適意乃剛惡也二章惛怓謂羣吠一聲無有正論也民憂憂其害及已也奸相得君必有微勞見信故人主不覺其奸勉之以無棄見微勞不足恃也三章罔極變幻不可測也慝即寇虐之匿於中者此又假公濟私因事播惡之小人所謂色厲內荏穿窬之盜也敬慎威儀言小人善窺意旨不可少假辭色惟近君子則小人自逺語指同列而警王之意深矣四章何人斯曰既微且腫即此詩所謂醜厲也正道敗壞令人同歸醜行此又寇人心術者戎雖小子而式𢎞大惕然使之深省亦使王自悟也五章繾綣互為黨羽牢固不可解也正反者於正道而反之則是非不明刑罰不中民無所措手足民勞五章章十句板凡伯刺厲王也此詩即上篇所論列之人蓋少壯柄用者也觀上篇戎雖小子此篇小子蹻蹻可見但上篇是論其聽信羣小縱惡害民此則直指其身語更切勢耳凡近小人者未有不逺君子彼盛年用事羣奸附和於老成必狎侮於容止必矜張曰靡聖管管曰小子蹻蹻善人載尸皆狎侮老成之事上篇所以欲其近有德也曰出話不然曰威儀卒迷勉其辭輯辭懌戒其囂囂謔謔皆容止矜張之事上篇所以欲其慎威儀也通篇惡小人無逺謀而不肯用人之謀故一章曰猷之不逺是用大諫二章憲憲泄泄無謀之謂也三章我即爾謀又曰我言維服告之以逺謀也或謔謔而戲或囂囂而傲或蹻蹻而驕如此聲音顔色拒人千里此其所以敗壞不可救歟末以敬之一字藥之能敬則親君子肅威儀人皆樂告以逺猷而君民胥受其福一章猷之不逺利在秋毫害在畢世范文子曰國家之事童子言焉將為戮矣所謂童子之見也出話即所謀之言猷不逺則出話亦無當故大諫承猷不逺來上篇以大諫終此以大諫始二章憲憲泄泄猶云燕子處堂不知禍之及也其病在飾非拒諫若能辭輯辭懌則出話必能合理而讜言可入詢謀集益有裨於民三章笑者笑其非今日之亟務也不知我之所言正是亟務何為笑之四章當時必以君子年耄相戲謔如云爾何知中夀爾墓之木拱矣以憂為謔則安危利菑勢不可救五章夸大也毗附也夸大其言依附曲說以禦人之口又盛氣凌人則善人惟箝口不言夫至善人載尸其禍尚可言耶民方愁苦呻吟善人莫敢揆度其所以然而告之以至喪亂死亡民無依倚更無有惠我師而一言救正者可哀也六章殿屎喪亂之民必歸於邪僻豈其民無忠順之性哉觀天牖民之易則知牖民者不必强制如弭謗之術也但無自立僻則多僻之民自化不然放僻無所砥止也然則國人流王於彘凡伯先有以燭其幾矣七章厲王非如幽之欲廢太子何故為宗子危之諸家說俱未妥清溪李氏曰藩垣屏翰皆為城而設者而君則城也懷之以德則四者皆安矣若藩垣屏翰之俱傾城能無壞乎當斯時也孑然獨立豈不可畏哉按此則宗子即指王也以天下言則曰天子以同姓言則曰宗子所謂君之宗之也不言王而言宗子者史記王以榮夷公為卿士用事按武王時有榮公十亂之一成王時有榮伯作賄慎息之命夷公其後也馬融曰周同姓畿內諸侯為卿大夫者也芮良夫謂榮夷好專利而不知大難正所謂猷之不逺者然則是詩所刺其殆榮夷歟八章敬天之學豈堪為此人言意在諷王也蓋少年輕率其平居媟嫚無所不至又不聽老成不畏喪亂不恤民瘼事事俱自立辟而出王游衍天實監之即上可以欺君下可以病民曰明曰旦之威必不可以囂囂謔謔者蒙之所謂天道昭昭炯於白日蓋動之以天譴之嚴也回天心免人禍亦曰敬而己板八章章八句生民之什十篇六十一章四百三十三句詩序補義卷二十一
