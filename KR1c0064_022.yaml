body:
  text: 詩序補義卷二十二石泉縣知縣姜炳璋撰蕩之什蕩召穆公傷周室大壊也厲王無道天下蕩蕩無紀綱文章故作是詩也周自成康而後以至穆共無甚失德雖懿王之世就衰夷王之變覲禮然亦未至大壊至厲王横暴棄義類任小人廢典刑沈湎於酒炰烋於國周室於以大壊矣本實先撥大命以傾必然之勢穆公之所以傷也序傷字乃從七咨字體㑹出實指厲王時事而移置紂身上繪圖冩照却不著一毫色相只以末二句動其鑒殷之思是點睛處也蕩蕩以下講師之謬説耳一章上帝者下民之君無不畀之以恒性者也今日之上帝忍而暴虐其命多邪辟若不以善畀而以惡畀者然是天生烝民其命之善殆不可信矣而不知非天命之難信也天命本善習染汚之鮮克有終然則非天命之辟也亦人自為之耳先從本原上痛下一針二章人臣之惡莫大於貪酷强禦酷也掊克貪也詩人故作怪問之詞上二曽是何乃有是人乃天降之滔徳以禍人國者也下二曽是何乃用此人乃女力興之以自禍者也讀詩記云力言任之堅也三章義類善人之儔類也言爾前日秉用之善類强禦之人多懟之乃採流言不根之事使受誣而去而已乃專為冦攘以用於内也式用也傅變曰天下之禍不由於外皆興於内真氏徳秀曰内有衣冠之盜而後外有干戈之盜王氏應麟曰盜言孔甘冦攘式内皆孟子所謂民賊也有民賊則賊民興作祝怨謗也惡播於下怨歸於上靡届靡究恐非監謗之所能弭也四章人君有殘民之意而後酷吏中之人君有嗜利之意而後貪人中之炰烋斂怨即是强禦掊克之根傳云炰烋猶彭亨盖凌虐之狀也斂怨以為徳言聚怨於己以為聚徳於己而惟日不足如人以為聚斂彼以為理財也由君徳不明之故不明故義類屏絶前後左右公卿皆冦攘也尚得謂之有人哉五章喪亂多諉於天紂云我生不有命在天然沈湎于酒豈亦天湎汝乎沈湎則義類逺而不義親正論不聞謟諛見用故無所不為如此既愆爾止以下想見君臣日在醉鄉惛然不知大命之將傾六章義類既空人皆慆徳民之作祝也如蜩如螗而且騷動也如沸如羮事無大小總不離乎亡國之轍及此速改猶或可挽回於未壊也人指君臣由行言君則炰烋斂怨臣則强禦掊克行之不改也故逺近無不積怒而虐熖及乎鬼方矣史稱厲王暴虐熊渠畏之去其王號是也七章舊臣即老成人也縱無舊人尚有舊法女惟不聴而顛覆之大命以傾耳設聽而用之未嘗不可轉危亂而治安也八章顛沛倒仆也揭根見也君身本也天下枝葉也本先撥而枝葉從之君身先壊天下亦由之大壊末二句言外見宜鑒于殷結出作詩之㫖蕩八章章八句金氏履祥曰周自夷王王政不綱厲王初立諸侯畏之荊楚自去王號三十年間天下無他故其後好利用榮夷公又以監謗而殺言者雖芮良夫召穆公交有陳諫又皆有大雅之刺以感王心而皆不聽卒以流亡身死於彘本實先撥斯可見矣嗜好用舍之間可不慎諸抑衛武公刺厲王亦以自警也呂成公曰史記載武公以宣王三十六年即位國語亦稱武公年九十五作懿戒自儆韋昭謂懿即抑也說者遂以為此詩追刺厲王今考其文如曰其在于今興迷亂于政曰匪手擕之言示之事匪面命之言提其耳曰聽用我謀庶無大悔夫豈追刺之語乎史記國語殆未可據以詩為正可也按史記衛世家武公和立於宣王十五年孔氏謂立於三十六年誤也武公在位五十五年國語云武公年九十五作懿戒即以作懿戒之年為卒之年則即位時年四十若在三十六年則年已六十有二即在十五年亦年四十有一共伯為武公兄年益加長作栢舟之共姜亦老矣父母何為欲嫁之詩云髡彼兩髦髦者子事父母之飾既小斂則脫之史謂僖侯既𦵏則共伯脱髦乆矣又安得云兩髦以詩證史其謬立見盖共伯之卒當在僖侯卒之前一二年而武公少於共伯其英年嗣立無疑其卒在平王十三年已至百歲外而其立必厲王之時也幽厲皆亡國之君而病症各有不同幽則小人艶妻宦豎交亂其時亦多傾險柔惡之人厲則燕喪威儀飾非弭謗任用皆强禦掊克故刺幽多沈痛刻酷之音而刺厲者但規其威儀言語任賢納諌義各有當也此詩與民勞板蕩無一不合其云顛覆厥徳罔敷求先王即尚有典刑曽是莫聴也其言不愆于儀輯柔柔嘉即戒其愆爾止也其言訏謨定命逺猶辰告無易由言即出話不然為猶不逺是用大諌也其言肆皇弗尚天方艱難曰喪厥國即小大近喪也其云相在爾室即及爾出王及爾游衍也其言誨爾諄諄聽我藐藐亦聿既耄即匪我言耄爾用憂謔也其言昊天孔昭我生靡樂即敬天之怒無敢戯豫也民勞曰敬慎威儀板曰威儀卒述而此亦屢言威儀蕩曰靡明靡晦而此欲其夙興夜寐至厲王沈湎一事史傳所不詳獨蕩之詩曰天不湎爾以酒式號式呼而此亦云湛樂于酒細玩四篇無一語不符盖因其受病之處各杼所見或借刺或隱刺俱切中其弊故不謀而合以詩證詩孰謂此詩之非刺厲王哉刺厲而云自儆者何也武公英年即位恐忠言不見聽故托為父兄師傅訓已之詞以告于王曰爾曰小子皆指武公亦聿既耄誨爾諄諄皆父兄師傅自謂及武公暮年以是詩有禆於修身齊家治國之要使人日誦以自儆侯包云衛武公刺王室亦以自戒行年九十有五猶使臣日誦是詩也一章首提抑抑威儀通篇以威儀為主盖王燕喪威儀臣下相習成風正救時之藥也補正云此詩屢以威儀為言盖動容周旋中禮者盛徳之至而威儀是力者入徳之門外貌斯須不莊不敬則慢易之心入之其在後生小子執徳不固者尤為存餋持守之切務記曰禮義之始在於正容體齊顔色周書顧命曰思夫人自亂于威儀武公之意亦猶是也靡哲不愚者自非成徳每患威儀不中節知及之仁能守之尚不能莊以蒞之故雖哲人而氣質之偏亦惟此威儀或有所戾也二章道徳謨猷皆歸之敬慎威儀盖容貌為徳之符敬慎則恂慄存而道徳之光外著命之所以定猷之所以逺也三章其在于今四字轉捩興起也如女興是力之興四句雖言自己實暗指厲王女雖湛樂從乎何弗念厥紹而一猛省也先王明法具在罔敷求則顛覆厥徳矣四章皇天弗尚承迷亂于政來夙興夜寐洒掃廷内則弗安湛樂矣維民之章言此廷内道徳於斯立謨謀於斯成可以為民表修爾車馬以下所以禦變皆克念厥紹處五章質樸質也侯度諸侯之法度也言質矣爾之人民謹矣爾之侯度似無不虞之事而必用戒者盖一話之失足以召釁一儀之愆實為厲階必柔嘉而後無意外之虞也六章無易由言承上章斯言之玷來惠于朋友而羣臣奉其言惠于小子而子孫繩繩法其言惠于庶民而萬民無不承其言反是則失言之禍大矣七章屋漏而曰不顯曰莫覯便是愧恧之滋無曰不顯莫予云覯時時省察乃能不愧於心八章以慎獨功深自然之符告之言修徳而有威儀人自悦服如投桃報李之不爽也若身不修徳而責民之服猶童羊而責以角徒惑亂小子耳烏足信哉厲王監謗欲以刑威致民之服故言及之九章以下恐其言之不聴而反覆警之也此章言溫溫斂盡客氣歸于和平篤實恭則其外著者也絶不以明哲自見不知正第一明哲人告之善言無不樂受若强戾不恭聰明自用正天下之大愚人也十章未知臧否猶未便是愚至手攜事示面命耳提而猶曰未知此纔是愚人若在幼穉或可以俟亦既抱子不終為愚人乎此非質之本愚也乃自以為智盈心悞之耳苟無盈心則溫溫恭人虚以集益足以知其理而成其徳天下豈有夙知而晚成者乎十一章昊天孔昭我生靡樂是托為父兄師保自述其憂勤之意三我字乃立訓者自謂也誨爾四句即上章未知之故補正云亦既抱子承耳提面命而言若曰汝借曰未知亦既抱子而非甚幼矣亦聿既耄承誨爾諄諄聴我藐藐來若曰借曰我有未知亦聿既耄而更事多矣按此既耄二字方有著落十二章舊止即先王之明刑也取譬不逺猶云能近取譬耳言近取先王之明法與吾身所行譬之亦猶是也則天命不差忒而常眷顧矣如回遹其徳俾民大棘則明刑顛覆天命能無忒乎此一章結出敷求先王之意以収全局抑十二章三章章八句九章章十句補正曰小序謂刺厲王朱子發五義以辨其不然但耄期之人使人誦于側以自警則當戒以倦勤勉以克終篇中無一語及此反覆玩索似武公家訓所以示其子孫也按此亦泥國語九十五歲作懿戒之言其實此詩作於武公初即位之日托為父兄師保之言以訓己者因而諷王也桑柔芮伯刺厲王也朱子以詩有滅我立王之文疑作於共和之時信然也是時厲王居彘宣王未立人情洶洶思亂篇中所言民之貪亂寜為荼毒民之罔極民之未戾皆指此也周公召公保䕶太子一意調停朝政苦于不可太加整頓賢奸苦于不可太加旌别稍渉意氣國家之事大壊然罪人漏網復肆彈冠萬一營入政府又是亡秦之續盖流彘之事人徒知衛巫監謗禍由民變而不知貪夫致之芮伯語語為民出脫歸責小人聲罪作歌傳播中外于是人心稍定奸人畏誅十四年二公得以展布其共和之力而無有間之者或亦賴于是詩之作歟共和者猶云協恭和衷也竹書創為立共伯和為君之事偽書之誤也一章厲王不能庇其民而民病民之卒狂皆從病而致瘼字正亂之見端倉兄填兮胡氏一桂云填滿也積也言悲閔積滿於中也補正云古詩憂来填心古賦悲來填膺皆滿實之意二章四牡旟旐傳箋俱指軍旅言之歐陽氏以為厲王無征伐事然觀下章孔棘我圉則此時必有邊圉之急如玁狁西戎荆楚淮北者詩之所有可補史之所遺民靡有黎壯者皆從兵役也具禍以燼僅存者死亡之餘燼耳國步斯頻補正云步頻則蹙亂而易以顛蹶故以為喻三章民為邦本國步之所資者民民病則無所資而天不我將矣天不我助而民困益甚居無所定徂無所往言民無所托命也古義云柄政之君子實為國家之所維繫其持心當以無競為主用養和平之福誰為興兵搆怨之謀以階之厲使從役之民飄泊無定至今如斷梗乎四章土宇鄉土之居室也我代守邊之士自我也邊圉告急則有鋒鏑之憂五章為謀二句陸氏詩學云謀之毖之則亂雖大而自能削平告爾誨爾正謀之毖也能序爵君子常尊小人聴役謀毖而民安矣以執熱為喻胥溺為憂時勢之急真如溺如焚當如何警省起下章之不然六章言君子仕亂世如向疾風而行氣息僾唈而不能舒肅進荓使也皆釋詁文言川壅而潰禍亂已成君子雖有進救之心乃曰時已無及惟農力自給而已所謂菑害並至雖有善者亦無如之何皆不能序爵有以使之也故下章遂言流彘事七章滅我立王流彘也稼穡卒痒饑饉也具贅卒荒一語雙承具贅承滅我立王所謂君若贅旒然也卒荒卒至饑荒也八章不能序爵之禍至於此極故惠君必考慎其相相得人而天下治不順之君自獨俾臧故用小人而天下亂下二章乃切責小人九章當其未敗之時忠臣義士亦嘗痛哭言之無如朋友相譖不能相善雖有言而不入且進則擠之於前退則議之于後無往而不窮也十章瞻言百里者早知有今日之禍也覆狂以喜者安危而利菑也胡斯畏忌謂聖人非不能言胡于此而有所畏忌不言哉特言之無益如下章所云耳十一章言棄善如遺認賊作子讜言不能入矣民之貪亂皆忍心者廹之民亦以忍心相應所謂俾民卒狂也十二章此上三章皆言進諌於王而小人蔽之此章又將良人與不順並提以起下二章良人未嘗不進言于不順者上不見聽于君下復見怒于友也詩緝云大風損物喻小人也其來必有隧道必從空大谷中喻小人乗虚而至也蘇氏云征行也垢穢也言善人之作也以用其善小人之行也以播其穢征垢發其中有之穢于外也十三章不順者貪人也以大風之損物喻貪人之敗類聴言則對誦言如醉箋云見道聴之言則對答之見誦詩書之言則冥臥如醉也既不能用其良矣反使良者而從我之悖其中垢而敗類如此俾我悖如董卓招致蔡邕王叔文之締好八司馬是也十四章朋友指貪人所謂及爾同僚也既之隂女反予來赫我以言告女是往隂覆于汝汝反來加赫然之怒于已也十五章傳云凉薄也箋云職主也兩章三職字正應誰生厲階誰字言民之所以貪亂不知止者由主為凉薄之人工為反覆凡不利于民之事為之如弗克勝民之所以回遹也言職競又言用力謂十分出力致之盖民之叛王實由小人非盡民罪以見罪之無可逃也起下章雖曰匪予之意十六章民之變至今未定冦盜充斥實由盜臣之為冦也今日者凉薄之人僉曰不可用以其反覆善詈也詈君子而盜主柄以為民冦真盜臣矣而彼猶曰王之暴虐使然匪予致之然我既作歌以揭其隱情狀暴露烏得而揜之哉桑柔十六章八章章八句八章章六句雲漢仍叔美宣王也宣王承厲王之烈内有撥亂之志遇災而懼側身修行欲銷去之天下喜于王化復行百姓見憂故作是詩也箋云從此至常武為宣王之變大雅美宣王者詩人體王側身修行遇災而懼之意因托為王自言以美之也補正云首章靡神不舉虚言之以發其端也次章乃備舉所用事六章則追思歴年承祀之恭而冀神無怨恫也始呼天而訴之繼疑上帝之不臨而后稷之不克救繼求助于羣公先正繼望哀于父母先祖终則歸命于昊天上帝而望其虞求其惠始言民之無辜繼厥躬受其𤯝繼痛民無孑遺而先祀將摧繼懼大命將傾靡瞻靡顧而無所逃遁終則言大僚庶正左右親近莫不同心急民病以格天心人苟無棄其成天或終惠以寜言之序如此一章寜莫我聴言豈莫我聴乎而旱如故也則我必有以獲罪者矣以起下章寜丁我躬之意二章寧丁我躬蘇傳云與其耗斁下土寜使我躬當之無使人人被患也三章如霆雷之畏正自己冩出兢業情狀盖以周室中衰所餘已無幾人又繼以旱則無有孑然獨存者是天不以餘黎與我也胡不相畏乎併先祖之基業亦將摧敗所以兢兢業業之至也説本補傳四章云我無所言兢業之至臣民皆云王置身無所矣我之所以如此者以大命近而無處可以瞻仰顧望也故下文呼父母先祖而欲其哀之五章蘇傳云宣王所以祈旱者至矣而莫之答故曰苟吾不當天心則寜使我遯去以避賢者無以我苦此庶民也六章言民命方急當勉力救之有畏懼而不敢去者但不知天何故寜病我以旱而不恤我也虞者度其平日祈年方社之誠意也敬恭明神宜無悔怒猶舜竭力耕田供為子職我罪伊何之意非漫為自信之辭也七章凶年必殺禮故臣鄰渙散而無紀綱俚里通用訓作賴字盖人君所賴以祛旱者自郊徂宮禳于臨時祈年方社行于平日尊則上帝親則后稷助我則羣公先正恤我則父母先祖今皆不可恃至于庶正冢宰趣馬師氏膳夫左右無不周救不敢止息則舍此更無他術矣而旱猶如故于是仰天嘆曰我將何所倚賴乎八章言大夫君子何所求而為我感格天心乎使百姓安而庶正以定也曰為我引為己責不敢以為共有之事也瞻仰昊天曷惠其寜箋云渴雨之時也得雨則心安雲漢八章章十句崧髙尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉或曰周至厲王王室衰微諸侯肆行賞罸不行于上則褒美申伯為可嘉錫命不行于下則錫命韓侯為可嘉也然俱不足以盡序美字之意宣王時玁狁擾于北王命尹吉甫伐之既平韓侯來朝錫之追貊使為之伯以控制北方荊楚亂于南王命方叔伐走之申甫近于楚足以牽制元舅出封所以威楚也東有徐夷之叛王自將伐之徐方既庭以齊為東諸侯長密邇淮徐因命仲山甫宣布王命即以備徐方者委齊侯盖數賢侯皆有用之才與之圖善後之計終宣之世不聞再冦此以見付托得人而中興之業於斯為盛故六月采芑常武所以美其始崧髙烝民韓奕所以美其終一章詩雖送行而全神俱射著荊楚將宣王命申伯之意曲曲傳出於以見王謀為甚毖而王功為甚赫申甫皆宣王時賢諸侯同有功於王室者故既云維甫及申又云維申及甫二國在楚之北中國之南楚通中國之道也林氏之竒曰申初在王畿内宣王始分封之以扞城王室楚有圖北方之志其君多居於申合諸侯又在焉子重請申呂為賞田巫臣曰申呂所以邑也以禦北方無申呂晉鄭必至于漢然則申甫二國宣王本封賢侯以制楚不謂至春秋而見併于楚也疏云岳降神靈和氣以生申甫正謂徳當神意山神佑之使有賢子孫耳傳云翰幹也箋云皆以賢智入為周之楨幹四國有難則往扞禦之為之屏籓四方恩澤則往宣暢之按此三言已包括申伯甫侯之功而王今日所以付托之意具見于此二章亹亹言任事之勤承上于蕃于宣來南國是式命為州牧使南國諸侯皆奉法承教不敢肆也登周禮注成也補正云猶定也登其民物之數世執其功即世守其政教徵令之常法也盖定其成式然後其功可執三章申伯之封本為彈壓南邦為前伐荊蠻善後計故又複言之因謝作庸表裏江淮扼荊楚之吭天南鎖鑰非申伯而誰四章功事也申伯營謝之事召伯任之上二章言王命召伯此實冩召伯營建事五章路車乗馬即上章所賜者往近王舅補正云呼申伯而告之以之國之期既近故下章承以申伯信邁謝于誠歸按此可以不必改字南土是保南土諸侯保其土宇無相凌奪式之斯保之矣六章徹土田定稅法歸于什一也徹土疆取其什一之稅以供委積也七章周邦咸喜戎有良翰不愧南土是保之命也文武是憲不愧式是南邦之命也八章通篇未嘗言徳而末章特指出柔惠且直剛柔適中也揉此萬邦謂韁索在手控馭得冝其詩孔碩詩中皆國家治安之計天下重逺之任非徒頌美之詞也其風肆好言婉而多風欲其體㑹于語言之外也崧髙八章章八句列國史補曰以世考之召戎之申侯即為蕃翰者之子也申侯忘父之忠以禍王室平王忘父之仇而勤王師以戍母家皆非善繼志之孝子也烝民尹吉甫美宣王也任賢使能周室中興焉宣王命召穆公平淮南之夷而淮徐之叛至勞天子自將其勢亦岌岌矣迨徐夷納欵非有賢侯為州牧坐鎮其間非善後之計也齊太公之後五侯九伯齊實征之故命仲山甫賦命于東而以東諸侯受控馭於齊然則宣王招攜懐逺之畧綢繆桑土之計其美不可勝言矣按通鑑前編宣王五年樊侯仲山甫城齊其時齊侯為厲公暴虐立十二年而被弑不足與中興之業文公即位乃能誅弑君之賊七十人雄才大畧有足敗者故宣王以東事委之也據史記年表文公立于十三年與前編五年城齊之説殊戾盖城齊在淮徐既平之後宣王用兵自有次第未必自將伐徐先諸臣而輕出也前編紀年殊不足信宣王承厲王之亂諸侯往往不知有天子江漢去鎬京絶逺徐方新服齊曹皆有弑君之禍故因城齊之役天子大臣奉使宣布王命巡歴東方侯國考禮正刑一徳以尊于天子此宣王命山甫之意也故城齊之命至後二章始㸃清知前屢言王命乃宣布政教之命也宣王于申伯則命之曰南土是保于韓侯則命之曰幹不庭方而于齊獨無所命者盖三詩皆作于吉甫而此詩送仲山甫之行非送齊侯之行也故不及勉齊侯之事然曰明命使賦肅肅王命仲山甫將之則所以命齊侯者宣王早授意于山甫矣一章天生天子以保烝民復生賢佐以保天子懿徳性成物則天授保兹天子一語為通篇主腦二章天子是若非以順為正也盖訏謨碩畫經乆善後之計克當上心而王使布明命于四方也三章集傳式是百辟當為冢宰王躬是保當為太保盖三公也出納王命以下又今日之新命周室中衰凡事頺惰須一番整頓方是中興氣象出而布政于侯國入而奏事于朝廷吐納賴之故以喉舌為喻四章肅肅王命即賦政之命也邦國若否内有平亂扶危崇善簡惡作用五章不侮矜寡民隱得以上聞也不畏疆禦亂賊不得肆行也二者是賦政中之大綱領六章衮職有闕維仲山甫補之不指平日言如徐方之繹騷列國之僭亂皆衮職闕處使之帖然安靖所謂補之也七章仲山甫出祖以下乃車徒之盛毎懐靡及恐無以稱上意也此章方㸃出城齊之命八章式遄其歸知其必卒事而歸非欲其亟歸也永懐即靡及之懐也以慰其心備陳山甫之才徳足以勝之無不及之虞所以慰之也烝民八章章八句韓奕尹吉甫美宣王也能錫命諸侯北方之國追貊雜處玁狁之强至侵鎬及方深入内地宣王命尹吉甫六月興師可謂急矣玁狁既去因為善後之䇿韓武之穆也其先世封于韓為并州牧而韓侯新立來朝王知其賢仍命為伯為北國之長以榦不庭方者委之崧髙烝民二篇時時提出王命此篇曰王親命之則吉甫所以贈行者其即所以美宣王也歟一章冩韓地廣大富饒先從鎮山説起有倬其道見車書一統北國朝貢皆由此入蕩蕩平平倬然明顯榦不庭方上二篇皆有此意而言頗隱躍此因玁狁諸夷最强故直指以詔之榦者正也無事則正其疆界以安之有事正其罪惡以討之必先正已而後正人故以夙夜匪懈䖍共爾位立其本二章言錫予之典三章言祖饑之儀周自汾王失道諸侯嗣立多不請命王朝宣王鋭志中興韓侯初立士服入見又以先世封圭合瑞于王可謂恪恭守典矣于是侈陳錫予之隆見天朝之寵再言祖餞之盛皆天府之珍厚往薄來燕饗以禮朝聘以時正赫然中興之治顯父之餞奉王命也或云朋友之情或以顯父即蹶父之字又云詩即作于顯父皆臆説也四章言韓侯取妻五章言蹶父擇壻于王朝無甚關係不知侯國富盛禮儀豐備正中興之功遍滿宇宙處介圭入覲君國之始親迎以娶人道之始皆禮之大者也况以强藩連姻畿内之臣而親迎蹶里躬事御輪則平日之恪恭秉禮守典承休于是可見寫得絢爛炫耀于中興氣象奕奕有光孔樂韓土以下言韓國川原之美生物之繁因以見國富政平民安俗美以作諸侯之長儼然北門鎖鑰六章溥彼韓城燕師所完則無須山甫之城齊穆公之營謝自足為天子外蔽原解云今王以韓先祖世為牧伯因其國近百蠻命韓侯以追人貊人奄受北方之國而為之伯教以修其城深其池治其田畆清其稅籍各以地所有或以時入貢此皆牧伯之事也此正榦不庭方作用盖北方甫靖綢繆未雨䖍共爾位以佐戎辟不外此也墉壑畆籍指北國之在服内者獻其貔皮赤豹黄羆指追貊之在九服外者任之專而責之備宣王圖治之心急矣韓奕六章章十二句江漢尹吉甫美宣王也能興衰撥亂命召穆公平淮夷黃氏集解江漢一詩乃召公還師奏凱之日論功行賞之時所作也然伐淮南不知確在何時史記宣王紀但言法文武成康之遺風諸侯復宗周北伐南征事皆失載金氏前編紀年多不可據盖是時淮南北諸夷俱叛王命召穆公先率江漢諸國舟師順流東下擊淮南之夷而王以大軍駐淮上由淮南達徐進討徐方耳故淮南平而淮北亦落膽一章武夫滔滔先以江漢起水勢軍威有聲有色二章孔疏上言來至戰地此言經營四方明是既戰而勝乃經營四方之叛國也按止云武夫洸洸而戰功不及叙匪獨王師有征無戰亦以文徳為重而武功從畧此吉甫通篇之微意也四方指淮夷四方之國從亂者觀下式闢四方自知三章提出江漢之滸言自江漢水厓諸侯無不闢其侵地而定以徹法不獨淮夷也王命召虎盖奉命伐暴即兼有是命至此言之歸美于上也叛亂之地必侵疆越畔厚歛横征召公一時釐正之言瘡痍甫定即奪其侵地非病之也諸務未遑先平賦斂非過棘也盖分土而治什一而稅先王立極故其于王國來取中已耳于疆于理兼承式辟四方徹我疆土來至于南海無不闢之土無不徹之田又不特江漢之滸而已四章武功既成疆理既定王乃命召虎曰南民不沾王化爾來兹土徧布政教厥功大矣爾既開敏其功我用錫爾祉此承上起下之辭五章釐爾圭瓚秬鬯一卣推㤙也告于文人錫山土田加地也于周受命自召祖命言其功即康公佐文武之功其賞即文武命康公之賞也此承用錫爾祉來六章考成也湛露在宗載考是也作為也公謂虎以孫繼祖敢不成召公之功而祝天子之壽又願天子之為文武也又言文徳洽此四國見武功非所尚意其後王師敗績姜戎中興之業頓隳吉甫之慮逺矣江漢六章章八句常武召穆公美宣王也有常徳以立武事因以為戒然篇名常武猶武王樂名大武也然惟不黷武乃能常有此武常武者欲其威武常赫而不可妄有挫折也續序者將常武拆開非是一章皆命皇父之辭皇父南仲之後以卿士而兼太師也二章皆命程伯休父之辭留者如後世設流官以重兵鎮其地處者如後世遷延之役三事就緒王師如時雨之至而不受兵害歸市者不止耕者不變也三章周室中衰淮夷諸國不知天子今者張皇六師黃屋左纛中見嚴威天子焉士卒孰不盡力諸侯孰不用命真如雷如霆雖未至其地徐方安得不震驚乎此冦凖所以勸駕親征也然不善用之便為王振之土木故必舒徐安固而作軍行三十里紹箋云緩也舒徐安行不疾也匪怠緩而遨逰不徐也此王師之敬戒處四章以下俱承有嚴天子來仍執醜虜傳云仍就也箋云醜衆也虜服也就執其衆之降服者夫既降服猶就執之是秦白起之坑趙卒也竊謂醜虜掠得之衆也則執其平日之害民者嚮導者黨賊者而誅之淮浦之歡聲載道截彼淮浦王師之所天子以天下為家王師所至之處即為王師之所有我陵我阿我泉我池氣象此征淮浦從亂之國尚未至徐境率彼淮浦省此徐土興師䇿命之詞觀王謂尹氏一語自見此時未至徐土并未至淮浦也赫赫業業二章則至淮浦而徐方驚王旅嘽嘽一章則至徐土而徐方服末章則所謂不留不處而三事就緒矣經文自明讀者錯㑹乃生枝節五章王旅嘽嘽以下極冩王師之必勝盖天子親臨徐土也濯者洗滌其腥穢而沛以時雨故曰大征六章連説王武王師王旅而歸本于王猷正行師之大主腦允塞推心置腹開誠布公而無詭秘之謀也著此一語以前冩兵威處纔是堂堂正正王者之師來來降也來同無不來也來庭來而稽顙于天子之庭帖然服罪也不回世世稱臣猶云南人不復反矣一歩深一歩以明天子之功四方未平王奮厥武四方既平王曰還歸王師之出全為四方起見武不可黷不留不處無害三農皆王猷中早定之矣常武六章章八句大雅美宣王者盖六篇吾于是而知宣王中興之功也雲漢曰周餘黎民靡有孑遺雖曰憂旱過甚之辭而兵火饑饉之餘户口亦寥寥矣崧髙曰徹申伯土田韓奕曰實畆實籍江漢曰徹我疆土知侵掠兼併横征厚斂無國不然矣城申城齊韓奕曰實墉實壑則知名城之墮溝洫之壊不可勝言矣韓侯之朝而津津稱美則知朝覲之禮闕矣獻其貔皮赤豹黃羆則知方物之貢稀矣而况玁狁北侵荆蠻南擾淮南北又告驚于東使非召虎吉甫諸大賢扞掫于下宣王勵精于上驪山之禍又何待幽王之世哉盖厲王暴虐沈湎燕喪任用强禦培克衛巫鑒謗何異秦之偶語棄市乎川壅而潰流王于彘復欲得太子甘心焉怨毒之于人甚矣哉周召二公口瘏手据者十有四年不過安輯畿内搘拄未亡而邉境之抄掠四方之不庭偭規敗度皆未遑問亦勢有所未能也宣王銳志中興南征北伐威式奮揚諸侯各守典奉法朝貢弗怠至東都之㑹而周道粲然復興然其力為已艱矣乃不終厥徳料民太原不籍千畆殺杜伯而非其罪詩人作刺而不知警至為姜戎所敗幽王繼之周室遂東嗟乎以尫羸之疾用藥石而愈愈而復病病而酖毒繼之有不殞其元氣而速之斃也哉瞻卬凡伯刺幽王大壊也箋云從此至召旻為幽王之變大雅老夫灌灌又曰匪我言耄已非少壯矣今歴年既乆又刺幽王大壊則此非板之凡伯明矣按春秋魯隱公七年天王使凡伯來聘去幽王時又六十餘年殆昔凡伯之後歟一章孔填不寜補傳填塞也天何不惠養我乎使我甚卬塞不遑寜處也二章承上罪辜不収來女反有之是無故而削其土地女覆奪之是無故而據其人民哲夫成城哲婦傾城鄭本掇于此末呂成公改屬下章是也三章匪教匪誨李氏集解曰幽王為人教之誨之藐然不聴其所聴者惟婦人寺人而已丁奉臆言婦有長舌其自此詩倡言乎然亦㤗誓牝雞之謂也夫謂惟厲之階者幽王之厲甚矣申后黜而太子廢家厲也小人盛而刑獄繁國厲也諸侯叛而夷狄侵天下厲也三川竭而岐山崩天地厲也凡此諸厲皆從婦人之舌以為階小雅曰赫赫宗周褒姒滅之而不言其所以滅然則所以滅者此舌耶四章哲婦之窮鞠君子也忮害變忒無所不至始則譖愬以離其交終則背棄以斥之去豈不曰為惡己極哉而王反曰伊何能為慝宜其無所忌憚也五章天之刺王神之不福王者以不忌介狄而忌正人也天責人怒便是不祥記云端冕則有敬色縗絰則有哀色當此菑害並至宜其有憂懼之心慘戚之色方見威儀之類乃賢人正士以為可弔者而安危利菑怡怡自得絶不見憂戚之容故視正人惟恐不逺人亡而國殄矣時尚未有戎禍詩人何以云舎爾介狄盖戎之强宣王之世已然北伐南征東討獨于西戎則委之秦仲孤軍深入最失䇿也卒為戎殱又以兵七千人與其子莊公勝之然未聞西戎之叙未幾王師敗績于姜戎戎之輕朝廷乆矣幽王繼衰其有不駸駸乎窺中國哉然則戎之熖已熾戎之禍已萌凡伯云然驪山之變其殆有以灼見也夫六章即承上文天人並提覆說一過令王惕然自省七章我為王我之也言不先不後自我致之也然自我致之亦自我挽囬之我皇祖以關雎之淑女興周我以梟鴟之哲婦亡國無沗皇祖則去䜛逺色尊賢使能何天心之不鞏神怒之不回也哉瞻卬七章三章章十句四章章八句召旻凡伯刺幽王大壊也旻閔也閔天下無如召公之臣也大壊見天下事不復可為而宗周遂滅也然忠義不死之心未嘗絶望于其主故上篇欲其無忝皇祖此篇欲其用召公之臣孝子之于親也不以疾不可救而不藥忠臣之于君也不以國將亡而不言其心一也篇名召旻旻閔也哀也哀天下未嘗無召公之臣而王不能用此凡伯作詩之意也一章篤厚而力也其降喪亂厚而力斯謂之疾威箋云卒盡也荒虚也國中邊陲無民則空虚矣諸侯安得不叛四夷安得不起末章所謂日蹙國百里是也二章以其害正人故謂之蟊賊訌潰也蟲食禾于内則禾潰小人構䧟于内則君子亦潰以其呶亂國政剥喪元氣故謂之昏椓共恭同靡恭肆行無忌也以其心術邪僻故謂之回遹潰潰泯亂也皆天降之罪罟以羅天下之善類也王不去之而反用之以安定我邦降喪之所以日篤也實靖夷我邦由于不知其玷耳以佞為忠必以忠為佞而賢人貶斥四章舉錯失宜民受其害居圉所以卒荒也如歲旱之時草安得茂又如水中浮草流亡轉徙無所依泊我相此邦亦無不潰止也民逃其上曰潰潰茂補傳云潰敗也草不敗其茂乎兩潰字無異義五章彼疏斯粺箋云彼賢者祿薄食麤而此昏椓之黨反食精粺女小人何不自廢退使賢者日進乎兄况同滋也原解云乃專主滋甚為害日引長而無已也六章池與泉有由竭喻亂有由生孰生之小人生之也今為害己深而猶專滋矜大獨不思亡國害亦及其身乎所謂癰疽既潰而大命隨之我代小人我之也七章日闢國百里人心歸附三分有二或疑有礙文王臣道不知立言在有天下之後也不尚有舊非無耆舊之臣如召公者而王不能用可哀也召旻七章四章章五句三章章七句陳氏傅良曰周南係于周公召南係于召公豈非化之盛者必有待于二公也至于風之終係以豳雅之終係以召旻豈非化之衰者必有思乎二公也蕩之什十一篇九十二章七百六十九句詩序補義卷二十二
