body:
  text: 詩序補義卷二石泉縣知縣姜炳璋撰召南説見周南鵲巢夫人之德也國君積行累功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉夫人于歸知其有德者以被文王后妃之化也桃夭女子猶曰宜家况享此百兩之盛禮者乎國君以下學者附益之辭或曰桃夭眀言宜其室家此不眀言之盖此之子夫人也不比周南民間之女子夫人云之子未成禮也作詩之人國人也國人稱其夫人且百兩甫至試問于何處説起不比民間女子可以宜家盡之故但陳禮儀之盛扵欣羡之中寓想像之意詩人之慎也一章詩人但言車馬之駢闐輿従之炫耀夫家以此迎母家以此送所謂爛其盈門者而之子安然受之無愧則其德宛然可思三章箋云盈之衆媵之多集傳因之則已将下成之之意説盡故下云成成其禮也其禮即指衆媵言之盖諸侯一娶九女所以廣𦙍嗣防淫泆也今諸娣之盛若與車馬之美互映是禮儀周備更無㡬㣲虧闕處故曰成也大雅美韓侯之娶妻曰諸娣従之衛風美荘姜之來嫁曰庶姜孽孽皆謂此然姪娣軰行不同而共事一夫非先王之制也故詩但言諸娣箋謂衆媵姪娣為春秋亂制所誤耳鵲性不淫而難偶善扵為巢有苞桑之固故以喻諸侯鳩性均一而享成巢故喻夫人鵲巢三章章四句采蘩夫人不失職也夫人可以奉祭祀則不失職矣此夫人能奉祭祀其家人美之之詩家人即宫人也或以為夫人親蠶者非夫人不獨薦豆薦豆不獨蘩夫人服翟服副不獨被而詩人于備物上偶拈一蘩于佩服上偶拈一被于助祭上拈一前一後盖即此以例其餘一章曰用之猶未用也曰之事猶未事也未用而常想其用未事而常想其事純是一叚誠敬心二章上章言所用之事此言所用之地重疊叙出便見夫人慎宻之心兩提公侯不重在與公侯合敬亦不重與公侯敵體盖作詩者従賢夫人心上體㑹出來見時時以此事為公侯之事以此地為公侯之宫一器一物稍不盡慎便是失職将下章僮僮之敬祁祁之儀盡攝于此三章後序以祭祀為夫人之職朱子因之又存親蠶之説按蘩有水有陸水産可為葅如左傳蘋蘩蕰藻之菜是也陸産可飼蠶如七月采蘩祁祁是也然俱當斡旋被字夫人助祭服副不應以被疏因解夙夜在公為視濯于夜視饎㸑于正祭之夙則夙夜既倒而義亦未安蠶事告桑當服編受繭服副俱不應服被何氏古義以為三夫人世婦之服然序以不失職指夫人而属之妾御蠶桑正夫人之事而曰公侯又以宫廟為蠶室似俱牽合竊謂此當指祭祀被者夫人齋時之首服也按祭統先期旬有一日宫宰宿夫人夫人亦散齋七日致齋三日君致齋扵外夫人致齋扵内然後㑹扵太廟疏云外謂君之路寝内謂夫人之正寝后夫人有正寝亦有燕寝追師疏云不至王所居燕寝是也在公謂在公所言齊宫也謝叠山謂齋廬之類君以路寝為齊宫夫人以正寝為齊宫公對私室而言夙夜者自夙至夜言散齊致齊無日不在此也在齊宫而夫人首服以被者玉藻云𤣥冠丹組纓諸侯之齊冠也張謚圖天子齊𤣥端𤣥冠𤣥裳諸侯惟佩山𤣥玉為别聶氏三禮圖婦人褖衣之黑始因男子之𤣥端亦名褖衣則君之齊服𤣥端夫人之齊不褖衣乎君之齊為𤣥冠則夫人之齊不服次乎追師掌王后之首服為副編次註副以覆首若今步摇服之以従王祭祀編列髪為之若今假紒服之以桑次次第髮長短為之所謂髲髢服之以見王后之燕寝亦纚笄總而已按内則疏男子笄總後加髦著冠則婦人笄總後加次或加編加副随地為之也夫人齊于正寝既不可如祭時服副褘又不可服告桑之編如笄總而已何異燕寝之地首服以次如見君然故被者夫人齊居之首服也薄言旋歸箋云祭事畢夫人釋祭服而髲髢其威儀祁祁而安舒無罷倦之失還歸自廟及其燕寝已含正寝釋服一層釋服者非廟中即釋其服也玉藻朝服視朝于内朝退適路寝聽政使人視大夫退然後適小寝釋服是朝服釋于小寝則祭服釋于路寝矣夫人之祭服亦當釋于正寝矣若于廟中釋之亦于廟中取之喪大記所云取衣者以篋非祭禮也故知詩言旋歸自正寝易副以被歸于燕寝也乃知僮僮齊時之敬見于正寝者祁祁則自正寝而歸不忘齊戒之初也采蘩三章章四句草蟲大夫妻能以禮自防也按召南十四篇言禮者二此云能以禮自防防男子有無禮之汚也野有死􅍪惡無禮惡女子不以禮相見也坊記禮坊民所淫章民之别故男女無媒不交無幣不相見恐男女之無别也是時紂惡腥聞淫風大熾文王之化及于南國風為丕變民間女子連姻貴室廟見之後追想従前蔦蘿未附六禮未成保無有强暴相陵憂如之何設或此身一敗傷如之何真所謂以禮自防者也小雅亦用首四語盖指諸侯之思南仲恐為西戎侵侮意正與此序合一章詩言草蟲之鳴喓喓然則阜螽之躍趯趯然物各以類相従也按昏姻六禮惟親迎始見君子第一既見見其親迎也奠鴈御輪以禮遇之故以蠜興已而以負蠜興君子喓喓聲之和也躍而就之陽下于隂也二章既見則俟于門外揖以入也三章既見則合卺而飲同牢而食也故以已所經厯之地采蕨采薇為興不棄葑菲之意也傳云説服也其心安焉勤儉孝恭将帖然為之天下極足傷悲者失身非類欲自湔祓不得故嘉禮未至貞女之憂也俯仰古今如雄之于莽邕之于卓彧之于操皆召南女子所為傷悲也夷平也敬戒之意従此始悲傷之憂従此平草蟲三章章七句采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣法度祭祀之法度也陳少南云采之有常地盛之煮之有常器奠之有常室主之有常敬謂之能循法度序曰能循法度經曰有齊皆美之也傳箋因季女字遂謂未嫁時教成之祭則所謂大夫妻能盡祭祀乃是預推他日嫁後事不知季女猶云少婦婦女通用詩中甚多王肅云此篇所陳皆大夫妻助夫氏之祭也連用五于以末用一誰字節節注著季女正節節繫動有齊采之自當盛盛之自當湘盛自當于筐筥湘自當于錡釡何足異然包得無數滌濯之事措置之方生熟之節正是有齊見端處或云宗子主祭則薦豆者當為宗子之婦大夫妻似不足以當之不知此季女即宗子之婦宗子即大夫也其云宗室亦猶諸侯夫人云在公耳朱子以季女為主婦是也風人之㫖未嘗直率亦未甞含糊如采蘩提出公侯其為夫人可見此提宗室其為大夫妻可見奠置也獻也盖已薦之矣故曰有齊季女采蘋三章章四句郝氏敬云編詩者首鵲巢君夫人初嫁也次采蘩即君夫人之職草蟲大夫妻初嫁也次采蘋即大夫妻之職按左傳濟澤之阿行潦之蘋藻寘諸宗室季蘭尸之敬也若為此詩眀下注脚而何氏楷云有齊季女齊國少女太公望之女邑姜也何氏附㑹多類此甘棠美召伯也召伯之教眀于南國序言美召伯左傳云思其人猶愛其樹詩㫖備矣史記乃云决獄樹下韓詩云不忍勞民廬于樹下以聽政鄭箋述之又因下篇創為召伯舎甘棠以聽男女之訟不知舎甘棠云者布政之時循行經厯偶然憇息草舎以居非必于此聽訟又何以知為男女之訟也詩當作于武王之世而召伯之舎當在文王之時所謂去後見思也周公編入召南耳劉元城小傳曰説者謂不重煩百姓止舎棠下是墨子之道也朝廷宫室乃是中庸之法安可如是以干譽哉伯長也曲禮五官之長曰伯王制分天下以為左右曰二伯即周召分陜之謂也周禮八命作牧九命作伯有方伯則八命之牧也有伯爵七命之伯也有州里之伯内則所云州史獻諸州伯者也夫安知文王之時召公不為州伯乎或以為伯仲之伯非是或謂遷善而不知者王民也何以于召伯思之如是盖赤子在慈母膝下顧我復我習焉而忘一旦音容濶絶則魂夢相依精神俱切南民于召伯類是甘棠三章章三句説苑子曰吾扵甘棠見宗廟之美也尊其人敬其位古聖人之道幾哉金罍子曰甘棠召公之所茇也公則己矣人猶不忍拜之况翦之乎齊景公之槐也嚴刑禁之置吏守之而人傷之不足以蔽所愛也夫思堯者見于墻而特棠耶怨紂者喪及日而况槐耶行露召伯聽訟也衰亂之俗㣲貞信之教興强暴之男不能侵陵貞女也美召伯之能聽訟也一章或云守禮所以有訟非也盖不解其何以致訟也下二章或云男女對訟非也盖既訟而深幸其事之得白也一章傳云興也以露之沾濡喻非禮之汚辱乃自述其平日守禮以興起下章速訟之誣傳云厭浥濕意行道也言厭浥然道有多露豈不于早夜之間凛然自謂曰道有多露不可行也我之自守如此玩豈不字謂字是被强暴一番見誣而深望昭雪口吻夙夜人所不見最幽宻處提出以槩生平凡一言一動稍涉嫌疑皆多露也二章三章若未有媒聘則决是獄者不必召伯凡毅然有所執以為訟者必自有一種似是之禮兾以動聽故箋云媒妁之言不和鴈幣之來强委之如左傳徐吾犯之妹公孫楚聘之矣公孫黑使强委禽是也将謂其無禮彼云媒行禽委矣然雖有言而不和雖有幣而强委非召伯聽之鮮有不惑于疑似者無情之辭全恃利口以似為真㡬令貞女無以自白故雀之穿屋恃有咮也何有角鼠之穿墉恃有齒也何有牙以喻男子似是之禮恃有口也其實未嘗有禮也家謂女氏受禮而以男為家也故但言家而受禮一層自見誰謂汝無家乎無家則不敢訟矣今何以速我于獄也然雖速我于獄而治獄者曉然知汝室家之禮之不足也下章云雖速我于訟而聽訟者亦不従汝非禮之禮也上有眀允之吏則下無覆盆之寃嚴霜白日其凛凛于夙夜者不有以自全哉行露三章一章四句二章六句羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也羔羊鵲巢所致猶周南云兎罝后妃所致也夫人有鳲鳩之德則諸侯之家齊家齊而朝廷正故在位之節儉正直皆鵲巢所致也朱子辯説云序説得之緇衣羔裘大夫之朝服退朝時釋服表裘紽緎總皆裘縫也素絲合絲成組為裘縫之飾也五則縫之數也羔裘色黒故飾以素絲非獨召南之大夫為然安見其節儉盖上三句正形容委蛇委蛇一句而節儉正直已寓節無過不及儉節制也非儉約之謂也心體中一毫侈肆則粗鄙躁率形焉安能従容自得左傳穆叔引此詩以譏林父之慢意亦如此然非有正直以為之體則立心邪曲所謂貴而益謙與慢同醉而益恭與傲同以其偽飾于外也故末句節儉正直四字俱到以羔裘引起如赤舄几几之美周公義不繫乎赤舄也衮衣章甫美孔子義不繫乎章甫也即一冠一履而全體宛然此風人之㫖也箋以退食為减膳疏以羔裘為節儉則晏嬰之狐裘三十年趙盾之食魚飱不且髙出扵召南大夫哉傳云古者素絲以英裘不失其制疏云織素絲為組紃以英飾裘之縫中急就篇云紃褖履之圓絛扁者為組圓者為紃合組為一縫之飾也胡氏一桂云縫之突兀為紽有界限為緎合二為一為總皆取黑白别處為義也其實紽緎總即是縫言羔羊之皮五縫耳每縫則素絲為組飾之非紽外别有緎緎外别有總也集羔皮以成裘縫亦不一其以素絲為飾者則或五或三隨所宜用之鄭風三英粲兮是也孔疏云羔裘卿大夫之朝服諸侯視朝與卿大夫同服羔裘而以為同服麑裘者非也崔靈恩謂天子諸侯朝祭之服先著眀衣又加中衣又加裘裘外又加裼衣裼之外乃加朝祭之服賈孔並因其説其實非也盖裼衣即緇衣緇衣即朝服也玉藻言諸裘皆有衣以裼之又言君在則裼盡飾也臣之見君必朝服則裼衣即朝服也士冠禮云主人𤣥冠朝服註朝服十五升緇布衣也不言色衣與冠同則知朝服之為緇衣矣古者禮服皆直領無衿裘上衣裼衣胸前裘色自㣲露故曰見美又曰盡飾若非朝服于裼衣外加衣揜之謂之襲使其美充于内故曰充美也玉藻云表裘不入公門襲裘不入公門則裼裘乃入眀矣表裘襲裘之非朝服眀矣古裘與今異毛表而革裡也有反裘而負薪者孔子曰皮之不存毛将安附此其證也詩言羔裘盖退朝之時不可朝服以居故釋朝服而表裘則見其五紽五緎歴歴如此或曰論語狐貉之厚以居又曰褻裘長盖彼為平日之燕居此則退朝之燕居也羔羊三章章四句殷其靁勸以義也召南之大夫逺行従政不遑寜處其室家能閔其勤勞勸以義也盛世之思婦與衰世不同衰亂則行者有死亡之懼居者篤思念之情君子閔而録之因以為輕用民力者之戒若二南之世因材而使不比北山之従事獨賢也及期而代不比于役之不日不月也簡書是奉每懐靡及而為室家者睠念征人勸之以義于以見王化之行也况此詩行役箋云施號令于四方疏云在四境之内非如汝墳之使紂也一章雷以喻人君之威命山南曰陽南山之陽則行役大夫循歴之處上斯指此地下斯指此命遑暇也風俗之醇漓民生之疾苦皆君命所及何斯地而可違斯命也凛君命如凛天威其敢或暇乎婦哉歸哉以稱職而言旋者兾之也二章南山之側比南山之陽尤近大夫駐節之地也而殷然之雷如在左右則現在之經營朝夕之晉接皆闗國計民生上莫敢惕于心也此莫或勤于事也三章雷在山下即在身上舉首即是真不違顔咫尺矣敬天之畏莫切于此莫或遑處則寝處不暇也古人敬天威雖夜必興衣服冠而坐敬君命則夜以繼日坐以待旦皆莫或遑處之義也三章步步加切纔見周南婦人勉之以義或云振振信厚也信厚之人恐其措置或未盡善故慮之其言是也又云信厚之人既能盡力朝廷又能眷念室家嗟乎念身家肥妻子戀戀枕席所在皆是而盡力朝廷者誰歟况心無二用未聞一心為公復一心為私也殷其靁三章章六句摽有梅男女及時也召南之國被文王之化男女得以及時也序云男女及時及男女少壮之時非及一年婚嫁之時也傳謂男三十女二十為及時是也箋以四月五月六月分此三章無庸矣此非女子自作也補正云女子之嫁也行不辭誡不誥所以逺恥至曰迨其謂之抑甚矣箋云我我當嫁者夫一女不嫁何勞旁觀者之亟亟李氏詩所云女子自言歸期将近傷離父母之家如梅之離其本根也摽與標同木末也按此既嫌破字亦于庶士難通惟戴氏溪續讀詩記曰求我庶士擇壻之詞父母之心也宜若不可易矣盖詩人設為女父母之言扵以見男女之及時也男女及時有従正靣説者桃夭是也有従側靣説者摽梅是也之子于歸非桃花爛漫之日迨其吉兮豈梅子摇落之時歐陽氏曰以摽梅之易殘興芳年之不再卜吉而來此其時也䟽云十分之中尚在樹者七尚在樹者三傾筐取之樹已無實今者六禮自今而來嚴氏云及今成昏陋矣謂之黄氏櫄曰媒妁之言也通以詞己定其人則六禮可以後備箋謂男女相奔不禁則誣矣摽有梅三章章四句小星惠及下也夫人無妬忌之行惠及賤妾進御于君知其命有貴賤能盡其心矣此猶周南之樛木也然樛木是従旁靣説只言文王受福而夫人之賢可見此従對靣説只言衆妾進御而夫人之賢亦見縷縷叙來用實字一點以見心安意順固非援命自解亦非幸造命有人盖夫人被后妃之化惠下出於自然衆妾亦被夫人之化承恩習為固有無勉强無驚喜而王化之薰蒸久矣補正記妻不在妾御不敢當夕言夫人所當之夕若以故不得進御則衆妾不敢當此夕也朱子所引疑誤此偶舉在東在西之星以眀見星而往見星而還耳盖因所見而賦其事也泥定比興則説多牽合裯傳云禅被也箋易為床帳盖恐與衾複容齋隨筆謂床非一已所致良是盖或衾或裯隨所宜進之故抱者兼焉悲愁者援命自安此偏於承恩處用之榮遇者稱命自矜此偏于貶損處用之媵妾當以天子一娶十二女諸侯一娶九女為正鄭氏注周禮言進御之法月之初卑者先尊者後八十一御妾當九夕二十七世婦當三夕九嬪當一夕三夫人一夕后一夕凡十五日而徧望後反之尊者先卑者後五日之御諸侯制也媵當四夕夫人専一夕凡五日而徧也羅氏願曰以王后之尊下與庶妾更進迭退其為降也甚矣汪堯峰曰人主之身非金石雖淫慾不道之君不至此曾是周公輔成王以是導之哉吾謂九嬪世婦女御與女酒女漿之屬統於太宰皆宫中之職左右后妃以供事非進御於王者也小星二章章五句江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也序以小星為専美夫人則推作者言外之㫖也江汜為美媵之無怨是作詩者并無此意乃推録是詩者之㫖也國史熟知當日事情故精確如此不我以者不以之備五日之御也自續序謂不以其媵備數箋云使已獨留不行朱子因之未改按諸侯一娶九女自有常典嫡雖妬忌豈能不備數以貽笑夫家故伊川東萊説此詩皆無待年之説何氏楷云媵者送昏之名史記載伊尹為有莘氏媵臣春秋執虞公及井伯以媵秦穆姬初不言某國之女為某國之媵妾也非然也媵送也従女子之嫁也有以男子為媵者如井伯是也謂之媵臣有以女子為媵者公羊所謂一娶九女二國媵之是也謂之媵妾衛風云庶姜韓奕云諸娣皆媵也盖諸侯之女原不為諸侯之媵如宣姜之女一適齊桓一適宋桓一適許穆未聞衛矛歸齊而以宋許兩夫人為媵也媵止取給于一時或踈賤之族以充其數必非諸侯之女亦無姪娣兼媵之事夫何疑于序之言媵哉傳云決復入為汜本爾雅釋水邢昺疏凡水之岐流復還本水者名汜據此則汜非水名謂水自江出而復入于江故曰汜也文王之化及江漢之間詩固得於江漢之間也一章蘇氏轍曰江則有汜嫡則有媵而之子之不我以何哉其後必悔矣盖不敢怨而俟其悔耳黄氏震曰岷隐云不我以正是置之于無所與事之地非遇勤勞也已乃寛釋曰久當自悔不必過為戚戚也無所怨尤此為媵之美此説得之決出而復入者水之常也見棄而復容者事之常也媵但兾以理之常而不計夫情之變是媵事嫡之心也二章與許也今雖不我許其後也必有以處我矣三章嘯歌岷隠指媵則三其字異義盖言其後也為嫡者必且蹙然而嘆快然而歌有不自知其所以然者然則媵之于嫡如孝子事親忠臣事君自盡其道以兾其心之一悟過之一改也勞而不怨媵之美大矣集傳引陳氏惠不及媵妾而媵妾不怨則亦未嘗不以為美媵也江有汜三章章五句或曰文王之化何以被于媵而遺于嫡夫瞍可底豫象不格姦况此被化之嫡哉盖編詩者録小星以為嫡夫人之法録江汜以為媵妾之法各舉一詩言之非謂媵可美而嫡終不變也故讀行露知强暴之必悛心讀江汜知夫人之定遷善野有死麕惡無禮也天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也南國被文王之化淫風一變人見女子之無禮者則深惡痛絶之也死者自死之物腐穢不堪不比田獵所獲猶可充君之庖也故為廉恥不存穢迹著聞之喻樸􅈪不材之木故為狹邪惡少之喻左傳趙孟云武在此尨也可無吠以尨喻公子圍此以尨喻淫女以尨之吠喻淫女之惡言皆惡惡嚴峻之辭一章麕鹿皆淫獸且至死腐尤可賤惡也而白茅包之必不然矣包茅為宗廟縮酒之需即尋常玩好猶不藉用况死麕乎懐春猶云懐昏姻也春為天地交感發生之時故以懐婚姻為懐春情欲動於中不顧禮義亦一死麕也而吉士誘之乎吉士具白茅之貞潔即良家女子決不牽誘而况懐春之女乎二章然則懐春之女其相牽誘者不過狹邪之匪人猶之與死鹿相比附者無非叢雜之樸􅈪故樸􅈪中有死鹿焉宜也而謂白茅純束之無是理也此只説得喻意一邊而正意已見獨不觀有女如玉者乎三章此如玉者見懐春之女早舒緩徐徐而退也若曰無致近吾之身使我急行而動我之悅也身相近則語相接無使其言若尨之吠得汚吾耳也夫是以見其欲來而早避之也此與行露于二南别出一局盖二南之風極含蓄而行露章詞意俱盡則以訟獄之後還我清白也二南之風極和平而此篇聲色俱厲則以惡惡之甚若将凂已也盖以二詩所處之地不同也召南之大夫委蛇委蛇有節儉正直之風召南之女子舒而脱脱有端荘静一之德儀容動履乃德之符是以君子敬慎威儀野有死麕三章二章四句一章三句何彼襛矣美王姬也雖則王姬亦下嫁于諸侯車服不繫其夫下王后一等猶執婦道以成肅雝之德也史氏榮風雅遺音攷石經毛傳鄭箋蘇解吕記嚴緝穠並作襛今經文不知何時遂改作穠集傳尚仍毛氏戎戎之説則當朱子解時猶是襛字可知襛字是従華看出肅雝従車看出肅秩然有序也雝和也所謂和鸞雝雝是也詩人意中早有文王之化在曰文王之孫可知恪守者有文考之家法漸摩者有太姒之徽音故有此車中之人宜其車聲之肅雝也集傳下見其車者四字極穏通篇俱在詩人觀望中著想徐氏光啟曰曷不二字宛然道路聚觀企踵盱眸相顧歎賞之語一章側重王姬言王姬之車而不言所適何國故但美王姬二章指言平王之孫下於齊侯之子如桃李之花兩相輝映也盖兼美之先言平王之孫君臣之分也三章側重齊侯之子盖以嘉魚比王姬而以絲緜比齊侯之子也釣者維絲合而為緜然後得嘉魚娶者為齊侯之子然後尚平王之孫先言齊侯之子倡隨之義夫婦之道也鄭氏樵謂為詩之時則東周采詩之地則召南也鄒氏忠胤辨之曰黍離既作召南故地已非周有天家歸妺何與雍岐舊民事穠李之歌不與條梅並奏審矣頋安得采于其地或又以齊侯為襄公諸兒以春秋書王姬歸于齊也名物鈔云桓十四年齊僖公卒襄公諸兒立立五年平王太子洩父之子桓王崩荘王立歸王姬在荘元年時齊襄已立五年矣王姬為荘王之女則詩當云齊侯而非齊侯之子當曰桓王之孫而非平王之孫也或又以齊侯之子為桓公小白以荘王十四年共姬妻齊桓也考齊桓父僖公兄襄公則桓乃襄弟桓公立三年王姬歸齊則不得言齊侯之子也又彭汝礪奏疏引此詩云惟有平德故人化之惟有齊德故人畏之然亦難通文王以前未有諡平者故詩人偶以此稱文文王稱平王猶武王稱寧王安得預為東遷之平王避也若齊封國在武王世豈得于他國公子而云齊侯之子傳云武王女文王孫適齊侯之子其定論歟然則齊侯之子何人也或曰太公之子丁公伋然武王娶太公女邑姜伋與武王女為甥舅行不可以婚若其後世則又非周公編二南之年且非武王女矣周公之薨在成王十有二年太公于成王發金縢猶在則其卒當是周公東征以後或據偽竹書康王六年齊太公薨者非也丁公吕伋與邑姜為兄弟行可知武王之少女當適于伋子乙公乙公為世子而伋為之娶故曰齊侯之子是女為文王之孫男且為太公之孫緝熈之漸染敬義之薰陶嘉耦相形如桃如李正不徒以顔色及時令人嘉歎也諸兒何人敢汚聖人之册哉何彼襛矣三章章四句騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也騶虞為鵲巢之應者謂騶虞之詩為鵲巢之詩之效也後儒以為有闗雎之德必有麟趾之瑞有鵲巢之德必有騶虞之瑞而春秋絶筆適值獲麟于是䜟緯符命駢肩接踵雖董仲舒劉向猶惑焉何怪新莽之八十篇哉皆由錯解序一應字以致矯枉者并騶虞而疑之也不知此篇但言王道流行樽節愛養庶物蕃蕪即取物之際存愛物之仁其仁心之自然真如騶虞矣騶虞不殘生物之獸取以為至仁之喻召南諸侯行春蒐之政雖有五豝五豵之多徒御左右皆一發不忍多殺盖人人各具一諸侯之仁而仁風洋溢如以一發専属諸侯亦不過齊宣王之殺牛魏文帝之全麋耳而公徒三萬遇物即殺又安見諸侯之仁集傳不待勉强言不必三令五申而人自喻之盖至仁之世無一物不得其所徹上徹下渾成一太和宇宙周家八百年丕基至此已無憾故曰王道之成也古者一發四矢如詩言四矢反兮四鍭如樹及孟子發乗矢是也然皆非謂四矢並發也故疏云五豝一矢殺其一而已或云殺四逸一者非也箋云戰禽獸之命戰争也令禽獸各争其命班固西都賦矢不单殺中必叠䨇集傅用其文謂四矢五豝盡殺之知必有叠䨇者詩以寡殺為仁箋疏為優𥙷正云豝隠深葭之中一豝負矢其羣皆奔故一發而五豝齊見也騶虞二章章三句程子曰二南者正家之道也盖舉一夫一婦莫不有文王之德焉周南十一篇其言婦女九召南十四篇其言婦女者十一鄭氏曰二南房中之樂也后夫人諷詠以事其君子故其詩多閨房循禮守義之言而不徒為思婦勞人之作周公録之以為後世法盖后夫人大夫妻士庶人之婦必如是而後家齊也家齊而後賢才多朝廷正故兎罝羔羊録焉周南多眀言后妃而召南録甘棠一詩以見諸侯之齊其家皆召伯之教也以麟趾終周南則闗雎之化成也以騶虞終召南則鵲巢之化成也此文王之德化洋溢而無不遍被歟或曰召南不如周南之序何也時有先後地有逺近因所得以為次聖人删詩亦仍其舊耳王氏栢删去甘棠死麕何彼襛矣三篇求配周南之數如其然則聖人早去之矣召南十四篇四十章百七十七句詩序補義卷二
