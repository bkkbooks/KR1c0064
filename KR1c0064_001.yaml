body:
  text: 詩序補義卷一石泉縣知縣薑炳璋撰詩國風舊本言毛詩國風陸氏德明云詩有齊魯韓三家故題姓以别之或云大毛公加毛詩二字或云河間獻王所加孔氏云詩國風舊題也毛字漢世加之按易稱周易以文王周公孔子而名傳不得擬經故書不稱伏詩不稱毛尊經也或曰孔子刪詩乎曰然然則古詩三千仲尼刪之為三百乎曰史遷言古詩三千信有之而云刪為三百則非也古者自朝會燕饗以及陳善納誨皆有詩令太師歌之為君德之助而閨門里巷勞人思婦亦莫不以詩寫其性情采詩之官復陳于天子以考見列國政治之得失其所傳何止三千哉今所載正雅美文武成王而無康王之詩變雅刺幽厲而夷懿以下無雅殷室三宗而太甲獨無頌衛有康叔齊有太公丁公陳有胡公唐有唐叔皆始封賢聖之君而諸風無一詩及之豈得云古詩之舊哉然則三千餘篇古之全詩也東遷而後西京文物蕩于兵火且更歷數百年守缺抱殘旋復遺佚故正考甫得商頌十二篇至孔子時僅存其五則此三百篇非即古詩之舊曉然也詩既散亡存者又殘缺失次夫子自衛反魯乃取而刪定之為三百十一篇有斷簡賸句不成片假者則去之如史傳所引用一二言是也有美不足法刺不足戒者存之恐為後世人心之纍亦去之如唐棣之華是也可知衣錦尚絅素以為絢未必鄭之丰衛之碩人也誰能秉國成詩本無能字殷鑒不逺在于夏后之世詩本無于字皆學者諷詠之訛豈必篇刪其句句刪其字也哉不然詩為樂章而刪其一字一句不足以入音律矣則歐陽氏之説非也堯夫謂諸侯千有餘國風取十有五不知季札觀樂時已歌十五國風矣其説亦非也然諸儒云孔子有正樂之功無刪詩之事則又未敢信也彼謂于禮刪采齊則堂上有儀而門外無儀于射刪貍首則天子有節而諸侯無節于燕刪新宫則歌有詩而管無詩其説固然然周衰禮廢至戰國而皆去其籍此數詩者或逸于刪詩之後未可知也不得據為未嘗刪詩之證矣夫逸詩之見于左國二戴吕氏春秋晏子春秋國䇿韓詩外傳説苑家語漢書注及諸子所引用者多矣而謂皆逸于孔子之前而孔子皆未之見也可乎故謂三百為成數而所餘不止十一篇説可通也謂古詩止此三百餘篇不可通也謂孔子刪去者必少于三百篇之數其説是也而謂孔子本未嘗刪詩其説非也程大昌詩議詩有南雅頌無國風南雅頌為樂詩十二國為徒詩不入樂今考季札觀樂工歌十五國風詩無不入樂者陸元輔曰風雅頌之名周禮左傳荀子有之表記兩引國風程氏憑臆妄決難免穿鑿之譏矣何氏楷世本古義詩之名風有三義其一者繫乎土五方有性而百里殊風天子巡狩太師陳詩以觀民風者此也其一者本乎上上之人身先之淑慝政教之隆汚感焉漸焉猶風之吹物入物于是乎雅俗乖和其形于謡詠而成風大序所謂一國之事繫一人之本謂之風是也其一者辨乎體列國之風化不齊聲氣雖不類而體則一是故風之體輕揚和婉託物而不著于物指事而不滯于事義雖寓于音律之間意常超于言辭之表大序所謂上以風化下下以風刺上言之者無罪聞之者足以戒是也按十五國風之序周南召南邶鄘衛王鄭齊豳秦魏唐陳鄶曹見于左氏者夫子未刪以前之次第也若今詩所編則刪後之次第也以聖人手定之次豈無意乎卓氏爾康之砭諸説當矣及其自為之説亦不可行也謂邶鄘衛為西周之國則衛已東徙謂其詩多西周之詩魏檜二風詎非西周何以獨後謂惡衛先滅邶鄘故恕鄭之滅檜何以滅魏不并恕晉衛先于王以王風等于侯國衛為康叔之風繫晉而長參齊秦而親故亞二南而長列國夫後世綿蜀一隅習鑿齒猶還漢鼎考亭祖之著于綱目王何以後衛衛雖懿親詎得以先王至云聖人編詩大桓文秦穆之功又以聖人親商而疏魯皆其論之甚頗者也不揣固陋以意逆之而為之説二南繫之周召首十三國文武之治之託始也微子修其先王禮物作賓王家而不臣宜次宋而宋無風衛朝歌之地紂故都也元城劉氐曰王都而外宜次朝歌然邶鄘為衛所滅先邶鄘不與衛之滅邶鄘也班固地里志邶武庚所封國先邶猶先宋矣蓋夫子作春秋宋先諸侯而于詩邶先列國體先王庸建上公之制興滅繼絶之心也二南不次以王何也以先朝而擬諸昭代則大一統為尊以共主而擬諸文武之制則先朝為重故王不先邶而次于衛也然而聖人于此有餘憾矣申侯發難犬戎弒王秦晉鄭衛皆有勤王之師而老成練達素協人望莫如衛武公倡義率先復君父之讎正申侯之罪則三國皆為我用東諸侯寧無忠憤激發者哉真再造之功也何以立君之外了無餘䇿至平王十三年而就逝奄有邶鄘修爾車馬將安用乎大抵此時人心讎戎而德申徇母而忘父申侯方挾天子以自重投鼠忌器勢不可以驟為而欈王姦命復煩諸侯之力故雖武公之賢不能昌眀大義與召虎方叔爭烈而周東矣夫子于王之次衛而不能無餘憾者此也東遷之後號令何以不行鄭武相平王秉周政不聞恢復自強之謀坐收十邑之利至于寤生射桓王中肩王師不敢再出鄭為之也于是齊桓創霸而天下朝齊矣故次以鄭以齊蓋聖人編詩與作春秋不同春秋亂世之書也臣弒君子弒父有能尊王討亂賊姑取之故嘗恐天下之無霸也詩文武成王之書王道之大也宣王入于變雅十三國為變風其例嚴矣而盜天子之大權為摟伐之私計則深惡之懼後世之無王也魏先于唐以魏為晉滅且不與晉之世伯也晉為世霸而天子大權又世歸之晉由此任好繼起力爭中原周益不可為朱子云讀其詩駸駸乎有并八州朝同列之槩焉夫同此豐鎬故都文武居之藹然禮樂之風而周以興秦居之悍然強猛之氣而周就滅此夫子所以深惜周轍之東遷也其餘如陳則大于檜曹曹後亡檜先滅三國以是為次終之以豳者亂極而思治也嗟乎五伯迭興小國困敝使能如周公足以撥亂反治以紹二南夫子欲為東周即此志也檜為鄭滅何以後于鄭據史記則桓公言于王而檜虢獻其十邑據國語則鄶仲貪冒悖鄰武公舉成周之衆奉辭伐罪皆有王命也去古已逺諸説紛如為詳十五國風之次序如此而未必其有合也周南鄭譜云周召岐山之陽地名張守節史記正義大王居周原因號周劉熙釋名周地在岐山之南其山四周也皇甫謐云周召之地共名周召是周內之别名也文王遷豐為旦奭之采地旦居周故旦為周公奭居召故奭為召公周召之名蓋取諸此李迃仲乃云紂猶在上文王豈可擅分地豫人不知地為境內命其大夫主之安得以為僣可知周召對舉則周乃岐陽之舊名而非後來之國號也武王有天下周公封于魯召公封于燕二公留相而周召之名終于不改蓋元子就封而庶子則仍居采地故周公召公至宣王之世猶有共和之政逮王室既東而周召食采又在東都而非昔之故地矣若夫分陜之事據史記燕世家在成王時中分天下諸侯主以二伯公羊傳云自陜而東周公主之自陜而西召公主之康王之誥云大保率西方諸侯入應門左畢公率東方諸侯入應門右注云召公蓋西伯畢公則繼周公為東伯也是周公所轄者為束南之域召公所轄者為西南之域也南國何以繫之周召有以周公治內召公治外言者則漢廣汝墳詎非國外何以繫之周南有以分陜言者則周召皆岐陽地何以召南無國中之詩按內外之説以作詩之時言之蓋文王時周公治內召公治外也分陜之説以編詩之時言之蓋武王成王時周公主東南召公主西南也二南文王之詩其時侯國也然受命之王不得與諸侯同周公編詩釐定樂章以文王之世已治內而召公治外故以國中之詩繫于已然文王之化自西而南但言國中不可以南稱也故以采得于荆之漢廣豫之汝墳皆東南之域為已今日所轄者皆繫之于周南召公諸侯也行文王之政于南國故以南國諸侯之詩繫之召南而江沱之采于梁何彼穠矣之采于雍梁之間皆西南之域為召伯今日所轄者亦繫之于召南焉周召之化即文王之化也説者疑于周公掠文王之美豈其然哉然則周召之名以人言之不以地言也故序曰繫之周公召公如云周南得之周召南得之召則周召皆岐陽之地豈二南皆岐陽之詩乎二公東西分陜必有界限今亦無所考矣關雎后妃之德也風之始也所以風天下而正夫婦也故用之鄉人馬用之邦國焉箋云三百一十一篇詩是作者自為名朱子曰后妃太姒也序者蓋追稱之闋雎為十五國風之始夫婦為王化之始天下之夫婦正而成孝敬厚人倫美教化移風俗皆託基于此此大序一篇所以綴于闋雎之下以為全詩之綱領也風風也教也風以動之教以化之從風字推出風教二意為全序主腦詩者志之所之也在心為志發言為詩上以風教被物下承上之風教而發之為詩此只釋詩字之義下文乃詳言之情動于中而形于言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也所謂風以動之也情發于聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近乎詩所謂教以化之也先王以是經夫婦成孝敬厚人倫美教化移風俗詩者感上之風教而成者也而先王即取以為風教之助先言以經夫婦詩首關雎之義也故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌鄭氏樵曰程氏云詩之六體隨篇求之有兼備者有偏得一二者風之為言有諷諭之義如文王曰咨咨女殷商之類皆可謂之風雅者正言其事如憂心悄悄愠于羣小之類皆可謂之雅頌者稱美之辭如吁嗟麟兮吁嗟乎騶虞之類皆可謂之頌故不必泥風雅頌之名以求其義也亦猶賦詩而備比興之義焉朱子曰六者之序風固為先而風則有賦比興矣故三者次之而雅頌又次之蓋亦以是三者為之也上以風化下下以風福鳯反刺上主文而譎諫言之者無罪聞之者足以戒故曰風按凡和緩不迫主文譎諫皆謂之風正風正雅中皆有之不獨指國風亦不獨變風變雅也玩下節自知六義惟風之用微而善入其功最廣故抽出言之至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣上之所以動之化之者不得其正而下之感被亦無一道同風之美于是變風作于列國變雅作于王朝而詩道一變國史眀乎得失之迹傷人倫之變哀刑政之苛吟詠性情以風其上達于事變而懷其舊俗者也言國史眀乎當時得失之事迹知其傷人倫之變哀刑政之失吟詠性情以風刺其上故采得衆篇命瞽矇奏之以救當時政事之失為風教之助也不言變風變雅者蒙上文之辭也舊俗先王時之風俗也故變風者發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也獨舉變風者以變風之止于禮義尤隱是以一國之事繫一人之本謂之風天下之事形四方之風謂之雅此言風雅皆本一人之風教雅者正也言王政所由廢興也政有大小故有小雅焉有大雅焉政有大小亦舉其大槩言之頌者美盛德之形容以其成功告于神眀者也此風教之極治功之成是謂四始詩之至也是謂四始結上文以起下二南為風雅頌始關雎又為二南始之義然則關雎麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公歸到風教上周南召南正始之道王化之基閨門者風教之始二南者風教之基故下文又申眀關雎之義是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也是以關雎樂得淑女以配君子以下當云樂而不淫哀而不傷是關雎之義也漢儒以詮解之語竄入本文反致舛誤蓋毛公以前皆以淑女指后妃至鄭箋以淑女為三夫人以下創為后妃求淑女之説此憂在進賢等語正同鄭箋意蓋東漢學者所增非孔門之原本也關雎之美后妃俱在形容不盡愛慕無已中傳出序曰后妃之德也一言盡之矣諸家誤解集傳于其始至之文謂后妃自處子初至時有幽間貞靜之德無情欲宴私之意夫渭梁初設朱幩方臨苟所稱良家女子稍知姆訓自必端好自持何足形為歌詠始至云者乃太姒來嬪之一二年宫人深被其德故作詩以美之朱子亦云當時人被文王太姒德化之深不覺形容歌詠如此則知始至不指成禮之日矣一章摰而有别在后妃只和敬二字又只一淑字大意言后妃之德足以為君子之善配但見其雍雍在宫和而且敬如雎鳩之和鳴相應于河洲之上也女對婦言則女為未嫁之稱易曰女子貞不字是也若對男子言則男正位乎外女正位乎內是也此淑女對君子已指太姒為婦時矣詳味興語亦指現成夫婦如云初嫁則和鳴相應説不可行二章釋言云流求也朱子云順流求之得不得未可知也下章興既得始及采之言之序也左右與佐佑義同蓋太任采荇菜供祭而后妃助之也若云上下無方恐于芼之有礙史記文王在位五十年九十七而崩其嗣位當在四十七嵗而大戴禮云十五嵗生武王前又生伯邑考大紀稱昌為世子娶于有莘曰太姒則文王親迎之時正王季在位之日詎煩宫人之求淑女思之而至于寤寐反側也而金氏據偽竹書武王五十四而崩文王六十三而生武王因謂大雅文王初載為即位之初年以為淑女必待宫人之求不知宫人原無求女之事也然則孰求之蓋太王王季求之而宫人至今聞之也文王生有聖德太王因廢長立少以及文王雖泰伯仲雍遜荒不顧其為文王擇配其難其慎聖德間世而生必聖如文王而後可以為文王之配世豈易有其人宜其寤寐不忘此事也思服者思之著于胸而不能去蓋絶大艱巨皆不足為文王憂而所憂惟此悠哉悠哉徹前徹後無一不想到而恐其願之無以相副以至輾轉反側于衽席間耳夫子不曰憂而曰哀哀者憂之極而深慮其無以得也后妃廟見之後一二年間太任采荇菜后妃嘗左右采之無不知其聖德同聲交慶以為從前思得如此之淑女今果然有以遂其求矣文王得吕尚曰吾太公望子久矣因名為太公望與詩意略同皆追敘之辭也三章同志為友言與文王同心一德渢渢乎鼓瑟鼓琴之好合也樂不指文王上而祖父下而宫中府中歡欣融洽洋洋乎考鐘擊鼓之和暢也關雎三章一章四句二章章八句鄭本五章章四句今從毛本漢儒引此詩多以為刺列女傳曲沃負告魏哀王云周之康王夫人宴朝關雎起興前漢杜欽云佩玉宴鳴關雎歎之李竒謂見于魯詩後漢皇后紀序康玉宴朝關雎作諷眀帝詔云應門失守關雎作諷楊賜傳云周王宴起關雎之人見幾而作韓詩關雎刺時也史記亦云周道缺詩人本之衽席關雎作揚雄云周康之時頌聲作于下關雎作于上習冶也習治則傷始亂也張超誚青衣賦康王宴起畢公喟然感彼關雎性不雙侣朱子云儀禮以關雎為鄉樂又為房中之樂周公制作時已有此詩其非出于康王眀甚鄭氏樵云關雎作刺是賦其詩以刺之此可以通諸説之窮葛覃后妃之本也后妃在父母家則志在于女功之事事字下提有及其嫁也四字躬儉節用服浣濯之衣尊敬師傅則可以歸安父母化天下以婦道也季氏本云葛覃太姒自治葛畢而欲歸省其親也內治之本在于勤儉孝敬序言后妃之本大義了然此國史所題聖門所傳者也以下多屬贅語在父母家數字尤無謂凡史所載躬履節儉躬紡織浣濯者惟王后貴人姑以是稱之未有處子在母家而稱躬儉節用者且上下語氣絶不相蒙竊疑女功之事以下有及其嫁也四字傳本脫去遂致文理難通一章后妃始往治葛也以盛言之曰萋萋以密言之曰莫莫非萋萋為初夏而莫莫為盛夏也萋萋之葛黃鳥止焉于飛者人衆驚之而于以飛起也鳥飛而集于叢木之處已逺于人故喈喈而聞于治葛者之耳也何氏楷謂后妃但親董之不必親自治葛不知古人風氣醇厚太姒率其宫嬪親往治葛無可疑也萋萋之盛治正及時喈喈之音助豫作息真樂而忘勞矣此實情實境也二章上章是初往刈葛此章則歷敘其治葛之事也多少治葛之勞只一是刈是濩盡之多少組織之勞只一為絺為綌盡之歸到服之無斁正如老農舉箸深知盤中飱皆從辛苦來而儉德可風已悠然見于言外三章傳以言告師氏為我受告師氏而下文言告作我師氏之告語甚費力集傳告于師氏藉以言歸詞意既順而不敢自達義亦正大又云將服之以歸寧于父母矣正無斁之意沈氷壺曰葛生蔓延相及而女子逺于父母嫌于節之誕矣黃鳥好音相慰而女子曠隔通問嫌于音之睽矣發端即注歸寧苐女紅忙迫故逮絺綌就緒而後徐及之耳葛覃三章章六句三家以此為康王時詩而黃氏櫄詩解謂詩在父母家作以章末兩歸字為于歸之歸皆不可信也卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至于憂勤也東萊吕氏曰知子之來之雜佩以贈之婦人之志如是其夫斯能好善矣我姑酌彼金罍維以不永懷后妃之志如是王者斯能體羣臣矣室有轑釡之聲則門無嘉客况后妃心志之所形見者乎后妃何志志在體恤使臣也自續序者不一其人辭意纍重朱子遂改為后妃思念君子夫思婦而稱其貞靜專一者以世教衰微閨門無禮而君子于役乃能甘心首疾而形為詠歌故聖人樂豫之列其辭於變風豈聖后合天地之撰侔神明之德而下等於尋常閨思乎竊恐古序之不誣矣一章後序泥左氏強入求賢審官以懷人為文王所懷之賢人遂致前後扞格不知懷人猶云勞人蓋行役勞苦而感懷之人耳嗟我懷人猶云哀我憚人也下章維以不永懷正此懷字如懷人必為所懷之人將思婦亦為所思之婦乎七我字一例皆代使臣我之也卷耳易求之物猶不盈筐况人才難得乎而尤當恤者使臣也使臣若曰嗟哉我懷人亦君之臣也何獨置我于大道中而馳驅不息耶蓋述其言以恤之也不曰行而曰置由君置之耳周行大路也初出郊圻驅車道左已覺君門日逺矣由周行而崔嵬舍坦道而山行也由崔嵬而髙岡山之絶頂也由髙岡而砠下峻嶺而復山行也立言之序昭然左氏以周行為列位不過借用如云當道要路耳小雅鹿鳴云示我周行大東云行彼周行皆可互證二章崔嵬髙山也較周行更况瘁矣則其感懷何如吾知使臣若曰我姑酌彼金罍庶幾不永懷乎隤頺也虺隤象虺之伸頺然而無以縮故曰病也三章髙岡則崔嵬之極髙處矣玄黃赤馬變而為黑白馬變而為黃勞極而色異也傷思也懷之鬱而黯然神傷也三章三述使臣之言即末章一云字也四章前言金罍兕觥原是想其傷懷之時或者酌酒可以消憂然不能消釋也此章連用三矣字已是神疲氣竭光景懷人至此又將云何惟有張目逺望而已君子所以體恤者當何如也篇中體恤懷人之意俱在言外皇華遣使盛言車馬光華勉以公義作之于天朝也卷耳懷人極言車煩馬敝恤及私情作之于后妃也卷耳四章章四句按三家以為康王詩雪山王氏以為勞妾媵之婦寧又有謂文王遣使求賢者皆未可據也樛木后妃逮下也言能逮下而無嫉妬之心焉詩義補正后夫人之于衆妾常恐其上陵而思有以隔限之衆妾之于后夫人預料其妬已而思所以曲避之此恆情也樛木下逮葛藟上附纒綿固結而不可解如此非盡乎天理之極而無一毫人欲之私不能也一章樛木興后妃葛藟興衆妾蓋興有正意在下二句者有正意即包括興處者此言樛木下垂故葛藟得以上附喻后妃逮下則衆妾皆得依託此意已包括在上二句內故下但言文王之福履可矣君子指文王也詩人取興原非泛設如蔦蘿之于松柏異體而同根故興王族之依託于王葛藟之于樛木異根而上附故興衆妾之依託于后妃宫闈之內藹然和平聚順君子雍雍在宫茀祿爾康莫大于此不然聚怨召釁何所不至君子之憂方大豈能有一日之安乎故綏之在君子而致其安者則后妃也二章荒訓芘左傳葛藟猶能庇其本根蓋藉之以自庇也若云葛藟能庇樛木則衆妾能庇后妃乎宫闈使之和順便是扶助文王之福履三章縈者四靣纒繞之意太和之氣溢于門庭則螽斯之慶麟趾之瑞皆基于此文王之福履于是全且久而無憾矣樛木三章章四句螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也后妃能逮下故子孫衆多而古序但言子孫衆多者承上篇能逮下之文也蓋螽斯者樛木之應也後序螽斯不妬忌諸説言螽耳何不妬忌之有陸農師云草蟲鳴于上風蚯蚓鳴于下風性不忌一母百子故詩人取為不妬忌之况詩人全篇要寫后妃不妬忌頗難立論因想到後一層子孫之多則不妬忌可見猶恐實處寫之不盡因想到螽斯作一影子然螽斯之和集寫得不生動不足以形容后妃故以詵詵薨薨揖揖形螽斯因以振振繩繩蟄蟄形子孫之多中間輕著一宜字極尋常極歎羡而后妃之德悠然可會通篇惟螽羽子孫是實字其餘俱作形容唱歎之音集傳用貌字聲字意字精絶嚴氏謂螽蝗生子因飛而見其多故以羽言之按此詵詵只訓衆多小雅詵詵征夫是也集傳云和集是揖揖之義非詵詵也振振羣飛貌魯頌振振鷺是也薨薨集傳云羣飛聲齊風蟲飛薨薨是也毛傳云衆多乃詵詵之義非薨薨也繩繩聲不絶也揖揖斂羽而和集也蟄蟄盤聚而伏藏也詩人無一字不相針對螽斯三章章四句胡氏宏曰愚讀史至隋文帝獨孤后然後知婦人之惡以妬忌為大也獨孤不獨妬文帝使不得有異生子又妬及太子勇寵妾雲昭訓遂啓賊子廣篡奪之謀卒至宗祀滅絶生靈塗炭開皇之中天下户口八百九十萬唐興撫綏三十餘年至永徽初始及三百八十萬户耳吁獨孤一行妬于宫闈之間而滅天下之户五六百萬聖人刪詩立周南之義教萬世后妃專以不妬忌為大美也意深逺矣桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃夭咏于歸之女子而序以為后妃所致者何也蓋后夫人正位中宫主持隂教勤儉孝敬化天下以婦道而國中女子遂人人有一后妃之德蓋太和所被凡所謂勃溪之習蕩軼之風已淘洗得淨而尚有未嫻姆訓者乎故當時六禮往來都是良家子女際少好之年得婚姻之正後此之宜其室家即可于于歸之日卜之也故曰桃夭者葛覃之應也不然于歸之初賢何從見而詩人預知之乎昏姻之期傳主秋冬箋主春夏各有所據集傳主箋説以為桃有華正昏姻之時然二章言有蕡其實三章言其葉蓁蓁則夏盡而秋矣豈自春徂秋皆婚期耶衛風曰士如歸妻逮氷未泮孫卿韓嬰皆曰霜降逆女氷泮殺止似以傳為優馮氏復京名物疏辨之最晰詩義補正既曰宜其室家又曰宜其家人蓋婦人固有當于夫而不宜于家人者記曰子甚宜其妻父母不悅出是也至于宜其家人則內外和而父母順所謂當于其夫者始不為燕昵之私矣傳指一女子許白雲作三女子竊謂詩人只舉一物為興亦不必定在何時而此女值開花彼女又值結實也傳義為長首章宜字傳以色言者非艷冶之謂也和氣積中而後婉娩之容形于外如桃之和氣具而後其華盛也蓋女子于歸之始無不勉強自持而容貌辭氣之間自有流露不爽者不必遲之又久也故先以色言之次章傳以德言婉娩之容早已見之而其德又踰時而見其誠確如桃之有實也三章傳以形體言蓋之子年日以長德日以密終始一致進而有加一家之人無不以為宜之子至此直是層層周到念念回旋如花之有葉也詩人無字不盡善非徒取叶韻也男以女為室女以男為家家室微有廣狹之分之子必先于夫婦居室之間致其和敬而後能宜其一家故以室為重而曰宜其室家然宜家較難于宜室宜其家則室自宜矣故以家為重而曰宜其家室家就籠統説家人則分晰言之上下親踈無一不宜則宜家之至而室不必言矣故曰宜其家人桃夭三章章四句兔罝后妃之化也關雎之化行則莫不好德賢人衆多也賢才衆多而序以為后妃之化者何也后妃之德冝配君子而太和所醖為振振之公子女子被后妃之化皆宜其家人而和氣所蒸為賢才之衆多蓋相夫者有卷耳之志而育德者成麟趾之休也或曰棫朴旱麓之詩何以不言后妃大雅朝廷之樂也周南房中之樂也故彼以為夀考之陶融此以為關雎之效驗義各有屬也夫周南之言后妃猶召南之言召伯非遺文王也言后妃而文王之修身齊家自見周公録此以為房中之樂朝夕諷詠以淑凡為后夫人者之德若曰賢才之衆多家室之和平皆于爾乎繫之必德如太姒而後可以輔君子治國中也邑薑殿十亂之末此之謂歟一章肅肅傳訓敬是指罝兔之人蓋所以為干城處呈于觀感之間直從赳赳處看他底裏肅肅處想其全身不専在兔罝也好德之人與德相感眉睫之間如相告語故有以得其賢或問朱子云兔罝詩作賦看得否曰亦可故傳不言興正以其為賦體也二章椓之丁丁正椓杙于中逵也椓杙時是方施之始見其肅肅施于中逵則既施之後又見其肅肅始終無間也好仇亦有德相配合始終無間意三章不是既施中逵復遷而中林蓋施之非一處也説文平土有叢木曰林中林幽隱之處猶之中逵之肅肅不以隱顯異也故可以為腹心于中逵先視其椓杙蓋聞其聲而後視其事也繼視其張罟又視其人又從中林視之是途中瞻視次第連説赳赳武夫非無意也蓋人君命將出師必取強武之人以為心腹恃功而驕悍然跋扈甚而縱敵以取重殺降以邀功古今一轍即始終臣節而心術未純如周勃之安劉幸而成事世績之助唐幾移社稷有才無德大是害事詩人于罝兔者驟然望之一假雄偉奇崛之槩知是將才而靜叩中藏知其忠有可倚足以為腹心之寄也公侯得若人則折衝禦侮之臣即股肱心膂之任而兔死狗烹無因至矣傳每以用武言是從赳赳看出真善于體會説者翻云不必説到剛勇極力回護非也兔罝三章章四句墨子云文王舉閎夭泰顛于罝網之中西土服胡母輔之謂閎夭樵于山與獵者爭路被執纒以兔網文王救而得解朱氏謀煒詩故文王治于岐四方無侮武夫無所效其用相與從事罝網以消磨其壯心姑識之以廣異聞芣苡后妃之美也和平則婦人樂有子矣此言后妃之美而詩人意中何嘗有此意序周南者從采芣苡上想出樂有子又從樂有子上想出家室和平因從和平上想出后妃之美來蓋春時百物欣欣向榮問其故物不知也識者從他一假芳菲自得處想見化育流行無不遍滿是詩當作如是觀不績其麻市也婆娑是佚逰氣象纎纎女手可以縫裳是蕭瑟氣象有女仳離慨其歎矣是愁苦氣象一張一弛王者之道女紅之暇人樂宜男詩人口中一片遊行自在正是王民皥皥一章傳曰采取也有藏也其取之則二章掇之捋之也其藏之則三章袺之襭之也首章已統冒全篇二章以其子可治産難故云取之者取其子也如云掇其穗捋其子則本草采穗采子各不同時傳云芣苡宜懷妊言能使之易産唐本草又增宜子疑附會三章一手執一手可采故下復言采采襭之則芣苡已盈可歸矣芣苡三章章四句按王氏肅云自關雎至芣苡房中之樂未知所據燕禮有房中之樂鄭注絃歌周南召南之詩房中者后夫人之所諷誦以事其君子是房中並歌二南二鄭于禮淵源有自王氏悖之非也劉向列女傳以為宋人之女嫁于蔡而夫有惡疾其母將改嫁之女不從乃作芣苡之詩韓詩亦曰芣苡傷夫也芣苡雖惡臭乎我猶采之而不已以興君子有惡疾我猶守之而不去補傳云向之説出于魯詩今芣苡非有惡臭而宜于産子魯詩不足據也王氏應麟詩考辨命論云顔回敗其叢蘭冉耕歌其芣苡則遂以芣苡比惡疾矣詳蔡人之妻因説母引芣苡之詩以自況不必始作于此也宋女而蔡妻何名為周南乎漢廣德廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也王氏志長曰漢廣四語氣象宏逺神理深微商季淫風未殄關雎化洽頓令漢濵遊女覿靣有難犯之色采風者推厥所自恍見王風過化存神難以思議真有若漢廣之不可泳江永之不可方者反覆長歌此其所以謂之風也不然遊女既不可求而見者獨流連低回則是篇乃後世髙唐洛神一流文耳何以為周南乎此序可疑甚矣詩以首句名篇此獨提出漢廣二字漢廣江永據集傳是比遊女而序云德廣所及又似江漢比德廣者然夫以江漢比德廣則民間出遊之女似不足以當之矣蓋序固眀眀以江漢比文王之德化也漢之廣猶云德之廣也所及及於江漢之間也江漢之源自西而南亦猶文王之化自西而南也如是則江漢為主遊女為賔故不以喬木辨首而以漢廣名篇耳遊女及于歸之女皆被化者也文王主持風化者也詩人于被化者見其德之可欽可羡如此而後推究到主持風化者之德其可涯涘乎漢廣江永溯洄贊歎三致意焉二南兔罝麟趾羔羊甘棠騶虞五篇美男子其餘二十篇皆言婦人豈刪詩者專存婦人之詩歟蓋房中之樂為后夫人諷誦故皆言婦人女子而其時男子可知也周南之序大半言后妃而文王可知也漢廣汝墳序不言后妃蓋化行南國其化漙矣專屬后妃則其義不備眀言文王又非針規后妃之旨故使人自會古序立言不其慎歟一章人于喬木自無休息意不可休息只形容木之高竦非真欲休息之也不可求亦只形容女子之貞淑非真欲求之而歎其不可也猶云不可以非禮干云爾被化之女豈肯獨遊鄭指為衆女最是則朱子所謂端莊靜一者衆女皆然矣昔何以艷冶今何以貞淑詩人悠然神會而歎之曰誰為為之乎意中想著文王目中却注此江漢低回歎慕無限深情不可泳不可方只是不可測度之意谷風篇就其深矣四語亦為計較量度之喻也二章凡詩言之子于歸只就現在嫁者言之從無説他日之于歸者桃夭束山可證也毛公謂與桃夭一例故無傳耳然則此二章言之子者不指遊女矣蓋風氣丕變其出遊者皆端莊靜一其于歸者皆車馬親迎真無一女之不淑前日淫亂之風􅀈洗殆盡翕然禮義之俗詩人所以再三歎美于文王之化也翹翹高也錯薪衆薪也楚蔞亦薪也蓋無薪不高以興無女不賢故隨手刈其楚刈其蔞而翹翹者如故也亦隨意舉一于歸之女而其賢者依然也或謂楚更高于錯薪然則蔞亦髙于錯薪乎一章言出遊之女之守禮也二三章言于歸之女之守禮也于歸者不一故言秣馬駕馬而行也又言秣駒駕駒而行也漢廣三章章八句按韓詩漢廣説人也何氏楷云亦云守禮之可説耳其論近是薛君章句云遊女謂漢神則荒唐矣然其意猶未離乎正也至外傳云孔子適楚處子佩瑱而浣使子貢三挑之侮聖已甚三家之廢豈偶然哉范氏景文曰詩人深知文德則亦賢者也汝墳道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也疏云閔之則恐其死亡勉之則勸其盡節比之于殷其靁志逺而義髙安溪詩所惄如調飢者慮其行役之憂虞王室如燬故也不我遐棄者幸其復歸而歡聚父母孔邇故也惟能修方伯之職盡撫慰之道故氏既知尊王之義而又念父母之恩也朱子以采薪非大夫內子之事故未嘗質言大夫然君子行役念及王室疏從劉向定為大夫妻良是或曰後世如王良之妻曵柴從田間來命婦采薪無足怪不知南國婦人猶采芣苡以相樂而汝旁大夫妻乃困頓如此乎女子縫裳君子譏之况躬親樵採之事哉一章君子既歸而追賦其前日未歸之時也或作興體失之矣遵汝伐枚是言君子行役時之景物如此調飢是恐其遐棄故思之如重飢也已隱照起如燬來非尋常夫婦濶别之思二章只換肄字乃用一字寫出逾年之隔也遐棄箋作死亡精甚棄即由來無棄之棄深以不至死亡為幸也如但喜其不棄絶我則天下豈有行役而云棄妻者前此之憂今日之喜俱從下王室如燬來昏亂之朝手足莫措故箕子不免于眀夷文王且至于蒙難如後世酷吏得志朝士人人自危每出必與家人訣曰未知復相見否今以汝旁被化之大夫受役焚炙忠良之亂國思之安得不如調飢一旦復我邦族且喜且驚而後知今日之得免也三章言君子之勞以王室之如燬也然王室雖則如燬而虐不及于使臣逰子生還二親無恙悲喜交集破涕為歡則人臣膝下之年皆天王優賜之日雖則勞我也不可謂非厚我也尚敢有所懟怨以乖臣子之誼乎蓋其願即寸草春暉之願也而其心即天王眀聖之心也後世逰子之吟拘幽之操一言兼之矣故曰勉之以正也或言父母不可以言邇邇對逺言身為大夫或經營于境或風議于朝所不能無者然音問常通暌違不逺豈至岵屺之悲乎詩人曰孔邇其用字精矣夫以紂之虐熖而行役之室家猶不敢怨蓋文王之化道薰蒸融溢大行于汝旁之國故被其化者皆以文王事主之心為心也吾于汝墳見文德之至焉鯉尾赤魴尾白尾白而赬則勞甚矣比以魴魚幸其漏網來歸耳汝墳三章章四句劉向列女傳周南大夫受命平治水土過時不來其妻恐其懈于王事言國家多難惟勉強之無有譴怒遺父母憂乃作詩韓詩曰汝墳辭家也其卒章曰魴魚赬尾王室如􅛚雖則如􅛚父母孔邇薛君章句王室政教如烈火猶觸冒而仕者以父母迫近飢寒之憂為此祿仕外傳亦同後漢書周磐讀詩至汝墳卒章慨然而歎為親從仕諸儒雖未盡合詩旨然于父母則皆未嘗指文王也宜集傳兼存其説歟麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也續序雜亂甚矣朱子盡去之以公子為周之公子可謂木拔道通而首序以為關雎之應何也后妃之德足為君子配斯時嬪御之屬無一不被后妃之化于是含英育秀苞孕百男而為之公子者遂宛然聖世之祥麟也子復生子太和所鼓一本九族翕然太和而百姓無難故周公編詩以為周南之卒章國史序詩以為關雎之效驗麟仁獸也故取以為興諸家言信言禮俱不必從蓋麟興公子麟之趾興公子振振之德下麟字即指公子而文王后妃致之之意于言外見之此風人之旨也朱子初説云麟之趾仁厚公子亦仁厚較集傳更分曉可以麟興公子亦可以公子比麟振振形容不盡于嗟歎慕無窮麟王者之瑞獸也千百年而間出非其時不可得而致也詩連説六麟字而以公子公姓公族分屬由親以及踈由隘以及廣殊覺子弟羣從無非異采一似古今驚為竒物大史書為異瑞之麟至周南之世目之所遇無非此物不以為異轉以為常不知其可驚止知其可愛矣蓋龍之種鳯之雛皆麟之瑞詩人若曰何麟之多也謂區區符瑞陋矣周公公子也麟也陜以東周公左周南之所以名也召公公族也亦麟也陜以西召公右召南之所以名也周召而下又不知凡幾物滋後大有開必先則今日含仁履信之祥麟即他年析圭列土之百辟是以武成既告而大封同姓逺過唐虞夏商聖人豈有私意哉蓋此振振者醖釀久矣麟之趾三章章三句孔叢子曰孔子讀詩自周南至正雅喟然歎曰周道成矣黃氏佐云周南詩皆純正體裁畢備此周道之所以成正雅之所由作也故孔子歎之周南十一篇三十四章百五十九句詩序補義卷一
