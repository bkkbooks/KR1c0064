body:
  text: 詩序補義卷五石泉縣知縣薑炳璋撰衛説見邶風淇奧美武公之德也有文章又能聽其規諌以禮自防故能入相于周美而作是詩也孔叢子曰於淇奧見學之可以為君子也輔氏廣云曾子首章後六句之説字義明白意旨詳備蓋謂當從大學釋詩也或謂傳者引詩非為此章作訓詁然後序以聽其規諫説切磋於學問意合以禮自防説琢磨於自修意合輔氏之言當矣武公老而針警於國曰無謂我耄而舍我則公之學問莫大於受規諫抑戒賔筵二詩無非以禮自防則其自修亦無過於此序説誠與大學表裏通篇美武公之德一章是德之進益民不能忘所以驗其德也二章於嚴肅處形容充耳會辨皆有嚴整意所謂盛服亦敬也故將下四句覆述美之三章金錫圭璧承切磋琢磨來德至此已渾化無迹瑟僴赫喧不待言矣故下四句於寬和處形容之敬而和恭而安故曰德之成興意直貫到不可諼見緑竹而思君子正其不諼處工夫即在切磋琢磨瑟僴是敬謹之容赫咺是光輝之著皆以容貌言許氏恐其重復范氏謂名譽之著皆非也傳緑王芻也竹萹竹也郭璞注爾雅云王芻今呼為鴟腳莎某氏曰緑鹿蓐也釋草云竹萹蓄郭注云此作竹字同音異宋熙寧初吳安度試舍人院有司以所賦緑竹詩背王芻古説直以為竹遂黜富韓公言史記敘載淇園之竹正衛産也安度詩有據遂賜出身事載容齋三筆郝氏敬云禹貢豫無竹材世稱渭水淇園以希貴見稱漢去武公時至八百年苟淇竹如彼其盛不應盡化烏有水經注今望淇川無復此物惟王芻萹草不異毛興范家相詩瀋曰經傳言竹如易之篬筤書之篠蕩禮之竹箭皆不帶緑字詩言緑竹當是王芻萹竹又戴凱之竹譜漢武冦恂所伐别有一種䈛竹理或然也淇奧三章章九句考槃刺莊公也不能繼先公之業使賢者退而窮處淮南子曰夫可以揚清激濁抑貪止競其唯隱者乎故録考槃孔叢子曰於考槃見遁世之士無悶於世也此詩形容碩人處全在獨字永字如後世梁鴻之隱霸陵山彈琴自娛夏子冶之入林慮山中人無知者管幼安客遼東坐一木榻五十五年皆是也然則此時之世為何世其君為何如君故曰刺莊考槃集傳謂成隱居之室考槃在澗者猶云築室在澗耳在字方有安頓於諸家為優詩説云澗阿陸是一處其地兩山夾水其上有陸其旁有阿雖分言之實指一處也言考槃在澗正如南陽草廬此中大有人在陶詩云結廬在人境而無車馬喧是首句意問君何能爾心逺地自偏是次句意寬以心體言之便含中有獨樂意獨字無限孤另此時最易改節所謂誓者乃詩人形容其志之堅非賢人真有此誓也唐人詩從聽世人權似火不能燒得卧雲心是誓字之義箋説謬甚辨説駁正良允山夾水曰澗有仄狹意寬則居雖隘而心自寬也曲陵曰阿亦有偏曲意薖傳訓寬大言地雖偏而心自逺也高平曰陸軸盤桓不進之意亦反對也寤宿一般真樂都從無言處自領何可告人考槃三章章四句碩人閔莊薑也莊公惑於嬖妾使驕上僭莊薑賢而不答終以無子國人閔而憂之此詩閔莊薑賢而不見答也蓋求其不見答之故而不得或者世俗所尚莊薑未能莊公頑鈍人也其不相答以是之故乃從俗情上細細揣摹因從莊薑處處推勘而無一不兼之卒不見答是可怪也乃見其可閔也蓋對莊公言更説莊語不得莊公好色之徒故其辭褻又勢利之徒故其辭侈而閔之之意却于言外見之一章碩人者大德之人以稱莊薑良允乃莊薑之淑德概不之及但見衣錦而加之褧衣便見夫人誠朴守貞含素不尚華飾早與狂蕩之人針鋒不對即此便是不見答之根前二章就平日言後二章方追溯其來嫁兩碩人分界甚明二章史榮曰巧笑曰倩言巧笑之狀所謂笑靨也亦謂輔靨淮南子修務訓竒牙幽靨䩉搖注云靨䩉頰邊文又説林訓靨䩉在頰則好注云靨䩉頰上窒也楚辭大招靨輔竒牙注言婦人頰有靨輔也洛神賦明眸善睞靨輔成權注亦引大招為證按頰輔之靨謂之笑靨即兩頰之笑渦也即詩好輔口之謂也上五句已極容貌之美然有下二句方見神氣生動三章言敖敖之碩人我想其來嫁而稅于農郊也車馬之盛入君之朝一時大夫無不喜君嘉耦而曲體君心者有如此四章承上來嫁説自齊之衛必渡河鱣鮪葭菼皆大河所有以興庶薑庶士碩人四章章七句據左傳詩為國人所作列女傳莊薑始至操行衰惰傅母作是詩補傳云詩言翟茀以朝蓋為得禮不見衰惰之狀况譽為碩人極道容色之美非傅母所宜言國人之辭也續序以左傳有美而無子衛人所為賦碩人語遂以為國人憂其無子不知左氏歸重在以完為己子上故篇首以無子提起非謂此詩専為莊薑無子而作而薑之可閔亦不以其子之有無也氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也序所謂刺時者蓋刺當時惡始而不得以晚蓋者也此詩借棄婦之辭為失身敗行者寫照後序夾雜難通先儒云谷風説來都是德此説來都是情又谷風節節是哀怨此節節是供牒故同一見棄同一勤勞同一悲愴彼首章曰德音莫違貞也此首章曰子無良媒奔也一章有所托而謀謀而許許而送送而下文復思其來曲折之甚二章以爾車來以我賄遷已草草登車矣男子非徒貪色直利其多金三章歐陽氏曰桑之沃若喻男情意盛時可愛至黃而隕又喻情意易於衰落耳鄭以桑落為仲秋時又謂鳩非時而食椹桑在春夏皆未落豈獨仲秋而秋安得有甚按此駁鄭甚當此一章承上起下作轉捩四章桑之落矣可言色衰可言愛弛可言金盡凡沒興事一齊迸注都在此四字中五章言既遂遂竟也盡也我既盡此勞苦之事乃逢彼之暴怒至于見逐乎若云婚姻既遂便與上四句不相粘屬補正云老使我怨又曰總角之宴則為夫婦者久矣三嵗為婦乃計其食貧之日耳靡室勞矣謂室中之事靡不躬執其勞六章及爾偕老老使我怨箋云我既欲與汝俱至於老老乎汝反薄我使我怨也將老字一頓作詰問之辭則尚未甚老也然婚姻自有正禮猶淇之有岸隰之有泮不可踰也今我不能自持相與宴好而邀以信誓初不思其如此適與正禮相反也反是正禮而不思今日見棄固其所耳尚何言哉淇岸隰泮作禮義大間説則女之耽兮一假亦有著落氓六章章十句竹竿衛女思歸也適異國而不見答思而能以禮者也此詩集傳謂思歸寧而不得是也何嘗有不見答之意古序但云衛女思歸未嘗明言何國續序曰適異國亦不知為何國也夫豈有不知所適之國而能知其不見答哉集傳於泉水篇多父母終三字説者遂以此父母未終亦臆説也夫父母在歸寧禮也何悖於義而思之如此其切耶則父母終可知矣一章爾爾淇水也爾衛也即爾兄弟也鍾氏惺云抑鬱之情以風調寫之季彭山不解遂以為淫可知風調詩中自有即此以參鄭衛思過半矣二章以思字領起泉源淇水如在望也而無如終逺父母兄弟何也三章陸氏詩學巧笑二字懸想淇上遊女風景末章駕言出逰乃説自己耳作詩篇法固當如是四章駕舟楫以出逰發抒憂鬱我之願也而無如逺莫致之則亦長為逺兄弟父母之人矣結出一憂字詩所由作也竹竿四章章四句芄蘭刺惠公也驕而無禮大夫刺之序言刺惠公者得之後序云驕而無禮則非也芄蘭柔弱正與驕而無禮者相反按惠公之即位也少齊人使昭伯蒸于宣薑惠公不能禁也且左右公子之徒以其譛殺二兄常懷携二不得不倚齊為重因而俯從其命如芄蘭然非有依附則不能起此甘為人役之喻也箋云芄蘭柔弱恆蔓延于地有所依緣則起詩言吾君童子之年有成人之佩其所立當何如者乃雖則佩􅀈而才能我不之知也但見所佩者不獨􅀈也容刀珮璲且垂其大帶而驚瞿特甚視彼芄蘭同其柔弱附于大國􅚿然聽命又何怪焉觿者説苑謂治煩抉亂之物佩觿猶云當成人之任指為君言是借用字容遂帶因佩觿而連類及之服愈盛以見其任愈重也悸程子曰悸悸然心不定也正形容無能處童子原非不美之名惠公即位年已十五六童子佩觿猶云孺子王矣年少而當重任也芄蘭不是興童子興其無才能驚顧退却耳芄蘭二章章六句詩億此刺當時之嬖臣也禮記大全長樂陳氏曰惠公服成人之服而有童子之行皆非也河廣宋襄公母歸於衛思而不止故作是詩也此序辭費疑有後人增入之字説苑宋襄公兹父為太子桓公有後妻子曰目夷公愛之兹父請立目夷公問其故對曰臣之舅在衛愛臣臣若終立則不可以往絶迹於衛是背母也且臣自知不可處目夷之上後目夷逃之衛兹父從之三年桓公疾使人召之曰若不來是我以憂死也兹父乃反復立之然後目夷歸也桓公卒兹父立夫人在衛思之義不可往乃賦河廣詩孔子曰吾於河廣知德之至也詩億河北方流水之總名非必專指大河嚴氏據一河字遂以此詩為宋桓公在時所作蓋夫人於桓無相思之理宋仁宗廢后郭氏尚不肯與仁宗私見况賢如夫人耶此詩河廣宋逺皆欲歸宋之意蓋作於襄公既立之後也襄公寧讓千乘之國不忍疏母子之情孝之至也而夫人之作是詩恐傷襄公之心也假而曰靡日不思其子將何以為情假而曰逺莫致之是又明明以迎養示其子也是以寧置母子之情於不論而曰誰謂宋逺乎跂而望之即是也曾不崇朝可至也若曰吾與汝不過咫尺之睽耳問使可以時至音耗可以常通在我不必有倚閭之望在子不必有陟屺之思蓋意實思之而語中為未嘗思者然守不可歸之義而又曲體孝子之心夫人之情苦矣夫人之賢至矣故孔子以為德之至也河廣二章章四句伯兮刺時也言君子行役為王前驅過時而不反焉繻葛之戰祝𣆀射王中肩此春秋二百四十二年絶無之事諸侯無起而正其罪者維時衛人師敗而還詩人憤之故託為思婦之言以刺時蓋當此之時天下無王諸侯皆可刺也為王前驅以桓王親將故曰為王衛師𨽻右軍軍以右為前故曰前驅也自伯之東緊承為王前驅來王城在東諸侯之師先至京師而後伐鄭衛與鄭構久矣提出之東以見今日奉命于東非若前此伐鄭遽從而西也如思婦自作齊桓未興天下何知周室况一女子安能大義炯然聖人録此詩一以見王室陵夷諸侯犯上春秋之所以作也一以見野有遺直志在尊王東周之大可為也一章嶄然而起味其辭氣絶不類閨閣言伯以強武之才急趨王事執殳前驅便見諸侯無王而伯獨有王二章袁仁或問曰不但行役之久自初伐至周之時而我首已如飛蓬三章其雨其雨杲杲出日亦見敵勢甚熾雖天子自將未易為力既為王前驅故雖首疾而甘心無所怨悔四章憂思所結至于心痗以心痗結此詩詩人之意可知矣伯兮四章章四句有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也狐妖淫之獸雄狐綏綏以刺襄公莫赤匪狐以刺有位衛之淫風流行當時在位之人不尚淑女專尚美色有娶非其耦者如齊崔杼之于棠薑楚巫臣之于夏姬是也詩人託狐以興集傳綏綏獨行求匹之貌求匹于水之梁失其所求也裳以配衣猶婦以配夫婦而無德如無裳也所以為憂也之子指當時求匹之人帶以束身言婦德不足以檢束吾身如無帶也服以章身言婦德不足以光顯吾身如無服也有狐三章章四句木瓜美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也序美齊桓其義不刊而或以為惡文公之不仁味其語意有感德之深情無風刺之微意當楚丘既城衛人漸致殷富而追念桓德銘入肺腑詩所由作也感之者衛所以致其感之如此者由齊桓有以施之也凡詩數章章各有意而此篇别無淺深正以其一唱三歎而意猶餘于辭之外乃見其銘德之深也重在永以為好言贈以微物猶當厚報永好為期况功同再造而我無尺寸相酬唯有世世子孫玉帛相見齊廷誓與永好而已語復而意無窮正於含蓄處見之木瓜三章章四句衛以宣惠而致滅以文公而中興邶終二子乘舟著其亡之因也鄘終載馳著其興之因也衛所以興齊桓之功也故以木瓜收三衛之全局衛國十篇三十四章二百三句詩序補義卷五
