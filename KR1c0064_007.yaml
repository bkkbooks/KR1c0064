body:
  text: 詩序補義卷七石泉縣知縣姜炳璋撰鄭鄭詩不淫馬氏端臨言之詳矣而夫子曰鄭聲淫說者因謂鄭聲自淫鄭詩目正也豈有論其詩則忠臣賢士語其聲則里巷俟邪者乎蓋夫子所放者别有所謂鄭聲而非此二十一篇之謂也春秋時鄭簡公以師觸師蠲賂晉悼矣後又以師茷師慧賂宋慧亦自云淫樂之矇意必當時新撰一種淫哇以媚强國而聲遂流傳聖人筆削在一時賡歌在衆口豈能驟奪其所習而使之一歸於正為邦者偶一不察足以亂樂故夫子亟欲放之也如必以鄭詩為淫則秦以女樂遺戎齊以康樂遺魯真淫聲也豈亦以是二十一篇為樂章乎古樂之不傳久矣樂書云東漢雅樂郎杜䕫已老祗記鹿鳴騶虞伐檀文王四篇餘聲不傳太和又亡其三至晉而又無傳然則東萊所謂三百篇皆中聲朱子非之竊恐無所據以知其是亦恐無所據以辨其非也魏文侯以鄭衛之聲為新聲子夏亦以為新聲此二十一篇自桓武以來即有之豈傳至戰國而反以為新者哉新聲云者新造之聲艷麗之曲代有創作俱謂之鄭聲者以淫樂始於鄭也其中不過極形男女閨房之欲所謂奸聲以濫獶雜子女不知父子正謂此也又考漢志云鄭聲施於朝廷哀帝時鄭聲尤甚而左延年之徒以善鄭聲被寵隋書安馬駒曹妙逺等能造曲多習鄭聲三百篇之聲亡久矣豈鄭詩獨傳于後世乎然則鄭聲别有其聲而非此二十一篇也若此二十一篇班固惟以出其東門溱洧二詩徴風俗之淫其餘多忠君愛國之意思賢懷人之作音節雖曰優柔本體自爾剛直而直指為淫竊恐其未必然也緇衣美武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉記曰好賢如緇衣則爵不瀆而民作願孔叢子曰於緇衣見好賢之心至也傳曰鄭武公養賢而賦緇衣是也續序之說非也好賢之詩多矣而聖人必以緇衣為法者豈獨以其志哉即音節神韻之間具有纒綿悱惻之意焉連用四兮字兩子字兩豫字一段親愛之神如見一章緇黑色緇衣武公所與賢者之衣也宜稱也言新成之衣長短與身相稱也子無珍惜之也服之而敝豫又改為也且適子之館凡器用之具使令之人果無不適意否也子或省親而還歸則途中飲食豫授子以粲無稍匱也粲餐也何以不言車馬其所常有者無待言也蓋武公養士於學之詩二章好謂既敝改為而色鮮明也服之而敝則又改造有加無已也三章席改造而更寬大也敝又改作始終不變也緇衣三章章四句將仲子刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉此欲莊公之保全叔段而作此詩以諷之也言公之封段于京不得已耳祭仲之諫公也云都城過百雉國之害也公嘗曉之曰請仲子兮無踰我里以比無預我家事也無折我樹杞以比無欲徙段於他邑也吾豈敢愛段之才寄以人民社稷乎畏我父母故也仲子君將不堪之說殊可懷也而父母請之之言亦可畏也畏即所云焉避害是也然不與以師保而聽其所為必至於作亂吾恐里中樹杞不能相庇又縱尋斧焉已也蓋詩人以仁厚居心以忠愛事君以防微杜漸憂國以保全骨肉悟主莊能用其言何至為克段之舉哉將仲子三章章八句叔于田刺莊公也叔處于京繕甲治兵以出于田國人悅而歸之須三章合併看乃見叔段之美之至其所以為美者正其大不美者也而莊公則俟其自及可刺也詩人習見叔段逰獵前後而形容之覺隨舉一事而京城里巷總無與之相比又仁人多不能威武威武之人多不能延接賓客叔兼有之乃為盡美然以見其遨逰里巷狎比小人招集亡命走馬擊劍後日敗關並著於此而公置之不論則寵之者乃所以陷之也詩人所為刺之也叔于田三章章五句漢宣帝以次子淮陽憲王聰達有才拜韋元成為淮陽中尉欲感諭王輔以推讓之誼由是太子遂安齊髙帝從弟季敞性豪縱上心非之嘗語之曰卿可數詣王思逺以其立身簡潔也皆因其所闕而儀以賢佐使之潛移則莊公於叔段可刺矣大叔于田刺莊公也叔多才好勇不義而得衆也此篇俱作叔自于田而公所二字苦無安頓惟傳善說詩乃曰叔之從公田也則獻于公所句最著眼而將叔無狃戒其傷女尤為一篇之綱蓋詩人想莊公失教之故或者平日一種粗厲輕儇之習足為亂階者未嘗親見之故不以為意耳至從公田獵公所目擊也䄠禓暴虎誇示乃兄而傷女之戒藹然形於莊公之口吾以為無傷也其臨事之善射御者如此事畢之整暇者如此夫安得傷之所可懼者負才恃衆未聞父兄之教師保之訓吾恐禍在蕭牆危如履尾正不徒區區䄠禓間矣詩人于莊公口中露一狃字若已深中段之痼疾又用一傷字若已預知他日敗關而一時之言旋過旋忘欲保骨肉無傷不可得矣詩人忠愛之至彼祭仲公子吕輩豈足及此哉不義得衆之說本之後序疏以負才恃衆易之甚當箋云宵田也非也蓋焚林而田也如組如舞傳曰驂之與服和諧中節疏云言叔之所乘馬良御善耳非大叔親自御之下文又良御忌方大叔自御嚴氏粲云磬以騁馬控以止馬則馬之進退惟其意所以實其善御也後手絶力而縱前手攧而送則矢去徑而有力所以實其善射也射御之善俱是一時事又俱是從公時事段以公戒其無傷益逞其武威鼓其技勇以見弟優為之不煩阿兄致慮也按古射御用兩人所謂不失其馳舍矢如破穀梁傳云御者不失其馳然後射者能中是也段此時心目中有莊公在故將御者之轡自已執之隨御隨射顧盼自雄顯出超羣軼倫從來未有之技使觀者歎服方足驚動乃兄首章言火烈具舉舉起也蓋火起虎出段握拳迎之的是初獵事火勢漸揚禽獸並出故驅車逐之的是中間事火勢已盛禽獸四散已畢故車遲發罕以終焉只寫火而次第不紊如此罕傳曰希也如鼓瑟希之希猶間隙也謂漸漸希間去正與慢字對而叔之餘勇可賈矣大叔于田三章章十句清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦敵於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也按左傳杜注髙克好利而不顧其君向不知所據及讀詩後序知杜氏所本也然三傳及史記俱不言克好利後序何以知之蓋以殺申侯傳而臆揣之耳鄭文殘忍過人如執王臣使盜殺二子皆優為之何有於克使克專利何難數而誅之而反授之以兵陽若任用而隂去之耶故孔氏疏春秋以為無罪可告諸侯是也且文公非忌虎假以翼也逆料清邑之兵非其素將久留河上人心自離及師潰而歸欲止不能欲歸不可不得不舍鄭而奔也後序周納髙克幾與申侯同科聖人灼見至隱大書鄭棄其師而不言髙克出奔朱子歸獄鄭文而削去克之好利萬世之是非定矣上二章作引起之辭上三句言車馬器物整齊若此而問其所事則河上翺翔而己矛之上勾曰喬二矛故重喬李迃仲謂只寫甲兵之盛若云英敝則未有英敝而車馬猶武健者恭録折中云左後軍右前軍也旋回抽拔也自彭而消自消而軸時更久矣止馳駟介不建二矛無鬭志矣翺翔逍遙之態忽而變焉左軍旋車而欲返右軍抽隊以潛遁中軍髙克自將作為好言以鎮撫之而亦不能固其志也有潰而已於是左右之將返國而中軍之將出奔謹案髙克所將雖止清邑之兵然鄭師所至每分三軍繻葛則分中軍左右距衛人伐鄭鄭以三軍軍其前則此分三軍可知然不言軍則以不滿二千五百人之數也清人三章章四句序以詩為公子素作意其或有傳受歟羔裘刺朝也言古之君子以諷其朝焉凡刺詩而語若稱美者續序悉云陳古刺今非也此美其大夫而古序云刺朝何也蓋刺朝廷之不親任而置之疏逖之地也凡言彼其之子猶云彼人耳皆外之之辭如王之揚水魏之汾沮洳唐之椒聊曹之候人皆是蓋美在彼則刺在此也對居內者言則居外者為彼對親任者言則疏逖者為彼此大夫云彼其之子或已去位而追念其在朝之日或居疏逖而數稱其才德之全蓋惜之也觀下篇遵大路之思賢則知此時賢人之不得志者多矣一章洵直與下章孔武一例直訓順順理之謂也順理而率意徑行非侯也故必從容盡善乃見其美命天所賦之理舍者中心安之不渝正形容其安處時勢益險阻此心益順適此章就從容順理處美之已包下二章意次章就果斷處說末章就文采處說皆舍命不渝之一節也二章孔武有力謂遇事有擔當有骨力也司主也一邦之中無剛正之人則是非可否全無主張之子為正直之主一邦賴之三章三英裘飾當從集傳朱子以此句言裘故以上洵直孔武俱以裘言傳以洵直指大夫說故以三英為大夫之三德按此章已作别調不與上章一例故上二章從傳而此章當從集傳召南羔裘其飾五紽五緎而此云三英豈古今異制損五為三耶羔裘三章章四句遵大路思君子也莊公失道君子去之國人思望焉序言思君子乃從既去之後追想臨去之時一段留行情緒而思之彌篤言君子之去時我執子之袪曰無以失禮惡我我先君故舊不可遽忘也而飄然遽去先君有知能無悵然蓋使其君聞之知賢人在國衆心所歸而先君舊臣不宜輕棄從對面一照而君之不可寁故已在言下不言惡君而言惡我吕氏曰婉辭也故謂與先君故舊也或云摻執子袪子字蓋面言之然則畏子不敢亦豈嘗與大夫面言乎詩人與君子有同僚之誼原非泛常國人故思之切如此後序謂莊公時亦無據自莊公後代多失德君子以為醜行而吐棄之故曰無我魗好箋云善也當讀如字言今雖可棄而昔日先公之善不可遽忘才與魗字對遵大路二章章四句女曰雞鳴刺不說德也陳古義以刺今不說德而好色也刺詩有譏刺則指其過之謂也有風刺則規諷之謂也雞鳴之詩乃賢婦以其夫不說德而針規諷切之也前二章規其懷晏安而忘職業後一章規其昵閨房而忘取善續序陳古刺今非也一章首二句苦難安頓遂致通節不靈如謂女方曰雞鳴而士且曰已昧旦則士勤于女矣尚須婦速之興且婦猶寢何暇規其夫彼爛然之明星又何以見之也竊謂此章俱婦人之辭禮雞初鳴夫婦盥潄適父母舅姑所是雞鳴而起乃人之常此蓋賢婦夙興而其夫猶燕寢乃告其夫云興居之節女曰雞鳴而起士之起或稍遲於女亦當曰昧旦而起矣子試興而視夜明星爛然非昧旦乎翺翔弋射男子之事尚其勤厥職哉不言夫婦而言士女見男正位乎外女正位乎內截然不可踰越勿安於夫婦之私情也子興者速之使興視夜之早晚也明星有爛昧爽也翺翔有鼓舞踴躍意正振其惰心使之勃然興起也三章決非一時之言朱子次章謂既得鳬雁而歸末章云又語其夫界限分明其夫既弋而歸婦又語之曰弋言加之試與子宜之與之飲酒以期偕老斯時也勤則不匱足以資生樂而無荒足以蓄德而琴瑟之在御者亦靜好焉男修其業女勤其職黽勉同心夫婦相保所謂偕老也射弋不過其中一事飲酒和樂易流燕昵琴瑟窒人淫心故以靜好為言三章然止警戒于帷房之間而未能親賢友善猶非說德者也此章不言子之當贈當問當報只形容自已說德之誠而君子之當親賢自見此從對面託出倍見真切女曰雞鳴三章章六句車牽之詩曰髙山仰止景行行止觀此賢婦真令人有髙山之仰景行之行矣有女同車刺忽也鄭人刺忽之不昏於齊太子忽嘗有功於齊齊侯使妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之藉昏姻之故求繫大國君子恥之忽之辭昏可謂有君人之度丈夫之志矣祭仲勢利之徒其言不足深責而詩人乃以之為刺聖人又存而弗削此則大可駴者竊以為此詩之作當在昭公出奔之時蓋忽承莊公餘烈郎之戰惡曹之盟與齊最睦山戎伐齊忽執其帥大良少良歸之固有功於齊者也齊侯兩請妻之又與忽甚昵也使忽有中主之材仲執突歸發兵拒守而請齊為援亦足自救觀忽奔而齊再伐鄭納突而齊不與忽被弒而子亹誅渠彌轘則齊之能為忽用也明矣乃敵未壓境抱頭鼠竄固已大誤又不奔素所親厚之强齊而倚託苶然無氣之衛朔越五年而朔猶未免於奔其能如忽何詩人目擊其事而心傷之謂人君之擇所與猶親迎者之擇所偶也朝榮暮落之舜華乃與之同車雖翺翔佩玉何益焉而彼美孟姜美且都者反無作合之意可謂昧所擇矣彼者外之之辭後復警之云齊侯請昏之德音汝豈忘之純是一片借境首序所謂刺忽也後序以此為忽罪豈足以為訓鄭六卿餞韓宣子子旗賦此詩宣子稱為昵燕好可證此詩之㫖矣有女同車二章章六句山有扶蘇刺忽也所美非美然五詩皆作於昭公奔衛之日厲公竊位之時而此一篇則以子都指忽而狂且目突也子都莊公時人鄭之美麗者也故鄭人以意所美者即為子都子充猶子都也褰裳後序以狂童指突其說是也而傳誤以為指昭公按鄭風言狂言狡皆指突也春秋弒君篡國不絶書而執其臣使廢其君以立其所私則自宋創之鄭以小國受制莫敢誰何于是日望昭公之來而寄棲于衛者四年若不知有鄭者故詩人作此諷之使知人心猶繫乎故君鄰國非可以久託也或曰何不明刺之乃宛若婦人之言何也突猜刻人也祭仲立之而欲殺仲傅瑕迎之而卒誅瑕斯時昭公在衛其勢岌岌國中稍有向背形迹難以免矣詩人以思忽惡突之心而若為女子之刺男子者然不見乃見猶云燕婉之求得此戚施耳此際苦衷正難告之千載下耳國史知其心故曰刺忽亦諷刺之義也一章扶蘇宜在于山荷華宜在于隰興子都宜在于國者也乃見此狂且而子都者漂泊他邦無所棲寄乎二章山不惟有扶蘇而又有橋松隰不惟有荷華而又有遊龍木則惟喬殊挺拔也葒則枝葉放縱殊奮發也今狡童在國而子充委靡不振一籌莫展乎上章閔忽之失所此章則刺其不能自强也山有扶蘇二章章四句蘀兮刺忽也君弱臣强不倡而和也鄭突因宋得國而宋多責賂鄭不能堪也魯桓欲平宋鄭連年盟㑹而鄭必取盈鄭難再索突遂邀魯以戰宋復以魯紀敗齊宋燕衛之師逮宋以齊蔡陳衛報伐入其國都毁其祖廟而鄭竟不能禦則突􅉵甚矣當是時宋既成讎齊復搆怨而齊與昭公有夙好者也使昭以一乘入齊齊必為昭用以齊要宋合兩大國之師以納昭如疾風捲蘀耳昭何為而安居於衛哉一章詩人喚醒之曰今日時勢如風之吹蘀女知之乎齊宋兩大國若曰女乘此時以倡之則豫必從而和之矣得國猶反掌也叔伯與旄丘之言叔伯同謂齊宋諸國也倡字略斷豫諸侯自指也詩人有所畏不敢斥言故隱其辭也二章漂與飄同捲而去之甚于吹矣要要結也言女能倡我亦當要約與國連兵以納女也非齊宋之果有是言詩人設為是言以見其事可操券而成也倡有結强援申大義乘時振起意蘀兮二章章四句狡童刺忽也不能與賢人圖事權臣擅命也按朱子答徐容問云忽有甚狡若鄭突却是狡此詩乃鄭突篡位之日詩人不仕其朝思忽而諷以發憤歸國也狡對柔懦言不與我言不仕其朝喜其不與我謀也不與我食恥其食為不義之食也維子言無二心子指忽諸侯未踰年之稱正忽出奔之時也不能餐不能食憂其柔懦終無以復國亦諷刺之義或曰詩人何以不刺突所謂刺者諷諌之義忠臣之所以施於君者也突則絶之於鄭矣何為刺之突逐兄據國羣臣如祭仲輩俯首聽命代為畫䇿方以與言為榮受祿為幸而詩人皭然泥而不滓懇懇焉惟故君是念豈非嵗寒松柏疾風徑草乎狡童二章章四句褰裳思見正也狂童恣行國人思大國之正已也此鄭之賢人思忽而刺其不知復國之道也子指忽言子惠顧而思我則當使人褰裳涉溱至鄭而求我矣子即不我思鄭國中豈無他人如我者欲為子畫䇿乎狂童之狂已甚逆理恣行人心不附可乘之會也而淹留異國恭然不振可怪也晉文公之復國所賴狐偃趙衰諸人衛成公之復國亦賴寧俞諸人未有無謀臣竒士而能成其事者鄭忽羈衛四年其從亡諸臣皆猥瑣之才始既昧于所從繼復戀棧不去卒至一籌莫展非鄭無其人也有人而忽不知用也詩人作詩招之忽猶未悟必藉祭仲之迎而復國未幾身死賊手藉有賢人何為至斯褰裳二章章五句顧氏炎武曰傳曰忽何以名春秋伯子男一也辭無所貶李因篤云春秋之法天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男是公侯為一等伯子男為一等也故子産曰鄭伯男也遭喪未踰年之君公侯降稱子如宋子衛子陳子之類是也今鄭伯爵也伯與子男為一等下此更無所降不得不降而書名矣非貶忽之辭故曰辭無所貶然則五詩之作于奔衛之日瞭然也式微曰微君之故黎侯即位久也狡童曰維子之故忽未踰年也皆臣子之辭耳如在復國之時夫子明以世子豫之國史何為斥其名哉或謂刺忽之詩何以獨多昭公為莊冡嗣素繫人心而迫于强令坐視其君父之出走而不一援手舉國中曽無哀怨之音則天理絶矣此忽詩之所以多也五詩雖同刺忽而義各有主聖人存而弗削者一以見名義既正雖至失國猶足以繫人心一以見先王之澤忠義之心未嘗一日忘也丰刺亂也昏姻之道缺陽創而隂不和男行而女不隨首序刺亂者有三有刺淫亂者有刺國亂民貧者有刺不用賢而致亂者此詩則女子適人不得其所困極而自悔之辭詩人述之以刺國亂民貧也言已之在母家也俟巷者有之俟堂者有之求昏者之衆也斯時即于求我者之叔兮伯兮許其親迎盛服共駕何至有今日之厄乎蓋或格於擇壻過嚴或阻於他故未偶皆不可知夫不以今日之家室為可安而轉以從前之庶士為可慕國亂民困衰世之音也四章皆自悔之辭固非望其再來迎己亦非欲他人之迎也人情憂喜極時往往為過分語求昏者多而云既有俟巷又有俟堂悔其不送悔其不將皆過分語鄭氏以為親迎誤矣親迎無婦自迎壻之禮是從極失意後癡心摹想從前一畨熱閙不可多得也士昏禮壻親迎女登車姆為加景景與褧通加褧衣于禮衣之上避道路風塵也故傳云嫁者之服然曽子問孔疏云嫁服士妻褖衣大夫妻展衣卿妻鞠衣也無錦衣衣裳用錦箋云庶人妻之嫁服也蓋言錦衣也而復加褧衣錦裳也而復加褧裳嫁時之服已備斯時也豫得以自主之叔伯即指上俟巷俟堂者駕字當讀斷言許昏而使之親迎也又在送將之後衣錦褧衣二句顛倒重復蓋困極無聊回想前日從其身上衣想到裳又從裳想到衣厯厯艷稱却是嗚咽之甚若作女為悅己者容便失其㫖中谷有蓷之婦人已至仳離而但曰不淑曰艱難未嘗遽怨也此則失所而菲薄其夫鄭俗不如王風逺矣丰四章二章章三句二章章四句東門之墠刺亂也男女有不待禮而相奔者也先儒讀逸詩唐棣之華以為辭無甚昵非淫詩如淫則夫子不責其未之思矣此篇乃反其室逺之說正合何逺之㫖宜為聖人所取晉酒泉太守馬岌求見宋纎不得銘曰丹崖百尺青壁千尋室邇人逺實勞我心古人直以此詩與杖杜緇衣並用故說者謂其室則邇其人甚逺二語足該蒹葭一篇而序云刺亂者當與下篇參看蓋賢人隱處人君棄而不求邦之所以亂也下篇曰風雨如晦則亂可知也故序但云思君子此云子不我即則棄賢可知也故序但云刺亂序詩者亦序其未明之意耳後序傳箋皆無取焉一章言賢人立品之髙也東門之外有墠墠外之坂有茹蘆生焉此賢人之室也其室甚邇矣而其人則逺不以禮致之不可得見也夫室之邇人何以逺人之逺也亦君自逺之耳二章言人君棄賢以致亂也踐行列貌言家室中之內外上下截然整肅也豈賢者置身局外坐視國之迷亂而不一救哉賢人若曰豈不思爾而一救正乎亦子不我即雖欲救之無由也東門之墠二章章四句風雨思君子也亂世則思君子不改其度焉傳曰興也謂風雨雜至而如晦喻世之昏亂也難鳴在暗而思曙喻君子居亂而思治也然兼有賦意憂世之士當此晨夕倣徨永夜安得君子正色立朝不改其度撥亂而反之治乎下二句從反面透出思字意既見而夷則未見而臲卼矣既見而瘳則未見而若負重疴矣既見而喜則未見而抑鬱愁慘矣夷集傳平也傳訓說便與喜字復詩所凄凄風雨初至而寒涼也瀟瀟既至而有聲也如晦風雨而晦冥也雞初鳴則喈喈然相和再鳴則膠膠然相雜三鳴而將旦則接續以鳴而其聲不已矣夷如病初退瘳如病既愈喜則無病而且喜樂也云胡不喜此憂劇之辭也風雨三章章四句子襟刺學校廢也亂世則學校不修焉此當時賢者為閭師黨正主學校之事故言今日者學校荒蕪生徒解散無以作育人材悠悠之思以漸而深焉而無賢君相振興學校之意隱然見于言外青青子襟不一其人也是為師者指其弟子而言往往教也嗣音謂繼續其絃誦之音也來來學也乍往乍來於城闕之間便有輕儇恣縱意一日三月所謂悠悠我思也亦以見一日荒落已有一日之害況不止一日二語通篇著眼處為人上者廢學不修吾恐有用之子襟流為佚遊之比匪人心風俗之患可勝言哉語語為子襟丁寧却語語為當道提醒子襟三章章四句房𤣥齡問於薛收曰道不行矣夫子何營營乎收曰上失其道則下修之得時則行失時則蟠先王之道所以續而不墜也古者謂之繼時縱我不往子寧不嗣音如之何以不行廢也言雖無興起學校之人而嗣音者當在子襟耳自秦坑儒燔詩書天下以學為諱漢祖馬上得天下未遑禮樂而一二老生於兵戈荆棘之際誦法孔子私相傳授人自為師乃得十一於千百漢武以來崇儒重道而宿儒名彥崛起以經學鳴毛公之於詩亦其一也苟非漢儒為先聲宋儒雖欲表章無由矣得魚忘筌豈通論哉揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也箋謂同姓臣所作是也後序以為閔忽則非也亂臣弒逆必先翦君之羽翼使之孤立於上而後惟我所欲為至於宗室大臣尤所深忌詩人同姓親臣當君弱國危之日憂讒畏譏之時此身一去而君隨之故不覺垂涕泣而道之也一章激揚之水不可以流束楚興異姓之人不可以間兄弟也昔也兄弟世臣遍滿列位而漸次删除至於終鮮所存者惟豫與君耳言汝親之也彼方謂人之親汝勝于兄弟用兄弟不如用他人此必無之理迋汝之言也二章惟豫二人言兄弟在君左右者我之外更無一人危之亦痛之也姚氏舜收曰迋是一時之妄言不信是平日之不誠推極于平素甚言其不可信也揚之水二章章六句出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家焉班固地理志鄭國土愜而險山居谷汲男女亟聚㑹故其俗淫鄭詩曰出其東門有女如雲又曰溱與洧方渙渙兮此其風也則二詩之㫖瞭然矣序云閔亂閔淫亂之成俗也主持風教者敬以修已禮以齊民斯亷恥之心生冶遊之習化鄭上下習為淫風故出其東門而袨粧麗服紛然出逰至于如雲之多凡賢人所為觸目深惡者當時恬然不以為怪故不以無恥為可刺而轉以沈溺不反為可閔也匪我思存言雖則如雲之多非我之所取者也惟此朴素而無妖冶之飾勤儉而無佚逰之事相與樂之以為內助而已極華艷之地提出綦縞以明已之好尚在此而不在彼所以挽回世道也如雲非必皆淫女也通解云不過冶容誨淫耳如荼言如荼之輕白可愛也吾惟此縞素之衣茹藘所染之布裳聊可與娛而已便見夫婦之外更無同志世道日非風俗日蠧可閔也出其東門二章章六句野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉蘇傳鄭人困于亂政感蔓草之得露零以生而自傷不及也故思得君子以被其膏澤思之而不可得庶幾邂逅而見之以適我願故鄭伯享趙文子於垂隴子太叔賦野有蔓草文子曰吾子之惠也義取此矣或曰有美一人婦人之謂也然則彼姝者子何以畀之亦婦人耶韓詩外傳家語夫子遇程木子引此詩教子路以有美一人比程木子知此詩之㫖矣以蔓草之遇零露反興民間之不得厚澤也推其故朝無君子耳有美一人指賢人也清揚者眉宇之間可慕悅也古人於賢人得於觀感之間則眉目間當有不可掩者邂逅不期而遇謂賢人與君相遇也若言與我相遇何益之有適我願者膏澤下於民也與子偕臧君子得行其道小人得遂其欲吾與子皆得其臧也序云思遇時思遇夫賢人柄用膏澤流行之時也有美一人有字最重有此人而用之澤可逺施望之也有此人而不用民不被澤惜之也在當時必有所指矣男女失時以下講師附益耳蔓草二章章六句溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉鄭衛二國獨以淫稱後序推其故衛則由上所化而鄭未聞也因想到公子五爭男女相棄失其配偶釀為淫風故出其東門以下悉歸此時今考溱洧一篇男女出逰采蘭相謔何嘗一毫困頓朱子駁之是也至於上已祓除其來久矣周禮春官女巫掌嵗時祓除風俗通禊者潔也於水上盥潔也非獨鄭有之韓詩內傳桃花水下之時鄭國之俗三月上已於溱洧兩水之上執簡招魂祓除不祥斯則專指鄭矣男女聚㑹積久遂成淫風詩人目擊而刺之曰士曰女皆旁觀者述之之辭蓋叙其事而可惡處使人自思如衛之桑中是也詩中皆是女子誘男故朱子曰衛猶為男悅女而鄭皆為女惑男蓋以此詩推之也兩方字有方來未已之意早已注著下章殷其盈句二章只用殷盈二字而界限分明蕳蘭也蘭品最貴而今之蘭非古之蘭朱子楚辭辨證云黃魯直言一幹一花而香有餘者蘭一幹數花而香不足者蕙今按本草所言之蘭雖未之識然云似澤蘭則處處有之蕙則自為零陵草尤不難識其與人家所種葉類茅而花有兩種如黃說者皆不相似大抵古所謂香草必其花葉皆香而燥濕不變故可刈而為佩若今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萎皆非可刈而佩者也又吳草廬有蘭說甚詳今所謂蘭因黃山谷稱之遂謬以為離騷之蘭夫今之蘭其種盛于閩朱子閩人豈不析其土産而辨析如此世俗猶以非蘭為蘭也按家語晏子云蘭之本三年湛之以漉酳既成則易以匹馬非蘭之本性也所以湛者美矣注云本根也投物水中曰湛澄酒曰漉以酒嗽口曰酳夫惟蘭之根葉俱香故投於酒而香冽其貴敵匹馬若今蘭之根投之酒中立見敗腐矣尤可為今蘭非古蘭之證也溱洧二章章十二句王氏柏欲舉聖經中朱子所謂淫者盡删之其說曰淫奔之詩聖人之所必削決不存于雅樂也審矣故新臺牆有茨十篇猶可存之若淫奔之詩雖閭閻小夫莫不醜之今夫童子淳質未離情欲未開或於誦習講說之中反有以導其邪思非所以為訓敢記其目以俟有力者請於朝再放黜之一洗千古之蕪穢計三十有一篇焉且召南之野有死麕王之大車秦之晨風齊之綢繆唐之葛生朱子不謂淫者亦以為淫而去之明李經綸亦欲删詩大㫖如王洵如是也王李欲洗千古之淫詩以正人心而聖人獨留此淫詩以蠧風俗乎夫乃知淫詩聖人早删之固無待於後人之補救也其不删者刺淫而非淫者之詩也孔子謂放鄭聲朱子以為鄭詩宜放然鄭詩中緇衣羔裘女曰雞鳴出其東門不可以為淫也一不知放之者并此四詩放之歟抑存此四詩而不放也欲存之而槩曰放之不可也欲盡放之而一則曰吾於緇衣見好賢之誠再則曰好賢如緇衣於樂則放之唯恐不速於修身立政稱之惟恐不至毋乃相左乎今惟左氏傳一書可以證鄭詩之不淫而說者則又以為斷章取義夫斷章取義亦必有義可取以太王之事為文王以衛之仁人為孔子所謂擬人於其倫也若淫昏之人狹邪之語何義可取而比强國之諸侯大夫欲其母免於罪戾也得乎哉故曰鄭聲者别有淫聲而非此二十一篇之詩也鄭二十一篇五十三章二百八十三句詩序補義卷七
