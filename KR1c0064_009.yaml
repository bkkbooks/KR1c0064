body:
  text: 詩序補義卷九石泉縣知縣薑炳璋撰魏説者謂諸國有世家小序得據以為説惟魏與鄶史遷所不能述故其美刺皆湮沒不傳可證詩序非子夏所授受按鄶滅於東遷之前魏滅於魯閔公之世子夏生於春秋季世相去二百餘年安得逆溯其世次而曲為之説且諸篇之序國史所傳國既就滅史亦隨亡魯史拾遺乃於殘編斷簡中得此二國之詩世已不可考矣於此見國史考核之詳記載之慎孔門傳信之確而不敢以鑿空無據者惑後人之見聞也史記曹世家世次甚明今所云昭公共公皆後序之辭其在古序亦何嘗有一篇指為某公乎而以是為疑則凡注書一有未詳其餘説皆不足信矣葛屨刺褊也魏地狹隘其民機巧趨利其君儉嗇褊急而無德以將之此於風詩别立一格蓋風人從未説出所以刺之之故而此詩明言之以儉本美德原無可刺儉而太過至於褊急則不能無譏矣詩人之意正使後世驕侈惰慢者不得以是詩為口實也通篇最喫緊在好人二字蓋當時之卿大夫有爵位者非可與賤者伍也提出好人來以明所刺之人此篇賦也首章從屨説到裳説到要説到領要襋亦女手所縫説者言治其要襋而大人即服之不待女功之詳備不知衣裳自有制度豈有即治要襋而便可服之之理朱鬱儀言衣之綻裂或治其要或治其襋略補緝之而好人遂以為服也此似不見其可刺也二章左辟讓也以右為上故讓而避左也揥所以摘髮象骨為之婦人之飾也恭録折中云魏之風俗大約男事耕耘垢衣敝履而見客則必致敬女操井臼裙布叉荆而行禮則必致飾故葛屨之人皆能宛然左辟縫裳之女有時佩其象揥乃實事也此則儉而有禮更無可刺所可刺者以其心褊也蓋俗過於儉則有計較錙銖吝嗇迫狹之意惟此以為刺而餘無譏焉嘉其所已能而勉其所未至也葛屨二章一章六句一章五句傳以好人指縫裳之女而左辟又引婦至門夫揖而入不敢當尊之禮象揥所以為飾此説自通然以褊心刺娶婦之人未免費解不如集傳好人訓大人而刺褊之意更醒也汾沮洳刺儉也其君儉以能勤刺不得禮也天下豈有人君而躬自采莫者哉采桑婦人之事即公行公族儼然大夫魏俗雖儉亦不至此況君乎如英如玉正所謂如圭如璧者以是為公路公族綽有餘地尚何儉不中禮之刺或云即不稱其服意未聞如英如玉而服猶不稱也惟何氏楷云彼其之子指君子在下位者蓋所美在之子而所刺在公路也魏俗儉嗇有君子其人者文質彬彬為俗儀表詩人目擊其時卿大夫惟是褊心故贊其人以為絶不類今之為公路者伐檀深贊君子以刺貪意亦猶是所謂美乙而刺在甲者也一章集傳興也沮洳雖下猶有美菜可採喻之子雖賤猶有美德可稱蓋彼其之子才猷外著與公路相反但覺彼則風采此殊朴遬可刺也二章以汾之一方逺於國興之子在下逺於朝也如英宜從集傳言其風華文物掩映於水湄也尤與儉嗇相反三章無度以才猷言如英以威儀言如玉則統內外言之君子比德於玉如之則備乎德矣汾沮洳三章章六句或曰汾為晉水公路公行公族為晉官此晉詩而采之魏地者竊以為不然地理志汾水出于太原西南入河王氏謂入河之處即魏舊國所謂南枕河曲北涉汾水是也如言汾者即為晉何異言江漢者即為秦地哉吳有太宰陳鄭宋魯亦有太宰鄭有少正魯亦有少正晉有公行齊亦有公行安見晉有是官而魏獨無之魏之官明見於詩況左傳晉但有公族公行餘子而無公路也季札於魏風曰泱泱乎大而婉儉而易行以此二詩觀之誠有合矣武公篡唐日即于侈已渺不相涉曲沃以前魏尚無恙晉太史安得即採詩於魏地乎皆不辨而知者也園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無德教日以侵削故作是詩也刺時者刺時政也辨説國小而迫日以侵削者得之餘非是王風黍離作於既亡之後故其辭怨而歸之于天曰此何人哉不忍斥其人諱之也園有桃作於將亡之日故其思憂而責之于人曰彼人是哉不欲寬其罪警之也朱子謂國小無政無政無善政也後序但云儉嗇箋又云民無以戰豈詩意乎蓋國勢日削強大見陵其君茍簡為心其大臣偷惰成習詩人憂之而作歌彼昏不知轉謂之驕責其露才揚已正坐不思耳若能思之便知朝露之危不可終日發憤自雄自不容己是篇一氣六折自已心事全在一憂字喚醒羣迷全在一思字至其所憂之事所思之故則俱在筆墨之外托興之中范家相云棘之實棗也桃與棗皆落實於秋詩人因所見以起興見其隕落將為人所取食故目擊而生憂士季本謂未仕之稱非也此詩哀愁婉轉是大夫憂國之辭當從箋訓事謂不知我者以我所言之事為驕也人君之職在論相兩言彼人是哉彼人曰是孰敢以為非茍延旦夕終日泄泄而以其君國拱手輸之晉也園有桃二章章十二句陟岵孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也補正自古無子别父母之詩蓋仁人孝子不忍一日離親而宿於外至以征役逺行則暌隔之傷意外之慮有不忍出諸口者故必待辭家就途之後始自言其瞻望之情也不言已慮父母之疾痛衰羸但言父母憫已之勞悴懼已之棄捐隱深悱惻之辭也序曰孝子行役思念父母則詩為孝子自作登山望親正孝子之情也爾雅釋山多草木岵無草木屺傳言無草木曰岵有草木曰屺正與釋山相反集傳未正其誤王氏聞句嗟乃一字句也夙夜無已箋作勉勵之辭與上嗟字不相呌應而上慎一頓亦無力集傳為優遊子行役所懼死亡父母與兄之心一也故曰止曰棄曰死皆一意也止者止其地棄者棄我不歸皆含死宇末章方明點出耳陟岵三章章六句十畝之間刺時也言其國削小民無所居焉刺時者刺時事之不可為也桑者桑婦也穆天子傳居范宫以觀桑者是也采桑豈男子之事此詩蓋朝士之婦勸其君子歸隱而詩人述之以刺時也魏國削弱上下困敝君子仕於其朝不得行其志其室家勸之也曰十畝之間此採桑之婦間間自得吾將與子還兮不能鬱鬱居此也又曰吾將與子逝兮長往而不返也夫賢者不得其所而室家有歸隱之辭其為時可知故曰刺時也春秋之世田制未壞魏國雖小豈至一夫受田十畝箋謬也十畝之間東萊吕氏謂甚言之未可為定數也一云五畝之宅合兩家所授言之十畝之間二章章三句伐檀刺貪也在位貪鄙無功而受祿君子不得進仕爾朱子從序説而少變之蓋本孔叢子于伐檀見賢者之先事後得也然美在君子則刺在貪夫故注孟子不素餐章仍用序説箋云上三句為君子之人不得仕進也不稼不穡四句為在位貪鄙無功而受祿也足盡此篇大意大烹以養聖賢而今日有不然者君子才可任國猶檀木之可以為車也乃坎坎伐檀而反有河干之置但見河水清漣伊人冷落而佌佌有穀者何多也於是呼而問之曰爾不稼不穡何以取我之禾三百廛乎爾不狩不獵何以瞻爾之庭有懸貆乎食於人而無以治人是素餐也彼河干之君子不素餐而不與之餐爾何以居其位食其祿而不自返乎義本詩緝傳云坎坎伐檀聲木之堅故伐之勞重檀之難得不重伐之勞也河水清且漣猗猶云泌水樂飢正與取三百廛庭有懸貆相反蓋伐檀二句已反照起小人無才而任用河水句已反照起小人得志而受祿故呼而問之素餐本直刺小人此又於君子身上反照刺意更婉伐檀三句興也若作君子實事則輿人一流似非君子之業補正此與碩鼠相表裏三百廛三百億三百囷乃下所以奉上且於禾曰取則為取於下明矣古者民風淳厚田獵獲禽必獻于上豳詩所謂言私其豵獻豜于公是也輻也者欲其直指也故下云河水清且直輪取其轉淪小風水成文轉如輪也詩人用字之精如此伐檀三章章九句碩鼠刺重斂也國人刺其君蠶食於民不修其政貪而畏人若大鼠也辨説此亦托於碩鼠以刺其有司之辭未必直以碩鼠比君也是時卿大夫各有采地橫征于私邑故詩人述其民刺有司之言誦之於朝以刺其君也唐仲友詩解以碩鼠為愛君之至其以此乎通篇為民將去之辭著眼在誰之永號一語君門萬里拊膺長號其君不聞也涕泗入告而壅不之達也惟舍之以去庶不哀呼斯土耳詩人述其辭而歸結于此以見嗸嗸滿野呼籲莫知人心一失君將何恃使魏君聞之先去掊克之吏而後國可安也一章連呼鼠而女之怨毒之深也集傳顧念也不念我仰事俯育但取脂膏而朘之耳碩鼠且貪且畏是貪有司伎倆逝往也言往矣將去女矣適彼樂土正找足去女二章莫我肯德我以為脂膏彼以為錙銖耳我以為額外之求彼以為奉上之義耳直者不敢望其分外施恩只是無碩鼠之貪殘便是直道宜民三章聶夷中詩二月賣新絲五月糶新穀即食我苗之謂也不言穀而言黍麥者額外之征也不言實而言苗者稱貸之益也誰之永號言樂郊無碩鼠則誰使之永號也碩鼠三章章八句讀伐檀碩鼠二篇魏固亡于貪殘而不亡於儉嗇也然以儉嗇始必以貪殘終聖人之道中而已儉而失中安于庸鄙苟延旦夕其於經國大猷一似夏蟲之不可以語氷説苑云邯鄲子陽園人忘桃則知之其亡也不知務小者亦忘大也儉嗇之極必至貪殘猶之老莊之後必為申韓其勢然乎魏風七篇次第井然蓋簡編頗約秦火之後未經龎雜故血脈貫通如此此七篇中先王良法宛然具在其輿服則衣裳佩飾一衷于古無瓊辨玉纓之侈也檀車輪輻一本考工無小戎二廣之竒也其官制則公路公行公族非如晉之以異姓卿之子為之也其役法則兄留弟行户無兩役非如唐風之父母何食也其田制十畝曰場圃其外曰外圃一夫百畝曰廛井田之制燦若列眉即孟子所謂鄉田同井也其男務稼穡其女事蠶桑歌謡止以抒憂狩獵所以講武而刺淫之作無聞是以有忠臣有孝子有如玉之君子有退隱之髙人士愧素餐而不貪民避碩鼠而不叛非先王之遺澤猶有存焉者乎季札曰以德輔之則明主也蓋深慕乎其風之近古也詩所云魏者周同姓之國東遷後乃為晉滅則其詩多西周詩也蘇氏疑皆為晉而作此猶以其列于唐風之前也檜之序于鄭逺矣亦以為檜詩皆為鄭作是蘇氏之意謂西周不應有風也成康而後幽厲以前太史之所採者安在況衛武鄭桓泰仲之屬明在西周乎朱傳國風之首二南以用之閨門鄉黨邦國而化天下十三國則亦領在樂官以時存肄此西京舊典如此魏國七篇十八章百二十八句詩序補義卷九
