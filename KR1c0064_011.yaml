body:
  text: 詩序補義卷十一石泉縣知縣姜炳璋撰秦按史記平王封襄公為諸侯襄公于是與諸侯通使聘享之禮十二年伐戎至岐卒可知岐東南鎬京之地襄已得之但岐以西仍為戎據耳詩引終南其明徵也一統志終南山在鎬京内今為西安府綿亘藍田咸陽長安盩厔四縣之境又曰鎬京城在咸寧縣西南咸寧即古咸陽則終南在鎬畿内無疑岐山為乾州之武功縣去西安幾三百里苟非已得鎬京安得飛越至岐耶况秦之犬丘即今興平縣去西安不及百里犬戎弑幽驪山取賂而去王室東遷遂空其地黍離所為作也襄公力戰逐戎則地非秦有而誰有耶平王特賜豐岐不言鎬京秦已有之無待賜也然則集傳已得西都八百里之地西都對東都言正指鎬京非無據也迨其子文公逐戎并豐岐得之而以岐東七百里之地還周岐東即鎬京不言鎬者秦人諱之且言岐東若在岐之封内者然以冀後日之復得耳其後疑周復賜之故秦境至河豳風二南之周一變而為强悍之秦豈一朝一夕之故哉東遷以後西戎竊據王都其耳濡目染不過鯨吞豨突及秦襄開國其間時時以復仇勵衆正如勾踐棲㑹稽民年十五以上即籍為兵故越强天下盖君臣俱以枕戈寢干為事其國中以擊刺戰鬭為先卒頼其力克復故土雪恥自强而俗已不可改且自襄公以後孰為文武之君又安能復見文武之民豳風二南之俗也强悍不已遂積而為咸陽之燼其亦斯民之不幸也夫車鄰美秦仲也秦仲始大有車馬禮樂侍御之好焉此美秦仲寺人不主傳命而秦用之想見百度草創官屬未備景象細玩此詩語若極為誇美而親暱之意多名分之防少與駟鐵篇徒御截然號令嚴肅者不同說者云纔言體統森嚴忽又禮文簡易此漢廷叔孫通未制禮之時創主之國其臣多野固是然詩人又别有㣲意盖以秦仲初封車馬始多侍御方設國勢兵力猶未十分强盛今以初造之秦當猖獗之冦適以滋禍耳故以飲食宴樂告之言及今之時安常處順可以養鋭蓄精觀釁而動如輕於一試所謂不鼓缶而歌則大耋之嗟凶矣說者乃謂如魏武對酒當歌人生幾何許白雲又謂秦仲之世非可樂之時不知仲之死于犬戎詩人已灼見之也美之中其有諷之意乎今者不樂逝者其亡豈于立國之初為此不祥之言况西戎未殄非可苟安盖勸之以養晦也不然深居逸樂乃趙髙之所以愚二世者豈嬴氏開國之初而有是哉車鄰三章一章章四句二章章六句駟鐵美襄公也始命有田狩之事園囿之樂焉此當與下篇叅看下篇言出兵時車甲之盛從義之勇以見强敵有必摧之勢此詩言平時講武極其完備整暇以見在我為習練之師惟其兵為習練故知敵有必摧惟其預習平時故出兵時車甲可誇從義甚勇是駟鐵正小戎之張本也按史記秦仲既亡其子莊公宣王以兵七千與之破犬戎復予秦仲後未幾莊公之子世父被擄迨西京淪喪幽王被弑而戎更强矣以猖獗之戎益以豐岐襄雖志圖恢復如冒昧出師秦仲世父之續耳故此篇最是立國關鍵續序以園囿之樂與田狩並言昧其㫖矣只言田獵一事而其國中富强徒御衆盛號令嚴肅人心樂從簡閱訓練之無不至休息節宣之無不周以視前篇之百度草創其氣象大不同一章駟鐵孔阜馬之盛也末章四馬既閑馬之良也各舉其一耳六轡在手言御之善也媚子猶云羽林親軍謂親愛之人也是上二句隠然有公在内故直言從公二章人君田獵虞人張翼以待射故曰奉亦見國勢方新人心競勸意命左即左是御者合馳驅之法而舍矢即中是射者有如破之能盖御雖從者而命之亦自君也六帖云次章意一串而各二句又自相連各一句又自有意按只此便有四時講武遺意富國强兵作用不徒作校獵圖觀也左之獸之左非車自左旋也三章有始而無終者氣已盡也有張而無弛者力易竭也獵畢而遊養人之力馬不馳驅養馬之力釋驅逆之輶車以載田犬亦養犬之力也事事節宣蓄銳養精然後可以赴敵而勝戎駟鐵三章章四句小戎美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉一章分兩人語本于後序傳無此意也集傳謂皆婦人之詞是也通篇只是自稱其君子即每章上六句極寫車甲之盛正見君子帥之足以挫敵也而其所以美襄公者則詩人述其言之意也安成劉氏云前六句誇車甲後四句叙私情非也努力戎行已無私情矣嚴粲謂閔其不堪勞苦亦非也乃憂其無以奏功耳盖車器鮮明材官踴躍士有必死之心軍無反顧之志而我君子以如玉之徳運籌帷幄自必斟酌得宜今日者帥此車馬在其板屋矣其果能奏績否耶徒使我瞀亂心曲耳如此首尾一意而婦人亦勇于義意亦見矣觀温其如玉一句覺寫兵車俱見細膩不是一味鹵莽亂我心曲者西戎甚强即萬分慎宻猶恐疎虞以見臨事而懼即婦人與知焉秦之所以興也黄㤗泉謂次章已及器械以言龍盾之合也不知龍盾取其蔽車而下已說到控馬故此章只主言馬不得以下章意雜之觼軜承上六轡言惟其驂馬納轡于觼故云六轡在手也温其在邑言從容籌畫應無患害盖就如玉之徳細思之庶不至輿尸之患耳方何為期言將以何時為還期見君父之仇一日未復則王師一日不旋胡然而我思念之哉胡然猶云何為言無容念其歸也正以大義制其私情所謂勇于赴敵而無所怨乎三章厭厭安静也兵事忌囂惟静鎮者能成大功徳音美譽也秩秩有次序不欲速也所謂美譽者報君父之仇雪生靈之恥不愧將帥之任也然曰秩秩則不可以邀功僨事不可以欲速敗謀已寓其中首章亂我心曲憂之也次章胡然我念之稍安之矣末章言徳音則知其奏凱而勒勲也小戎三章章十句儒者以秦有天下二世而亡因歸咎此詩此不識時勢者之言也西戎殺秦仲盡滅犬丘大駱之族夫且弑幽王擄褒姒周轍遂東凡為臣子豈徒不反戈而鬭已哉秦自莊襄以來歴世不隳其志殘山剩水以耕以牧卒致富强襄公奄有鎬京通上國其子文公盡有豐岐之地至徳公徙于雍徳公之子三人宣公成公讓國以及穆公遂伯西戎其始盛則由襄公也盖攘外所以安内非威武無以為功駟鐵一篇即車攻吉日之㫖也小戎即采薇六月之義也特規模有廣狹則風雅有異音不可謂周則是而秦則非秦之失在有國以後不在造邦以前也或以寺人之令啟望夷指鹿之漸小戎俴收變八鸞元戎之舊以為秦人罪不知秦仲初有寺人未聞其用寺人也即史年表謂穆公學于宁人宁人寺人也用寺人始于穆公非仲也小戎兵車對大車則為小戎制與考工合當此上下同仇可以𠞰賊何妨剙為軍器而况秦固未嘗創也故三篇當以集傳為正然云以大義驅其人而敵之强弱戰之勝負皆有所不暇顧則襄公勝算在握可以語秦仲不可以語襄公也蒹葭刺襄公也未能用周禮將無以固其國焉武城王氏曰秦俗方急功力好戰爭置禮教于不問故當時有西周遺賢明先王之道通教化之原詩人欲襄公求之與共圖國事也故作蒹葭之詩襄公大仇未復百事草創乃國已富强天子錫命通聘列國據西周之地治西周之民而不以西周之道且得志而驕居然立西畤郊祀上帝僭端見矣其子文公嗣立即定三族之刑于是國有賢人見幾而作飄然于蒼葭水湄之間而為之君者不過而問焉詩之所為作也集傳秋水馳神寄思境外而可望不可即世安得有是人箋以為指知周禮之賢人是也而作是詩者亦賢人也首二句固是現前寫景而一篇悲凉無窮蕭瑟正于國勢勃興之時作此變徵之調盖得其人即可希蹤成周刑措非其人則將來强力不已必至尚刑名變古法馴而燔書坑儒無所不至矣此世道升降一大關鍵也故駟鐵小戎不足為秦病而土闢兵强但知選士以勵兵戎不知求賢以培元氣秦之為秦可知矣蒹葭三章章八句李氏以伊人為東遷故主豐岐之民思之非也終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之集傳以為美其君盖美之中寓戒之意也嚴氏云周地沒于戎終南岐西名山按終南之綿亘何止千里則自鎬以至豐岐莫不有終南故李善註西京賦終南南山之總名可知雍州之山多稱終南固不獨長安之南山武功縣南之一山也然則秦已奄有鎬京終南固其境内所云君子至止已至終南之下矣集傳之說是也西都之地鎬為王城其地最大岐山去鎬甚逺豐則與岐相連盖西都已入于秦戎所踞者僅豐岐耳詩人所為誇美之又從而勸戒之也終南秦鎮提出便有囊括全雍尺地不可與人意秦都犬丘在西垂而鎬則雍之東境以河為界洛邑在河之南其至東周必自鎬而南當其以兵勤王渡河至洛受服而歸終南之山所必經也故曰君子至止則錦衣狐裘若與終南嘉木相與輝映末二句便見位尊責重所以副天子寵命者不容苟矣玉藻君衣狐白裘錦衣以裼之傳及集傳俱引以釋此詩盖諸侯仕天子之廷則服狐白裘有功則賜錦衣以裼之錦衣即裼衣非錦衣之外又有裼衣也裼衣即禮服非裼衣之外又有禮服也詳見周南羔裘篇傳云錦衣采色也采非素也而鄭氏欲合于裘色故云素錦又云狐白裘諸侯裼以錦大夫裼以素則自相戾不知君以采臣以素雖同服狐白而裼各不同也至天子亦服錦衣狐裘經無明文鄭氏以君臣視朝同服故以意擬之耳壽考則有倦勤之憂不忘者自始至終時以王命為念也終南二章章六句通鑑前編宋太宗時秦襄公冡壊得銅鼎狀方而四足銘曰天王遷洛岐酆錫公秦之幽宫鼎藏于中此即天子既命之即有其地之說也黄鳥哀三良也國人刺穆公以人從死而作是詩也此詩左傳專罪秦穆史本紀亦如之非末減康公以康公之罪不待言也正義引應劭云繆公與羣臣飲酒酣公曰生共此樂死共此哀于是奄息仲行鍼虎許諾及公薨皆從死似三良亦輕于一諾然當從左史此不足據臨其穴惴惴其慄集傳作生納壙中說本揚子然此種竒惡始皇胡亥所施於工匠者穆康雖暴應不至此據括地志及陶潛詩三良别有塜生納壙中實無其事君子求死易處死難三良如以穆公一言而慷慨自殘誠不免輕于鴻毛之譏惟本不肯死而穆公命之于前康公迫之于後其惴惴恐懼正如生納壙中者夫然後見三良之無過三良之可哀也上言誰從穆公則其穴穆公之穴也三良之墓當與穆公一處凡言三良别為葬穴皆與詩悖不足據惴惴其慄將迫之自殺而恐懼也詩人極力為三良表白歸罪穆康全在此二語然三良非懼死者懼死不得其所為後人議耳序何以不云刺盖穆康之可刺顯而易明惟三良恐其處死之道未盡善而不知三良勢處于不幸非死傷勇之謂也序重表微故不曰刺穆康而曰哀三良百夫之防東萊謂有才智在非匹夫之勇也防者防患于未然禦者禦患于方至後世防禦使官本此黄鳥三章章十二句揚雄責三良復言而不近于義李徳裕曰三良者非所謂殉仁義也殉榮樂也蘇軾和陶詩三子死一言所死良已微王氏詩疑三良既不能引大義納君于無過又不能為國家慮不以自全為嫌按諸儒摘抉三良不遺餘力不知作詩與序詩者早知三良之無過也晨風刺康公也忘穆公之業始棄其賢臣焉傳曰先君招賢人賢人往之駛疾如晨風之飛入北林箋云先君謂穆公按如由余自戎往百里奚自宛往丕豹公孫支自晉往也觀不承權輿之詩則康公之棄賢可知矣恭録折中云君子謂賢人也君子隠處心常思之思而未見故憂而不已不知君子因何故而忘我實甚盖欲知其所以去之之故而得其所以來之之術也二章山宜有櫟隰宜有駁以興國宜有君子也未見君子則無以為國故不樂也三章如醉則憂更甚矣上棄之其下思之并責其不可果于相忘此亦忠君憂國者之用心惜康公既棄君子并思君子者而亦棄之也按忘我實多謂其果于忘君并謂其果于忘先君也然必有所以致其忘者仍責備在康公身上晨風三章章六句無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉此詩繋于康公之世錯簡也諸儒之言錯簡者多矣而此獨可據者以詩言王于興師耳按康公從無為周興師者且秦自穆公以來不知王乆矣安得篇章所及尚念成周故天子乎金氏履祥何氏楷並謂莊公之詩按秦紀秦仲死于戎宣王命其子莊公與兵七千使伐戎破之則報仇雪恥功莫大焉何以言刺惟許氏謙以為美襄公夫以為襄公之詩是也而以為美非也盖刺襄之用兵以勤王為名而因以為利也襄公東遷之賢侯也幽王弑襄公與戎戰有功又以兵衛平王遷于東都王命伐西戎遂有鎬京之地終南之詩可據也史記王命襄公為諸侯賜以岐西之地令逐戎有之盖鎬京業已恢復使襄公知君臣大義剪荆棘建宫廟掃陵寢迎大駕而西以復文武成康之業豈不與周公召公争烈哉而驅戎出走奄有王都其後文公得豐岐猶能以岐東七百里還東周而襄公得鎬乃不能以尺土歸天子彼其意以為吾得之戎非得之周不知赫赫王命復我疆土未嘗以鎬京賜秦也觀文公得豐岐而以故鎬還周則知襄公之時周未嘗以鎬賜矣乃公然履天子之廷闕涖天子之郊圻天子方錫命為侯寵以章服并岐西亦命得之而襄公之罪可勝言歟文公始辭而終受不足責矣國史以周秦興亡一大關鍵特録此詩為萬世戒其意深矣然則無衣之詩其在終南之後乎三代無所謂兵此謂用兵指周禮五兵之屬即詩所謂戈矛矛㦸甲兵是也補正云豈曰無衣言衣装皆夙具也戎事均服故同袍非彼此共服之謂子指襄公言吾與子同仇者為王興師耳奈何克復神京踞而有之乎曰偕作偕行知襄公身在行間與士卒同卧起也無衣三章章五句渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也疏云康公即位為君思母本送舅時事而作是渭陽之詩述已送舅念母之事也序云康公念母不曰太子送舅則念母為正㫖而送舅其追憶也玩我送字曰字何以字宛然日後追叙口吻葢身既即位歎母之不見而追憶至舅且追憶送舅時之思母一片孝思溢于言表言我昔日之送舅也至何地曰渭陽也何以贈則路車乘黄也當此之時已悠悠思我母矣今日躬已踐阼舅氏又復下世迴念昔日之思又成往事黯然傷懐何時已耶盖以今日之思母因想前日送舅時已思之矣今并舅亦不可得見悲之所以益至而念之所以益深歟往日之思因舅念母今日之思又因母念舅凡人生極惨戚地未嘗不思父母極安樂地亦未嘗不思父母康公承穆公之業日益富强迴想母氏劬勞欲養無由真有心能志之口不能言之者而從送舅一事抒寫其思讀者知此詩為孝子不是賢甥渭陽二章章四句權輿刺康公也忘先君之舊臣與賢者有始而無終也謝叠山責詩人禮貌衰而不去而說者因視為彈鋏無魚之類不知居食但指一節以槩其餘也不忍斥言其大者而但責其奉養之小者亦忠厚之意歟且此賢者為穆公之舊臣與君共休戚者也諫不行言不聽禮意漸衰而後翻然决去之乃知從前惓惓君國之意正未忍遽絶也首二句指穆公時今日指康公時二字一頓無限感慨吁嗟一嘆所該者廣權輿二章章五句或曰秦穆賢主也秦風十篇止黄鳥為穆公卒時之詩豈穆公無可美歟曰即有秦穆之詩褒美太過聖人削之矣盖穆公據百二之險奄有西戎知重耳之賢貪利而納夷吾取賂不遂而執之得賂而釋之貽晉數世之禍繼以懐嬴脅重耳人道舛矣又乘文公之喪伐鄭滅滑此其志豈區區在鄭滑哉穆之不得志于中原晉之力也然有大功二焉大義二焉齊桓既沒天下無伯雖得宋襄之補苴而泓之戰竟為楚敗穆公卒納文公于晉使天下無伯而有伯戰于城濮復使小子憖帥師助之楚遂大創而晉伯以成皆大功也天王出居于鄭秦伯師于河上將納王非晉侯辭之則勤王之烈著矣朝王于踐土使晉文不致河陽之狩則修覲禮于京師矣皆大義也然春秋兼重伯功故有功于伯者節取之詩專言王道故桓不見于齊風文不見于唐風更何有于秦穆哉獨其知人善任為康公以下所不及故存權輿一詩志其懐先君而已秦國十篇二十七章一百八十一句詩序補義卷十一
