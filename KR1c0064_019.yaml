body:
  text: 詩序補義卷十九石泉縣知縣姜炳璋撰桑扈之什桑扈刺幽王也君臣上下動無禮文焉左傳衛侯饗苦成叔寧惠子相苦成叔傲寧子曰詩曰彼交匪敖萬福來求今夫子傲取禍之道也鄭伯享趙孟於垂隴公孫段賦桑扈趙孟曰匪交匪敖福將焉往中說文中子曰命之立也其稱人事乎故君子畏之魏徴曰詩曰不戢不難受福不那彼交匪傲萬福來求其是之謂乎君子曰徴其能自處矣范氏寧曰君臣之禮廢則桑扈之諷興玩寧惠子趙孟及文中子之言則知此詩正重彼交匪傲句也蓋幽王燕諸侯必有禮儀失度者故詩人作此諷之欲其篤泰交之誼而戒憮敖之風也一章有鶯其羽猶之熠耀其羽熠耀螢也彼借以為鮮明鶯黃鳥也此借以為文章詩所云羽興天子之羽翰也故曰受祜酬酢欵洽從敬心所形則有樂胥之美君子指王胥皆也樂胥無一人一念之不然孚契之至無有些子攜二處所謂厥孚交如也則諸侯皆吾羽翼足以受天之祜矣二章詩所云領興為諸侯之長率也故曰萬邦之屏屏言長率諸侯使大小相維强弱相制足以為諸侯之屏蔽三章詩所云之屏承次章之翰承首章戢難又承次章受福又承首章天下諸侯斂戢而敬慎王之受福不已多乎四章此結出正意來不敖者敬也言兕觥旨酒之間相與交際致敬盡禮而無敖慢則屏翰立戢難著四海一家王之萬福若來同矣用敖字一㸃而諷王之意躍然桑扈四章章四句按古義以桑扈為饗禮蓼蕭為燕禮湛露為來朝而饗燕又以為九夏之驁夏說俱失之鑿鴛鴦刺幽王也思古明王交於萬物有道自奉養有節焉何氏楷曰咏申后事也以白華之詩證之其第七章鴛鴦在梁戢其左翼之子無良二三其德詞旨昭然按何氏說詩多失之鑿而此詩似何義為優據史記褒姒為后事在三年前編幽王三年始嬖褒姒至五年始廢申后及太子宜臼說雖不同而此詩之作當褒姒初嬖之時申后見疏之日褒猶未后也申猶未廢也詩人豫識其幾故以鴛鴦起興鴛鴦匹鳥雌雄未嘗相離夫婦之喻也畢之羅之為人掩取褒姒中傷申后之喻也君子萬年言當為宗社計宜其遐福言當為嗣續謀乘馬摧秣言車馬親迎不比奔則為妾也漢杜欽云後來異態則正后自疑而支庶有間嫡之心又云為漢家建無窮之基誠難以忽此前二章意也來濟諫立武氏疏云周文造舟以迎太姒而興關雎之化孝成縱欲以婢為后使皇統亡絶社稷傾淪即後二章意也詩人咏夫婦曰雎鳩取其有别盛世之夫婦也曰鴛鴦取其情摯衰世之夫婦也一章舊說以畢羅為鴛鴦之美事疏云畢則執以掩物羅則張以待鳥以見觸處皆網羅也君子能篤於夫婦則網羅不得加而萬年福祿常與其德相稱也二章戢左翼以相依於內恩誼之篤也左翼戢則右翼舒防患之周也君子於夫婦之間能如是以立萬年之基始終無猜宜其始終是福矣三章夫婦之道不可以賤妨貴王之立后也乘馬在廏既摧之又秣之以致親迎之禮君子將以是立萬年之基以福祿偕老安得自階之厲邪艾老也追述親迎盛禮以見嫡非妾所得加何氏曰亦猶唐髙宗欲廢王皇后長孫無忌述太宗言朕佳兒佳婦今以付卿言猶在耳之意四章有福祿之安不當使有畢羅之危綏安也鴛鴦四章章四句頍辨諸公刺幽王也暴戾無親不能燕樂同姓親睦九族孤危將亡故作是詩也後序云不能燕樂同姓言有頍者辨不燕王何以皮辨且末章明言樂酒今夕况同姓大臣其所規勸亦不在一燕飲也按幽王任用小人其於貴戚元老盡置閒散而社稷之安危民生之疾苦宫幃之理亂刑政之是非彼既不之下詢此亦無由獻納滿腔忠告無可發抒庶幾嵗時㑹食之間少長咸集或者動其親親之誼眷念老臣咨以密勿因事救正將在斯時無如危亡日迫而王不知也故一則曰庶幾悅懌再則曰庶幾有臧而君子則惟宴而已明年此日不知有此㑹否耶今夕兩字無限悲凉故上二章筆筆注到末四句味其語意憂切痛深固不僅如陳思之求通親親欲叙骨肉之恩又豈但中山之畏讒聞樂不知涕注之橫集也哉一章言王著此皮辨欲何為乎蓋旨酒嘉殽將以燕同姓也此與宴者豈是異人乃王之兄弟至親正如蔦蘿施于松柏榮則俱榮悴亦共悴所謂與君共休戚者也向也未見憂其間隔而無以自通今日庶幾說懌而咨以肺腑乎爾王也匪他朱子謂非他人恐復豈伊異人句箋言至親也言親之至非有他嫌疑隱匿而不言嚴氏曰蔦蘿視松柏以為命松柏殞則二草亡矣言此以醒王也箋云君子斥幽王也二章兄弟具來謂不止一二人豈無至論可採變松柏言松上承具來之文只王一身為九族託命所賴者益多矣庶幾有臧臧善也改不善以至於善也三章在首者辨已在首將宴之時也自兄弟推之更有甥舅亦吾休戚相關者也危亡無日兄弟甥舅無不知之吾恐相見無幾樂酒惟今夕而已而君子則惟有燕飲未嘗籌及一事死亡其能免乎李氏樗曰先集維霰所謂危亡有漸也國將亡必先離其九族頍辨三章章十二句車牽大夫刺幽王也褒姒嫉妬無道並進讒巧敗國德澤不加於民周人思得賢女以配君子故作是詩也韓詩作覯爾新昏以慍我心亦以此篇為刺詩也然續序云因褒姒之嫉妬思得賢女配之不使之復故后而諷之求新昏有是理乎竊以為是詩疑作於申后既廢之日褒姒欲立之時大夫欲救正其非而莊言不入因詳言天子立后必得賢女乃可正位中宫字字為褒姒反照令王三復其言使之知萬不稱任而自止故鴛鴦言申后之不可廢也車牽言褒姒之不可立也其云德音來括則哀其窈窕而不淫其色也云令德來教非入宫見嫉也云式飲庶幾則非飲酒沉湎夜以繼晝也云我心寫慰我心所以答天下仰望之心也而謂褒姒其人哉昔漢許后之廢成帝欲立趙飛燕為后諫大夫劉輔以為宜妙選有德之世考卜窈窕之女語曰腐木不可以為柱卑人不可以為主正與詩意相類一章敘往迎之時望之如是也提出間關車牽六禮親迎為天地祖宗主何等鄭重固非充下陳者所能當其殊禮也如果德音來㑹雖無好友為配亦足燕安而喜樂矣夫婦如賓如友好友猶云嘉耦暗指王王雖未善而得賢女自當轉危為安此想望之切於往迎時也二章言碩女既至而所望不虛也以令德來教則國有磐石之安君有明哲之譽凡我臣民亦且好爾而不至於厭惡也碩字對卑賤故衛風曰碩人對嬖妾也此詩曰碩女對褒姒也三章正言其令德之實褒姒之病在希寵縱欲故詩人言如得此碩女令德所見即如一飲也吾君雖無旨酒女式飲之吾君雖無嘉殽女式食之躬儉可風也吾君雖無絶大恩德與女女欣喜歌舞不置而不必惟吾言是聽惟吾欲是從貞靜可風也以是主持隂教足以表率六宫而不爽矣德以接遇之恩禮言左傳晏子云詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣歌舞感德之謂四章寫爾雅注云有憂者思散寫也箋云得見女如是我心之憂除去也承上章言碩女令德如是始足以作合君子而答仰望之心言陟髙岡者必析其柞薪取其葉之湑也議昏姻者必求得夫碩女取其德之令也鮮得覯而得覯之則心寫無憂何至廩廩乎有危亡之懼哉五章極力推重碩女之令德言其一言一動如髙山之可仰大路之可遵於是四牡六轡之良迎而立之則覯爾新昏亦足以慰我心矣不然微賤下質以穢中宫所謂海內失望荆棘生於闕廷乎車牽五章章六句朱善解頥以此為燕樂新昏上下通用之樂歌王道詩億云天子大昏之詩也青蠅大夫刺幽王也或以為厲王之詩而不知非然也古稱暴主必曰幽厲幽甚於厲也蕩之篇曰流言以對桑柔曰朋友以譖厲固非不信讒言者然周公召公依然執政而夫婦父子之間未聞失德他如宣王時之吉甫方叔申伯仲山甫之屬莫非先朝留遺出而佐中興之治可知厲王之世祗衛巫監謗樹惡於民耳其於故家大臣未嘗斬艾殆盡也若幽王之信讒其邁乃祖逺矣讒人之為卿士者如尹氏皇父虢石父之徒也讒人之為六卿者則番家伯仲允棸子蹶楀之屬也讒人之司百職則瑣瑣之姻婭讒人之居宫掖則艷妻之煽處讒人日多故讒言日盛莫親於夫婦而白華作矣則曰二三其德莫親於父子而小辨作矣則曰君子信讒正月云民之無辜并其臣僕信讒而誅戮行矣小宛曰哀我填寡宜岸宜獄信讒而刑政酷矣以及十月之交雨無正巧言諸篇其斥逐誅死於讒言者不知凡幾而召旻云人之云亡邦國殄瘁職此謂也然則幽王之廷尚有人乎驪山發難天子弒王后虜死事者僅一鄭桓公其餘皆發蒙振落無一人紓國家之難蓋忠臣義士靡有孑遺故也而原其始皆由於君子之信讒言是以幽王之暴甚於厲而禍亦慘於厲夫乃知青蠅之為刺幽也豐氏鄒氏欲移幽作厲則亦未取刺幽之全詩讀之也無信二字貫下二章逺之則交亂四國近之則構我二人王充論衡曰人中諸毒一身死之中於口舌一國潰亂故君子不畏虎獨畏讒人之口詩人惡貪則斥為碩鼠惡讒則指為青蠅皆惡惡之盡情青蠅三章章四句按袁季政注劉子云魏武公信讒詩人刺之真西山云讒言害政雖慈祥和易之君亦能變易其心志成王是也說者因指二人為成王周公四國為管蔡商奄說皆無據漢書昌邑王夢青蠅之矢積階西東可五六石以問郎中令龔遂遂引此詩以為讒人衆多師古注矢惡也又漢成帝建始中有青蠅垂萬數集未央宫殿中朝者坐陸氏詩學云詩人不過偶爾寄興而昌邑信讒夜夢蠅矢明皇友愛鶺令千數集殿樹一經品題物以類應孰謂言詩而可昧其㫖乎賔之初筵衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫泆武公既入而作是詩也刺時者刺當時君臣上下沈湎於酒也韓詩云衛武公飲酒悔過而作蓋以抑戒例此詩而其實與刺時之㫖不相悖也劉向列女傳云幽王惑於褒姒不時飲酒沈湎倡優在前以夜繼晝可為當時酗酒之證後世公卿沈湎名臣猶書酒誥以針况幽王無道通國化之而賢如衛武漠然未聞一諫草乎今讀抑戒賔筵而知武公憂國之忠也以刺時之意為自悔之辭猶微子言紂惡而云我沈湎于酒也武公入為卿士本於鄭箋然史無明文其為三公在平王之世蓋武公為王室親藩入朝而作詩刺時何必卿士哉一章言因祭而大射射之前後俱飲酒而意主乎射故能不亂也大侯周禮司裘職王大射共虎熊豹三侯注云虎侯王所自射熊侯諸侯所射豹侯卿大夫所射也箋以下有蒸衎烈祖之文故决其為大射也鐘鼓既設是貫串上下語蓋既設者為奏樂也樂八音皆備言鐘鼓舉大綱也公升即席奏肆夏一也主人升爵獻公公拜受爵而奏肆夏乃行酬禮二也旅酬之後獻工工歌鹿鳴三終管新宫三終三也射則天子歌騶虞諸侯歌貍首射畢又為羣臣舉旅既燕復射其禮殺射畢有無算爵有無算樂四也賔將出奏陔夏五也公入奏驁夏六也總於鐘鼓既設中統括之發彼有的二句即在獻爾發功內是一時事補正云功狀也奏中多少之功狀也大射禮釋獲者取賢獲告於公是也彼指射侯也詩言獻爾發矢功狀之時彼發矢於侯而中的多者將以此求爾之飲此爵也爾代中多者指中寡者二章祭祀有獻酬之文亦當飲酒然為祭而設故終亦不亂上章前八句注到舉酬逸逸後六句注到以祈爾爵此章前八句總注到後六句來蓋言為祭而飲者不至亂也章內百禮既至有壬有林祭中宏綱細目無不包括獨舉旅酬為飲酒言之也補正云錫爾純嘏子孫其湛尸嘏主人之詞其湛曰樂以後則祭畢而旅酬之時也箋以各奏爾能為獻尸之酌然上文既云錫福湛樂則祭事已畢此重飲酒不重獻尸蓋行旅酬之禮也室人不得言賔恐亦非佐食謂主人之弟子也對賓弟子言俱不言弟子者蒙上子孫之文則曰賓曰室人而意已見蓋長賓長兄弟俱無手自㪺酒之禮仇讀為㪺賓載手仇者謂賓弟子手自酌酒舉觶於長賓以酬主室人入又謂兄弟之子又舉觶於主以酬賓於是總結之云莫不酌彼康爵以奏爾時祭之功也所謂其湛曰樂各奏爾能者如此豈至於酒過乎三章祭畢而燕同姓主於飲酒矣初筵猶或自持旅酬之時已無令儀此與下章為一時事王者燕同姓亦服皮辨上下通服之下章有側辨之俄則知此章為祭畢而燕同姓武公為周同姓之臣得與此燕至於旅酬則見其上下皆失禮也上章旅酬祭畢之時也此則燕之時也四章賓醉己甚身容口容頭容無一足觀疏謂無算爵之後也補正云不知其郵謂舍其坐遷蓋號呶屢舞不知郵歷他人之位也五章深惡飲酒之亂而痛責行禮之不嚴也首四句統冒彼醉不臧不醉反恥承或醉或否來式勿從謂承監史來式語辭勿與弗通箋云猶無也言此監史目擊其上下喪德何弗從而告之以無使其甚慢乎如於非當言者禁止其言匪當由者禁止其語凡由醉之言俾出必無之物以罰之如此則酒戒嚴將人人自惕獻酬酢三爵之間嘗恐不能記憶儀度以致失禮䝉譴况敢多為加爵以至於亂乎而監史之不能則監史之失其職也責監史者所以責王耳賓之初筵五章章十四句魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉劉知幾史通云觀猗與之頌而驗有殷方興觀魚藻之刺而知宗周將隕隋書薛道衡傳煬帝覽道衡頌怒曰此魚藻之義也詩所云君民猶魚水也魚非水不樂君非民亦不樂也能豈樂飲酒則無酒荒之禍矣當時東諸侯遙禱之詞故曰王在在鎬按此詩以魚喻民非喻王也在藻頒首喻民之得其所也民得其所於是王在鎬京可以豈樂飲酒不然宵旰方長憂孔棘耳然則楚茨諸篇之刺幽在即位之始魚藻之刺幽在燕樂之始其幾已形其事未甚故大臣但言必如此而可樂則不能如此必不可以一息安者矣後序謬指武王殊非詩意一章黃東發謂與王在靈囿一般不知彼詩上章言庶民子來也此則規戒之意多於興處㑹心自見刺幽之旨二章上豈樂飲酒言民生皆遂而飲酒以樂之也此飲酒樂豈言民得其所故燕飲之間君臣歡悅而無耿耿不已之憂也三章詩所能以飲酒樂豈則不忘民而可以安居矣民安而後王安有那其居為飲酒樂豈之本結出那字方知三章之興著意在民生也魚藻三章章四句采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徴㑹之而無信義君子見微而思古焉此當與桑扈相表裏幽王初政其於燕饗諸侯必有失其儀度者故詩人作桑扈言天子燕諸侯當如是也其於諸侯來朝必有形其侮慢者故詩人作采菽言天子朝諸侯當如是也孔子告哀公朝聘以時厚往而薄來所以懷諸侯即此詩諷刺之旨其後幽王果以侮慢諸侯舉火徴㑹而敗一章詩所以筐筥之盛菽興車服之榮諸侯也言來朝而有錫子之典也曰何錫豫之又曰雖無豫之又曰又何豫之何氏楷曰諸侯未來而王者已預為之儲具也二章恭録折中云言泉水之湧逺望不見言采其芹則見之矣以興君子之來逺望不見言觀其旗則知之矣逺望其旗者迎之於門也書曰王出在應門之內是也始觀其旗之動繼聞其車之聲繼見其馬之數而後其人至焉蓋佇立以久俟之也三章何氏楷曰天子所豫向所儲者今始豫之即車馬衣服是也末四句言樂只君子有此恭敬齊遬之美則天子命之為諸侯而申之以福祿命之申之皆從豫字中推出可見天子嘉惠於諸侯者皆諸侯之忠敬有以自致之非有分外之恩也况得而侮慢乎四章詩所云以枝葉之盛興率從之人之多補正云為國以得人為本此率從之左右禮事辨治此所以能殿天子之邦也說到殿天子之邦此正述職敷奏之時見其才德足為天子守土也平平亦就平日之從政言率從則隨諸侯以至也萬福之同羣臣亦有然五章恭録折中云葵與揆通膍厚戾止也言楊舟泛流以紼維之使不行也以興諸侯將去天子處以端揆之任使不去也書曰使宅百揆是也留相王室則功業愈崇而福祿愈厚故望其優游而止於是也何楷曰諸侯朝事既畢而天子致其挽留之意也采菽五章章八句何氏决為康王之世非也角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩也經文如蠻如髦其後序之說是也讀至第三章交相為愈知彼此植黨傾陷不獨君子受讒矣四章受爵不讓知宗族中有附小人為鷹犬以刈本支者矣五章老馬為駒六章教猱升木皆非泛說輔氏曰必指當時實事言之嚴氏曰史之所無為詩之所有如此類是也篇中大意以無胥逺為主而歸結在我是用憂詩人豈為一身計哉晉司馬骨肉相殘關內侯索靖指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳此即我是用憂之意一章言角弓雖調弛之則相反兄弟昏姻雖親疏之則相逺逺者謂隔絶不相維繫也二章言王族自相殘賊皆王教之使然也含末二章意三章此字暗指自已處之泰然也交相為愈者彼此賊害即末章所謂如蠻如髦也四章何氏楷曰相怨一方正無良之實一方猶言一隅各有所執自見其是而不肯相下從來小人得志王族中必有與之依附以自翦其宗者如宋華亥附寺人栁而逐合比晉范臯夷附三家而逐吉射皆是也五章此承上章受爵不讓而正言規之六章劉氏彝曰小人樂於不善而又益之以不善之教是以塗塗附其塈相著而不可脫矣非所以為上之道也故陳為上之道按親親長長之道乃徽猷也與屬相聯屬以歸我也七章傳曰晛日氣也箋云雨雪之盛瀌瀌然至日將出其氣始見則人將稱曰雪今消釋矣蓋積隂之後忽見天日使人欣幸躍然王積迷之後憬然悔悟則人亦將曰讒人自此消沮矣而無如王不肯貶而棄之也驕生於居失其所居便無從驕式居者猶云任其居位也婁者常如此也是從瀌瀌字生來八章王氏安石曰積之髙則浮浮流義比消為深傳曰流而去也自相殘賊如蠻髦憂心者但可付之長歎而已角弓八章章四句唐氏士諤曰昔辛有適伊川有被髮野祭者曰不及百年此其為戎乎其禮先亡矣而楚子果遷陸渾之戎於此類之應也如蠻如髦我是用憂詩人之意深矣幽王卒死犬戎之難可畏哉菀栁刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也續序言王者之不可朝事非然也蓋是時羣小用事綱常倒置王室之禍不容一睫而列土外臣有心周室者欲拯救無路故以憂國之忠悃為局外之旁徨作此詩而使王聞之也天子外臣身逢暗主惟如周文王之柔順文明郭令公嶽武穆之單騎赴召臣道斯為無愧後世强兵手握遙執朝權甚且興晉陽之甲清君側之蠱六朝亂臣率用此術無怪近代借此詩一靖字自號為靖難之師也聖人存此詩立萬世臣道之防杜亂賊覬覦之意一章有菀者栁其枝葉下垂有以接引容納於人則人自休息焉興王能接引容納臣下則孰不思昵就之上帝尊之也亦九重髙逺之謂甚神神靈自用也我外臣無敢以參末議矣假令王能使我安靖其國家然後子得竭忠盡力扶危而紓忠也使王使之也靖我靖之也如鄭武公入為王卿士之類二章言上帝甚蹈無越職以自取病焉兩俾豫靖之起下章曷豫靖之三章彼人指王之左右讒諂之小人天即上帝喻王也鳥飛傅天為小人蔽君之喻小人之心不知其何所至王方假之羽翼為之親任曷能使我靖之哉居者居於己國也凶矜謂構禍可憐之狀居以視之事外倣徨耳菀栁三章章六句桑扈之什十篇四十三章二百八十二句都人士之什都人士周人刺衣服無常也古者長民衣服不二從容有常以齊其民則民德歸一傷今不復見古人也後序與緇衣同緇衣公孫尼子所作董氏逌曰詩序蓋雜出於古之遺言也此詩所陳皆言其儉朴恐無思富盛之意且亂離之後又非必人無臺笠女皆寡髮安得云未見似以序說為長矣補正云此詩首言其容不改蓋因晚近服飾之淫靡而思古先之朴素也笠之以臺撮之以緇充耳之以石皆言其朴素也綢直如髮卷髮如蠆言其任質自然而不為巧飾也蓋必有華其笠純其冠珠貝其瑱短其帶巧飾其髮與縱以為冶態者故思古而軫懷焉一章傳曰彼彼明王也按彼明王者言彼明王之時猶云彼一時也疏云舉都邑者以都邑之士近政化有道先被其德無道先化其淫此時貪淫巧僞都邑之士尤甚故舉古之都邑以駭今之都邑也傳曰周忠信也左傳楚子囊卒君子謂子囊為忠忠民之望也詩曰行歸于周萬民所望忠也可以為周訓忠信之證補正云黃衣狐裘貴者之服也在上位者儀容有常言有條理行歸忠信是以萬民則而象之二章釋文云綢密也密且直以女子之髻言如髮就其髮為之不加髲髢為髙髻也補正狐裘黃黃在上之人士也臺笠緇撮在下之人士也在上者言則衆聞之行則衆見之在下者言行不可得而詳故苐言其服飾也然觀其服飾而其應上之風以成俗者亦略可覩矣于士則貴賤並舉于女則獨舉貴者貴者朴素如此則賤者不待言矣三章說文琇美石次玉也充耳瑱也實塞也禮充耳天子以純玉諸侯以下則玉石雜衛風云充耳琇瑩則知亦貴者之飾也故對下尹姞補正不言君子女之飾苐曰謂之尹姞何也尹姞又君子女之望也承上章綢直如髮而言不獨凡為君子女者然即號為尹姞者亦然四章垂帶而厲亦貴者之服言從之邁謂人雖不得見而其服飾儀容之盡善則我願從之以行而不尚近日之奢淫也猶孔子從先進之意五章補正非故欲其垂之也帶之制不改於舊則自有餘矣非故欲卷之也髮之束不改於舊則自有旟矣正與首章其容不改相應於士備言衣服冠笠瑱帶於女苐舉首飾言之體也云何二字略讀言我今不見將云何乎亦惟張目逺望切其景行之意而已是於言從之邁句著一找足語非另是一意都人士五章章六句何氏據羅泌路史之說以為共伯歸國因廣引書證之適與經悖采緑刺怨曠也幽王之時多怨曠者也劉氏彝曰從軍役久也周制王畿外為八州州建牧以統七卒卒建正以統三連連建帥以統兩屬屬建長以統五國國建侯以統民而教之者三焉耕以足食文以興藝武以防亂國有不順得正以屬屬弗制則正以連連弗制則正以卒卒弗制則正以牧牧弗制則正以州州弗制然後大司馬提六軍起鄰牧正以九伐之法王師未有踰時在外者故男女無怨曠幽王時大司馬不能呼吸天下州牧卒正連帥屬長不能正其所部而鄉遂之兵反久役於外過期不反與古異矣刺怨曠者刺其時多怨曠也時多怨曠則其刺在上耳或疑此詩婦人所作何以登之於雅蓋太史採之畿內因以入告或大臣擬作以為諷諫皆所以刺王也一章豈無膏沐誰適為容婦人無君子不在而膏沐以俟之者此蓋聞其君子之歸期也采緑而不盈一掬思之甚也而忽聞君子之歸期則豫髮曲局將何以承事君子哉二章五日為期者傳聞君子至某地屈指五日可返里門乃至六日而猶不至則歸期猶未定此所以采藍而復不盈一襜也釋詁云詹至也三章向也承事君子如欲狩也我則張弓而納于韔中以待君子之往狩如欲釣也我則緡繩而繫之于竿中以待君子之往釣君子在室豫固無事而不承其意也此及下章蓋追敘之四章君子之釣維何惟魴及鱮既得魴鱮而歸豫共觀之相與為樂以安於靜好之常今何如哉安得不眷念之深釣得魴鱮已該弋得鳬雁一面觀非觀其釣觀其所得之魚耳采緑四章章四句詩緝謂古者新昏三月不從政此新昏者之怨詞或又以為隱刺褒女皆非詩旨也黍苗刺幽王也不能膏潤天下卿士不能行召伯之職焉此詩不次車攻吉日之間則非美宣可知也幽王之世王廢太子奔申王將伐申殺太子而申與犬戎甚昵詩人欲止其伐申之役也而危言難入故特舉宣王封申城謝之事言之欲王知申之不可棄也蓋謝為荆徐要衝封申伯於此為南藩重鎮嵩髙詩屢稱申伯功德而云四國于蕃四方于宣又曰揉此萬邦聞于四國今日其可翦為仇讎乎且前日之謝足以控淮海諸夷而今日之申反足以結西羌諸翟主政者既無宣王帥師者又無召穆膏澤未敷人無鬭志驅畏險苦役之民輕與申敵吾恐師旅無成而王心為之不寧也篇中述謝功而結穴於王心則寧一語其諷微矣故曰小雅之什近於風一章鄭氏歸美宣王朱子專言召伯其義一也二章三章五我字皆詩人我之猶云我兵我軍云耳必我南行之事既成而後役夫皆云歸哉前此無思歸之人也云字方有著落召伯勞之統始終而言此二章從城謝之人寫出他急公趨事不敢言歸情景正從勞字中來四章上二章內已見區畫之周密號令之嚴明器具之完備而未事量度臨事激勸皆勞字中作用故此章承上二章明白言之五章此又承上抽出其大者有成便與無成相對黍苗五章章四句隰桑刺幽王也小人在位君子在野思見君子盡心以事之李氏樗曰君子窮處於巖穴之下而斯民之心思慕之切未嘗忘之隰桑之詩所以作也君子在野人思見之觀末章可知矣朱子疑非刺詩而卒章引楚詞思公子兮未敢言為證則亦未嘗不從序也思見君子則厭惡小人而刺在用小人逺君子之人一章以桑在隰而美盛興君子在野而自得也劉氏以容貌言則淺矣二章有沃興德之潤身三章有幽則盛之至矣君子不特自得也而德音足以感人使之膠固則盛德之至也上二章正意已在興內此章則以上二句興下二句四章言我心愛君子何不遂以告之而君子隱處巖穴無由得見但中心藏之何日能忘之耶此章忽作變調一句一轉蓋欲用之既不能棄之則不忍低徊反覆其愛惜悼歎神情宛然若君子己見則愛慕之意何妨直告不徒為中心之藏也故知上三章既見君子乃假設之辭非實境也何日忘之便有相機而動之意王心開悟便可舉之於朝故此篇是憂國思賢之操非伐木求友之音隰桑四章章四句左傳鄭伯享趙孟于垂隴子産賦隰桑趙孟曰武請受其卒章則知卒章為實事也陸氏詩學謂天子視學養老乞言之樂歌亦本集傳詞旨大略與菁莪相類白華周人刺幽后也幽王娶申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也漢書班倢妤傳師古注白華周人刺幽王黜申后也白華為周人所作猶後世長門賦為相如作也此篇俱從大處立說所念在先王所憂在宗社所懼在危亡將至所望在王心改悔而非徒為一人之寵辱計也一章從夫婦胖合每以兩物相合者為喻如桃李絲緡之類此菅茅亦喻王之夫婦言漚白華以為菅必以白茅束之猶人君有澡修之德必取純潔之女佐之乃足為神明主何王之逺我而使之獨居也吾恐與王聯比者非芳潔之德矣俾我獨只說得一面而與褒女深相結束已在言下二章此菅茅亦喻王之夫婦也天以英英白雲露彼菅茅使相須為用猶先王以佳兒佳婦使之相與有成天步艱難最著眼國家將亡必有妖孽褒姒正天生亡周之妖孽也三章池水不可云流當從王氏地理考為水名此碩人疑當指宣王蓋滮池在豐鄗之間而北流以潤稻田猶宣王承文武之烈而遺緒以澤子孫今王所為令我嘯歌傷懷而愾然以念宣王也四章言先王立為冢婦主饔饎奉宗廟猶桑薪之於烹飪也乃燎之於無釡之煁則不足以成烹飪之功矣我之見棄何以異此然我非徒為一已之見棄憂也維彼宣王以菟裘詒汝汝不之顧則為勞我心耳烘燎也燎焚也燎於有釡之竈可以烹飪如無釡則薪歸無用耳重煁字不重烘字五章傳曰有諸宫中必形見於外按幽王之意以為寵嬖棄嫡無與外人事也不知惡積於宫必播揚於外天下聞之將有動搖社稷者六章前言實勞我心恐負先王之付託此則深懼社稷之危亡憂思以漸而深八章傳曰扁乘石貌疏云夏官𨽻僕云王行則洗乘石鄭司農云乘石所登上車之石也言有扁然之乘石王出入履之亦卑甚矣卑之不可以為髙猶妾之不可以為后也王之嬖褒姒而逺我也所憂甚大不使我憂思之日病乎白華八章章四句或責申后不戢父兄之逆謀王氏道曰以驪山事責宜臼則可責申后則不可宜臼固在申申后歸申史無明文其或在離宫如後世之長門歟綿蠻微臣刺亂也大臣不用仁心遺忘微賤不肯飲食教載之故作是詩也此亂世之公卿奉命出使而不恤其臣下也王鋼曰下四句蓋追叙治世公卿出使其從行者之樂也糗粻未給則飲食之而無斯飢智力未周則教誨之而無督責甚而車敗馬瘏則命彼備用之後車急呼載之而不致徒行其體恤微臣者如此蓋治世也歎今之不然綿蠻三章章八句瓠葉大夫刺幽王也上棄禮而不能行雖有牲牢饔餼不肯用也故思古之人不以微薄廢禮焉左傳鄭伯享趙孟趙孟遂賦瓠葉義取古人不以薄物廢禮漢書劉昆當王莽之世教授子弟五百人每春秋享射備列儀典以素木瓠葉為俎豆桑弧蒿矢以射兔首亦取義於是詩然則詩人欲矯當時風俗奢侈因述古初士大夫燕飲雖薄物可以行禮蓋在誠意之綢繆不在殽核之豐腆也恭敬者幣之未將者也苟誠意不至雖有牲牢珍錯皆為具文今舉一物而獻酬酢並至覺主人情重禮度詳明以視長夜沉湎者相去逺矣為王誦之所以規之也瓠葉四章章四句漸漸之石下國刺幽王也戎狄叛之荆舒不至乃命將帥東征役久病於外故作是詩也此詩但云東征按左傳椒舉告楚靈王曰幽王為太室之盟戎狄叛之鼓鐘傳云幽王㑹諸侯於淮水之上下篇後序云幽王之時西戎東夷交侵蓋東夷屢叛幽王東㑹諸侯以臨之不服則又命畿內諸侯合兵以討之歟詩人述軍士怨咨入告於王而師必挫衄之意自在言外有豕白蹢雨徴也補傳云天氣鬱蒸則衆豕涉波蓋春盡秋杪天氣尚凉忽爾炎蒸羣豕涉水則以為必雨之徴也何以云白蹢劉氏彝云中國有豕純黑為常南蠻有豕無非白蹢謂四足及腹皆白也范氏亦云東南之豕無非白蹢然則見豕白蹢則大軍已入東夷境也一章自鎬京起程一路險逺故云不遑朝言朝夕不息也二章經歷者愈逺愈險故云不遑出言無暇謀出也三章言已至東境疲病之極水潦為憂故云不遑他言只此受苦不盡無暇計及鋒鏑之危也語哀而愈深漸漸之石三章章六句苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷己逢之故作是詩也此數言內含無限政刑失措紀綱紊亂戎狄交侵兵役不息凡四十四篇所刺者無不櫽括而末但舉其一事言之是其到盡頭處其景象類於萇楚而究竟則為黍離故不曰刺而曰閔閔者知其必亡而無能為也一章苕華將落則變而黃凡目擊傷心景象總於首七字見之傷者非傷己逢之也文武成康之業一旦失墜故宫禾黍知不旋踵百感攢膺耳續序但云傷已猶未知此大夫心事二章花落而但有葉則衰益甚矣如此二字胸中歷歷分明而口中却不忍遽言三章偶舉以見之羊墳首也水無魚也人不能飽也閭里蕭條人民愁歎國不亡得乎苕之華三章章四句何草不黃下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也周室鎬京之盛守卒之衆户口之殷甲於天下何至犬戎深入其亡忽諸今讀漸漸之石以下三詩而知此日之周其民力物力為己盡也幽王四方征討不見於史然詩之所著用兵如兒戲視民若禽獸其不載於史史文闕耳山童川竭疾病兵荒而殘民以逞者猶擇人而食天怒人怨至此已極此犬戎之所以一戰而滅周也一章二章皆賦中之興故傳不言興也三章承上文言征夫獨非人乎人則匪虎兕也人也而虎兕棄之可哀孰甚焉四章兕虎惡獸狐亦妖物皆人所厭惡者故為鄙夷其民之喻首章何草不黃秋盡時也知受役在春夏矣黃而至於𤣥則冬杪矣末言幽草幽者茂盛而色黑則又在次年之夏矣何草不黃四章章四句朱氏謀㙔謂即舉火召諸侯師之事也然詩言經營四方則不獨如京師而徴兵戲褒亦不必有兩年之久也按小雅至都人士之什於風尤近矣其所以為雅者義在王朝不得夷於列國也又按二變雅所載刺幽王之什總計之至有四十餘篇之多以視夫刺宣王刺厲王之詩蓋不啻十倍凡父子君臣夫婦兄弟朋友之失其道以及信讒棄賢黷貨嚴刑酷斂嗜音甘酒窮兵遊宴奢侈之類史冊所不載者皆詩人刺詩之所及或數詩而共指一事或一人而分刺一端何人才如是之盛而篇章如是之富也哉蓋周家傳世十三棫朴菁莪之化其淪肌浹膚已五百有餘載故幽王之世祖宗培植之德報禮獨隆天地英華之氣發泄殆盡忠臣義士一時感憤篇什獨多今讀其詩或和平溫厚宛然盛世之韻或悲愴凄凉諷然亡國之音或直指其人凛乎斧鉞之加或隱寓其情致其諷詠之意或當身說法自訴己情或託物借端不揚人過或窮形以盡相或節短而音長凡三百篇忠臣孝子勞人思婦之意旨莫不薈萃於四十餘篇中而集其成然百爾君子懷忠賈禍或死於暴主之罪罟或死於讒人之交搆至驪山之變玉石俱焚獨此蠧簡遺編偕平王大駕捆載而東尼山編次隻字不遺其亦幸矣逮至祖龍一炬又逐殘烟所賴傳於諷誦之口譜為鏗鏘之音老生宿儒如二毛公者崛起西漢之時近接洙泗之緒凡諸君子從憂患得之涕泗成之者至今無恙也豈非不幸中之幸乎而猶病其詩之多也乎都人士之什十篇四十三章二百句詩序補義卷十九
