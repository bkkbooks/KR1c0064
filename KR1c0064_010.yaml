body:
  text: 詩序補義卷十石泉縣知縣姜炳璋撰唐嚴氏粲曰堯都有四地理志大原晉陽注云詩唐國晉水所出一也河東平陽注云堯都也在平河之陽二也中山唐縣張晏註堯為唐侯國於此三也河東彘縣順帝改曰永安臣瓚於晉陽下註云所謂唐今河東永安是也去晉四百里四也詩之唐國其說有三詩譜以堯居晉陽後乃居平陽於詩唐國為晉陽皇甫謐曰堯始封於中山唐縣後徙晉陽及為天子都平陽於詩唐國為平陽臣瓚又以唐國為永安今考堯都雖有四而詩之唐國當從詩譜為晉陽盖周以封叔虞叔虞封於堯都之故墟故曰唐叔其子燮以晉水所出改為晉侯晉陽實晉水所出則唐叔虞之始封在晉陽矣唐以堯得名晉以水得名按晉風稱唐或云曲沃武公并翼夫子傷之不稱翼亦不稱晉復周之舊而稱唐竊以為非也十三國皆始封之號叔虞受封之日止有唐耳無所為晉後王狥晉之請改唐為晉而太史所掌之國風舊號具在安得而更之或曰唐之於晉猶邶鄘之於衛也則又不然唐固未嘗滅也為鄂為翼為曲沃皆叔虞之子孫豈與邶鄘類乎史記唐自燮父改為晉孔氏以為請於時王改之爕父叔虞之子時王康王也或謂晉之名自武公始則亦未敢謂然按鄭語史伯曰當成周者南有荆蠻申呂應鄧陳蔡隨唐韋昭注應蔡隨唐皆姬姓也西有虞虢晉隗霍揚魏芮註八國姬姓也是西周已有晉名而幽王之衰以為興必在晉則燮父請命於朝改唐為晉非史遷之謬也但康王何以改燮父何以請則不知其故耳又周有二唐國其在西者成王以封叔虞後為晉者也其在南者定四年滅於楚者也盖唐國有二或燮父以國名相同因請於王否則以殷諸侯故國易名新之故王亦從之歟左傳止言唐叔叔以後絶不言唐隠五年傳曰周之東遷晉鄭焉依翼侯鄂侯隨所居之地言之其國號為晉則前後無異豈待曲沃武公而後為晉哉如謂誅武公之篡故謂之唐唐國非其所有晉又豈其所當有其後晉文晉悼之入朝於武宫儼然以稱為太祖不知唐叔何論燮父矣然則晉風稱唐國史之舊相傳以至春秋集傳所謂仍始封之舊號是也蟋蟀刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自娛樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮有堯之遺風焉此為國初之民風僖公之世在共和之年去始封已六世時天王流彘王室多故而溺於晏安詩人因述叔虞以來民間警戒之詞以為諷誦焉後序以刺為指斥其非倡為儉不中禮之說謂欲其以禮自娛樂夫禮與娛樂相反娛樂又與詩意相反不知糾懲獻納所以匡救其闕者皆謂之刺也左傳鄭伯享趙武印叚子石賦蟋蟀趙孟曰善哉保家之主也孔叢子曰於蟋蟀見陶唐儉徳之大也集傳之意本此詩人欲僖公知國初之風俗民生之勤苦其憂勤惕厲至於如此也好樂無荒三章疊咏詩人之情見矣或疑思及其外即此見唐風之局促晉祚之不長按集傳云外餘也非職之外乃所思有不及之處也史伯云周衰晉興豈可以翼滅於沃而謂祚之不長乎讀書記嵗聿其暮夏之九月周之十一月也蟋蟀三章章八句顧炎武謂晉為姬姓國而用夏正其說非也一王之興莫大於正朔胡氏春秋傳夏時冠周月後儒多未信即家則堂夏正三論按之經傳亦未盡然也且晉侯世霸固以尊周名籠絡諸侯若棄正朔不用其亂王章更甚於請隧楚雖僣妄秦雖强悍而左氏據秦楚二書以紀二國之事所載年月歴歴與經不爽是皆用周正也晉顧短垣自踰乎顧氏用偽竹書參之羅泌所云傳據晉史經據周厯并援春秋僖五年晉殺其太子申生十年里克弑其君卓明年晉殺其大夫㔻鄭經傳錯互以為證按僖四年十二月傳稱申生縊於新城而經書其事於五年春傳自註云晉侯使以殺太子申生之故來告盖經必來告乃書左氏特發此為例以後傳載於前經書於後皆凖諸此豈可以此而云晉用夏正不然僖五年經書冬晉人執虞公傳亦言是年冬十二月也二十八年經云三月丙午晉侯入曹城濮之戰經云四月己巳傳年日月無不同則晉自叔虞以至春秋之末皆用周正明甚竹書晉人偽撰宋儒偶有信之者而外丙仲壬勦襲孟子又故為太甲殺伊尹以亂之前人辨之詳矣以是為據得毋黎丘之惑乎然左氏實夏正周正并用如莊十六年傳公父定伯出奔衛三年而復使以十月入曰良月也就盈數也以十月為盈數則知夏十月也若拘其文謂之衛不用周朔可也僖二十四年經書冬天王出居於鄭傳言秋王適鄭處於汜成元年王師敗績於茅戎經書秋而傳載其事於春拘其文謂周不自用其朔可也又豈卜偃之九月十月絳縣老人之甲子為然乎盖事蹟既冗卷帙亦繁不及洗刷固著書所自有非可以誣左氏也山有樞刺晉昭公也不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能洒埽政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也東萊吕氏曰詩人豈真欲昭公馳驅飲樂者哉盖曰是物也行將為他人所有曽不若及今為樂之為愈其激發感切之者深矣非勸其為樂也吕禄棄軍其姑吕􅎐出珠玉寶器散堂下曰無為他人守也乃此詩之意也末章尤可見詩人視沃强翼弱潘父之徒又與桓叔表裏大難將至而昭公如處堂之燕子夷然不槩於心故若為告其同列說得死期將至無限沈痛以冀昭之及時猛省也他人暗指成師若曰成師一來則身且不保國非子之國也不能有為反不如及其未至而行樂耳非寛慰之詞乃痛極之詞耳若為告同列無一語及昭者顯言賈禍適以激成詩人之苦心也山有樞隰有榆則人將取之興子有衣裳車馬則人將享之也子指同列也此詩人忠於昭者孔氏以為大夫士以上是也車馬鐘鼓琴瑟侑食豈民間所有况勤儉之唐俗乎且以永日謂可以度此長日也葛生云夏之日冬之夜楚辭長夜曼曼何時旦皆憂愁難度之意山有樞三章章八句揚之水刺晉昭公也昭公封國以分沃沃盛强昭公微弱國人將叛而歸沃焉自古從無一國歸心大臣納欵其君如贅旒猶不能傳檄而定直待祖以及其孫百戰而克之者也盖沃雖强唐叔之澤深入人心昭侯亦無過惡故其民至死不貳一君亡復立一君更歴六世然後克之中間相持六十七年寧膏鋒露骨必不肯坐視君父之難後序乃云國人將叛而歸沃可乎國史推見至隠知其感諷昭公使之省悟誅内諜而早為備故曰刺昭公也盖潘父執晉國之柄内結於君外通於賊曲沃之封想由潘父贊成之故師服之言不用迨羽翼既成可唾手而誇定策矣詩人以封章告宻之意為藏頭露尾之詞盖發潘父之謀也水勢之揚至於横溢者以白石鑿鑿激之而愈揚也水喻成師石喻潘父素衣朱襮諸侯之服也昭公之弑在大臣之叛國人决無欲以此奉桓叔者子當指桓叔之使臣宻與潘父往來者素衣四句乃述潘父告曲沃使臣之詞下文所云我聞有命即指此也盖潘父欲迎桓叔自有宻使往來其告曲沃之使曰我將以諸侯之服從子於沃既見桓叔而衣之迎之使來云何不樂乎兩章既述潘父之詞末章云斯命也我已聞之但其謀甚宻不敢以告人耳出於潘父為詞在下傳之為命通章一氣貫注而諷昭使早為之所者至深切矣揚之水三章二章章六句一章四句椒聊刺晉昭公也君子見沃之盛强能修其政知其蕃衍盛大子孫將有晉國焉上篇是發潘父之逆謀此篇是痛昭公之不振皆忠於昭公者也語語為沃贊歎却語語為昭悲凉使昭公能及時有為則民俗醇厚君臣一心修内治以立基强國勢以威敵椒聊雖盛其何能為乃苶然無志束手待亡在彼有振興之勢而在我有日敝之形終為沃併耳詩人所以為昭憂也碩大言今日之國勢逺條言他日之子孫椒聊二章章六句桓叔篡弑之賊聖人所必誅存二詩以見晉人憂國之忠亂賊之必不容於天下後世也綢繆刺晉亂也國亂則婚姻不得其時焉詩序但言婚姻之失時而所以失時以晉亂故也盖詩人述當日婚姻之貧困以刺晉亂也恭録折中云良人夫稱也國亂民貧婚姻不能備禮故當初婚之夕而酒饌不設但有綢繆之束薪而已燈燭稀微但見三星之在天而已凄凉如此此何夕也而乃見良人則良人之艱窘可知也子兮子兮見者相謂也良人家貧無以為禮見者亦貧不能資助故共相嗟嘆以為無如此良人何也隅東南隅也昏見之星轉而在隅夜已乆也邂逅新婦至而行禮也其禮草率如人之邂逅相遇也户在室南在隅之星轉而在户夜已分也粲美也粲者謂新婦也綢繆三章章六句此詩序說瞭然朱子亦墨守之無異也乃季氏本以為淫詩王氏柏以葛生蒙楚為淫詩金氏履祥又以羔裘為淫詩夫魏唐聖人之都流風餘韻猶有存者故其民勤儉而無刺淫之作安得有淫詩也枤杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并耳刺時者刺當時之人骨肉離叛無能為君紓難也傳意本如此續序錯解耳是時晉室戰争六世公族兄弟大半趨炎助逆詩人作此刺之且以激發異姓諸臣之志也曰杜雖特生而葉湑湑菁菁若有助之者以興求助之意踽踽睘睘兄弟無人也然豈無他人不如我同父同姓者乎心懐叛逆同父猶路人也志存報國異姓猶兄弟也嗟乎君之孤危如此雖行路之人猶相卹而比附之况立其朝食其禄者乎常人無兄弟猶將佽助之况君父之尊乎盖以呼號望救之語激其分憂同患之心也枤杜二章章九句羔裘刺時也晉人刺其在位不恤其民也刺時者刺當時禍亂民不聊生也鄭譜以綢繆四詩皆昭公世序無明文盖昭公以後之詩也微弱日甚干戈不息何以堪此然晉魏皆帝王之都而魏之臣則曰行與子還魏之民則曰逝將去汝此晉獻之所以一舉而定魏也若晉則僅存一線其危迫甚於魏乃强鄰擾之大夫役之不死於兵革即死於飢寒輾轉無告猶念其舊好依依不去風俗之醇民情之厚真絶無僅見此晉武所以遲之三世而後得志也斯時沃勢甚張晉則一君弑復立一君皆晉大夫力為禦侮故征調之間不順人情其寔不得已也傳云自用也李廵曰居居不狎習之惡孫炎曰究究窮極人之惡用民之力必與相習始不强其難不至窮盡始不憂其困乃居居然不狎習而使之究究然必窮極而用之祗見其不堪命也他人不指曲沃曲沃之君民已讐之屢世矣豈以上不見恤而萌事讐之心箋泛指他國是也故者謂祖父以來已相服屬一旦去之誠所不忍且子為舊君之臣猶足以繋人心好者子在故國而無異志亦足為人所親愛皆忠義感發語羔裘二章章四句國家危急之秋尤以民為邦本倘為時勢所迫虐用其民民將叛之誰與之守幸而不叛亦與之同盡爾矣聖人存羔裘見唐民有不渝之忠義亦見君臣無立國之經猷也鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也陟岵言孝子行役而此言刺時陟岵猶有兄在父母猶得以養也但慎旃無死亡而已斯則父母將填溝壑而一身之鋒鏑危苦轉非所憂刺時者言時勢迫之而然非盡君上之虐用其民也顧王事靡盬小雅四牡之文也其時為成周民之亟於王事宜也若此時晉亂極矣猶屢言王事欲其靡盬者何哉盖曲沃負心不義通國仇之晉之遺臣往往假王命以鼓勵人心如王命虢公立小子侯王命虢仲立侯緡王命虢仲等伐曲沃是以其民萬死一生猶以王命為尊忠義自効雖至危困之極百感攢膺但仰天呼之無一語怨其君者以為迫於强暴不得已而使我至是也自此而晉之遺民幾盡矣自此而曲沃有詩晉無詩矣鴇羽三章章七句此詩疑作於小子侯之後民愈困勢愈促而王事匪懈文武之遺澤其未冺乎武公滅晉之後以王命臨之民亦胥服嗟乎晉侯世霸人以為其謀臣之多表裏山河之固而不知其民之從義百倍他國也其後智氏灌晉陽沈竈産鼃民無畔意盖其風俗自古然耳二南邠風而外君子于唐有餘慕焉無衣美晉武公也武公始并晉國其大夫為之請命於天子之使而作是詩也此以下為曲沃之詩其所謂美者乃曲沃人之美其君而晉人之所為流涕也曲沃受恩反噬成師弑二君鱓弑一君稱弑三君唯鄂侯令終其餘六世皆不得其死自古亂臣賊子之禍未有如此之烈周天子屢世命將討賊忽受賊賂命為諸侯此厲宣幽平所必不為者也史述武公之臣美之之詩見以前為討曲沃之王師而此為爵曲沃之王命也以前為初封之晉而今為曲沃之晉也以前為忠臣義士所呼號而今為亂臣賊子所誇美也序述一美字而前後分界劃然一章此非述其請命於王亦非述其請命於使臣盖武公定晉天子賜衣其臣榮之乃美之曰桓叔以來豈曰無七章之衣不如子今日之衣新命於王為安且吉也吉者受命於王故晉不敢叛諸侯不敢討也稱君曰子初有國時親暱之臣仍其舊稱也二章天子之卿六命其服六章燠者煖也言可以長享富强也曽一貫曰若非王賜則不寒而慄矣然異日者魏斯韓䖍趙籍起而分晉上行下效毫不相爽椒聊何有哉無衣二章章三句有枤之杜刺晉武公也武公寡特兼其宗族而不求賢以自輔焉武公以簒弑得國國人以王命無貳心而超然於塵俗之表泥而不滓如後世申屠蟠管㓜安之徒固自有人也彼哀侯見弑之日武公以上卿誘欒共子共子寧鬭而死其視曲沃之卿蔑如也豈以武公之飲食為義而就之歟故于民間採一刺武公不能好賢之詩列于無衣之後以見鴻飛冥冥天子亂命不得而脅亂臣賊子不得而汚易曰肥遯其殆斯人歟此編詩之意也武公所用者皆平日翊戴之人畫䇿之士而無志於賢賢人亦自甘髙蹈而不求仕也詩人但自述其孤特無以致賢人則刺在奄有大國者矣中心好之而無由飲食則刺在天禄自奉者矣序曰刺武公述詩人之意也有枤之杜二章章六句葛生刺晉獻公也好攻戰則國人多喪矣後序謂國人多喪喪死喪也或以為思存者天下豈有其夫尚存而遽言塋域者乎詩緝以為婺婦悼亡是也而詩億謂哭墓則又不然三代無婦人哭于野者按此詩當與鄘風柏舟同調首二句賦也楚棘墓間木也于野于域野中有樹樹間有冢也野與域互言之予姜指其君子也亡此謂不在此而在彼野域之間也誰與獨處言誰與處乎亦獨處而已君子無所與而處於彼已無所與而處於此也婺婦無角枕錦衾之理盖君子斂時物也亡此謂不在此而在彼枕衾之間也上三章以三誰字三獨字呼起下二章兩歸字言歸于其室其居與之同穴也則我與君子皆有與而非獨處獨息獨旦矣夏之日所謂日長似嵗也冬之夜長夜曼曼也百歳之後所謂之死矢靡他也然則此非望逺之吟實悼亡之賦袁羊嘗詣劉恢恢眠未起袁作詩調之曰角枕粲文茵錦衾爛長筵劉尚晉明帝女主見詩大不平曰袁羊古之遺狂劉孝標謂袁以死嘲劉故主不平則角枕錦衾其作斂時衣物也由來舊矣葛生五章章四句采苓刺晉獻公也獻公好聽讒焉獻公誤聽士蒍盡殺羣公子誤聽驪姬及梁五東關五而申生縊重耳夷吾奔晉亦再世不競獻公之蔽深矣正言之猝難移其痼疾詩人托為采苓之事以諷之一意翻作四層朱子以為比是也猶楚人以弋諷楚王通篇只說得弋事也陸氏埤雅苓與苦生於隰葑生于圃則首陽之巔不必有苓其下不必有苦其東不必有葑矣今人之言曰采苓于首陽之巔夫首陽之巔或亦有苓之可采也然而人之言勿以為信且暫舍之是者不遽行非者不遽斥也于是熟思審處而是非决矣人之為言胡得而惑焉苟箋云且也無然包徐察審聽在内兩人之為言即采苓于首陽之言也先信之繼許之後從之立言之叙先言苟亦無從後說無然盖輕聽之主言甫入而毅然從之迅舉疾施而事已成矣故先把他從字用力抑住猶云且忍耐這一刻然後漸漸勸他苟亦無然若當下便說其言不然則彼從之益堅此與愚人說事妙訣采苓三章章八句唐國十二篇三十三章二百三句詩序補義卷十
