body:
  text: 詩序補義卷二十四石泉縣知縣薑炳璋撰魯頌詩義補正云朱子謂成王賜伯禽以天子禮樂魯於是乎有頌以為廟樂其後又自作詩以美其君亦謂之頌尚恐未妥伯禽時有頌以為廟樂魯人當世守之不應易象春秋並存而反失其廟祭之樂伯禽時樂頌俱存孔子不應刪其祖宗廟樂而獨存後代頌美其君之詩嘗考閟宫之詩作於僖公而春秋書禘首見於閔二年嗣見於僖八年是時齊桓創霸諸侯始強桓公始僭百燎管仲陪臣而用邦君之禮諸侯效之僖公嘗從齊桓攘淮夷伐荆楚於是自喜其功而僭用天子禮樂作頌以張大之閔二年吉禘於莊公蓋賊臣慶父之所為然所用不過禘之樂歌禮文尚未正其名義至僖公禘太廟則真用天子之禮矣不然隱桓莊三世豈無卜禘卜郊不從可因事以書者而直至閔僖以後始見於經哉乃明堂位之誣因閟宮之詩及春秋所書郊禘附會而成而成王之未嘗賜伯禽之未嘗用可即以詩與春秋正之詩曰乃命魯公俾侯于東錫之山川土田附庸則未嘗賜以天子之禮樂明矣繼之曰周公之孫莊公之子然後備言承祀之事然則僭用天子之禮樂自僖公始顯然矣假令成王賜而伯禽受則錫之山川土田附庸之下當接龍旗承祀至戎狄狄是膺始明著為僖公之事其文乃順何以大書周公之孫莊公之子於龍旗承祀之前哉蓋詩人承時君之令以作頌而惟恐後世轉誣為先君故别白之如此而讀者乃未察耳合以春秋所書則僭禮肇自僖公無可疑者孔子曰魯之郊禘非禮也周公其衰矣謂以周公之聖而子孫僭逆如此周公之業自是而衰也後之儒者以孔子之言為定可矣駉後序謂季孫行父請於周而史克作頌信歟按春秋僖十六年季友卒十七年滅項胡傳歸獄行父説者謂友之子無佚早卒行父至文六年始見經時稚子耳何能為此事知行父至周請頌之説非也史克黨于行父外傳謂與里革為一人在宣之世莒僕之對斷罟之直恃行父耳未可遽定頌僖者為史克也韓詩外傳云奚斯作魯頌班固西京賦序王延壽魯靈光殿賦序皆云奚斯頌魯奚斯公子魚也曽為慶父求免其死其人可知恐督廟事有餘而命之作頌則不足也東魯多賢人尚風雅四篇辭非一手然俱有先王先公之遺意焉而無邪一語聖人提為全詩之宗旨夫豈史克奚斯之所能勝任哉闕疑焉可矣或曰頌廟祭之詩安知非祭僖廟之樂章歟曰稱魯侯未有僖諡一也飲酒燕樂不類廟祀閟宮稱爾稱女非身後之頌二也令妻壽母而奚斯作廟正在僖公之世三也然則魯為侯國何以不言風曰頌之不可為風猶風之不可為雅也故王之為風以其詩為風體非聖人降之也魯之為頌以其詩為頌體非聖人升之也駉頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧於坰野魯人尊之於是季孫行父請命於周而史克作是頌頌者祭祀之樂歌而遣於廟告於廟者亦附焉從無稱美生人之辭而為頌者有之自魯頌始序頌詩者曰祀文王也祀武王也不言頌文王武王以詩列於頌則頌不待言矣每序必言頌亦自魯頌始蓋魯頌頌之變也襲頌之貌而非其實故每篇言頌僖明僖公在位詩人受命作頌故於將順中寓責難之意以表詩人之隱衷也傳云諸侯六間馬四種有良馬有戎馬有由馬有駑馬孔疏以良馬朝祭所乘貴有力有容戎馬貴多力田馬貴疾駑馬給官中之役貴肥壯以分配四章今細按各章用字無一不對針其説良然總一思字無限量無止息無旁騖非專為馬也有國政在即思馬亦非徒思也有馬政在駉四章章八句或以為祀魯公之詩或以為美馬政之詩或以為祀莊公之詩皆無據有駜頌僖公君臣之有道也李迃仲曰僖公之臣其賢者惟公子季友臧文仲而已季友不能死子般及閔公之難文仲有不仁者三不知者三又稱其竊位所謂有道者果如是乎無乃魯無賢君至僖公特異於羣公乎如二子者彼善於此乎按臣之有道於在公明明見之而君之有道亦寓其中况威儀不亂燕樂不淫亦足以見君臣之有道也此及上篇詞旨不溢所謂有先王先公之遺風者此也有駜乘黃人臣來燕之車馬夙夜在公燕飲也在公明明作推原之詞由其在公職事辨治故可以為今日之燕飲也振振鷺鷺于下狀舞人之舞也鼓咽咽為舞節也醉言舞君自起舞以為樂也在公飲酒相導以和君有餘惠也醉言歸不繼以淫臣有餘敬也僖公侈肆僭妄故卜禘卜郊公然為之又貪得無藝故每乘霸主之間輒謀伐國取地是徒知以恣肆強悍者詒子孫而不知以善道詒子孫者也乃於燕飲之終告以君子有穀詒孫子若曰尊賢而親親周公魯公之善道也恭明神而敬事耆老孝公之善道也公能以其詒公者詒子孫則君臣有道永世無窮矣針規之意也有駜三章章九句泮水頌僖公能修泮宮也能修泮宮者能整飭泮宮且能修泮宮之政也泮宮魯之學名魯有泮宫久矣不待僖公之時始為之詩云既作泮宫淮夷攸服言既振興泮宫之教修文德而逺人來非謂泮宮建而淮夷服也王伯厚云春秋時急攻戰而緩教化其留心學校者惟魯僖公能修泮宮衛文公能敬教勸學他無聞焉據此則詩人作頌豈盡溢美乎然淮夷之服未然之事也一語可盡而長言之非頌體也斯謂之魯頌歟一章僖公振文教於久廢而興學造士故從前與衛之常至此覺煥然一新無小無大從公于邁猶所謂圜橋而觀聽者甚衆也即此已足聳動逺人二章小大從公亦曰樂親其教也公闡揚禮義之德音昭昭然又匪有詞氣之厲也載色載笑以為教此真善教也二語形容僖公宛肖遂為後世幸學良規三章在泮飲酒不重重行禮既畢而飲也永錫難老亦壽考作人之意上章伊教言教也未有不身體而徒以言者順彼長久之道默體躬行以吾順道之心攝服人心孰與之梗故能屈此羣醜長道包下文明德文武在內詩人蓋有針規之義焉四章順彼長道者在敬明其德也表裏協於一敬才謂之明所謂敬以明之也威儀為德之符民則即在德上而德之見於治內為文見於扞外為武烈祖周公魯公文武兼備允文而不尚粉飾浮華允武而不在喜功好大實有一畨德中作用即此已足昭格烈祖而為孝矣即此已是自求多祜而受福矣此章説治道至精的是僖公對針之藥蓋稱頌而寓匡救之意也五章克明其德以下即在泮敷教而冀其有服淮夷之功也六章克廣德心承明德之君善於敷教來蓋偷生免死之心掃除得盡而後忠君愛國之心充拓得開立功之勇居功之和皆德心發露耳七章八章淮夷附楚附徐世為東南諸國之患一見於魯公之費誓再見於宣王之常武其強久矣至僖公十三年齊桓之霸方盛而淮夷病杞公從齊桓會于鹹以討之十六年淮夷病鄫又從齊桓會于淮則魯君臣所憂者淮夷也故詩人以服淮夷為稱願之詞然此未然之事也連牽四章似實有其事者然故於第七章云式固爾猷淮夷卒獲言能審固其謀猷淮夷豈終不獲哉著此二語上章之獻囚獻馘狄彼東南下章之元龜象齒大賂南金皆望梅止渴之辭也然則詩人早自救矣泮水八章章八句閟宮頌僖公能復周公之宇也頌而用之稱美其君頌之變體也頌而用之稱願其君尤魯頌之變體也夫以其詞之夸誕如是而聖人弗削則以猶有針規責難之微意焉按武王分天下為二伯陜以東周公主之陜以西召公主之魯為諸姬之長凡東南諸侯莫不統于魯以及淮夷徐方荆楚南海蠻貊皆在統馭之內所謂周公之宇也大雅韓奕之稱韓侯云奄受北國其追其貊亦猶是歟春秋時王室東遷魯寖削弱役于齊晉大國即常與許在魯封內者一奪于齊一易于鄭安得如周公大啓爾宇之時耶詩人因修閟宫奉命作頌歷敘先王先公遺緒而冀其東服淮徐南懲荆楚使諸侯奉天子命以尊二伯仍周公分陜之舊夫豈徒享祀豐潔之所能致又豈徒御畢出之所能勝者哉蓋必有道矣法周公之治以治魯斯可以復周公之宇無如卜郊僭禘幾于身陷大憝從齊伐楚不過因人成事以若所為求若所欲保有龜蒙幸矣經云復周公之宇指常與許也序云復周公之宇即大啓爾宇之舊合下五章而言之也上篇云頌僖公能修泮宮已然之事也此為未然而稱願之故曰不能也一章閟宮傳以為薑嫄廟又引孟仲子謂禖宮祀薑嫄而不祀帝嚳是知母而不知父也禖宮之説亦以郊禖附會之朱子曰魯之羣廟也按周公廟曰太廟魯公廟曰世室羣公廟曰宫閟宫者深邃之宫非宫名也因其舊而新之故曰新廟既曰閟宫又曰新廟則合太廟世室及羣廟並修之也春秋不書未嘗改作也閟宫有侐實實枚枚是言修廟之美以下推本后稷以魯之封國本於周周之受命由稷也上帝是依依猶眷顧也可見履巨人迹之妄如果有是異則魯頌早發其神竒矣奄有下國封之邰也奄有下土大利布之天下皆黍稷之土也覆舉黍稷别出稻秬何也補正云有邰之國唯宜四種及為農官九土所宜百榖皆播于下地舉稻于異種舉秬所以包其餘二章實始翦商集傳云蓋有翦商之漸矣語極妥貼如加志字便非太王心術屆及也致天命之及周也何以驗之於牧野而人心無二無虞知上帝之臨汝而天命屆矣大啓爾字宇土宇也言其統馭所至已包封內及東南諸夷在內此章從太王文武以及周公明周公受封之由三章錫之山川土田附庸明未嘗錫以郊禘也莊公之子僖公也以明僣禮之始然止為夸大之辭若不知為僣者然既云春秋匪懈又言享祀不忒蓋匪懈者時祭也不忒者禘祭也諸侯用禘似乎差忒然周公有大勳勞可以援宋為例此述僖公之意也皇皇后帝皇祖后稷享以騂犧言郊祀也是饗是宜降福既多郊而獲福也周公皇祖亦其福女禘而獲福也下章秋而載嘗夏而楅衡又詳言春秋匪懈之事周禮日月為常交龍為旗僖公不建日月而建交龍不敢全用也周尚騂祀周公以王禮乃從殷之白自比於宋也周郊以冬至而魯以孟春周禘推所自出而魯専禘於周公皆自知僣妄而稍殺也僣禘則忒矣僣郊則不宜矣曰不忒曰是宜詩人其以此為諷歟郊禘並僣未有言郊而不及禘者而魯之禘其實祫也用禘之禮耳未嘗僣五年之禘也猶之僣祈穀之郊而未嘗僣日至之郊也明堂位曰夏季六月以禘禮祀周公於太廟言禘禮用天子之禮樂也言祀周公則不推所自出也四章魯五廟太廟二昭二穆合魯公之世室而六白牡祀周公於太廟也騂剛祀魯公以下也諸侯祫嘗祫蒸其并升世室昭穆之主於太廟而祀之也三夀箋謂三卿即三家也李氏云季友受費而季孫氏始公孫兹帥師而叔孫氏始公孫敖帥師而孟孫氏始三桓之基皆肇於僖公之編五章僖公四年齊桓會七國之師伐楚盟于召陵公亦與焉十年經書齊侯許男伐北戎公未嘗與也詩人安得以他人之功為己功乎李迃仲云言僖公可以膺戎狄懲荆舒耳其説是也蓋與爾昌而熾一例上章保彼東方願其長享魯邦此章公車千乘願其扞禦蠻貊泰山巖巖一章願淮夷之同保有鳬繹一章願南夷之順皆未然之事也以魯國言則曰昌而熾昌而大以君身言則曰夀而富耆而艾又著夀胥與試亦動之以用賢之意上三夀敬大臣此與試體羣臣也惟老成是用則無新進喜事之咎矣六章七章周公肇封之日統馭所至東南諸夷莫非奄受之國乃昔之服從於魯者今轉為魯患故願其來同又願其莫敢不諾也天錫公純嘏言天而祖在其中八章魯先公疊遭文薑哀薑之禍則妻之不令者多矣母之不壽者有矣又亂賊肆行則大夫庶士之不宜者多矣故詩人及之前七章寫得後日功業照耀天壤而歸結處只言家庭聚順之常夫婦子母之樂蓋必家正而後朝廷正國治而後逺人服也而其本在於君身可微會矣九章以終閟宫有侐實實枚枚之意萬民是若謂周公魯公而下功在生民無不被其澤咸賴寢廟之新故新廟奕奕而民心無不順也民心順則祭可以獲福戰可以克敵岡陵壽考無不在其中此又通篇大結穴處閟宫九章五章章十七句內第四章脫一句二章章八句二章章十句黃氏佐曰此詩之頌僖公者拳拳於夀考不一而足何也曰可以見詩人之情也入春秋以來隱及于鍾巫桓乘于彭生般賊于圉犖閔戕于卜齮弒逆踵繼其來甚矣國人飲恨尚未舒也故此詩拳拳以壽考為言欲僖公戒覆車耳或者以諛辭溢美例之抑知其忠君愛國之意不得泯邪厥後僖公在位三十三年薨于小寢則詩未為無助魯頌四篇二十四章二百四十三句商頌聖人作樂莫不有樂章以為舞節豈獨商為然而頌之名則自商始鄭譜云商者契所封之地十四世至湯則受命伐夏定天下後世有中宗者嚴恭寅畏不敢荒寧有髙宗者嘉靖殷邦至于小大無時或怨此三王有受命中興之功作詩頌之武王伐紂乃以陶唐氏火正閼伯之墟封紂兄微子啓為宋公代武庚為商後自後政衰散亡商之禮樂七世至戴公時當周宣王有大夫正考甫者校商頌十二篇于周太師歸以祀其先王孔子録詩之時得五篇而已乃列之以備三頌按鄭氏據國語閔馬父之言夫校者因其舊有而校正之得者得此而其餘失也揚子乃謂正考甫作商頌誤矣正考甫孔子七世祖也世本正考甫生孔父嘉為宋司馬華督所殺而絶其世左傳正考甫佐戴武桓三君俱在襄公之前而史記宋世家乃云襄公欲為盟主其大夫正考甫美之作商頌不亦謬乎襄公為楚所執後伐楚傷于􅷺而云莫敢不來享莫敢不來王無是理也史遷本於韓詩不足信矣或曰殷有三宗太宗何以無頌按禮祖有功宗有德成湯為開創之君三宗為中興之主其廟百世不遷各有專頌太宗無頌先儒謂其詩散亡耳安知不即在此十二篇至孔子編詩而又軼邪孔子欲言夏殷深慨於杞宋之無徵微獨杞宋唐虞以前苟有文獻聖人必且表章恐後夫豫嘗曰某殷人也則此五篇祖功宗德所存聖人何啻璠璵視之歟商頌之異於周者周頌三十一篇皆作於周公故有一詩而羣廟用之後雖有制作之才不敢增周公之舊也商頌則三宗皆有頌隨時而遞增者也而商頌之同於周者祖功宗德百世不遷始得為頌故周太祖二世室皆有頌而成康親盡則祧無所謂頌也商則太祖三宗皆有頌而盤庚祖甲雖曰賢君親盡則祧亦未聞有頌也那祀成湯也微子至於戴公其間禮樂廢壞有正考父者得商頌十二篇於周之太師以那為首或謂郊特牲云殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間故此詩多言樂其説非也殷人尚聲未迎牲而先奏樂猶周人尚臭未迎牲而鬱鬯以灌也那止言樂列祖言味玄鳥言大糦各舉一事以該其餘不然豈長發殷武兩篇樂與味興黍稷皆不用耶全詩只舉鞉鼓管磬庸鼓萬舞而聲容無一不該節次無一不具成湯功德只一烈字盡之商頌簡朴亦以那為冠置鞉鼓奏之所以節樂樂三闋然後出迎牲蓋求神之時也牲既入行九獻仍以鞉鼓節之獨舉管者管聲細尤難與鞉鼓相諧鞉鼓管籥是堂下所奏玉磬即所謂鳴球是堂上所奏淵淵嘒嘒則深逺清亮中各具和平之韻國語云聲應相保曰和細大不踰曰平然未能與玉磬相依猶未見和平之至蓋磬聲天然和平不假人力鞉管來依磬聲斯真和平矣於赫湯孫頌湯非自誇也言湯之功德赫然故主鬯之孫亦承湯緒而於赫也此一節正行禮之時下節九獻之後鐘鼓交作萬舞皆陳則祭畢之時自古在昔以下則所謂輯之亂也按周因於殷禮雖尚聲尚臭微有不同而節次應不甚異觀那詩可見至祭義謂禘有樂而嘗無樂者又有以知其非也那一章二十二句烈祖祀中宗也太戊湯之四世孫有桑穀之異懼而修德商道復興號為中宗其廟百世不遷疏云此祀中宗之樂歌也按歐陽氏曰湯孫自太甲至紂皆是張氏彩曰湯為創業之始祖故後世率稱湯孫猶周之文子文孫耳然則可稱以祀湯亦可稱以祀大戊郝氏敬曰詩言及爾斯所自成湯及大戊也諸侯來假受命溥將言天命人心表中興之功也一節烈祖指成湯爾爾大戊也詩言嗟我烈祖成湯革夏受命有秩然常久之福申錫于無疆延及爾大戊再造天下烈祖重光得祭于斯所斯所猶云此地指大戊之廟言而中宗一假中興事業宗祀不遷已在其中二節薦酒薦羮正斯所所備之祭物賚與綏不同前篇樂以安神神亦安我故云綏此酒以祀神神亦錫我故云賚到得主祭者奏假無言時靡有爭正是凝合上下之思而成清酤和羮不過假此以將我思也三節約軧錯衡以下又從時靡有爭時追寫其乘車而來助祭也王政衰則諸侯不朝大戊中興故今日助祭諸侯無逺不至致我受命之廣大也自天降康豐年穰穰由祖考格故降福多也四節言中宗尚顧豫蒸嘗哉此湯孫之所奉者也蓋中宗中興之業即烈祖申錫之緒而湯孫于以丕承於弗替與前篇詞同而旨微别烈祖一章二十二句玄鳥祀髙宗也武丁中宗之五世孫恭默思道商道復興號稱髙宗其廟不毁頌髙宗而推本祖德正所以表中興也一節自史記述緯書謂娀簡吞墮卵生契鄭氏引以箋詩而怪誕不經矣按天命玄鳥降而生商只天命生商耳蓋天命生商之時正玄鳥降之時也降者鳥之髙飛從上而下非天降之也二節方命厥後補正云承上帝命武湯而言不獨命湯方命其後奄有九有也商之先后指中宗以下受天命而不危殆者其故在武丁之為人孫子也先儒作武丁之孫子按武丁之後未聞賢君子孫祭其祖考而云命之不殆由於已恐無是理下文又侈陳功德更甚矣不如從王肅作武丁為人孫子為妥三節武丁之為人孫子也負荷武王之業無不勝焉補正云武王成湯也與武王載斾同故諸侯皆建龍旗十乘奉大糦以供王祭也四節當是時畿內地方千里惟民所居止而肇開封域極彼四海無異正域之初焉孟子所謂武丁朝諸侯有天下是也五節今日髙宗之祭四海來格祁祁衆多由景山四周之大河以至王都可見殷之受命百世皆宜而百祿是荷也玄鳥一章二十二句長發大禘也禘考詳見周頌雍詩今讀是詩雖未明言禘嚳而首云長發其祥又云有娀方將帝立子生商則其為禘所自出之帝可知也而祖妣並祀如雍所謂既右烈考亦右文母可知也國語云玄王勤商十四代興蓋契至湯十有四世也史記相土昭明之子契之孫宋𠂻曰相土就封于商此詩作于湯崩之後商書曰七世之廟可以觀德則商本七廟相土早為毁廟之祖矣詩曰相土烈烈則毁廟未毁廟之主並合食于太祖可知也末言卿士阿衡盤庚云兹豫大享于先王爾祖其從與享之則禘時功臣皆祭可知也周之禘經無功臣皆祭之文周禮司勳凡有功者銘書於王之大常祭於大蒸賈疏本孔安國傳謂周時蒸祭功臣殷時蒸嘗俱祭未有蒸祭及之而大禘反不及者則周因殷禮可知也何休以功臣皆祭為禘不祭為祫則臆説矣長發序曰大禘故不言禘太祖雍序言禘太祖則大禘可知也故不言大一章禹敷下土方三句不是贊禹功只是急須契耳言水患既去幅隕既廣而下土安逸使五品不遜百姓不親將入於禽獸亂之道也故天生契以敷教焉二章玄王契也歐陽氏曰玄深微之意傳云桓大撥治也集傳易大為武蓋頌后稷曰思文以衣食足而禮義興陳常于時夏也頌契曰桓撥以禮義興則禍亂不生干戈不作威武撥亂莫大於此皆表微之論補正云相土侯國雖強大豈能致海外有截蓋契為司徒受命敷教而小大之邦莫不通達惟契能以身先之故其應甚速至相土嗣其世職聲教益烈至於海外莫不截然秉其法式也三章帝命不違非人不違之謂世無失德則帝命自不去之至湯則商家積纍之德與上天眷顧之命相會合故湯之降生即於此時所謂湯齊湯降不遲也日躋者脫盡聲色貨利之人欲超然天理清明之境界日新又新歷久見他遲遲不息始終無非一敬式于九圍作之君師也四章五章詩所云方是言湯為方伯天下歸之武王載斾以下乃言革夏之事按小球大球謂鄰國聘問之玉也為下國綴旒言綱紀諸侯而諸侯之於方伯如旌旗之綴於縿固結而不解也小共大共謂屬國貢獻之禮也為下國駿厖言驅策諸侯而諸侯之於方伯如駿厖之足任使奔走不辭也六章湯以武定天下故曰武王猶周書所謂寧王爾非諡也虔敬也秉鉞尚武以敬行之才見全體聖敬九州之治不能截然歸於一德以苞有三蘖遂其惡行其志故也今莫遂莫達而九有有截者則以初伐韋次伐顧次伐昆吾乃伐夏桀苞與蘖並去也湯年八十有七始伐夏到得有虔秉鉞是萬不得己非有利天下之心苞有三蘖以下正是如火烈烈之勢猶周書所云一戎衣而天下大定也七章補正云仲虺之誥曰小大戰戰罔不懼于非辜有震且業蓋謂此也謂之中葉者在湯為初年自契以來則為中葉也降于卿士孟子所謂學焉而後臣之也按此章又言阿衡配享之故長發七章一章八句四章章七句一章九句一章六句殷武祀髙宗也帝乙之世武丁親盡當祧以中興功髙故為百世不遷之廟此其祔主於廟之樂歌也玄鳥則其時祭之樂歌也商頌終於殷武以見商之賢君於此究矣三百篇始二南而終殷武二南文德也殷武武功也周公作立政云克詰兵戎以陟禹之迹王者先文德而後武功文以經之武以緯之內治修外夷服而王道備一章撻彼殷武奮伐荆楚其蓄勢在恭默思道來運籌決勝削平禍亂威服四夷在此一舉補正云荆楚之地川谷盤亘山林深阻羣蠻雜居各保其險故必入其阻致其衆然後能盡平之二章居國南鄉言其地近為聲教所加不比氐羌之逺也乃逺者曰商是常而近者敢不至乎既克之又以文告責之所以服其心也三章勿豫禍適蓋商道先罰後賞故諸侯凛凛以禍謫為懼稼穡匪解則可以免咎乃自度語四章以下天命降監一節正中興之本商邑翼翼一節是中興之盛以保我後生便引起下章作廟之意或以下章為武丁考室者謬也殷武六章三章章六句二章章七句一章五句楚雄南服立國在江漢之間其強最久周以前世系無所考武王封熊繹為楚子春秋莊公之世楚皆書荆至僖元年乃書楚人伐鄭李氏樗曰世亂則先叛世治則後服當湯之時不敢抗衡及商中微為中國患此髙宗所以伐之也文武之時亦未聞為患厲王之後然後大邦為讎宣王所以伐之也郝敬援二南為證謂天下有道則荆楚首善則非也夫文王之化及於江漢之間乃德化之成非岐西後而江漢轉先也蓋楚最難服天下視為向背責一不享之楚而天下莫敢不享責一不王之楚而天下莫敢不王平荆楚者平天下之大機也故詩人頌武丁中興之功先敘奮伐荆楚之績商頌五篇十六章一百五十四句詩序補義卷二十四
