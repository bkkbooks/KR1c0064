body:
  text: 詩序補義卷四石泉縣知縣姜炳璋撰鄘說見邶風柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之按史記釐侯卒太子共伯餘立弟和有寵于釐侯和賂士襲攻共伯于墓上自殺衛人諡曰共伯而立和是為武公則武公固篡弒之賊也索隱力辨其誣諸儒皆不用其說獨王氏柏信之以為功過自不相掩不知此正宣王之世王能討魯伯御豈容武公之弒君篡國今即以詩考之曰髧彼兩髦知共伯之卒在釐侯未薨之前也序曰共世子知未立為君也史遷之說誣矣蓋共伯蚤卒姜以歸寧至齊母留之而欲奪其志故姜作詩自誓耳詩入衛風知姜已歸衛也一章或以室女謂共姜非也髦者人子之飾內則曰拂髦冠纓豈必拂髦者皆未冠也詩曰蒸我髦士豈必髦士皆總角也况髧彼兩髦其語最昵非從未識靣懸擬之辭泛彼柏舟無所依薄夫死無依也曰在彼中河衛在河北併鄘之地兼有河南中河正指衛地也諡曰共姜從夫之諡也如未婚不得祔廟又安得從夫諡則姜非室女也嚴氏粲云父母子之天夫婦之天今父與夫俱不在唯母是我所天也何不信我而奪我之志也二章母子而言天人蓋母子相接専以恩言天人相接純以理言此心一毫隱私便不可對天若純白無私天必諒之今何以不諒乎柏舟二章章七句鄘風至牆茨鶉奔極矣宣姜之不淑奪於齊也豈知衛之先有守義之共姜為强齊所不能奪乎姜一女子乃前與柏舟之仁人後與淇澳之君子各冠一編之首聖人之重節義扶名教也如是牆有茨衛人刺其上也公子頑通乎君母國人疾之而不可道也宣公納婦之惡詩人已刺之如新臺二子乘舟之類至宣公卒惠公幼宣姜復下適于頑此又從前詩人意想所不到者矣形之于辭則汚齒頰筆之于書則辱簡編播之鄰國吾君無以列諸侯告之先王曾孫何以承秬鬯于是深疾之不得不轉為掩覆之故其詩一字不粘君父若尋常相刺者然夫深疾之而又掩覆之如此則其痛心刺骨也何極哉一章牆以蔽室不幸有茨掃則壞墻而室之蔽毁矣禮以蔽國不幸而有中冓之言道則醜聲著而國之蔽毁矣蓋謂不出諸口猶得飾為外觀一經道破則毁垣見室汚惡顯呈中冓從墻字來牆正所以蔽中冓也即有事非中冓從而道之然語及其人亦足醜也二章如鄰國問及安能不答但約略置之不堪悉數也如事非中冓或可詳之然又恐人之言吾中冓者更長也三章當言及而避之不可誦讀也即誦其别端而聞者了然徒取辱而已醜已醜之辱人辱之也傳云讀猶抽也不特解詩明確且為千古讀書第一真訣牆有茨三章章六句按左傳初惠公之即位也少齊人使昭伯蒸于宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人服虔云昭伯宣公之長庶惠公之兄也杜預云不可昭伯不可也然則强之者齊人矣所謂齊人則襄公也宣姜者襄公之女也於是諸兒流毒遍于魯衛矣或曰何以公然舉五子女而無忌豐氏云以理揆之殆非私通也奉齊之命下適于頑耳左氏以其人倫失序故謂之蒸而宣姜得從夫諡者惠公諱母之惡而祔于宣廟也夫宣姜穢行五子女皆賢此康叔武公遺澤未泯蓋不可以常理論也君子偕老刺衛夫人也夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也此詩在牆茨之後鶉奔之前蓋刺宣姜之棄位而姣序言今日之下適于頑者乃曾為衛夫人者也可刺也蓋惠公即位其副禕立于東房者非宣姜也何以云祭服宣沒而姜已不承事君子何以言展衣蓋追叙其為夫人時可尊可貴而深悼其今日之汚辱也㸃睛處在不淑兩字不淑者無偕老之德也一章凡稱夫人從無說到偕老者以夫人之偕老不足竒也若宣姜以夫人而棄位適頑此從來夫人絶無之事故提出君子偕老已含起不淑淑者德也然不必深求也能與君子偕老便是貞淑之德可以不愧此服矣副笄六珈舉一首服而揄翟闕翟在內即下所云象服也委折也委委折旋中矩也他周南作蛇他他周旋中規也以行步言如山安重如河宏廣以容貌言皆夫人盛德之容也宜者稱其服也承偕老來宜于始亦宜于終雖君薨稱未亡人猶象服以終其身生有夫人之奉死備夫人之禮凡為夫人者皆如是子亦當如是也而云子之不淑其誰信之傳曰子若是何謂不善乎只作疑問之辭以起下二章委他二句非泛設正與下二章美色相照而宣姜無一不相反也二章鮮明者子之翟衣而但見其髮之美也玉瑱象揥皆副笄所垂之飾而但見其眉之廣而白也子試思胡然而人尊之如天敬之如帝以小君猶之君也釋詁天帝皆君也以與君偕老當服夫人之服而豈徒以色也乎三章展衣后見于王及見賔客之服詳周禮內司服注言鮮明者子之展衣有時蒙彼皺絺于展衣之上服非不度也而但見目之清眉之廣額之豐滿信為邦之媛而絶不見有委委他他如山如河之度此其所以不淑而不能偕老以致象服無以終其身乎君子偕老三章一章七句一章九句一章八句桑中刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾期于幽逺政散民流而不可止淫亂之人一人而亂三貴族之女而其輩行又相若其期㑹迎送又適相同無是理矣此為刺淫之詩只三云字可見云是詩人云之也云子誰思思孟姜耳且思其期我要我送我耳下三句皆所思之境沫東沫北以見沫土無不皆然衛俗在位之淫可知矣桑中三章章七句桑中之詩非淫者自作也觀三衛之詩若新臺牆茨君子偕老鶉奔等篇雖以國君之尊小君之貴躬蹈淫佚刺不置口即北風之感虐有所不顧想見直道猶存而之人者乃歷歷自指所私姓氏及期送之地形為歌詠將羣起攻之能一日容于其國哉大抵淫奔之人暗室之中嘗恐張皇未有自鳴其事者也若夫桑間濮上之音尤與此不相及按史記紂使師延作新淫聲武王伐紂師延抱樂器投濮水而死師涓從衛靈公過濮上夜聞水中樂聲因寫之為晉平公奏焉師曠曰此亡國之聲也得之于桑間濮上乎然則紂之樂先宣惠者數百年而譜入衛風可乎晉平公又後宣惠百餘年而譜入宣惠之世可乎或曰惟二南為房中之樂而十三國未可以入樂則季札觀樂之時魯太師何以及國風而七月一篇又何以三分其詩當周禮豳雅頌歟然吕成公直謂三百篇皆雅樂則昔人議之蓋刺淫之詩非祭祀朝聘之用觀伯有賦鶉之奔奔而趙孟以為床第之言使臣弗敢與聞可見矣鶉之奔奔刺衛宣姜也衛人以為宣姜鶉鵲之不若也詩意若刺惠公而序以為刺宣姜誅亂始也非宣姜則惠公無可刺矣若頑則詩人所不屑刺者也如兩章俱述惠公語惠公宣姜子也防間則可而曰鶉鵲之不如乎當從舊說詩人刺之也我我君也提出兄字而宣姜已不可勝誅以揭起次章之意君小君也鶉之奔奔二章章四句定之方中美衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓說之國家殷富焉此衛文中興民物富庶而詩人追賦之也熒澤之敗宗社國都典章人物一時俱盡而七百餘遺黎依依不舍從我播遷文公以亨屯之才與民更始審形勢建寢廟課農桑詩人節節寫來便見日月重新山川再造有勃然蹶生氣象故詩但言宫室而城郭都邑皆在度量中也但言琴瑟而器用服物備舉也但言一升一望而朝市民居形勝要害在目也但言降觀而分井授㕓有田有宅也但言卜吉而人心歡洽人謀僉同也但言夙駕而宵衣旰食戴星往來也末言騋牝三千則國家之富强可知而總歸于秉心之塞淵落落舉數大端中興規模無一不具夫邢衛俱借籌于齊桓邢延二十餘年而亡衛自文公以後六國俱滅帝丘巋然傳世四十歷年九百今讀定之方中而已知其氣象之不侔也一章首四語國勢振起詩人無限興㑹傳云楚宫楚丘之宫也仲梁子曰初立楚宫是也室猶宫也箋云楚宫謂宗廟楚室居室也君子將營宫室宗廟為先廄庫次之居室為後按楚宫占定楚室揆日互文耳箋說為優忽舉榛栗椅桐梓漆似與上文不屬從鄭氏以楚宫為宗廟則朱子所云籩實琴瑟之材方有著落止言琴瑟舉一例餘二章傳云虛漕虛也景山大山京高丘也東萊詩記從之若登山測影既無八尺之臬又無一尺五寸之土圭何以測之若一望可測則首章建國匠人規制不必如許煩重且文義亦復當以集傳後說為是首章言建國規制三章言國家殷富而此章推原將遷時一假審慎之意終焉允臧承上起下由升而望一望中已包楚與堂景山與京在內下以降觀于桑與升虛相應或詳或略錯綜成文三章鄭箋雨止星見想見輦路泥濘輕車簡從侵晨而出固不是尋常勸農亦不僅是平日省耕乃播遷後提起精神與民同作息俱從四字中寫出顧氏兆麟曰靈雨既零命彼倌人讀斷命辭已藏在內星言夙駕另起非方命倌人以夙駕也桑田是兩項匪直也人秉心塞淵一氣讀人指文公猶言斯人不但有實心并有實政騋牝三千正其實政之驗也人字不對騋牝定之方中三章章七句蝃蝀止奔也衛文公能以道化其民淫奔之恥國人不齒也止奔與刺奔不同刺者已然而刺之止者未然而止之也熒澤之敗左氏曰男女從戴公者七百三十人朝歌生靈盡矣然懿公好鶴鶴有乘軒國人棄甲而走因以亡國則所以敗亡之由猶未盡晰也及文公布化禮義之說明興亡之幾著而揆厥所先其君被醢其民被屠皆由淫亂致之故此詩直陳炯戒怵以危言以為越禮私奔則死期之將至也一章天有蝃蝀猶宫幃有宣淫之事也齊在衛東正宣姜父母兄弟之國故曰在東莫敢指斥之者怵于其父母兄弟之威也不知女子有行已與父母兄弟逺矣可恃其威而淫佚無忌乎二章朝隮鄭氏以為虹也曹風云南山朝隮詩人取以為庇護小人之象何以見彼為雲氣而此獨為虹鄭不可從衛在齊西朝隮于西者言雲氣自東而西資其庇護而淫佚不道然其雨不過崇朝耳喻耽樂不久也女子已逺兄弟父母矣豈可恃其庇覆而棄位而姣乎此二章是致亂之由三章乃如之人方就今日說命是禍福之命言婚姻之道當先貞信如其懷婚姻而大無貞信若從前所為則不知禍福之天命而死期之立至也蝃蝀三章章四句相鼠刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也風人之㫖無有徑直如此者且其意亦一覽而盡弇州巵言所以譏其太直也細按當日時勢乃知此及前篇同出敗亡之後其創巨其痛深故其辭簡直而峻厲所謂傷弓之鳥飛徐悲鳴聞弦聲而頓墮者也或謂蝃蝀相鼠文公訓誥其民者也則序不應言刺蓋公所自盡者在敬教勸學授方任能數大事積習為之一變莫不惡惡如巷伯相鼠是也莫不好賢如緇衣干旄是也故讀定之方中知立國之規模讀蝃蝀三篇知當時之好惡而收束于載馳以見其君臣勵精惕志皆從患難中錘錬得之者也集傳威儀容止正指有位非必執野人而責以禮也箋云傷化敗俗即朱子所云敗常亂俗而久生于世則是賊而已矣一假意相字直貫到人身上當局者昏旁觀獨明左氏因此詩凡軟如忘視不登帶目不在體者皆以死許之而其言卒驗相鼠猶有四體人而無禮是無四體矣何以生蓋從憂患如此歷錬而猶不能動心忍性變其積習更何處玉成何所屬望留一日則為一日之蠧故曰不如速死相鼠三章章四句韓詩外傳三引此詩以明禮之不可已其義甚精禮運亦引末章然不可謂即此已盡詩意白虎通德云此妻諫夫之辭臆說也干旄美好善也衛文公臣子多好善賢者樂告以善道也此美衛大夫之好善首四句但言旌旄車馬之盛末二句從賢人身上說他何以報此殊遇作不了之辭大夫之賢却于對靣照出而上四句並未及見賢一字乃無一字不為見賢設也衛自武公而後代少賢君數十年來從未見此盛舉詩人眼界一新從前之沫東沫北倐為今日之浚郊浚都同一衛而衛之君臣霄壤懸隔安得不欣幸之雖然惡惡不深則好賢不至君子謂干旄之篇即托根于蝃蝀相鼠乎駕車用四馬自是常制詩言五之六之徐氏光啓引漢太守五馬五子之歌若朽索之馭六馬以為古有是制宋方勻泊宅編引此詩為太守五馬之證然五馬自是漢制夏書亦未必確指大夫故朱子但言其盛而不過求其說也苐衛當敗亡之後即集傳所謂人心危懼興起善端之時其君大帛之冠大布之衣戴星出入為之臣者始而四馬繼而五之後且六之不守常制彼姝子豈肯以非禮相接而詩人豈肯以非禮見頌斯大可疑也知程子以素絲良馬為見賢之禮其說不可易也自古見賢恆用車馬逸詩云翹翹車乘招我以弓卷阿云君子之車既庶且多大夫以車馬聘賢人禮也五之六之程子所謂有加無已也素絲紕之據周禮注云用以維之恐旗縿之曳地據爾雅則為龍旗之飾以緣旒之邊者孔氏又謂以素絲為線縷使之相連一物三異其說按集傳乘此車馬即在建此旌旗內孔疏云未設縿旒空有析羽謂之旌既無縿旒又安得有素絲之祝耶王氏云素絲為組以繫良馬其說是也程子以素絲為束帛義猶未妥干旄三章章六句詩總聞云衛君出野親迎其禮如此受迎者他時將何贊助以為報也是以姝子為女子也載馳許穆夫人作也閔其宗室顛覆自傷不能救也衛懿公為狄人所滅國人分散露于漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也録詩者只重義不可歸不敢踰越以見穆姬之賢其于思衛之切望救之殷皆非所重若詩人之意全注控于大邦誰因誰極上而以歸唁衛侯領起嚴氏粲曰夫人蓋欲赴訴方伯以圖救衛而託歸唁為辭耳次章承上起下三章方明咎之而所以欲歸之故至末章說破不如我所之繳轉歸唁見此行所係甚重也一章載馳載驅虛寫歸唁之急即泉水所云載脂載牽旋車言邁是也大夫蘇傳云許大夫之弔衛者也大意云馳驅而歸唁于衛此豫志也乃不使我馳驅而僅使大夫跋涉則驅馬至漕遂成虛願憂心所結何以解之故下章以既不我嘉緊接二章既者已事之辭箋以上章大夫為告難之衛大夫則義不得歸意全未及於此既字難通故不得不訓既為實集傳謂大夫跋涉而來引以為憂則義不得歸意亦未盡于兩既字亦有礙不得不釋既為果其實義不得歸意已盡于大夫跋涉句此中便包穆公阻之于內羣臣諫之于外遣大夫唁之不使夫人往可知故云爾既不以我歸為善則我不能旋歸矣于兩既字方有著落視爾不臧詩記云為許人者視爾父子兄弟之間有災患不臧其心如之何則我之思不逺矣不閟謂曉然易見也三章嚴氏粲曰我無所告訴愁鬱成疾欲采虻以療之人見我之愁鬱以為女子多思其常耳然亦當論其思之是否而許人尤我之思歸豈皆稚且狂乎何不解人意也四章何焯讀書記云考其時狄入衛在閔公二年冬此詩曰芃芃其麥殆背冬涉春麥秋將至矣夫閲數月而救不至則與國之充耳可知其與黎臣之言葛之誕節者何以異左氏于許穆夫人賦載馳之下即係以齊侯使公子無虧戍曹則是詩有以激之耳因依也極至其國也兩誰字十分斟酌全神已注在齊桓身上不然如紀侯之依魯黎侯鄭忽之依衛魯昭之依齊何補于事百爾指許大夫之往也百爾所思或云不過問唁之常非也蓋控于大邦誰因誰極即夫人與許君大夫謀者但不如我親自歸衛與衛人謀更當一畨親切也載馳四章二章章六句二章章八句鄘國十篇二十九章百七十六句詩序補義卷四
