body:
  text: 詩序補義卷八石泉縣知縣姜炳璋撰齊或曰鄭衛小國詩之多如此齊大國自太公至襄公十有二世止十一篇一可疑也代有賢君皆刺詩二可疑也十一篇中安得有泱泱大風豈季札所觀别有齊詩齊桓之功艷于天下何以無詩三可疑也竊謂周初六詩之教掌於大樂正而魯史於二南之外僅存十三國其所存者亦非昔日全文蓋詩之逸久矣夫子删詩存其可節取者其義無足取及文不能全者去焉故謂夫子未嘗删詩者非也謂删詩而什取其一更非也豈夫子於齊專取其刺而去其美者乎若夫季札所觀别無齊詩篇中還甫田盧令諸詩誇田獵之美規逺略之心其為泱泱大風者亦可見矣嗟乎文獻不足聖人歎之商有天下六百祀所存祗商頌五篇夫子殷人不能勉强補苴其何有於齊也乎若夫齊桓晉文之無詩詩所云或者誇美之過而夫子删之也雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉按公羊傳及史記哀公烹於周由紀侯之譖鄭氏謂烹哀者懿王也其後齊襄滅紀說者猶以為復九世之仇則哀之無罪明矣而後序於色荒禽荒興居無節男女淫奔一舉而歸之哀嗟乎紀侯既譖於生前續序復誣於身後不有朱子哀其長夜矣此詩味其語意乃宫中彤史述昔時賢妃之告君者以為將來取法也此篇向作三次告君苦於下二句難安頓而蠅聲月光亦費周旋不知上二章皆驚疑自語至末章乃告君也恭録折中云賢妃御於君所嘗恐晏起故夢寐之中若有所聞即自驚曰雞既鳴而朝既盈矣又疑非雞之鳴無乃蒼蠅之聲乎其實非雞非蠅蓋緣想成聲無聞而若有聞也二章非日非月以意造形無見而若有見也三章蟲飛薨薨則東方畢明矣故敬告於君曰雖樂與子同寢然朝臣之㑹集者待之久而有歸心矣無以我之故而憎君視朝之晚也嚴粲曰不言因君之故而憎己反言以己之故而憎君可謂善於規諷矣雞鳴三章章四句還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉若說田獵之非便是一篇諌獵書非風也妙在不說上之荒於獵而但言國人之逐禽并不說國人逐禽之非而但述其交相稱譽若置身局外代為欣羡者然其俗之不美由于上之化導自見後序謂哀公詩不可從上二章不言勇力末章提出從兩狼以見技勇雙絶還三章章四句著刺時也時不親迎也刺時者刺時俗也此著與庭與堂箋指婦家當自堂而庭而著無先俟於著之理集傳用詩記之說謂俟於壻家則由門外而及寢門而升階至堂秩然有序與不親迎之㫖自合然考士昏禮婦車有裧注裧如帷裳則俟已者其充耳之紞垂紞之瑱無由見之蓋通篇俱詩人之辭兩我字詩人指嫁者也不言其不迎而止言其俟不言俟之非禮轉言其俟之可誇以見壻家不以禮往婦家不以禮求習為固然遂成風俗國史所謂刺時也紞以懸瑱繫瑱於衡衡附於笄鄭司農云衡所以維持冠者鄭康成云衡垂于紞之兩旁疏云笄簪也冕與辨皆用玉笄緇布冠不用笄笄者所以固冠也詩言充耳兼冕與辨言之苟無冕及辨何以有笄有衡無衡何以有紞無紞則無充耳矣故知詩所云充耳貴者之服也士昏禮疏主人爵辨纁裳爵辨𤣥冕之次者用助祭之服親迎為攝盛也則卿大夫朝服自祭其助祭用𤣥冕親迎亦當用𤣥冕也按此卿大夫親迎皆服冕士服辨是以有充耳不兼諸侯以諸侯之紞五色詩止言三色知臣下之服也知兼以士言者以爵辨亦有笄有衡有充耳也則此篇不得泛作庶人之禮矣當時卿大夫而無親迎之禮其時之風俗可知也諸儒以瓊華瓊瑩瓊英作三物則是三易其瑱矣蓋泥傳以三章分作三人也箋云瓊英猶瓊華也蓋就瑱之文采處謂瓊華瓊英瑱之明潔處謂之瓊瑩其實佩之者一人也所佩者一物也此詩只重俟字以見不親迎之失禮瓊華等不過指其瑱耳玉光流轉莫名一狀故曰華曰英又曰瑩也著三章章三句地理志引此詩俟我於著乎而顔師古注著地名濟南郡有著縣述其說者因以為莊公迎婦姜而作黃氏䙧曰以著為地下文何以曰庭曰堂則著為門屏之間也或又云俟我於著乎為句而汝也以此為婦告其夫之辭更非葉氏巖下放言云大抵古文多有卒句之辭如以兮以只以且為終甚多此以而為終皆風俗所習齊不可移之宋者老泉詩談詩究乎而乎而何可究耶東方之日刺衰也君臣失道男女淫奔不能以禮化也淫奔之事無有旦則來而暮反去者後序徒以彼姝者子之文遂以淫目之然彼姝者子衛風以指賢者安見彼為賢人而此則不肖也一章政教之衰由于賢者之不在朝也齊在東方東方之日喻齊國世運之昌明我我君也履我略住履踐也即就也言跡我行事之善故就之乘時而仕也二章東方之月喻齊國世運隂閟在我闥自室而門將去也發行去也言跡我行事之不善故去之見幾而作也詩人不得於君父往往借男女以抒情又惟恐人之誤認其言直以為男女之情也故為之謬其辭日則就我夜則辭去使後人得其刺衰之㫖則說有可通泥其男女之辭則理無可解東方之日二章章四句東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉或云此詩作於哀厲怠政之時主於刺晏朝非也衰亂之君動止不常忽而未明求衣忽而蟲飛猶夢諸務廢弛忽而一事獨急遽久置閒散忽而一日獨召用其性情總不可知其號令總不可測其緩急無常度其輕重無定衡詩人特據興居一節以例其餘故此篇之㫖全在不夙則莫前二章須合併看直注到末一句人臣辨色入朝東方未明早矣而公又召之而又欲令之以事一步緊一步使人踉蹌入朝不可從容一刻尚何容觀玉聲之有其夙如此及其莫也則又不然所謂無節也然莫字不用明寫只從末句一㸃而無限晏眠怠息情狀一一含蓄何氏楷云召之第謂召見其人令之則將有所使之方與上章有别有樊之圃雖狂夫猶瞿瞿然不敢折栁其中以圃之有樊喻政事之有節度也奈何早晚之常猶不能定而不失之過早者即失之太莫也東方未明三章章四句南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之集傳謂前二章刺齊襄後二章刺魯桓刺桓者即所以刺襄也蓋襄挾强齊之勢以制弱魯肆為獸行故首二句已冒通篇南山崔崔見齊國之强大其勢險峻可畏也雄狐綏綏見襄公為邪媚之行綏綏安緩無所忌憚也彼齊子者何以既歸而復思齊反從魯而至其地乎若為責文姜之辭然桓非木偶何以不用申繻之諫同入雄狐之穴下二章又若為責魯桓之辭皆刺襄也一章懷傳云思也當屬文姜蓋女弟思見其兄亦情理所有豈知為所㸃乎詩不咎襄之獸行而轉咎姜之不應思齊并不咎文姜之淫行而若深惜其不知襄為何如人而思之者然刺襄之意嚴而婉二章魏風葛屨疏夏之有葛屨特為便於時耳非行禮之服若行禮雖夏亦當用皮按屨人掌王及后之服屨亦有葛屨而士冠禮屨夏用葛冬用皮士喪禮夏葛屨冬白屨則亦未嘗非禮服也惟朝祭不用葛屨耳緌按士冠禮疏玉藻言緇布冠繢緌諸侯之冠也緌纓飾也可知冠下有纓纓之繢飾則為緌然則纓之下垂者為緌緌之繢者尊者之服也若緌則冠下皆有之集傳冠上飾云上者刻本之訛也傳葛屨服之賤者冠緌服之貴者二屨為兩五兩者十屨也十亦數之耦也蓋言一身之中自冠至屨莫不有耦以見人各有耦也上章以勢言之文姜不應思齊此章以理責之姜既有耦當安於魯不應從斯道歸魯者復從斯道返於齊蓋指濼之行也三章魯桓為諸侯告父母之廟而娶此固知禮矣獨不知男女之有别而養成其奸也鞠養也夫人而與齊侯會是養成其姦也四章得止謂以禮得之也極窮也何以使夫人窮極其欲因之殺其身也蓋指薨車也南山四章章六句或曰文姜以桓三年歸十四年而齊僖卒諸侯之女適於諸侯父母在歲一歸寧則姜已歸寧十度矣經以常事不書耳仁山金氏亦云雄狐之事文姜在室已然而抑知非也按桓三年書姜氏至自齊其年冬齊侯使其弟年來聘致文姜也自是齊魯絶少聘問蓋齊方謀紀而魯睦於紀又為王逆后於紀至十年而齊侯衛侯鄭伯來戰于郎十三年魯復㑹紀侯鄭伯與齊宋衛燕戰而四國敗績則齊魯之絶好久矣終僖之世公不朝齊姜不歸寧經傳可覆按也男女之際春秋必謹文九年書夫人姜氏如齊歸寧也其嫁他國而歸魯者則書某伯姬歸某叔姬歸豈文姜歸寧而聖筆不書如或之說則子同之生可疑矣豈知同非吾子乃公羊子之謬言即展我甥兮亦詩辭之偶合未聞夫人歸魯已三年而子同之生猶有傳為齊侯之子者然則雄狐之事當自濼始耳或又疑文姜嫁已一周而其兄始娶王姬因以姜為襄之姊亦非也襄之娶王姬安知其非再娶耶春秋之再娶多矣何疑于襄耶甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也古人云甫田悟進學衡門悟處世揚子修身篇亦引此詩蓋言詩之用也而此詩之作實指齊襄旅獒不寶逺物則逺人格論語逺人不服則修文德以來之左傳懷逺以德漢書終軍曰逺人必有慕義而來者自古逺人總無泛指以詩之言逺人者證之春秋傳襄公事無不吻合故篇次又在雄狐之後然則此詩當從傳興也一章補傳逺人諸侯也治大田者莠不可除徒勞其力求諸侯者逺莫能得徒勞其心人君以人情為田禮耕義種猶恐不治乃無禮無義純用强力人之視已猶莠之驕驕耳其何能濟不徒用其心乎二章桀桀則侵陵嘉穀甚於驕驕矣已包戕魯滅紀諸事三章以總角童子之突而辨喻襄公未能修德尚有童心突然而欲爭諸侯吾恐其忉忉怛怛者不在諸侯而在蕭牆之內也或曰嵗月易逝人夀幾何或曰母為爾甥總角可侮說皆可通俱非詩㫖甫田三章章四句盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉此詩大㫖與還相似但還則述其交相稱譽以刺風俗之不美此則専刺襄公耳或云襄雖無道豈無車馬輿從何至牽黃犬逐狡兔乎按古者四時講武原未嘗以犬從禽自盧令見于此而載獫歇驕載于秦風兔死狗烹傳於范蠡試犬兹囿見於史黯少儀云犬則執緤守犬田犬則授擯者既受乃問犬名可見田獵用犬犬亦有名由來已久故韓盧宋鵲楚獷馳名戰國而鬪雞走狗必歸之齊也其人指從君田獵之人而人之美鬈恰與犬之重環相映人之美偲恰與重鋂相映似贊似謔而襄之溺于田獵自見上言盧下言人上言令令下言美且仁猶所云馬與人謀人與馬謀是也仁者和易接人也觀于思為譏華元則知美且偲非譽之也盧令三章章二句敝笱刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂為二國患焉此若為莊公解免之辭以刺文姜也三四大魚喻其從者也時齊人有謂母不可制當制僕從如後儒之說者詩人以為不然也魯弱莊幼猶笱之敝者耳在梁之空而欲取魚難矣況大魚乎文姜之遜齊而復歸于魯也從者之衆如雲焉起滅自由也如雨焉滂沱不止也如水焉泛濫無常也文姜蛟鱷也夫且挾魚而飛孰得而制之哉敝笱三章章四句文姜身與於弒義所當絶者也當其遜齊之日使魯有石碏之臣聲其罪而拒之於是請之天王告之列國率吾臣民發憤復讐則吾魯中如曹劌之善謀公子偃之善戰必起而助我彼曲我直彼竭我盈雖不得斷諸兒之首灑涕告墓而大義既申諸兒自無以立於天地之間無知之弒固不侯貝丘之田也乃失此機會聽其返魯强奴悍婢簇擁而歸莊公當十三四嵗之孺子直玩於股掌之上其如齊何哉故前南山篇是刺襄公作於公薨之日也此篇是刺文姜蓋作於遜齊返魯之日也載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉莊二年姜氏㑹齊侯於禚五年夫人如齊師七年夫人姜氏㑹齊侯於穀皆齊地也蓋齊侯在其境文姜涉汶水而與之會襄既恃强又侮莊幼故召之使來詩人於對面托出正意並未一語及襄但言文姜之無恥而襄之惡已灼然可見一章聞命即赴當晚啓行不及待旦寫出一段匆遽之狀故云薄薄蓋聞其疾驅聲也二章在魯道中漸次近齊但見其馬之美轡之柔從容暇豫按轡徐行魯君臣莫敢誰何故曰齊子豈弟望其車便知車中之人便知其人所為之事對面看去便有一竚立以俟之齊襄三章汶水甚大岸上行人甚衆彼齊子者方自有蕩之魯道翺翔以濟也不言車馬舍車而舟也四章齊子自魯道而來遨遊汶水之中遐覽逺矚曽不知恥連說魯道有蕩者四就諸兒心目中看出國弱主幼此中無人召之即至一路無梗也載驅四章章四句猗嗟刺魯莊公也齊人傷魯莊公威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉此詩極道魯莊公威儀技藝之美只用猗嗟二字微示刺意前人言之當矣蓋此詩作于莊公年已及冠之日文姜屢次會齊之時也一章通篇十分稱羡而以嗟歎之辭發端則其極稱羡之處正其大不滿之處也五句俱言威儀重在頎而長詩人若曰始則幼稚無知耳今乃昂藏七尺軀為世美男子儼然國君而膜視其父之死而不之憤也或者才武不足無以復讐而射又甚臧何以不興問罪之師也二章三句威儀二句技藝末句一結言如此威儀技藝而不以一矢遺我求其故而不得蓋彼固我之甥而非我之讐也彼固視舅氏最親因而召之無不來也三章三句威儀三句技藝貫貫革也强有力也反者復中其故處無虛發也㸃出一亂字亂莫大於吾父之刃于讐又莫大于讐人之辱吾母枕干寢戈為人子皆然乃禦小亂而忘其大亂也禦外亂而忘其內亂也夫乃知其節節可稱節節可歎矣自春秋有子同生之文公羊于夫人遜齊傳倡為同非吾子之說詩後序遂云人以為齊侯之子也不知文姜歸魯十有五年而如齊莊已十有三嵗矣尚有齊侯之子之嫌哉況既生莊公又生季友如欲别嫌當并友書之夫魯夫人有不貞矣又安得舉子而一一筆之于春秋蓋子同之生左氏曰以太子之禮舉之啖助曰君嫡子生以太子之禮接之則史書義如是止矣其不書者或生于未即位之時或不以太子之禮接之耳傳云孌壯好貌增一壯字已注刺莊本㫖射南宫萬事在齊襄之後朱子特引以證公之善射非即指此為禦亂也說禦亂詩人明以復讐討賊責之猗嗟三章章六句南山敝笱載驅猗嗟皆齊人之詩也雖為魯事其實齊風夫齊人猶恥文姜之行曾無魯人之詩乎詩所云此其所以為禮義之國歟知諱尊者之惡故也出自齊人則直矣而吾黨之直者異於是也然則春秋何以直書其事曰據事直書者史官之職也隱惡揚善者臣民之心也齊國十一篇三十四章四十三句詩序補義卷八
