body:
  text: 詩序補義卷二十石泉縣知縣姜炳璋撰大雅說見小雅文王之什文王文王受命作周也箋云從此至文王有聲為文武之正大雅文王受命作周而所以受命其上面便有亹亹緝熙敬止一層周既受命對面便有殷士祼將一層言文王受命後面便有法文保命一層只一語而全篇之旨皆具首三章言文王受命而昌子孫并挺生賢才以佐其子孫後四章言文王以敬德受命代商商之賢才適為周用可知天眷有德其命靡常後王毋以祖德可恃而不修德以保天命也補正四章五章言殷王之子孫羣臣服事於周者即前車之鑒似無天絶商之禍及其子孫又及其羣臣之後嗣意一章於昭在帝朱子前說以德言集傳以神言者盛德之士清明之氣常聚其沒也發而為英靈故明昭而神不亡况聖人與天合德至清至明呼吸皆與天通天者清明之氣也宰此氣者帝也以威靈處言之曰帝以實際處言之則理而已矣文王全盡天理沒則其氣亦歸諸清明之天而不昧故一陟一降在帝左右武王伐商必載木以行何也大雅開卷叙商周相代便云文王之神於昭于天蓋文王即天也武王以為有一念自私自利不可以告天即不可以對文考天心不順即文考之心不順聖賢心事何等公正曰上帝臨汝則文考臨汝矣天與文不忍斯民常處水火之中武王之心直與上帝文考相通伐商之事不啻親為提命其載主以行見與以服事殷之文王相契無間故夫子以達孝稱之而殷士祼將本非有一毫勉强也然即此便見後王法祖保命不容自已苟天心不享文其能眷顧哉因今日在天之靈想到當日格天之實有周之顯帝命之時總寫出一新字以下節節承帝命二章亹亹已含下緝熙敬止令聞猶下文義問謂善名也文王當紂之世令聞實難其德純亦不已故人心感而善名歸之者亦不已也似不必以既沒言此即下文萬邦作孚處感人心自足以享天心陳錫哉周使之昌世以及其黎獻也三章文王曰亹亹多士曰翼翼蓋未有不敬而能成厥猷者也正是君臣一德處濟濟多士內便包文德武功無所不備足以伐暴救民而文王在天之神以寧也將下篇肆伐大商一節事􅕍栝於此故下章即言商孫周服也四章上云亹亹便是緝熙意此特提出敬字為主腦緝者緝此敬而無間熙者熙此敬而不昧所謂亹亹也假哉天命以下以商相形說得凛凛可畏一氣趕到下章無念爾祖上五章侯于周服下便可接殷士忽著天命靡常一語見膚敏祼將黼冔襄事觸目皆龜鑑助祭而特舉祼將者商人尚聲樂三闋然後迎牲周人尚臭灌用鬱鬯既灌然後迎牲此殷周之禮一大變處獨舉祼將見周之異於殷也禮既變而冠服依然正使人怵然動念六章上言商孫歸周殷士助祭幾疑商家積纍之薄而不知其祖德宗功與我周無異而所以如此者以後王不修厥德也可見祖德不可長恃而念祖者之當自修其德也七章無遏爾躬令人悚然宣昭義問承令聞不已來有虞殷自天承宜鑒于殷來虞殷之廢興由於天而天非有聲臭以示人也文王之神於昭于天在帝左右謨謀具存心源可接法文王即法天也何以法之法其緝熙敬止而已上文極言天命可畏至此又言無聲無臭意非相悖也此不是言天道難知蓋言無著手處耳篇中指出敬字是文王心法正達天階梯萬邦作孚所謂修己以安百姓篤恭而天下平也蓋天無聲臭其聲臭寄乎人心人心感孚義問洋溢則天心孚而文王亦眷顧之矣不可以長配命乎文王七章章八句序言受命不言稱王吕氏春秋云周文王處岐諸侯去殷三淫而翼文王散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命維新以繩文王之德文王追諡而吕氏云然則受命稱王之誣久矣中候所云赤爵銜丹書入於豐劉歆作三統厯以為文王受命稱王九年而崩皆踵謬耳魯語以文王大明綿為兩君相見之樂左傳亦同又天子諸侯朝㑹以為樂章又燕禮合樂工歌文王蓋文王有君民之大德有事君之小心其用最廣故左氏曰周之興也其詩曰儀刑文王萬邦作孚言刑善也大眀文王有明德故天復扶又反命武王也言文王有明德故受天命而又命武王有天下也全詩歸重文王明德第三章言文王之德獨詳而王季以維德之行一語㸃過武王則但言伐商之事王季武王未嘗無明德而受天命則自文王始書所謂文考克成厥勳誕膺天命豫小子其承厥志是也文王有此明德必有聖父聖母故推本於王季太任有此明德必有聖配故詳言太姒德盛禮隆然後言篤生聖子以有天下敘武之伐商以有命自天命此文王發端詩固無處不歸重文王矣至末二章所謂復命武王也一章明明赫赫言文王有明明之德斯受赫赫之命通篇俱申此二語提出天難忱斯不易惟王悚然為嗣王炯戒使不挾四方使字正形容天威赫赫處而下文命此文王上帝臨汝皆鑿鑿可據二章言文王之聖自父母而已然三章淮南子云堯舜禹湯文武坦然天下而南面焉可謂至貴矣然而戰戰栗栗日慎一日按此即小心之謂也集傳翼翼訓恭慎即前篇緝熙敬止蓋洗心藏密亦臨亦保敬德之至也回違也與天一毫不相肖便是違天純亦不已與天同體故懷多而受衆也此實寫文王之明德四章言有命既集于周而天眷文王故於其初年又生聖女以為之配焉五章言大邦有子宜配文王其德盛禮隆如此俔天之妹謂與天伯仲固非以文譬天太姒譬天之妹更謬妹少女之稱易云歸妹是也太姒聖德譬如天之少女也按哀公問載孔子云冕而親迎親之也程子謂天子固不親迎諸侯亦無舍其宗廟社稷而逺出逆婦者所謂親迎亦逆之於館耳按文王時為世子非邦君比也則當親迎於其國洽字書亦作郃水北曰陽今陜西同州有郃陽縣即古莘國莘與邠岐接壤公劉云涉渭為亂自邠至莘必渡渭故文定之後行親迎之禮而造舟為梁於渭水是倒裝文法非謂太姒至渭而文迎之也六章言天既命文王於周京矣又篤生武王復命之以代商有天下也序所謂復命武王正體貼此章之意七章八章正寫伐商事或云屢稱武王而此云惟豫侯興稱侯者述當世諸侯之詞按其文義篇中侯字俱一例看為妥肆伐大商補傳云肆遂也較集傳為優鷹揚詩通云是義氣奮激直欲夷大難以快人心㑹朝清明王肅云甲子昧爽與紂戰不崇朝而殺紂天下乃大清明無復濁亂之政大明八章四章章六句四章章八句綿文王之興本由太王也文王之興指後一章本由太王則指前八章也太王時勢與公劉不同公劉是草昧開創之君故篤公劉篇氣象深淳制度簡括末章則歎其富庶之極而止太王雖為狄難而遷然承公劉餘業故規模宏敞制度詳明末則極言過化存神禮讓成俗景象已至文王三分有二時也一章言綿綿之瓜本於初生之瓞以興周之盛始於微也傳曰興也蓋一語統興九章以漆沮二水為洛水者始於孔安國書傳闞駰酈道元從之顔氏漢書注亦用其說是漆水即洛水而沮水亦入洛故孔氏以二水皆洛水此馮翊之漆沮在今同州朝邑界禹貢所云漆沮既從吉日所云漆沮之從非此詩之漆沮也隋志云扶風普潤縣有漆水經岐山北南入於渭漆縣古豳國地也沮水諸儒不知所在胡渭以麟遊縣别有漆水疑為沮水此扶風之漆沮扶風今為鳳翔府地則此詩漆沮及潛之猗與漆沮是也兩漆沮相去三百餘里有涇汭二水為之隔孔仲達謂馮翊之漆沮亦東流周地則非也集傳云漆沮二水名在豳地太王世居豳正在扶風漆沮之間或謂豳館几筵已有宫室安得云穴處不知陶復陶穴豳之舊俗未改且當狄難舊時宫室已棄岐山營繕未成故云未有家室也陶復陶穴民俗朴陋對末章禮讓成俗一段景象未有家室工役未興對下數章築室于兹俾立室家無限經營二章走馬陸行也率西水滸集傳云漆沮之側蓋漆沮注于渭渭水在梁山之南踰梁山循渭以達岐也莊子吕氏春秋各敘亶父遷岐事而孟子獨多踰梁山一語蓋亶父作邑狄不敢爭以梁山扼其吭也篤公劉篇疏云豳國之東有大山者其惟梁山乎梁山外蔽岐山內鎮渭水環其南曰率西水滸至于岐下而梁山之踰不待言三章堇荼如飴爾雅芨堇草郭注即烏頭也又云齧苦堇注云今堇葵也此詩言堇即釋草之苦堇而不同于芨歟曰止曰時兩曰字承上文言謀及乃心謀及卿士庶人龜卜皆以為然曰可止於是而築室矣此未遷以前定議非走馬以後事四章慰者慰其從遷之勞止者暫為便安之地左右以下方是度地居民畫井授地五章六章七章不過治宫室作門社而一段興㑹勃發規制堂皇便有蹶厥生氣象八章遷岐之後已無狄患而昆夷又强征昆夷雖文王時事而其來已久故集傳仍指太王箋云小聘曰問不如集傳作已之聲聞不隕尤於自修上關切也吕氏大臨曰昆夷所以為患者恃其深林大箐路塞不通耳今柞棫拔去道路可通失其所恃是以駾奔而喙息也九章然所謂入其境讓畔讓路入其邑男女異路斑白不提挈入其朝士讓為大夫大夫讓為卿一段太和之風禮讓之俗未曽說出故以虞芮質厥成一語括之以見藹然唐虞景象也夫豈陶復陶穴之舊乎蹶厥生猶云勃然興起即其命維新之意傳云天下聞之而歸者四十國被化者久至此歸附之非以一事遂足感人心也末四語言賢才多而王業成也恭録折中云天下聞而歸之者四十餘國當時遂有以此為文王受命之符者故詩人辨之以為人言虞芮質成之後文王乃蹶然而興者非篤論也文王之興自豫言之則曰以其有疏附耳能宣布德使民親附也以其有先後耳能前後相導使無過舉也以其有奔奏耳能出使四方喻德奏功也以其有禦侮耳能奮揚武衛折衝威敵也蓋濟濟多士乃文王之所以寧不係乎其質成與否也綿九章章六句棫朴文王能官人也原解云記曰人官有能物曲有利養之能盡其材故取之能備其官官之能當其人故用之能得其力能官人而治道畢矣文王聖德在位五十年培植薰育久而亹亹純一區别程量總覽羣英如六轡馭馬無不調其適而盡其才故曰能官人也按序云能官人集傳言詠歌文王之德惟有德故能官人兩義正相符一章木茂盛足以儲用興賢才足以備官正意已含興內左右趣之固是德盛人歸然曰左右專以近臣言則歸德意反不見甚廣蓋云羣材彚征或左或右各見其才無不奉令焉二章三章正申明左右趣之之意國之大事曰祀曰戎用之宗廟髦士奉璋威儀節度皆得其宜用之軍旅將卒一心六師趣附惟恐不及苟非程材器使無一不當何以得此濟濟容貌之盛指文王正與賢才相輝映四章承上章能官人則賢才得以自見然平曰無培植之功則無以致賢才之盛也此方歸重文王作人上雲漢為章于天而司造化者天也以興賢材為光於國而司造就者文也三年而小成九年而大成自非久道何以致之遐不猶云自然如此也五章承上章歸結到文王之德文質彬彬乃為佳士此作人之效也然文王之作人豈無其本哉勉勉猶亹亹緝熙敬止之謂正綱紀四方之本也言所以能作人者以其己德之修也棫朴五章章四句旱麓受祖也周之先祖世修后稷公劉之業太王王季申以百福干祿焉受祖言受釐於祖也曰玉瓚曰清酒曰騂牡皆主祭祀言之周之先祖以下學者之詞辨說所謂大誤也一章傳云旱山名山平則草木蕃以興人和則福祿盛干祿豈弟是一篇之綱言其干祿也以豈弟亦異乎人之干矣即末章不回之意豈弟訓樂易言樂易及民也表記云凱以强教之弟以悅安之周語單穆公引此詩曰夫旱麓之榛楉植故君子得以易樂干祿焉韓詩外傳云度地圗居以立國率民力稼以重農學校庠序以立教事老養孤以化民升賢賞功以勸善禁奸止邪以除害接賢連友以廣智宗親族附以益强詩曰豈弟君子文王之謂也按諸書釋豈弟二字甚合詩旨然則豈弟者樂易及民使民無不遂其樂也此即祭則受福之本先成民而後致力于神意二章其承祭也玉瓚黃流灌地以降神芬芳齊潔宜其受福也然亦以其有豈弟之德耳不然民生困悴神將怨恫何福祿之有三章君子之祭必有助祭之臣皆君子譽髦成之者也補正云君子德教從容漸漬能盡人之材使各極其所至猶鳶之飛而極於天魚之躍而自得於淵也其作人也本於豈弟之德蓋豈弟則優游不迫故能成就人材四章是以清酒騂牡以享以祀以助我景福介助也言人才盛而執事恪也五章柞棫茂密則為民所燎君子有豈弟之德民歸之則為神所勞至此以民神合言言神之降福由民之得所而豈弟有以致之也六章詩所云葛藟叢生未必皆直也然附於條梅則皆直也福之在人未必皆正矣惟君子以豈弟之德求之則正而不邪以結干祿豈弟之意旱麓六章章四句詩故云王用享於岐山之詩也其說似鑿思齊文王所以聖也言思齊之詩明文王所以聖非指思齊之首章也歐陽氏乃云所以聖者世有賢妃之助失其旨矣前二章聖母聖配助其聖也祖考家邦驗其聖也而非所以為聖於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已曰不顯亦臨無射亦保又曰古之人無斁真所謂純亦不已矣凡前篇曰亹亹曰緝熙敬止曰勉勉皆此意也此文王之所以聖也聖則不待諫聞從容中道常而肅雍變而烈假無不自得是以開來學於無窮而為萬世學者之法也不顯亦臨抑所謂尚不愧于屋漏無曰不顯莫豫云覯在文王則性與天合也無射亦保易所謂乾乾惕若書所謂檢身若不及在文王則至誠無息也聖學全體其要只一敬字敬之從容處便是和雍宫肅廟不過見於外者爾三章烈假以德言羑里之囚崇侯之譖處之有未盡善處則光大之德瑕矣四章上篇言文王先成民而致力於神蓋君道也此篇言其純亦不已為百世成人小子之法蓋師道也故末章不曰文王不曰君子而曰古之人正對後世之成人小子言詩人言文王為萬世師從不顯亦臨無射亦保上約言之曰無斁無斁二字徹上下統安勉人人可學極贊其無斁之至則曰不聞亦式不諫亦入其無斁處便是純實指之曰敬萬世作聖之基具揭於此故後世人材使之有聲譽而為俊士也序云文王所以聖得其旨矣思齊五章二章章六句三章章四句皇矣美周也天監代殷莫若周周世世修德莫若文王朱子曰此詩敘太王太伯王季之德以及文王伐密伐崇之事一章傳云二國夏殷也四國四方也玩作之屏之一段明是始遷岐下斬棘披荆可以謂太王不可謂文王故集傳於二國從毛傳指夏商也本意是言商政不獲而兼及夏者以二國皆革命書云我亦惟兹二國命亦指夏商也太王之時殷政漸衰不獲者不得於天也以天之不得於夏者驗於殷知二國之政一轍也耆憎式廓集傳未詳傳於頌耆定爾功云耆致也憎當作增式廓猶規模也言天於四方之國爰究爰度苟可以安斯民者則以大命致之以大其規模於是眷然西顧克當天心以此岐周之地與太王宅焉故下章遂言遷岐之事二章前八句所謂天作髙山太王荒之也串夷鄭箋作混夷按混夷之駾在文王之世若太王狄難方已昆夷復强但不殞厥問而已豈能滿路而去傳云串習夷平也言人物蕃而土地闢從前山林隂翳之境今乃習熟常行之大路厥配指太姜即爰及姜女聿來胥宇之意太王曰既固文王曰維新固者成不拔之勢新者非侯國之規三章帝省其山見柞棫拔松柏兊國勢日盛生齒日繁天既作之邦又作之君以自配對蓋自太伯王季時已默定之矣作對二字暗照文王故章末奄有四方句明白指出太伯之讓王季之受俱於因心則友四字托出或云使伯讓而有兄避弟之名太王必不肯奪嫡王季又豈肯亂宗竊謂此發明伯之至德則然而因心則友却不盡此心者太伯之心即太王之心也兄弟之間本無彼此天命所在詎有意必伯體太王之心而授之季季因伯之心而受之天至公無私尚何形迹之可言哉後世魯隱吳末皆以讓國釀成亂本以無因心則友之人耳夫乃知讓德之光乃王季豫之所謂因心則友也季厯不立諡法而曰王季季對伯言周家不沒泰伯之讓德矣有君民之大德有事君之小心者文王也太王何獨不然太王欲傳位季厯以及昌以文有聖德亦曰有以光大我國家耳豈曰將受天命為天子哉故凡言天命者詩人從後之詞猶云萬邦之方下民之王耳太王之受命既固太王之心不知其為受命也王季之既受帝祉其心亦不自以為帝祉也玉步一日未改君臣之義一日未絶此毫釐千里之辨也四章極力發揮王季之德而文王只帶言之以留下四章地步靡悔言天心眷注克副其心無所遺恨也文王以生安之質勤下學之事詩人曰亹亹曰勉勉曰無斁曰靡悔可謂善言文德矣非周公其孰與於斯五章沈氏曰言文王武功而冠以心體聖人之事功即聖人之心體也侵阮徂共傳云國有密須氏侵阮遂往侵共大旨了然乃張融據吕覽魯詩以阮徂共為三國謬矣六章以按徂旅救患也師至於共未嘗至密也即以救患之師為問罪之師遂從阮疆出侵須密極其神速而陵即我阿泉即我池盡國奔潰皇甫謐所謂須密之民縛其君以獻是也於是遂作程邑徙都焉世本古義云岐南渭側密地也七章聲者徴於詞也色者見於面也不大則甚微無疾遽也夏者氣之盛也革者機之變也不長則甚暫無留滯也東萊以夏革為縱私意則與不長有礙文王之知識非猶夫人之知識而猶不自用惟順乎天理自然之則一張一弛適如其分與天為體而已仇方萬民所仇即天心之所怒所謂天討也八章左傳子魚謂文王聞崇亂而伐之三旬不降退修教而復伐之因壘而降又通志云文王伐崇三旬猶不降於是勒兵攻滅之上段是圍之三旬時事下段是勒兵時事夫文王之師仁義之師也然曰同爾兄弟是與國之多士卒之衆曰以爾鉤援與爾臨衝是車馬之强器械之備以此奉天討攻崇墉必待執訊攸馘是伐是肆而後舉然則徐偃宋襄之仁義誠無用矣既滅之後作邑于豐又想見其罪人既得市不易肆斯謂之文王之師前段執訊攸馘則有聲有色矣然連連安安則不大聲以色後段如風馳電挈可謂氣極盛而機極神而初無留戀是不長夏以革夫豈以知識自用哉亦順帝則而已篇中說天處最親切顯然有觀有顧有省殷然有求有究有度諄然有謂而總結於四方無侮無拂人心之外無天命仁政之外無民心也皇矣八章章十二句補正天之立君以安民也故社稷無常奉君臣無常位聖人天理渾然無一毫人欲之私故行事皆明白直截無所回護如崇侯虎為紂三公又紂之寵人設請命伐之紂必不許而文王不聞以擅興為嫌也虎雖有罪餘裔豈不可建置而遂作豐邑密人侵阮徂共遏之足矣而遂作程邑詩人美之曰我陵我阿我泉我池不聞以攘奪為嫌也文王猶有方伯之命至湯之征伐又曷嘗受命於桀哉聖人以天自處見天下之亂非己不能平蒸民之生非己不能定故非常之事行之如日用飲食無有疑二所謂先天而天弗違後天而奉天時也此詩三言帝謂若天諄諄然命之其義深矣後世如劉虞朱雋皇甫崇操得為之勢而自潔其身以至喪身亡國人皆惜之然非聖人不能行權世變愈下設冒不韙而無成事悔豈可追故無湯文之德則三子所守不可易也小雅采薇三篇文王勤王之師以伐昆夷儼狁者也皇矣後四章則文王受黃鉞得專征伐之後伐密伐崇者也奉紂之命則曰自天子所又曰王命南仲處處提出至尊蓋文王所自作也此詩則曰王赫斯怒又曰下民之王若自為天子者然蓋既有天下之後後人頌美之辭也靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉民之附周久矣豈始於文王即六州之民其心附於文也久矣豈始於靈臺之詩序云民始附何哉鄭康成曰文王受命而作邑於豐立靈臺有聲之詩曰既伐于崇作邑于豐夫乃知此詩承上篇伐崇之後也崇侯稔惡其民習染已久以文王之師圍之三旬嬰城固守而招附不來至執訊攸馘不之懼其怙惡而抗王師可勝言哉滅崇之後徙都于豐漸仁摩義數年之間民風丕變靈臺辟雍以次而舉民樂其樂不日成之於是而知崇民之始附也附者歸也心悅誠服如子之樂趨父母也文王受命而下講師贅說耳前二章文王遊觀之樂也後二章文王視學之樂也未嘗及民之樂其樂而文王之樂在庶民心目中看出民之樂即在文王之樂看出孟子所謂欣欣然有喜色而相告詩人已摹及之靈臺四章二章章六句二章章四句下武繼文也武王有聖德復受天命能昭先人之功焉繼文者箋言繼文王非也蓋武王繼先王之文德也下篇曰繼伐武王繼文王之武功也武王之武功彪炳千古而文德似不及三后故此曰繼文言與三后克配也文王之文德肅雍無射而武功或歉於武王故下篇言繼伐言武王之伐本之文王也逸齊云言文德則非文王所得而專言武功則非太王王季所得而與詩人之言豈苟然哉一章詩旨雖云繼文而下篇即云繼伐非薄武功也安得云下武况樂曰大武諡曰武王豈以武為下竊謂下後也武步也謂後人之步武也下章繩其祖武正與此武字相應言後人步武惟周最盛蓋世有哲王追蹤甚難而三后在天之靈武王配之於京師無愧焉于京化國為天下也配之者其德足以武前人而不爽也二章配之奈何以其能起而求先世之德以繼之也世德之所在即天命之所在求字中便是永言處如太王之不隕厥問王季之克明其德文王之緝熙敬止足以享天心者武王皆見于實心實政而天下無不信之也三章信之斯式之矣然世德非有他也亦曰孝思耳其為下土之式亦非有他也孝思以為之則耳四章信之式之斯媚愛之矣其媚兹一人而丕應恐後者不以武功而以順德也順德維何即此永念之孝思以嗣先王之事而已武王化國為天下其善繼善述處使有一毫曖昧便不可嗣我先王昭哉言所以嗣服者甚是光明而無一不可告之先祖也五章光明心體可以傳示後世苟能繼此孝思之迹則人心所歸即受天之祜矣祖武兼三后及武王言之六章受天之祜豈獨諸侯來賀已哉萬年之久且逺獲諸侯之佐助屏籓王室以事一人然則孝思之所及無窮矣下武六章章四句文德莫大於孝孝者天命人心之本也傳於先世謂之世德繼其前人謂之嗣服實心行之謂之孚無所不順謂之順德傳於來世謂之祖武孝思之外無所為文德也周家世篤忠貞小心服事未嘗以武功為孝武王一戎衣有天下於孝思上或者可疑而不知正孝思之大也中庸達孝一章就制作言之此詩就心體言之故曰求曰孚曰思皆指心體也天命所眷即吾祖考之命故屢言天命人心所歸即吾祖考之心故屢言下土而首章提出三后在天便見左右陟降如相提命一舉一動何異稟命而行乎文王有聲繼伐也武王能廣文王之聲卒其伐功也伐武功也積功曰伐繼伐者言武王能繼文王積纍之武功也一章聲名譽也人之稱文王以德不以功未免功以掩德此述文王武功先以有聲發之以見非猶夫人所稱之名譽也用武而本之求寧觀成此功之所以大而聲之所以駿也求寧觀成直貫全篇蒸當為美盛之意乃贊美之詞二章文王受命伐崇作邑舉其大者其實三分有二天已將代商事命之文王矣後四章於武王不言受命者言天己命文王武王但繼之耳不須更命也三章聿追來孝追求從來之孝思而繼述之也直推到不窋失官以後公劉太王王季一段恢宏前緒精神四章文王滅崇便作豐徙都或者利其土地不無曖昧不知王者作事大公無我四方所歸非豐不足以安其居止繫其趣向理所當為為之勿疑豈有一毫自利之隱傳云翰幹也疏云幹築墻所立之木幹與墻為法蓋作垣依倚乎幹而四方依倚乎文王也五章按豐水在豐鎬之間東北流入渭注于河豐邑在豐水之西鎬京在豐水之東今曰東注則已指鎬京言維禹之績以禹功况武王之作鎬也可知此二句己含遷鎬意四方攸同皇王維辟猶所謂中天下而立定四海之民也故下章專以興學言之六章鎬京辟雍重建學行禮至無思不服武王方完得求寧觀成之事七章考卜惟王宅是鎬京乃補寫作鎬事八章生民曰惟糜惟芑芑白粟也與此同武王豈不仕原解云仕仕以官也豐水之涯猶有嘉穀人材長養猶嘉榖然武王豈不任材而仕之百年之計在樹人其仕之者將以遺孫謀而燕安羽翼其子也按此承上建學行禮來下武曰不遐有佐思齊曰譽髦斯士綿曰四友皆此意也文王有聲八章章五句文王之武功多矣如伐邗伐耆伐密須伐昆夷皆是何以獨舉伐崇以作豐也伐密亦作程邑然程未嘗徙都也自古帝王建都是第一事㑹天地之和據山川之勝為天下繫臣民之望為子孫樹不拔之基勢之强弱國之興衰皆於此卜之故詩人美公劉太王不言他務但曰遷豳遷岐而已文王之武功武王之繼伐亦但以作豐作鎬該之自岐之豐自豐之鎬去西戎而東即華於是芮邰岐畢吾西土蒲姑商奄吾東土巴鄧楚郢吾南土慎肅燕薊吾北土通道於九夷八蠻刑措不用者四十年嗟乎豐鎬宅而周以興豐鎬失而周以亡平王能三復斯篇何至以百二之險拱手而讓之秦人也哉文王之什十篇六十六章四百一十四句詩序補義卷二十
