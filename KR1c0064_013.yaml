body:
  text: 詩序補義卷十三石泉縣知縣姜炳璋撰豳此七篇得名為豳者以七月一篇陳豳之風俗也箋謂周公居東都作朱子援董氏說辨之然左傳季札于豳曰美哉樂而不淫其周公之東乎知鄭非無本也按周公攝政之初三叔流言公云我之弗辟無以告我先王因而避居東土公之在朝也朝夕納誨以詩為教如大雅陳戒之什是也公遜于東辭王而行此心惓惓不能自已于是舉公劉以來歷世從君民一體上培植之王業作為詩歌瞽矇諷誦以教之成王如親聆周公之訓而公之居東猶之在朝矣故序曰陳王業也以是推之鴟梟搖動我王業者也東山公之保全王業者也伐柯九罭狼跋見公之一身王業所係也故王業二字七篇之主腦不然一是豳詩一是居東之詩地之相去千有餘里世之相後千有餘嵗槩曰豳風可乎公劉遷豳而兼言后稷推所本也成王能知從前創造之艱難則知今日保守之匪易而公與王一本同原存亡共之何嫌何疑不特使王因詩而悔悟并亦使三叔聞言而革心惟國史善體周公之心故以居東之詩盡繫于豳惟季札深知周公之志故曰周公之東然則七月之篇非作于居東都之日乃作于將往東土之日也時未有東都鄭云東都從後之辭也夫後世武侯奉命出師猶上前後兩表諄諄以先帝為言况周公此時遭疑謗而將久違庭闕哉顧何以不言豐岐言豳則統乎豐岐矣何以不言邰不窋失官自竄戎翟已無邰矣七月陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也孔叢子曰于七月見豳公之所以造周也金氏履祥曰七月之詩周公遭變時所作也夫成王方有疑于周公公方避位居東而顧為是諄諄幾于强聒者嗟乎此周公忠愛之誠也夫豈以居東而遂忘其君也哉其脫然無纍之心與拳拳不己之心並行不悖也此詩是周公避位時作而却無一語及當日事情是周公陳王業而却無一語及創業艱難是欲成王懷保小民而但言民之愛親其上欲成王重民事而但言民之自力其事即農桑狩獵場圃居室以及草木禽蟲俱是他處所同未嘗一字及邠土亦未嘗㸃出邠岐地名但以時令為經衣食為緯民風景物為絢染使人于諷誦之下開卷即知為豳風而稼穡之艱難生民之疾苦昔日締造之勤劬今日時勢之搖動一一于言外得之此之謂風通體不言教而公私老幼秩然禮樂之所以興也通體不言官而獨舉田畯勸相于此勤也通體不言喪祭而開冰一見之典禮于此秩也通體不言酒而介眉稱觥用之儉德于此著也通體不言兵而于貉見之武備于此修也通體不言役法而于執宫功見之庶民所以子來也凡占天察地明倫定制備器築室染采褐衣裘裳實為周禮一部骨子而總無一字及刑蓋純以德化周家所以刑措四十年而不用也未㸃出萬夀無疆一語則欲王之念爾祖修厥德以承此無疆之休也至矣要須知邠民所重者養而節節有個教在邠民所重者情而節節有個禮在一章謀衣處止計其終從反面寫出謀食處專計其始從正面寫出蓋男耕女織須一時並進不得謀却此事舍却彼事也又須先時經營不得到得此時方謀此事也故此章為全篇提掇正見衣食兩事離開不得措置不盡無衣無褐何以卒嵗問得極真切是聖人設身處地心誠求之處同我婦子饁彼南畝田畯至喜見他少長合作士依婦媚吏至歡欣吏去踴躍下七章皆如是觀二章再言春日疏謂傷悲在蠶生之初不當在求桑之下故更本春日言之非也蓋求桑之女非即采蘩之女也春日為育蠶之候其有差早可食桑者則女出而求柔桑未可食桑者則采蘩以飼前後兩番紅女各乘春光和煦之時安得不俱以春日引起如無春日遲遲一語似蠶食桑之後又食蘩矣似女既求桑又求蘩矣此正見前日既勤後日更衆通國無一女之不蠶鄭氏以仲春為婚姻之期觀此章益以傳霜降逆女之言為信如從鄭則春日正婚姻之候已及公子同歸矣何暇在家蠺事且已及時又何云逮及集傳用豫字亦以此時非婚姻之期矣逮及公子同歸女公子也春秋傳凡公女嫁于敵國姊妹則上卿送之公子則下卿送之于大國雖公子亦上卿送之又公孫蠆以其子更公女而嫁公子又圉人􅕌自墻外與女公子戲皆可證也此時采桑者見女公子之躬桑不言而傷悲知其將與之同時而于歸不得久事其父母也三章前兩言七月流火九月授衣首章是一直說下從今年挨說到明年次章是從治蠶時預想到下半年流火授衣之時故汲汲也此七月流火八月萑葦蓋追言去年流火後取萑葦為棲蠶之具至今嵗治蠶之月采桑供蠶食而以所蓄之萑葦棲之也蠶事備矣而後載績之事起焉四章自二章至此皆言謀衣却每章作兩番寫此言冬獵之事上假是豳民自往取獸下假是邠公行田狩之禮而通國皆行也纘繼也謂舊年行之今年復舉搜苗獮三者行之于前而冬狩復繼之也農事既畢常恐不足禦一嵗之寒故大閲以前任民往取大閲之時通國皆行前言取狐後言獻豜互文也獻豜者或為祭祀賔客及充君之庖此章專言禦寒而忽及獻豜乃餘意以見邠民忠愛無已也五章舊以上卒嵗為邠公奉夏朔此章改嵗邠民自相紀候建子為嵗首其說非也君民豈有異朔此改嵗即指建寅之月蓋穫稻納稼十月中非無所事玩下章乘屋在十月之後則此墐户等事亦當在十月後矣古人之宅二畝半在邑二畝半在田言農夫往治邑中之室然後率其婦子入而居之若曰入此室處可以更嵗矣集傳下將字作將然未然之詞甚妥自孔疏吕氏以三正之說雜之則與何以卒嵗有礙但言物候及塗塞之事便覺寒氣逼人並未用一正筆寫寒若用一正筆則犯觱發栗烈二語也斯螽莎雞蟋蟀集傳以為一物按斯螽股鳴莎雞翼鳴蟋蟀注鳴經史中從無一物而股翼注俱能鳴者則三物也顧氏兆麟云先言在野在宇在户後以蟋蟀總承之六章亦兩層分說上言養老下言食農零星㸃綴而貴賤之等摘取之方生熟之節烹調之宜無一不指㸃分明正如家長數家珍一蔬一果逐事關心也故愈瑣細愈見王道濶大篇中每說一事必以時令引起七月之通例也七章邑居則塞向墐户穹窒熏鼠治之更無遺力何待再執宫功嚴氏云宫公室也邠民一絲一獸皆不忘君何獨于宫室忘之想見樂事勸功尊君親上之意邑居既治于前乘屋自指野廬說設或不治即無以為播榖之居安得不亟八章言農事畢而飲酒燕樂也亦所以推廣首章後假之意七月言民風而鑿冰開冰獻羔祭韭微及國政蓋衣食具備人民和樂即賔祭老疾無不與以調劑之宜見邠公無一事不為之節宣而邠民無一事不受君上之澤也以起下文稱觴願壽之意邠民既躋公堂以飲君則其自相為飲及君燕羣臣可知季札所為樂而不淫也七月八章章十一句七月之篇紀候或以日或以月先儒之言多不可據傳箋云一之日周正月也二之日殷正月也三之日夏正月也四之日周四月也然則三正既立其於二月不必云四之日矣孔疏知其難通而小變之謂日陽而月隂也建子之月陽氣初動故日之則無以解于建已之稱月也則又云四月純陽用事微隂初萌故月之也夫建已之月其卦純陽建亥之月其卦純隂純陽而隂初伏從而月之純隂而陽初伏乃不從而日之乎又先儒謂豳國僻逺無純臣之義自有私紀其時月者竊謂周家世篤忠貞文王事紂之日其繫易如臨之八月有凶復之七日來復猶用商正豈后稷公劉之世當虞夏時輒改時王之朔乎夏仲康雖微羲和俶擾天紀即有𦙍侯之師而何有于公劉三代雖云異朔而其上治天道下治民事皆以夏時為凖詎邠民生當其世而反用子丑之朔必不然矣然則一之日二之日孰定之曰周公定之也驗之七月流火之文矣據堯典日永星火以正仲夏七月而大火西流成周之時非虞夏之世也可知篇中以日紀月自周公言之非邠民當日自有之名也循邠民之俗純用夏時而必改稱一之日二之日者一嵗之中必有嵗首詩邠風也作詩之時成王之世也公將以子為嵗首而曰此正月也既與夏時相戾且下章四月五月等皆不可通如以寅月為正月則本朝正朔之外又有一朔是使天下二朔矣非所以大一統也周公作詩既不敢顯悖豳時之俗復不敢上干本朝之制因以十者數之終也十後以起其數連十言之則為十有一矣除十言之則直謂之一可矣曰一之日二之日又曰何以卒嵗二之日而卒嵗夏時也但避兩正月之名而示以從夏時之實聖人之情見矣必連舉四之日者何也子丑者夏時之終寅卯者夏時之始即始終之各二月日之是從夏時而仍不失尊王之義者也周禮籥章歌豳詩以逆暑迎寒又曰祈年于田祖則吹豳雅以樂田畯祭蠟則吹豳頌以息老物考之于詩未見其篇章所在三分七月之詩以當之謂殆及公子同歸以上二章為豳風十月穫稻為此春酒以介眉夀以上四章為豳雅稱彼兕觥萬夀無疆以上為豳頌者鄭箋也謂本有是詩而亡之者王氏安石也謂七月全篇隨事變其音節者王氏質也以甫田為豳雅豐年為豳頌李氏景齊也以蒸民諸篇為豳雅思文噫嘻豐年載芟為豳頌王氏志長也以甫田大田為豳雅載芟良耜為豳頌何氏楷也按周鎬京也邠公劉所遷之國也地既不同周天子也邠諸侯也爵亦懸絶安得以周之雅頌為邠之雅頌耶周雅周頌而言豳何異以周南為豳南乎夫豳本無風所云豳風周公居東前後之詩耳惟七月一篇係周公所陳王業實為豳地風俗固不得移而之魯亦不得移而之周也周禮言豳詩豳雅豳頌自當于豳求之逆暑迎寒祈年祭蠟皆民間之事自當于民間風俗求之則舍七月一篇其又誰屬也生民思文地則邠矣而后稷配天豈民間所用載芟良耜則農事矣然為天子之祈報且亦未聞作之于邠也鄭氏三分七月之篇饒氏魯謂一詩而備三體說非無稽且周禮言邠詩邠雅邠頌而不言邠風明以此三者皆在邠風也後人欲與鄭辨而無據安見齊得而楚失哉鴟梟周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟梟七月作于周公將往東土之日其詞平其意隱從容不迫聖人處變之道也此作于居東之時四國將叛之日欲王悔悟而急圖救正也故其情危其詞急呼號迫切聖人救亂之心也一章通篇豫我俱指鳥俱周公自比非前則喻先王而後忽自况也蓋以鳥之惜其子比己之惜其兄弟以鳥之愛巢比己之愛王室恩斯勤斯在鳥則謂自己撫育此子在公之意以比吾與兄弟俱本文考之毛裏同受恩勤共此一本亦共此一巢奈何骨肉視為仇讎從鴟梟而不顧乎鴟梟鴟梟猶云祿父祿父云爾如祿父已誅而猶欲其無毁我室無是理矣既取我子言取之而去使之黨惡也黨惡而叛君父必誅死周公豈欲死其兄哉如二叔束身待罪縛叛人以獻可以救其死亡篇中抑鬱沈痛展轉呼號不特悟王即以之告叔可也二三章集傳次第井然綢繆牖户以比己深愛王室之意蓋承上章鬻子閔斯來言我之親者莫親于管蔡我使之監殷正所謂逮天之未隂雨而豫為牖户之綢繆也三國鼎峙互為聲援以制一小腆之武庚尚敢有侮豫者乎豈意變生不測綢繆之計適遺以搖蕩之謀豈二叔未知吾經營王室之瘁乎吾向也拮据蓄租捋荼亦曰王室未成未有家室耳彼固親見之者也今家室成矣而仍使我譙譙翛翛而殺且敝使我室翹翹而危之甚使風雨漂搖而內變外患之總至此固非尋常意料之所及我于此時維音嘵嘵訴于王而已蓋名為責武庚故開口呼鴟梟而其意實沈痛于二叔之助逆而有難于顯言者不覺其言之痛切至斯也鴟梟四章章五句自金縢之篇曰我之弗辟我無以告我先王孔傳讀辟為誅辟以居東為東征馬融鄭康成讀辟為避居東都集傳主孔說而晚年與蔡九峰帖謂宜從鄭氏竊嘗詳考當日時勢參之經傳知朱子晚年之論定者是也有從孔傳而謂二叔流言與武庚之叛不是兩時者夫成王雖少賢主也二叔突然稱兵云將不利孺子其信之乎漢昭帝猶識上官傑毁霍光之誣况在成王書曰管叔及其群弟流言于國中蓋輦轂之下奸人密布互相傳播以達于王而不知主名者誰也若流言時便起晉陽之甲則當云宣言聲言非流言矣謬一也且公何忍逆料流言必由管叔乎即或知之便誅叔以滅口是益成王之疑也夫居東二年鴟梟作而王疑猶未釋然斯時肯授公以兵乎而曰疑者聽其疑天下未安公當以兵安之則後世之拜表輒行矣謬二也周公既去以重任付之二公二公亦周公也甘棠治內鷹揚治外滅此小腆裕如也而况齊魯虞虢陳魏諸賢侯皆與密邇而後儒恐武庚長驅入鎬謬三也書曰王迎公歸嵗則大熟則公還朝當在九月東山詩曰倉庚于飛熠耀其羽公之東歸當在二月如以還朝東征為一年事是奏凱而還頓兵郊外咫尺不見天子自二月至九月必天子郊迎而後入也何以為周公且東山既平而猶曰風雨漂搖耶謬四也或又曰大臣去位王何以不留而居東者果誰東也謂在東都則洛邑未營謂在東魯則公未之魯嗟乎為此說者得毋以公之居東若後世大臣削奪杜門掃迹者哉成王疑公未嘗誚公也意是時公必請命于王為鎮撫東土而行公豈欲顯成王之過哉詩曰衮衣繡裳又曰赤舄几几非待罪之服明矣然則何以知其為東都也洛邑未營東土則在版籍鄭曰避居東都從後之辭耳居東二年不特罪人斯得并所謂澗水東瀍水西周覽無遺後此作邑已預計于此時而謂王不留公公不居東土謬五也狼跋云公孫碩膚孫者避也即我之弗辟之辟也如叔謗公公曰我不殺叔無以告我先王其詞尚有成王哉且夫周公非不可磯者也攝政之時叔如貽書讓公謂權位太重得毋不利孺子則公將興兵誅之乎抑反覆開諭之乎即居東二年已得其狀意必使人曉之而堅不可動是公未嘗不欲生之而叔已絶其生之路風雷變成王悟公還朝叔益不自安遂挾武庚而叛故書金縢之後大誥次之詩七月之後鴟梟次之東山破斧又次之乃學者獨疑經而信孔傳其謬六也或又以東土為東郊則書言王出郊者馳驛召公王出郊以俟之耳出郊天雨反風不待公之至也以為公先在郊其謬七也今以周公居東東征前後考之書傳謂公居攝一年救亂二年克殷三年伐奄其說是也六年春營洛是年冬洛邑成七年留治洛然則流言當在元年罪人斯得當在二年鴟梟之作當在三年是年秋公還朝管蔡叛即以是年冬東征也制作禮樂當在七年蓋成王年十三踐祚至此年已二十四矣而說者乃疑公攝政七年無日不在東營洛遷頑制禮作樂日亦不足謬八也其餘諸論尚多皆主孔傳無一而可者也東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之于人序其情而憫其勞所以說也說以使民民忘其死其唯東山乎此詩周公所自作言其完者歸士完全也言其思者征夫思其室家也室家望女則室家之望征夫也男女及時各遂其願也而完字尤為一篇之綱戰危事也東山之役設有死傷雖奏凱西旋而父之哭其子婦之哭其夫者多矣周公之心天地父母之心也豈舍哀死憫傷寡婦孤兒之隱而專論其室家之情好哉誠以仁義之師又好謀而成故在彼無屠戮之慘在我無輿尸之凶全師而出亦全師而還及其既歸勞士也但言其室家懸望之苦男女及時之樂而他無聞焉則斯時父慶其子兄慶其弟里閭族黨之相歡樂無不包舉其中蓋惟我能勝人然後可以不妄殺亦惟不忍殺人然後不為人殺之智之盡仁之至也嗟乎如東山之捷者有之矣能如周公之完師而還有幾人哉𥙷正云篇中屢言室家男女之情而不及父母與小雅勞使還役之詩異何也古者征役逾時則返至三年之久則父母或有存亡之感上之人不忍形容歌咏者矣自古無别父母之詩蓋人子之所不忍言也即此見聖人之曲盡人情而止于義理之極矣正言父母以及家室杕杜之所以為雅也言家室而已包括父母東山之所以為風也其義一也首四句宜作周公自言若述軍士之詞便于三四章有礙言我來遇雨則軍士之苦自見一章首四句言方啓行也故下云我東曰歸二章言在途益久歸心益急故下云伊可懷也三章言家已邇而將至也故下云我征聿至每章重述一過一步近一步至末章則東山零雨是追憶之境一章言我之自東而來也征途既逺零雨又濛爾征夫莫不曰我東曰歸我心西悲然捷音已達于京畿斯時我室家皆制彼裳衣以待我而知我勿事行枚也因采桑而見蜎蜎之蠋在于桑野皆相謂曰彼敦然獨宿之人亦在車下矣在車下則啓行而來矣此制裳衣是室家初聞捷音喜而豫待三章婦嘆則望久不至而歎也灑掃則裳衣既成而修潔其室也立言之叙如此二章從征夫意中懸空說出無限凄凉景况宛然在目可驚可畏然歸心孔亟不覺可畏轉覺可懷蓋旅人在途心已在家極不堪景都是可親可愛也此二畝半在田之室廬也下章穹窒灑掃則二畝半在邑之室也程說自明三章皆周公之言末二句述征夫之言也以為鸛鳴于垤矣爾征夫之婦亦嘆于室矣婦知其夫將歸莫不灑掃庭除塗塞墻壁以待征夫之至而唯恐其不至也我征東之師忽已至焉樂何如耶斯時征夫見此苦瓜蒸在栗薪之上當必曰自我不見于今已三年矣苦瓜栗薪西土常物人當羇旅初歸見家鄉一物覺心開目爽况家人骨月之重聚耶或疑不合室家望女之㫖不知鸛鳴三句是言其望而下正慰其望也四章爾雅注及埤雅皆以熠耀為螢朱子以礙熠耀其羽故更之曰鮮明也蓋前此一路東來零雨不已至此則春光晴好景物鮮妍周公著熠耀二字便見日麗禽飛恰與皇駁之馬九十之儀相映昏禮依毛公霜降逆女冰泮殺止自九月至二月皆昏姻之期東歸之時適當春仲猶未過時一時嫁娶俱行新舊對說言無人不遂其願也東山四章章十六句破斧美周公也周大夫以惡四國焉後序謂周大夫惡四國其說誠非朱子謂作于軍士是也蓋此東征之將辨有明禮義深知周公之心而托為軍士之辭也首序盡之書多士云昔朕來自奄豫大降爾四國民命多方云告爾四國多方則四國俱指管蔡商奄此傳之所本也首二句作喝起之勢下四句是釋其所以如此也蓋祿父誅管蔡戮幾于破斧缺斨不知周公者以為近于寡恩矣而抑知公之東征誅一二人之不正者使天下之人皆歸于正以共享承平之福其所以哀天下者甚大破斧缺斨豈得已哉說一哀字見其征誅所及乃其惻怛慈愛之意遍滿宇內也實從上文皇字看出兵凶事也曰嘉曰休猶之刑曰祥殺曰義也破斧三章章六句詩緝斧斨樵蘇之用不言弓矢干戈矛㦸而專言斧斨錡銶者蓋東征之師不尚殺戮許氏謙主其說按武王之伐殷也民苦紂虐久矣王師之來如苗待雨若東山之役紂惡既消故君生感祿父有必死之志頑民有從義之心加以管蔡霍奄徐淮夷諸國方且以文考忠貞周家臣節為辭武王之取殷歸罪周公太公成之者而周公親總六師以片詞解散其黨吾知難也觀于既平之後猶營洛邑以處頑民則此日之時勢可知矣故謂東征而未有誅殺者非也然公仁人也全藉兵力則先軫優為之何必周公公于此時手提京旅又合庶邦友君尹氏御事兵力既强戰則必勝可以旦夕滅之而必遲之三年即多士所謂豫大降爾四國民命豫惟不爾殺之心也始之以文告繼之以招撫而禮義之所不能諭者然後以兵兵之而猶不忍妄動多殺也如他書所載客有獻微言于周公公曰唯唯明日興師而誅管蔡蓋相機而動極其神速于是祿父殺而殷民之望絶矣管叔誅而烏合之衆散矣若奄若徐戎淮夷不過傳檄而定絶不費手易所謂神武者非耶毛升曰此詩乃東征之後四國之中有知周公之心者作此以美之也四國管蔡商奄也既破我斧又缺我斨言周家兵力之强我雖有斧斨無所用之猶所謂矢盡弦絶乃寫一時敗北耳然周公之東征也乃所以正我四國之人心而哀之所以變化我四國為惡之心而使之嘉美所以斂固我四國渙散之心而使之休美也豈有意殺之哉是周公不忍殺人之心四國中知禮義者亦深服之也存之以備通經者采擇焉伐柯美周公也周大夫刺朝廷之不知也諸家從後序刺朝廷之說箋謂詩作于風雷之後猶疑周公故刺之不知風雷之後即啓金縢王即悟公即歸矣程子謂作于既得罪人之後刺不知所以還周公之道詩故周公將歸貽詩二公說皆未安詩學周公居東以禮化民昏姻其一節耳豈周公未之東土娶妻無行媒耶皆說之不可從者且詩無美刺並舉之例也一章此深喜周公之得見也匪斧無以伐柯匪媒無以娶妻以比匪流言之變則無以見周公也或疑近于幸災樂禍不知東人喜見周公之至而無以形容之一若流言之人直為我作見周公之合者無異斧之于柯媒之于娶也二章當為興不必䝉上章來上章喜其至此章樂其教也伐柯伐柯即此舊有之柯一視效之而其柯已成可見其則不逺也我覯周公而公之教我即此舊有之禮制一整頓而籩豆已秩然有踐矣豈必逺人以為教哉蓋分陜之時教化大行公至東土再為整飭而禮教煥然一新其實即其舊有之規模而詳悉示之耳非有所加也故中庸引之以為道不逺人之喻專言籩豆舉一以該其全也聖人過化存神不待後此制禮作樂而禮教東矣他日遷頑民于此得毋欲其薰炙此邦之風俗乎伐柯二章章四句九罭美周公也周大夫刺朝廷之不知也成王既悟出郊躬迎而猶刺朝廷之不知無是理矣三復集傳字字當以金鑄一章九罭不過尋常之魚網耳乃得鱒魴之美魚我東土不過尋常之下里耳乃觀此衮衣繡裳之之子蓋于將歸之日追叙初至之時不勝其驚異也衮衣繡裳上公之服知公之避東乃為天子鎮撫東土非去官也二章鴻鴈北鳥有時而南謂之鴻鴈來賔南方多洲渚遵渚鴻之來賔時也以喻周公來于東土三章北地髙平南方下豬遵陸北歸也以鴻之北歸興公之西歸上章言遵渚是喻其來似以東土為所矣然公歸豈無所乎特于女信處而已此章言遵陸是喻其去鴻去當再來詩人深慨公之不復也故云公歸將不復矣特于女信宿耳四章是作詩主意九罭一章四句三章章三句狼跋美周公也周公攝政逺則四國流言近則成王不知周大夫美其不失為聖也此詩蓋作于既歸之後東人追叙而美之也竊謂此章言狼貪故前後皆失其宜聖人無欲故進退皆安其度其前也避位居東無所愠也其後也王悟而迎無所喜也始終赤舄几几而已成王幼周公攝相上為宗社下為生靈所謂美之大者也流言者即以是為詞故不得已避此大美而不居自非聖人必有憤悶不平之意形于動靜及其聞王悔悟迎已可以成此大美矣未免喜極而改其常度而聖人處之從容安舒者其故何也有貪欲則拂之而生其怨望遂之而喜不自持無欲則渾然天理正大光明故惟音嘵嘵者憂勤王室之心赤舄几几者樂天知命之素並行不悖者也嚴氏粲曰狼猛健之獸雖善用兵者禦之亦不能免平時不至跋㚄其老者頷下垂胡若在平地亦無跋㚄之理所言跋胡㚄尾謂其落機阱之時進退求脫不得耳以事言謂之碩膚以名言謂之德音美名者功在社稷福在民生名之甚美者也今曰不利孺子則此名若有玷缺乃公以一避消釋羣疑而罪人斯得及風雷之變王悟公歸令聞令望何嘗有一毫缺憾也集傳德音猶令聞也指美名言是也蓋德之實君子能諒之若當時之名則見許于君子者未嘗不疑于一二人如成王不以為忠雖無損于實而已受玷于名矣周公始則見疑終則悔悟于是合上下朝野天下後世無一人不知其實并無一人不仰其名詩曰德音不瑕可謂形容曲盡矣狼跋二章章四句許氏謙作豳風次序圖七月之後即次以伐柯狼跋鴟梟九罭而以東山破斧殿其末竊以為非夫子序詩之意也七月鴟梟東山皆周公所自著者序于前而流言居東復國東征之顛未明矣破斧以下四詩皆人之美周公者也以破斧繼東山從其類也伐柯九罭狼跋皆東人所作者而以狼跋殿夫子非無意也蓋攝政似過專用二叔似不智居東似畏禍鴟梟似怨東征似憤并管叔誅之似忍皆所謂瑕也夫子特揭德音不瑕一語以收束豳風之全以見周公所以如此者皆出于天理人情之至而無一毫私意行乎其間其在當日已如日月之昭明萬古而下豈為奸邪之口實故狼跋詩人不必綜周公之全局而夫子編詩之意已盡元聖之生平也豳風七篇二十七章二百三句詩序補義卷十三
