body:
  text: 詩序補義目録詩類卷首綱領卷一國風周南卷二國風召南卷三國風邶卷四國風鄘卷五國風衛卷六國風王卷七國風鄭卷八國風齊卷九國風魏卷十國風唐卷十一國風秦卷十二國風陳檜曹卷十三國風豳卷十四小雅鹿鳴之什卷十五小雅南陔之什彤弓之什卷十六小雅祈父之什卷十七小雅小旻之什卷十八小雅北山之什卷十九小雅桑扈之什都人士之什卷二十大雅文王之什卷二十一大雅生民之什卷二十二大雅蕩之什卷二十三周頌清廟之什臣工之什閔豫小子之什卷二十四魯頌商頌臣等謹案詩序補義二十四卷國朝薑炳璋撰炳璋號白巖象山人官石泉縣知縣是編用蘇轍詩傳之例以詩序首句為國史所傳以其下申明之語為經師所加謂之續序亦謂之後序但轍竟刪之炳璋則存其原文與首句中離一字書之以示别耳其大意以講師所加多不得原序之義故往往詞意乖舛為攻詩序者口實因辨别其文闡首句之旨而訂附贅之謬故命曰補義其論江有沱謂古者嫡媵並行無待年於國之例然春秋伯姬歸紀叔姬歸􅀈實非一年之事未可斷其必無論魯頌謂用天子禮樂自吉禘莊公始見於經斷以為僭自僖公然吕覽史角之事雖出雜説而考仲子之宫初獻六羽注謂前此用八故曰初獻是已在隱公時矣是皆過於考證轉失之眉睫之前他如論野有死麕以厖吠為喻之類亦失經旨要其恪守先儒語必有據而於廢序諸家亦置而不爭不可不謂篤實之學也其綱領有云有詩人之意有編詩之意如雄雉為婦人思君子凱風為七子自責是詩人之意也雄雉為刺宣公凱風為美孝子是編詩之意也朱子順文立義大抵以詩人之意為是詩之旨國史明乎得失之迹則以編詩之意為一篇之要尤可謂持平之論矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書詩序補義卷首石泉縣知縣薑炳璋撰綱領序稱大小古無是説也唐陸德眀云舊説起后妃之德至用之邦國焉名關雎序謂之小序自風風也訖末謂之大序是分一篇為大小序已啓朱子離篇之始程氏大昌云凡詩發序兩語如關雎后妃之德也世謂小序者古序也續而申之世謂大序者衛宏語也范氏處義云小序一言國史之所述也小序以下皆大序亦國史之所述也按諸家以詳略分大小于義無害獨鄭氏樵以名篇二字為大序以下為小序其説最謬朱子分詩者志之所之也至詩之至也為大序引以冠經餘首尾之文及各篇之序謂小序此又以總論綱領者為大序而以分著各篇為小序也沈氏重云按鄭詩譜意大序是子夏作小序是子夏毛公合作或云小序是東海衛宏作成伯瑜詩説關雎序首尾相結冠束二南故梁昭眀亦云大序是子夏全製其餘衆篇之小序子夏惟裁切初句耳按諸説當以程子之説為允程子曰詩大序其文似繫辭蓋夫子慮後人之不知詩也故序關雎以示之學詩而不求序猶入室而不求户也又曰使當時無小序雖聖人亦辨不得國史得詩必載其事然後其義可知今小序之首是也其下則學者之辭也是以首篇為大序夫子所作而衆篇之首為小序國史所定也張子曰詩序亦有後人添入者則極淺近自可辨蓋指小序以下之續序及大序中憂其進賢不淫其色數語也今從程子之説以首篇為大序每篇之首二語為古序其下學者之辭為續序亦曰後序與古序離一字庶幾無魚目之混攻序者以序為毛公衛宏所作尊序者以序首二語為孔子所作皆非也蓋序者國史之題辭有詩即有序序在孔子之前假樂序云嘉成王也中庸曰嘉樂君子左傳亦曰嘉樂君子知左氏子思之從序矣孟子論小辨曰親親仁也蓋以宜臼之傅述宜臼之言為得親親之仁也若平王忘親戍仇安得有是詩又安得以為仁故朱子注孟子亦改集傳從序孟子曰誦其詩讀其書不知其人可乎是以論其世也非序何以論其世何以知其人知孟子未嘗不讀序也古序為國史定論詩學之津梁集傳集諸儒大成取士之正鵠集傳未安寧從古説黃東發云晦庵古説學者參之有詩人之意有編詩之意如雄雉為婦人思君子凱風為七子自責是詩人之意也雄雉為刺宣公凱風為美孝子是編詩之意也朱子順文立義大抵以詩人之意為是詩之旨國史眀乎得失之迹則以編詩之意為一篇之要鄭漁仲説詩往往自相矛盾如云武帝時毛詩始出自以源流出于子夏當毛公之時左氏傳未出孟子國語儀禮未甚行而毛氏之説先與之合不謂源流子夏可乎漢興三家盛行毛最後出世人未知毛氏之密其説多從齊魯韓氏逮至晉魏有左氏國語孟子證之然後學者舍三家而從毛氏從韓氏之説則二南商頌皆非治世音從毛氏之説則禮記左氏無往而不合此所以毛詩獨存于世也又云序謂變風出于情性止于禮義此言見夫王澤雖衰人猶能以禮義自防也其推尊序傳至矣至其作辨妄一書力攻古序殊不可曉序言簡而該旄丘曰責衛伯細味詩言皆責字之意也擊鼓曰怨州吁細味詩言皆怨字之意也序以一字括全篇者多類此序言隱而彰緑衣日月終風三詩皆言莊薑傷已也續序者撰出思念州吁認賊作子倫理俱亡細心繹之乃知緑衣傷已不得輔君子成內治也日月州吁之亂傷已無以致鄰國之見正也終風傷已不能討賊也詩義自眀序但引而不發序當于無文字處會之靈臺序云民始附也承上章伐崇之事蓋既伐于崇作邑于豐遂作靈臺于崇地而見其民之歸心也噫嘻序曰春夏祈榖于上帝也豐年序曰秋冬報也郊以祈榖至秋冬而報之也祈必有報禮之自然也善會序意者莫如毛公然傳亦須于無傳處會之如父母孔邇父母二字無傳知其意之不指文王也日居月諸胡迭而微日月無傳知其意之非喻夫人與妾也續序雜沓支離多與古序相戾蘇子由錢文子盡刪去之然續序于芣苡云和平則人樂有子于汝墳云婦人能閔其君子勉之以正于采蘩云夫人可以奉祭祀于羔裘云在位皆節儉正直其所以發眀首序之意者不能更僕懲羮吹虀毋乃過正衛敬仲後毛公百數十年續序中有為傳所依據者則講師舊有之説非敬仲倡之也其傳所未及而續序有之則敬仲之説也漁仲不得槩云序為宏作矣王氏柏云書授于伏生之口止二十八篇參之孔壁所藏又二十有五篇其亡失猶有四十餘篇余不知詩之為經藏于何所乃如此之祕傳于何人乃如此之的吾斯之未能信于是不特詆序并亦刪詩不知詩為學士之諷咏工瞽之絃歌非他經可比夫以詰屈聱牙之今文伏生猶能誦之况詩之有聲有韻者乎魏武時猶有東漢雅樂郎杜夔能奏騶虞伐檀鹿鳴文王四篇况在西漢之世乎魯齋之果于自用亦甚矣書序可廢而詩序不可廢即雅頌之序可廢而十五國風之序不可廢此馬氏端臨之説也書序且無暇論若雅之序廢則朝會燕饗受釐陳戒之典不眀頌之序廢則郊禘祈報巡狩祭告之禮不著似雅頌之序尤不可廢齊魯韓三家皆無詩序而專門師授各自為説隋經籍志云齊詩魏代已亡魯詩亡于西晉韓詩雖存無傳之者然三家遺文賸句猶散見諸書乃關雎並謂刺詩豳風不登七月則大槩可知也范家相曰諸儒以樂之非雅者為淫聲故子夏以宋鄭衛齊皆淫于色而宋本無聲是皆鄭聲也非謂鄭風即為鄭聲古之作詩未必無邪心夫子必不留之以貽來學何者姦聲亂色不留聰眀淫樂慝禮不接心術大學之教禁于未發之謂豫鄭聲之淫夫子既必放之何刪詩猶存其什詩存而聲亦存是未嘗放也同車遵路蔓草狡童如謂淫者之作不特立意鄙褻辭亦一覽無餘惟有序則美人香草各有指歸體骨既髙風情自逺屈宋可作衙官矣聖人録此垂教豈偶然哉馬貴與謂三百篇無淫詩其説當矣惟桑中宛然淫者之言蓋述其言暴其惡而不可以辭害志也如以辭則四牡類乎怨上采薇出車類乎苦役正雅猶然况風乎况變風乎衛風之淫至刺宣薑而極齊風之淫至刺襄公而極蓋君臣父子之倫澌滅盡矣而鄭風固未嘗有此也班志惟指出其東門溱洧二詩以徴風俗之淫夫子何獨云放鄭聲知夫子所放者别有一種淫哇之曲謂之鄭聲耳非此二十一篇之詩亦非此二十一詩之聲也説見鄭風無邪可以蔽三百漢儒以為詩人之思無邪朱子以為學者之思無邪如朱子之説當云誦詩三百一言以蔽之曰思無邪今但言詩三百恐漢儒之論正不可廢康成立意尊毛故不曰注而曰箋而每與毛相左由其泥續序之言遂失古序之旨然拾遺補闕為毛氏之功臣毛傳之行箋為之也昔人云讀詩未到康成處不敢髙聲論聖賢正謂此爾古人注書但釋字義其意旨所在聽人自會傳箋之所以簡勝也孔頴達承詔旨作正義述毛申鄭不憚辭費其捃托羣書該博曉暢使人讀一經而得十三經之用則孔氏之功也詩序補義卷首
